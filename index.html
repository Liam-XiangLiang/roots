<br>(你得长点心/放聪明点，别再相信他了。)","tags":["教训朋友"]},{"id":477,"verb":"Wise up","meaning":"放聪明点 / 看清现实(别被骗了)<br><span style=\"font-size:0.8em;color:gray\">(和 smarten up 类似，美剧极常用)</span>","scenario":"<span class=\"context-tag tag-drama\">社会毒打</span> \"It's time you <b>wised up</b> and saw what's really going on.\"<br>(你是时候该放聪明点/擦亮眼睛看看真相到底是什么了。)","tags":["社会毒打"]},{"id":478,"verb":"Settle on","meaning":"最终选定 / 决定(经过考虑后)<br><span style=\"font-size:0.8em;color:gray\">(落在这个选项上)</span>","scenario":"<span class=\"context-tag tag-life\">买东西/取名</span> \"We finally <b>settled on</b> a name for the baby.\"<br>(我们最终敲定了宝宝的名字。)","tags":["买东西/取名"]},{"id":479,"verb":"Head into","meaning":"走向 / 进入(某阶段或状态)<br><span style=\"font-size:0.8em;color:gray\">(头朝向那边走)</span>","scenario":"<span class=\"context-tag tag-work\">新闻播报</span> \"<b>Heading into</b> the weekend, the stock market looks strong.\"<br>(在即将步入周末之际，股市看起来势头强劲。)","tags":["新闻播报"]},{"id":480,"verb":"Roll around","meaning":"(预定的时间) 终于到来<br><span style=\"font-size:0.8em;color:gray\">(像轮子一样滚过来了)</span>","scenario":"<span class=\"context-tag tag-life\">期盼周末</span> \"I'll be ready when Friday <b>rolls around</b>.\"<br>(等周五终于到来时，我就准备好了/迫不及待了。)","tags":["期盼周末"]},{"id":481,"verb":"Come around","meaning":"(经过说服或时间) 终于改变想法 / 恢复知觉<br><span style=\"font-size:0.8em;color:gray\">(转过弯来了)</span>","scenario":"<span class=\"context-tag tag-social\">固执妥协</span> \"He didn't like the idea at first, but he eventually <b>came around</b>.\"<br>(他起初不喜欢这个主意，但他最终还是转过弯来/接受了。)","tags":["固执妥协"]},{"id":482,"verb":"Bring around","meaning":"说服某人 / 使恢复知觉<br><span style=\"font-size:0.8em;color:gray\">(把别人拉转过来)</span>","scenario":"<span class=\"context-tag tag-drama\">谈判说服</span> \"It took me an hour to <b>bring</b> him <b>around</b> to our way of thinking.\"<br>(花了我一个小时才把他生生拉拢/说服到我们的思路上来。)","tags":["谈判说服"]},{"id":483,"verb":"Talk around","meaning":"说服某人同意(本不同意的事)<br><span style=\"font-size:0.8em;color:gray\">(类似于 bring around)</span>","scenario":"<span class=\"context-tag tag-social\">舌战群儒</span> \"I managed to <b>talk</b> my wife <b>around</b> to buying the sports car.\"<br>(我硬是凭三寸不烂之舌，说服了我老婆同意买那辆跑车。)","tags":["舌战群儒"]},{"id":484,"verb":"Win over","meaning":"争取过来 / 赢得(某人)的支持与好感<br><span style=\"font-size:0.8em;color:gray\">(靠魅力或实力战胜对方的防备)</span>","scenario":"<span class=\"context-tag tag-work\">竞选/推销</span> \"His charismatic speech really <b>won over</b> the audience.\"<br>(他极具魅力的演讲彻底征服了/赢得了观众的心。)","tags":["竞选/推销"]},{"id":485,"verb":"Take to","meaning":"对...一见如故 / 突然开始喜欢<br><span style=\"font-size:0.8em;color:gray\">(像磁铁一样吸过去)</span>","scenario":"<span class=\"context-tag tag-social\">初次见面</span> \"The dog is usually shy, but he really <b>took to</b> you immediately.\"<br>(这狗平时很怕生，但它竟然立刻就跟你一见如故/黏上你了。)","tags":["初次见面"]},{"id":486,"verb":"Grow on","meaning":"逐渐让人喜欢上<br><span style=\"font-size:0.8em;color:gray\">(It's growing on me = 越看越顺眼)</span>","scenario":"<span class=\"context-tag tag-life\">评价音乐/人</span> \"I hated this song at first, but it's slowly <b>growing on</b> me.\"<br>(我起初很讨厌这首歌，但现在越听越上头/越来越喜欢了。)","tags":["评价音乐/人"]},{"id":487,"verb":"Die out","meaning":"(习俗/动物/物种) 灭绝 / 逐渐消失<br><span style=\"font-size:0.8em;color:gray\">(彻底死绝)</span>","scenario":"<span class=\"context-tag tag-work\">自然与文化</span> \"Many traditional languages are starting to <b>die out</b>.\"<br>(许多传统语言正开始走向消亡/灭绝。)","tags":["自然与文化"]},{"id":488,"verb":"Fade away","meaning":"(记忆/声音/颜色) 逐渐黯淡 / 慢慢消退<br><span style=\"font-size:0.8em;color:gray\">(像雾一样散去)</span>","scenario":"<span class=\"context-tag tag-life\">文学感叹</span> \"As time went by, the memories slowly <b>faded away</b>.\"<br>(随着时间流逝，那些记忆慢慢变得模糊/消退了。)","tags":["文学感叹"]},{"id":489,"verb":"Peter out","meaning":"逐渐耗尽 / 慢慢平息而终止<br><span style=\"font-size:0.8em;color:gray\">(像水流一点点干涸)</span>","scenario":"<span class=\"context-tag tag-work\">风暴/热度</span> \"The storm finally started to <b>peter out</b> by morning.\"<br>(到了早上，那场风暴终于开始慢慢平息/减弱了。)","tags":["风暴/热度"]},{"id":490,"verb":"Add up to","meaning":"加起来等于 / 最终意味着<br><span style=\"font-size:0.8em;color:gray\">(类似于 boil down to)</span>","scenario":"<span class=\"context-tag tag-work\">新闻总结</span> \"All these small fees really <b>add up to</b> a lot of money.\"<br>(所有这些隐藏的杂费，加在一起可就是一笔巨款啊/最终就意味着大出血。)","tags":["新闻总结"]},{"id":491,"verb":"Amount to","meaning":"总计 / 相当于 / 意味着<br><span style=\"font-size:0.8em;color:gray\">(常用于否定句，表示“什么都不是”)</span>","scenario":"<span class=\"context-tag tag-drama\">法庭/争论</span> \"His promise doesn't <b>amount to</b> anything.\"<br>(他的承诺相当于废纸一张/根本毫无价值。)","tags":["法庭/争论"]},{"id":492,"verb":"Boil down","meaning":"(把文章) 浓缩 / 缩减<br><span style=\"font-size:0.8em;color:gray\">(把水煮干只剩精华)</span>","scenario":"<span class=\"context-tag tag-work\">汇报总结</span> \"Can you <b>boil down</b> this 50-page report into a one-page summary?\"<br>(你能把这份50页的报告浓缩/提炼成一页的摘要吗？)","tags":["汇报总结"]},{"id":493,"verb":"Wrap up in","meaning":"(Be wrapped up in) 沉浸于 / 满脑子只有...<br><span style=\"font-size:0.8em;color:gray\">(把自己裹在里面出不来)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽自私</span> \"He is too <b>wrapped up in</b> his own problems to care about anyone else.\"<br>(他太沉浸于自己的世界/只顾自己的麻烦，根本不在乎别人。)","tags":["吐槽自私"]},{"id":494,"verb":"Block out","meaning":"屏蔽(噪音/不愉快的记忆)<br><span style=\"font-size:0.8em;color:gray\">(用砖块挡住)</span>","scenario":"<span class=\"context-tag tag-life\">专注/心理</span> \"I wear headphones to <b>block out</b> the background noise.\"<br>(我戴耳机来屏蔽背景噪音。)","tags":["专注/心理"]},{"id":495,"verb":"Tune out","meaning":"不理会 / 把(某人的话)当耳旁风<br><span style=\"font-size:0.8em;color:gray\">(像收音机调台一样把信号切掉)</span>","scenario":"<span class=\"context-tag tag-drama\">上课/开会</span> \"When the professor starts talking about math, I just <b>tune out</b>.\"<br>(当教授开始讲数学时，我大脑就自动屏蔽/神游天外了。)","tags":["上课/开会"]},{"id":496,"verb":"Zoom in","meaning":"深入探讨 / 放大细节<br><span style=\"font-size:0.8em;color:gray\">(与 zoom out 相对，播客极高频)</span>","scenario":"<span class=\"context-tag tag-work\">抽丝剥茧</span> \"Let's <b>zoom in</b> on that specific point you just made.\"<br>(让我们就你刚才提到的那个具体细节，深入探讨一下。)","tags":["抽丝剥茧"]},{"id":497,"verb":"Fall back","meaning":"撤退 / 往后退<br><span style=\"font-size:0.8em;color:gray\">(物理上的后退，也可指夏令时结束时把表拨慢)</span>","scenario":"<span class=\"context-tag tag-life\">美国生活</span> \"Spring forward, <b>fall back</b>.\"<br>(春拨快，秋拨慢。——美国人记住夏令时调表方向的神级口诀。)","tags":["美国生活"]},{"id":498,"verb":"Carry away","meaning":"(Be carried away) 忘乎所以 / 得意忘形<br><span style=\"font-size:0.8em;color:gray\">(被情绪冲昏头脑带走了)</span>","scenario":"<span class=\"context-tag tag-social\">冲动消费后</span> \"I got a little <b>carried away</b> and bought three pairs of shoes.\"<br>(我刚才有点上头/得意忘形了，一连买了三双鞋。)","tags":["冲动消费后"]},{"id":499,"verb":"Tear down","meaning":"拆毁(建筑物) / 严厉驳斥(论点)<br><span style=\"font-size:0.8em;color:gray\">(撕裂并推倒)</span>","scenario":"<span class=\"context-tag tag-work\">城市建设/辩论</span> \"They are planning to <b>tear down</b> the old hospital.\"<br>(他们计划拆毁那座旧医院。)","tags":["城市建设/辩论"]},{"id":500,"verb":"Build up to","meaning":"为(高潮/重大事件)做铺垫 / 逐步积聚<br><span style=\"font-size:0.8em;color:gray\">(一路添砖加瓦走向顶峰)</span>","scenario":"<span class=\"context-tag tag-drama\">电影高潮/悬念</span> \"The whole movie was <b>building up to</b> this incredible final battle.\"<br>(整部电影都在为这场令人难以置信的终极决战做铺垫/蓄力。)","tags":["电影高潮/悬念"]},{"id":501,"verb":"Bottle out","meaning":"临阵退缩 / 怂了<br><span style=\"font-size:0.8em;color:gray\">(跟 chicken out 类似，常用于英式/美式口语)</span>","scenario":"<span class=\"context-tag tag-social\">朋友调侃</span> \"He was going to ask her out, but he <b>bottled out</b> at the last minute.\"<br>(他本来打算约她出去，但最后关头怂了。)","tags":["朋友调侃"]},{"id":502,"verb":"Chicken out","meaning":"因害怕而放弃 / 临阵退缩<br><span style=\"font-size:0.8em;color:gray\">(极高频口语，chicken当懦夫讲)</span>","scenario":"<span class=\"context-tag tag-drama\">美剧台词</span> \"Don't you dare <b>chicken out</b> on me now!\"<br>(你现在可别给我临阵脱逃/掉链子！)","tags":["美剧台词"]},{"id":503,"verb":"Fend for","meaning":"自己照顾自己 / 自力更生<br><span style=\"font-size:0.8em;color:gray\">(fend for oneself)</span>","scenario":"<span class=\"context-tag tag-life\">独立生活</span> \"Now that you're 18, you have to <b>fend for</b> yourself.\"<br>(既然你18岁了，你必须学会自力更生了。)","tags":["独立生活"]},{"id":504,"verb":"Plough through","meaning":"艰难地完成 / 费力地阅读<br><span style=\"font-size:0.8em;color:gray\">(像犁地一样推过去，美式拼写 plow)</span>","scenario":"<span class=\"context-tag tag-work\">熬夜赶工</span> \"I have to <b>plough through</b> all these emails before I can leave.\"<br>(下班前我得痛苦地处理完这些堆积如山的邮件。)","tags":["熬夜赶工"]},{"id":505,"verb":"Sail through","meaning":"轻松完成 / 顺利通过<br><span style=\"font-size:0.8em;color:gray\">(像帆船一样顺风顺水)</span>","scenario":"<span class=\"context-tag tag-life\">考试/面试</span> \"She studied hard and <b>sailed through</b> her final exams.\"<br>(她学习很努力，轻轻松松就过了期末考试。)","tags":["考试/面试"]},{"id":506,"verb":"Slog through","meaning":"艰难跋涉 / 辛苦完成(枯燥的事)<br><span style=\"font-size:0.8em;color:gray\">(跟 plough through 类似)</span>","scenario":"<span class=\"context-tag tag-work\">阅读枯燥文件</span> \"I'm currently <b>slogging through</b> a 200-page legal document.\"<br>(我目前正在极其痛苦地啃一份200页的法律文件。)","tags":["阅读枯燥文件"]},{"id":507,"verb":"Whip out","meaning":"猛地抽出 / 快速拿出<br><span style=\"font-size:0.8em;color:gray\">(动作极快，像挥鞭子)</span>","scenario":"<span class=\"context-tag tag-drama\">电影台词</span> \"He suddenly <b>whipped out</b> a gun.\"<br>(他突然猛地掏出一把枪。)","tags":["电影台词"]},{"id":508,"verb":"Whip up","meaning":"迅速做(饭) / 煽动(情绪)<br><span style=\"font-size:0.8em;color:gray\">(非常地道的生活用语)</span>","scenario":"<span class=\"context-tag tag-life\">招待朋友</span> \"Give me ten minutes, I'll <b>whip up</b> some pancakes.\"<br>(给我十分钟，我马上弄点煎饼出来。)","tags":["招待朋友"]},{"id":509,"verb":"Drum up","meaning":"竭力争取(支持/生意) / 激起(兴趣)<br><span style=\"font-size:0.8em;color:gray\">(像敲鼓一样造势)</span>","scenario":"<span class=\"context-tag tag-work\">市场营销</span> \"We need a new campaign to <b>drum up</b> more sales.\"<br>(我们需要一个新的营销活动来竭力拉动销售额。)","tags":["市场营销"]},{"id":510,"verb":"Scrape together","meaning":"勉强凑集(钱款/资源)<br><span style=\"font-size:0.8em;color:gray\">(从底上刮下来凑一起)</span>","scenario":"<span class=\"context-tag tag-life\">经济拮据</span> \"I managed to <b>scrape together</b> enough money for rent.\"<br>(我好不容易东拼西凑才凑够了房租。)","tags":["经济拮据"]},{"id":511,"verb":"Muddle through","meaning":"坚持熬过去 / 勉强应付过去<br><span style=\"font-size:0.8em;color:gray\">(在泥潭里艰难前行)</span>","scenario":"<span class=\"context-tag tag-work\">遇到困难</span> \"We don't have a plan, we'll just have to <b>muddle through</b>.\"<br>(我们没有计划，只能走一步看一步/硬熬过去了。)","tags":["遇到困难"]},{"id":512,"verb":"Gloss over","meaning":"掩盖(错误) / 避重就轻地谈及<br><span style=\"font-size:0.8em;color:gray\">(刷上一层光泽来掩饰)</span>","scenario":"<span class=\"context-tag tag-work\">公关危机</span> \"The CEO tried to <b>gloss over</b> the company's recent losses.\"<br>(CEO试图对公司最近的亏损轻描淡写/避而不谈。)","tags":["公关危机"]},{"id":513,"verb":"Paper over","meaning":"掩饰(分歧/问题) / 治标不治本<br><span style=\"font-size:0.8em;color:gray\">(用纸糊上裂缝)</span>","scenario":"<span class=\"context-tag tag-work\">政治/商业分析</span> \"The new agreement merely <b>papers over</b> the fundamental differences.\"<br>(新协议只不过是表面上掩盖了根本分歧/治标不治本。)","tags":["政治/商业分析"]},{"id":514,"verb":"Smooth over","meaning":"平息(争端) / 掩饰(分歧)<br><span style=\"font-size:0.8em;color:gray\">(把表面抹平)</span>","scenario":"<span class=\"context-tag tag-social\">调解矛盾</span> \"I had to buy her flowers to <b>smooth over</b> our argument.\"<br>(我只好给她买花，来平息/缓和我们的争吵。)","tags":["调解矛盾"]},{"id":515,"verb":"Iron out","meaning":"解决(问题) / 消除(分歧)<br><span style=\"font-size:0.8em;color:gray\">(像熨斗熨平褶皱一样解决细节问题)</span>","scenario":"<span class=\"context-tag tag-work\">项目收尾</span> \"There are just a few minor details to <b>iron out</b> before signing.\"<br>(在签字前，只需解决最后几个小细节/熨平小瑕疵。)","tags":["项目收尾"]},{"id":516,"verb":"Hammer out","meaning":"艰难达成(协议) / 敲定(细节)<br><span style=\"font-size:0.8em;color:gray\">(像打铁一样反复敲打成型)</span>","scenario":"<span class=\"context-tag tag-work\">商业谈判</span> \"It took them three days to <b>hammer out</b> a compromise.\"<br>(他们花了三天才艰难敲定一项妥协方案。)","tags":["商业谈判"]},{"id":517,"verb":"Flesh out","meaning":"充实(内容) / 具体化(计划)<br><span style=\"font-size:0.8em;color:gray\">(给骨架长上血肉)</span>","scenario":"<span class=\"context-tag tag-work\">头脑风暴</span> \"That's a good basic idea, but we need to <b>flesh</b> it <b>out</b>.\"<br>(这是个不错的初步想法，但我们需要把它进一步充实/细化。)","tags":["头脑风暴"]},{"id":518,"verb":"Pad out","meaning":"(为了凑数而)拉长/扩充(文章等)<br><span style=\"font-size:0.8em;color:gray\">(填充垫子/注水)</span>","scenario":"<span class=\"context-tag tag-work\">写报告/论文</span> \"He <b>padded out</b> his essay with long quotes to reach the word count.\"<br>(为了凑字数，他用长篇引用给论文疯狂注水。)","tags":["写报告/论文"]},{"id":519,"verb":"Eke out","meaning":"勉强维持(生计) / 艰难获取<br><span style=\"font-size:0.8em;color:gray\">(极少量地挤出来)</span>","scenario":"<span class=\"context-tag tag-life\">新闻报道</span> \"They manage to <b>eke out</b> a living by selling handmade crafts.\"<br>(他们靠卖手工艺品勉强维持生计。)","tags":["新闻报道"]},{"id":520,"verb":"Branch out","meaning":"涉足新领域 / 扩展业务<br><span style=\"font-size:0.8em;color:gray\">(像树枝一样向外生长)</span>","scenario":"<span class=\"context-tag tag-work\">商业战略</span> \"The software company is planning to <b>branch out</b> into hardware.\"<br>(这家软件公司正计划涉足/扩展到硬件领域。)","tags":["商业战略"]},{"id":521,"verb":"Dumb down","meaning":"使通俗易懂 / (为迎合大众而)降低难度<br><span style=\"font-size:0.8em;color:gray\">(略带贬义，降智)</span>","scenario":"<span class=\"context-tag tag-drama\">播客吐槽</span> \"They <b>dumbed down</b> the movie so much that it lost its original message.\"<br>(他们为了迎合大众把电影改得极其弱智，失去了原本的内涵。)","tags":["播客吐槽"]},{"id":522,"verb":"Water down","meaning":"削弱 / 使(效果/规定)打折扣<br><span style=\"font-size:0.8em;color:gray\">(像水里掺水一样稀释)</span>","scenario":"<span class=\"context-tag tag-work\">政治与法律</span> \"The new environmental regulations were heavily <b>watered down</b>.\"<br>(新的环保法规被大幅度削弱/打折了。)","tags":["政治与法律"]},{"id":523,"verb":"Tone down","meaning":"缓和 / 降低(语气/色彩)的强烈程度<br><span style=\"font-size:0.8em;color:gray\">(调低音调/降火)</span>","scenario":"<span class=\"context-tag tag-social\">沟通建议</span> \"You might want to <b>tone down</b> your criticism in the email.\"<br>(你可能得在邮件里稍微缓和一下你那强烈的批评语气。)","tags":["沟通建议"]},{"id":524,"verb":"Sex up","meaning":"使...更有吸引力 / 添油加醋<br><span style=\"font-size:0.8em;color:gray\">(极其口语化的夸张表达)</span>","scenario":"<span class=\"context-tag tag-work\">公关/媒体</span> \"The PR team tried to <b>sex up</b> the boring financial report.\"<br>(公关团队试图给这份枯燥的财报添油加醋，弄得更吸引眼球。)","tags":["公关/媒体"]},{"id":525,"verb":"Jazz up","meaning":"使活泼 / 使更有趣<br><span style=\"font-size:0.8em;color:gray\">(像加了爵士乐一样)</span>","scenario":"<span class=\"context-tag tag-work\">做PPT/设计</span> \"We need to <b>jazz up</b> this presentation with some animations.\"<br>(我们需要加点动画，让这个演示文稿更生动有趣一点。)","tags":["做PPT/设计"]},{"id":526,"verb":"Spice up","meaning":"给...增添趣味 / 加点情趣<br><span style=\"font-size:0.8em;color:gray\">(加香料)</span>","scenario":"<span class=\"context-tag tag-life\">生活与感情</span> \"They traveled to Paris to try and <b>spice up</b> their marriage.\"<br>(他们去巴黎旅行，试图给他们的婚姻生活增添些情趣。)","tags":["生活与感情"]},{"id":527,"verb":"Liven up","meaning":"使(气氛)活跃 / 使生机勃勃<br><span style=\"font-size:0.8em;color:gray\">(注入生命力)</span>","scenario":"<span class=\"context-tag tag-social\">派对救场</span> \"Let's put on some music and <b>liven up</b> this party!\"<br>(咱们放点音乐，把派对气氛搞活跃点！)","tags":["派对救场"]},{"id":528,"verb":"Perk up","meaning":"振作起来 / 活跃起来<br><span style=\"font-size:0.8em;color:gray\">(像植物浇水后直起身子)</span>","scenario":"<span class=\"context-tag tag-life\">喝咖啡/听到好消息</span> \"She really <b>perked up</b> when she heard about the bonus.\"<br>(一听到有奖金，她瞬间就精神抖擞/来劲了。)","tags":["喝咖啡/听到好消息"]},{"id":529,"verb":"Cheer up","meaning":"高兴起来 / 使...振奋<br><span style=\"font-size:0.8em;color:gray\">(最常用的安慰语)</span>","scenario":"<span class=\"context-tag tag-social\">安慰朋友</span> \"<b>Cheer up!</b> It's not the end of the world.\"<br>(振作点/开心点！又不是世界末日。)","tags":["安慰朋友"]},{"id":530,"verb":"Crack up","meaning":"狂笑 / 精神崩溃<br><span style=\"font-size:0.8em;color:gray\">(极度日常口语)</span>","scenario":"<span class=\"context-tag tag-social\">看喜剧</span> \"That comedian really <b>cracks</b> me <b>up</b>.\"<br>(那个喜剧演员真让我笑抽了/笑裂开了。)","tags":["看喜剧"]},{"id":531,"verb":"Lighten up","meaning":"放轻松 / 别太严肃<br><span style=\"font-size:0.8em;color:gray\">(减轻负担/压力)</span>","scenario":"<span class=\"context-tag tag-social\">劝人别紧张</span> \"Oh, come on, <b>lighten up</b>! It was just a joke.\"<br>(哦，拜托，放轻松点/别这么开不起玩笑！这只是个笑话。)","tags":["劝人别紧张"]},{"id":532,"verb":"Calm down","meaning":"平静下来<br><span style=\"font-size:0.8em;color:gray\">(安抚情绪激动的人)</span>","scenario":"<span class=\"context-tag tag-drama\">争吵/危机</span> \"Everyone needs to <b>calm down</b> and think rationally.\"<br>(所有人都需要冷静下来，理智地思考。)","tags":["争吵/危机"]},{"id":533,"verb":"Simmer down","meaning":"平息怒火 / 慢慢冷静下来<br><span style=\"font-size:0.8em;color:gray\">(像锅里的水从沸腾变为慢炖)</span>","scenario":"<span class=\"context-tag tag-drama\">安抚吵架</span> \"Just give him a few minutes to <b>simmer down</b>.\"<br>(给他几分钟时间消消气/平息一下怒火。)","tags":["安抚吵架"]},{"id":534,"verb":"Settle down","meaning":"安顿下来 / (局势)平静下来<br><span style=\"font-size:0.8em;color:gray\">(结婚生子或市场趋稳)</span>","scenario":"<span class=\"context-tag tag-life\">人生规划</span> \"I'm not ready to buy a house and <b>settle down</b> yet.\"<br>(我还没准备好买房并安稳地过日子。)","tags":["人生规划"]},{"id":535,"verb":"Wind down","meaning":"逐渐放松 / (活动/业务)逐渐接近尾声<br><span style=\"font-size:0.8em;color:gray\">(像发条慢慢松开)</span>","scenario":"<span class=\"context-tag tag-life\">下班/睡前</span> \"I like to read a book to <b>wind down</b> before going to sleep.\"<br>(我喜欢睡前看书来放松一下紧绷的神经。)","tags":["下班/睡前"]},{"id":536,"verb":"Cool off","meaning":"冷静下来 / (天气)变凉快<br><span style=\"font-size:0.8em;color:gray\">(降温/降火)</span>","scenario":"<span class=\"context-tag tag-social\">情绪缓冲</span> \"Let's take a break and let tempers <b>cool off</b>.\"<br>(咱们休息一下，让大家的火气稍微降一降。)","tags":["情绪缓冲"]},{"id":537,"verb":"Blow over","meaning":"(风暴/丑闻)平息 / 逐渐被遗忘<br><span style=\"font-size:0.8em;color:gray\">(像风一样吹过去就没了)</span>","scenario":"<span class=\"context-tag tag-work\">公关危机</span> \"We just need to stay quiet until this scandal <b>blows over</b>.\"<br>(我们只需要保持低调，直到这场丑闻风波平息/过去。)","tags":["公关危机"]},{"id":538,"verb":"Die down","meaning":"(风雨/喧闹/讨论)逐渐减弱/平息<br><span style=\"font-size:0.8em;color:gray\">(慢慢死掉)</span>","scenario":"<span class=\"context-tag tag-life\">描述环境</span> \"We waited for the storm to <b>die down</b> before driving.\"<br>(我们等暴风雨渐渐减弱后才开车。)","tags":["描述环境"]},{"id":539,"verb":"Peter out","meaning":"逐渐耗尽 / 慢慢平息而终止<br><span style=\"font-size:0.8em;color:gray\">(跟 die down 类似)</span>","scenario":"<span class=\"context-tag tag-work\">讨论/热度</span> \"The conversation eventually <b>petered out</b> and we went home.\"<br>(谈话最终渐渐冷场/无疾而终，我们就回家了。)","tags":["讨论/热度"]},{"id":540,"verb":"Fizzle out","meaning":"逐渐破灭 / 无声无息地结束<br><span style=\"font-size:0.8em;color:gray\">(像汽水漏气一样没劲了)</span>","scenario":"<span class=\"context-tag tag-social\">感情/项目</span> \"Their relationship just <b>fizzled out</b> after a few months.\"<br>(他们的感情几个月后就自然而然地黄了/凉了。)","tags":["感情/项目"]},{"id":541,"verb":"Flare up","meaning":"(怒火/暴乱)突然爆发 / (疾病)复发<br><span style=\"font-size:0.8em;color:gray\">(像火苗突然窜高)</span>","scenario":"<span class=\"context-tag tag-life\">新闻与医疗</span> \"My allergies always <b>flare up</b> in the spring.\"<br>(我的过敏一到春天就复发/加重。)","tags":["新闻与医疗"]},{"id":542,"verb":"Act up","meaning":"(机器)出毛病 / (小孩)捣蛋 / (疾病)发作<br><span style=\"font-size:0.8em;color:gray\">(表现异常)</span>","scenario":"<span class=\"context-tag tag-life\">日常抱怨</span> \"My old knee injury is <b>acting up</b> again because of the rain.\"<br>(因为下雨，我膝盖的旧伤又开始作祟/疼起来了。)","tags":["日常抱怨"]},{"id":543,"verb":"Play up","meaning":"大肆渲染 / 强调...的重要性<br><span style=\"font-size:0.8em;color:gray\">(跟 play down 相反)</span>","scenario":"<span class=\"context-tag tag-work\">媒体/公关</span> \"The media tends to <b>play up</b> the risks of the new technology.\"<br>(媒体倾向于大肆渲染/夸大这项新技术的风险。)","tags":["媒体/公关"]},{"id":544,"verb":"Play down","meaning":"贬低 / 对...轻描淡写<br><span style=\"font-size:0.8em;color:gray\">(淡化重要性/严重性)</span>","scenario":"<span class=\"context-tag tag-work\">危机处理</span> \"The government tried to <b>play down</b> the severity of the economic crisis.\"<br>(政府试图对经济危机的严重程度轻描淡写/淡化处理。)","tags":["危机处理"]},{"id":545,"verb":"Talk up","meaning":"大肆吹捧 / 极力夸奖<br><span style=\"font-size:0.8em;color:gray\">(把别人抬高)</span>","scenario":"<span class=\"context-tag tag-social\">内推/社交</span> \"Thanks for <b>talking</b> me <b>up</b> to the boss.\"<br>(谢谢你在老板面前替我疯狂美言/吹捧我。)","tags":["内推/社交"]},{"id":546,"verb":"Talk down to","meaning":"居高临下地跟...说话<br><span style=\"font-size:0.8em;color:gray\">(傲慢、说教的口吻)</span>","scenario":"<span class=\"context-tag tag-work\">职场抱怨</span> \"I hate it when my manager <b>talks down to</b> me.\"<br>(我讨厌我经理用那种高高在上/说教的口吻跟我说话。)","tags":["职场抱怨"]},{"id":547,"verb":"Speak out","meaning":"大胆地说出 / 公开表达意见<br><span style=\"font-size:0.8em;color:gray\">(往往是针对不公)</span>","scenario":"<span class=\"context-tag tag-work\">争取权益</span> \"More employees are starting to <b>speak out</b> against the toxic culture.\"<br>(越来越多的员工开始公开站出来抗议这种有毒的职场文化。)","tags":["争取权益"]},{"id":548,"verb":"Speak up","meaning":"大声点说 / 勇敢表达意见<br><span style=\"font-size:0.8em;color:gray\">(打破沉默)</span>","scenario":"<span class=\"context-tag tag-work\">开会发言</span> \"If you disagree with the proposal, you need to <b>speak up</b> now.\"<br>(如果你不同意这个提议，你现在就必须大胆说出来。)","tags":["开会发言"]},{"id":549,"verb":"Shout down","meaning":"大声喊叫以压倒(别人的声音)<br><span style=\"font-size:0.8em;color:gray\">(不让人说话)</span>","scenario":"<span class=\"context-tag tag-drama\">辩论/抗议</span> \"The speaker was completely <b>shouted down</b> by the angry crowd.\"<br>(演讲者完全被愤怒的人群大声喝倒彩/淹没了声音。)","tags":["辩论/抗议"]},{"id":550,"verb":"Drown out","meaning":"(噪音)淹没(另一个声音)<br><span style=\"font-size:0.8em;color:gray\">(用更大的声音盖过去)</span>","scenario":"<span class=\"context-tag tag-life\">环境噪音</span> \"The music was so loud it <b>drowned out</b> our conversation.\"<br>(音乐声太大，把我们的谈话声都盖过去/淹没了。)","tags":["环境噪音"]},{"id":551,"verb":"Tune out","meaning":"不理会 / 把...当耳旁风<br><span style=\"font-size:0.8em;color:gray\">(像收音机调台一样关掉信号)</span>","scenario":"<span class=\"context-tag tag-drama\">上课/开会发呆</span> \"When the professor starts talking about math, I just <b>tune out</b>.\"<br>(当教授开始讲数学时，我大脑就自动屏蔽/神游天外了。)","tags":["上课/开会发呆"]},{"id":552,"verb":"Zone out","meaning":"走神 / 发呆<br><span style=\"font-size:0.8em;color:gray\">(极其高频口语)</span>","scenario":"<span class=\"context-tag tag-social\">日常聊天</span> \"Sorry, what did you say? I completely <b>zoned out</b> for a second.\"<br>(抱歉，你刚才说什么？我刚才完全走神/放空了。)","tags":["日常聊天"]},{"id":553,"verb":"Drift off","meaning":"渐渐入睡 / 迷迷糊糊睡着<br><span style=\"font-size:0.8em;color:gray\">(像船飘走一样)</span>","scenario":"<span class=\"context-tag tag-life\">开会/看电视</span> \"I was so tired I kept <b>drifting off</b> during the movie.\"<br>(我太累了，看电影的时候一直不停地打瞌睡。)","tags":["开会/看电视"]},{"id":554,"verb":"Nod off","meaning":"打盹 / 不小心睡着了<br><span style=\"font-size:0.8em;color:gray\">(像小鸡啄米一样点头)</span>","scenario":"<span class=\"context-tag tag-life\">疲惫不堪</span> \"He <b>nodded off</b> in the middle of the meeting.\"<br>(他在会议开到一半的时候竟然打起瞌睡来了。)","tags":["疲惫不堪"]},{"id":555,"verb":"Doze off","meaning":"打瞌睡<br><span style=\"font-size:0.8em;color:gray\">(与 nod off / drift off 同义)</span>","scenario":"<span class=\"context-tag tag-life\">长途车上</span> \"I must have <b>dozed off</b> on the train.\"<br>(我肯定是在火车上不小心睡着了。)","tags":["长途车上"]},{"id":556,"verb":"Black out","meaning":"晕厥 / 失去知觉 (短暂)<br><span style=\"font-size:0.8em;color:gray\">(眼前一黑)</span>","scenario":"<span class=\"context-tag tag-drama\">医疗/醉酒</span> \"He drank too much last night and completely <b>blacked out</b>.\"<br>(他昨晚喝太多了，彻底断片/不省人事了。)","tags":["医疗/醉酒"]},{"id":557,"verb":"Pass out","meaning":"分发 / 昏倒<br><span style=\"font-size:0.8em;color:gray\">(极高频多义词)</span>","scenario":"<span class=\"context-tag tag-work\">开会与急救</span> \"Could you <b>pass out</b> these agendas?\" (麻烦分发一下议程表。)<br>\"It was so hot that she almost <b>passed out</b>.\" (热得快晕过去了。)","tags":["开会与急救"]},{"id":558,"verb":"Come to","meaning":"苏醒(恢复意识) / (账单)总计达到<br><span style=\"font-size:0.8em;color:gray\">(回过神来)</span>","scenario":"<span class=\"context-tag tag-life\">急救后</span> \"When he finally <b>came to</b>, he was in the hospital.\"<br>(当他终于苏醒/回过神来时，他已经在医院里了。)","tags":["急救后"]},{"id":559,"verb":"Bring around","meaning":"说服某人 / 使恢复知觉<br><span style=\"font-size:0.8em;color:gray\">(把人拉转过来)</span>","scenario":"<span class=\"context-tag tag-drama\">谈判说服</span> \"It took me an hour to <b>bring</b> him <b>around</b> to our way of thinking.\"<br>(花了我一个小时才把他生生拉拢/说服到我们的思路上来。)","tags":["谈判说服"]},{"id":560,"verb":"Snap out of","meaning":"从(消极情绪/发呆)中迅速振作起来<br><span style=\"font-size:0.8em;color:gray\">(像打响指一样瞬间清醒)</span>","scenario":"<span class=\"context-tag tag-drama\">美剧神句</span> \"I know you're sad, but you need to <b>snap out of</b> it!\"<br>(我知道你很难过，但你必须马上振作起来/停止颓废！)","tags":["美剧神句"]},{"id":561,"verb":"Psych up","meaning":"作好心理准备 / 使(自己或团队)兴奋起来<br><span style=\"font-size:0.8em;color:gray\">(打鸡血)</span>","scenario":"<span class=\"context-tag tag-work\">面试前</span> \"I'm trying to <b>psych</b> myself <b>up</b> for this big presentation.\"<br>(我正在努力给自己打气/作心理建设，来迎接这场重要演讲。)","tags":["面试前"]},{"id":562,"verb":"Gear up","meaning":"为...做好准备 / 摩拳擦掌<br><span style=\"font-size:0.8em;color:gray\">(穿好装备准备大干一场)</span>","scenario":"<span class=\"context-tag tag-work\">项目启动</span> \"The team is <b>gearing up</b> for the product launch next week.\"<br>(团队正摩拳擦掌为下周的产品发布做准备。)","tags":["项目启动"]},{"id":563,"verb":"Hunker down","meaning":"埋头苦干 / 躲避(风暴等)<br><span style=\"font-size:0.8em;color:gray\">(蹲下来死守)</span>","scenario":"<span class=\"context-tag tag-work\">复习/赶工</span> \"Exams are coming, I need to <b>hunker down</b> and study.\"<br>(考试要来了，我得闭关/埋头苦读了。)","tags":["复习/赶工"]},{"id":564,"verb":"Knuckle down","meaning":"开始拼命干活 / 卷起袖子加油干<br><span style=\"font-size:0.8em;color:gray\">(跟 hunker down 类似)</span>","scenario":"<span class=\"context-tag tag-work\">冲刺打气</span> \"Stop messing around, it's time to <b>knuckle down</b>.\"<br>(别瞎混了，是时候拿出拼命三郎的劲头干活了。)","tags":["冲刺打气"]},{"id":565,"verb":"Buckle down","meaning":"开始认真工作 / 倾注全力<br><span style=\"font-size:0.8em;color:gray\">(扣紧安全带准备发力)</span>","scenario":"<span class=\"context-tag tag-work\">态度转变</span> \"If you want to pass, you really need to <b>buckle down</b>.\"<br>(如果你想及格，你真的需要收心/认真对待了。)","tags":["态度转变"]},{"id":566,"verb":"Slack off","meaning":"偷懒 / 摸鱼 / 懈怠<br><span style=\"font-size:0.8em;color:gray\">(Slack 有松弛的意思)</span>","scenario":"<span class=\"context-tag tag-work\">职场表现</span> \"Don't <b>slack off</b>, the deadline is tomorrow.\"<br>(别摸鱼了，明天就是截止日期了。名词 slacker = 摸鱼的人。)","tags":["职场表现"]},{"id":567,"verb":"Goof off","meaning":"游手好闲 / 磨洋工 / 瞎胡闹<br><span style=\"font-size:0.8em;color:gray\">(同 goof around，美国俚语)</span>","scenario":"<span class=\"context-tag tag-life\">学校/职场</span> \"Stop <b>goofing off</b> and get back to work!\"<br>(别摸鱼/瞎闹了，赶紧回去工作！)","tags":["学校/职场"]},{"id":568,"verb":"Muck around","meaning":"瞎混 / 虚度光阴 / 瞎弄<br><span style=\"font-size:0.8em;color:gray\">(英式/澳式常用，等于美国的 mess around)</span>","scenario":"<span class=\"context-tag tag-social\">警告小孩</span> \"Stop <b>mucking around</b> with my camera, you'll break it!\"<br>(别瞎摆弄我的相机了，你会弄坏的！)","tags":["警告小孩"]},{"id":569,"verb":"Mess up","meaning":"弄糟 / 搞砸 / 把屋子弄乱<br><span style=\"font-size:0.8em;color:gray\">(相当于 screw up / ruin)</span>","scenario":"<span class=\"context-tag tag-work\">认错道歉</span> \"I really <b>messed up</b> the interview.\"<br>(我真的把那场面试彻底搞砸了。)","tags":["认错道歉"]},{"id":570,"verb":"Screw up","meaning":"把事情搞砸<br><span style=\"font-size:0.8em;color:gray\">(极高频，比 mess up 语气稍重一点点)</span>","scenario":"<span class=\"context-tag tag-drama\">自责吐槽</span> \"I completely <b>screwed up</b> the presentation.\"<br>(我把演讲彻底搞砸/搞黄了。)","tags":["自责吐槽"]},{"id":571,"verb":"Slip up","meaning":"犯小错误 / 疏忽<br><span style=\"font-size:0.8em;color:gray\">(不小心滑倒了)</span>","scenario":"<span class=\"context-tag tag-work\">检查工作</span> \"We can't afford to <b>slip up</b> on this contract.\"<br>(这份合同我们绝对不能出任何岔子/纰漏。)","tags":["检查工作"]},{"id":572,"verb":"Trip up","meaning":"绊倒 / (使)犯错<br><span style=\"font-size:0.8em;color:gray\">(被某物绊住)</span>","scenario":"<span class=\"context-tag tag-work\">面试坑人</span> \"The interviewer tried to <b>trip</b> me <b>up</b> with tricky questions.\"<br>(面试官试图用狡猾的问题给我下绊子/套路我。)","tags":["面试坑人"]},{"id":573,"verb":"Catch out","meaning":"识破某人说谎 / 抓到某人的把柄<br><span style=\"font-size:0.8em;color:gray\">(把骗子揪出来)</span>","scenario":"<span class=\"context-tag tag-drama\">审计/盘问</span> \"I knew he was lying, and I finally <b>caught</b> him <b>out</b>.\"<br>(我知道他在撒谎，最终我抓住了他的狐狸尾巴/拆穿了他。)","tags":["审计/盘问"]},{"id":574,"verb":"Find out","meaning":"发现 / 查明(真相)<br><span style=\"font-size:0.8em;color:gray\">(极其高频的日常词汇)</span>","scenario":"<span class=\"context-tag tag-life\">探寻秘密</span> \"I need to <b>find out</b> what time the train leaves.\"<br>(我得查查火车几点开。)","tags":["探寻秘密"]},{"id":575,"verb":"Figure out","meaning":"解决 / 弄清楚<br><span style=\"font-size:0.8em;color:gray\">(替代 understand / solve)</span>","scenario":"<span class=\"context-tag tag-work\">职场万金油</span> \"Give me a few minutes, I'll <b>figure it out</b>.\"<br>(工作中遇到bug或难题，老美最爱说“我去搞清楚/搞定它”。)","tags":["职场万金油"]},{"id":576,"verb":"Sort out","meaning":"理清 / 解决问题 / 整理<br><span style=\"font-size:0.8em;color:gray\">(替代 organize / resolve)</span>","scenario":"<span class=\"context-tag tag-work\">职场救援</span> \"Don't worry, we will <b>sort this out</b>.\"<br>(安抚客户或同事的绝佳用语：别慌，我们会摆平/理顺它的。)","tags":["职场救援"]},{"id":577,"verb":"Iron out","meaning":"解决(问题) / 消除(分歧)<br><span style=\"font-size:0.8em;color:gray\">(重复出现，加深印象。极高频词汇)</span>","scenario":"<span class=\"context-tag tag-work\">合同签署前</span> \"We just need to <b>iron out</b> the final details.\"<br>(我们只需要敲定/熨平最后的细节。)","tags":["合同签署前"]},{"id":578,"verb":"Clear up","meaning":"清理 / 澄清(误会) / (天气)放晴<br><span style=\"font-size:0.8em;color:gray\">(使变得清晰)</span>","scenario":"<span class=\"context-tag tag-social\">解开误会</span> \"I'd like to <b>clear up</b> any misunderstandings.\"<br>(我想澄清/消除任何可能存在的误会。)","tags":["解开误会"]},{"id":579,"verb":"Clean up","meaning":"彻底打扫 / 赚大钱<br><span style=\"font-size:0.8em;color:gray\">(多义词)</span>","scenario":"<span class=\"context-tag tag-life\">家务/商业</span> \"We need to <b>clean up</b> this mess.\" (我们得收拾烂摊子。)<br>\"They really <b>cleaned up</b> in the stock market.\" (他们在股市大赚了一笔。)","tags":["家务/商业"]},{"id":580,"verb":"Tidy up","meaning":"整理 / 收拾得整洁<br><span style=\"font-size:0.8em;color:gray\">(日常家务)</span>","scenario":"<span class=\"context-tag tag-life\">客人来访前</span> \"I need to <b>tidy up</b> the living room before guests arrive.\"<br>(客人来之前我得把客厅收拾整齐。)","tags":["客人来访前"]},{"id":581,"verb":"Spruce up","meaning":"打扮 / 把...收拾整洁漂亮<br><span style=\"font-size:0.8em;color:gray\">(比 tidy up 更侧重于“让外观更好看”)</span>","scenario":"<span class=\"context-tag tag-life\">大扫除/出门</span> \"He <b>spruced</b> himself <b>up</b> for the interview.\"<br>(为了面试，他把自己好好捯饬/打扮了一番。)","tags":["大扫除/出门"]},{"id":582,"verb":"Smart up","meaning":"(英式)变聪明点 / 打扮精神 / 学乖<br><span style=\"font-size:0.8em;color:gray\">(美式多用 smarten up)</span>","scenario":"<span class=\"context-tag tag-social\">长辈训话</span> \"You need to <b>smarten up</b> if you want to keep this job.\"<br>(如果你想保住这份工作，你得放机灵点。)","tags":["长辈训话"]},{"id":583,"verb":"Dumb down","meaning":"(为迎合大众而)降低难度 / 使通俗易懂<br><span style=\"font-size:0.8em;color:gray\">(重复出现，加深印象)</span>","scenario":"<span class=\"context-tag tag-work\">产品宣发</span> \"The movie was <b>dumbed down</b> for a younger audience.\"<br>(为了迎合更年轻的观众，这部电影的剧情被故意简单化/降智了。)","tags":["产品宣发"]},{"id":584,"verb":"Boil down to","meaning":"归结于 / 最关键的原因是<br><span style=\"font-size:0.8em;color:gray\">(把水煮干只剩精华)</span>","scenario":"<span class=\"context-tag tag-work\">总结问题</span> \"In the end, it all <b>boils down to</b> money.\"<br>(归根结底，这一切都是钱的问题。)","tags":["总结问题"]},{"id":585,"verb":"Narrow down","meaning":"缩小(选择)范围<br><span style=\"font-size:0.8em;color:gray\">(在多个选项中筛选)</span>","scenario":"<span class=\"context-tag tag-work\">招聘/购物</span> \"We've <b>narrowed down</b> the candidates to three.\"<br>(我们已经把候选人范围缩小到了三个。)","tags":["招聘/购物"]},{"id":586,"verb":"Track down","meaning":"追查到 / 费力找到<br><span style=\"font-size:0.8em;color:gray\">(替代 find after a search)</span>","scenario":"<span class=\"context-tag tag-work\">找人找物</span> \"It took me hours, but I finally <b>tracked down</b> the bug.\"<br>(花了我好几个小时，但我终于揪出了这个代码bug。)","tags":["找人找物"]},{"id":587,"verb":"Hunt down","meaning":"搜寻到 / 追捕到<br><span style=\"font-size:0.8em;color:gray\">(跟 track down 类似，更有猎捕的感觉)</span>","scenario":"<span class=\"context-tag tag-drama\">警匪片</span> \"The police managed to <b>hunt down</b> the suspect.\"<br>(警察终于成功追捕到了嫌疑人。)","tags":["警匪片"]},{"id":588,"verb":"Pin down","meaning":"确定(细节/位置) / 迫使某人明确表态<br><span style=\"font-size:0.8em;color:gray\">(用图钉死死钉住)</span>","scenario":"<span class=\"context-tag tag-work\">开会/约人</span> \"It's hard to <b>pin</b> him <b>down</b> to a specific date.\"<br>(很难逼他敲定一个具体日期。)","tags":["开会/约人"]},{"id":589,"verb":"Tie down","meaning":"束缚 / 限制(自由)<br><span style=\"font-size:0.8em;color:gray\">(被绳子绑住)</span>","scenario":"<span class=\"context-tag tag-life\">人生规划</span> \"I don't want to get married yet, I don't want to be <b>tied down</b>.\"<br>(我还不打算结婚，不想被套牢/束缚住自由。)","tags":["人生规划"]},{"id":590,"verb":"Bog down","meaning":"陷入泥潭 / 停滞不前 / 拘泥于细节<br><span style=\"font-size:0.8em;color:gray\">(Bog = 沼泽)</span>","scenario":"<span class=\"context-tag tag-work\">项目卡壳</span> \"Let's not get <b>bogged down</b> in the details right now.\"<br>(咱们现在先别陷入这些琐碎细节的泥潭里拔不出来。)","tags":["项目卡壳"]},{"id":591,"verb":"Weigh down","meaning":"使沉重 / 压迫(心情)<br><span style=\"font-size:0.8em;color:gray\">(像重量一样压着)</span>","scenario":"<span class=\"context-tag tag-drama\">心理压力</span> \"The guilt of lying really started to <b>weigh</b> him <b>down</b>.\"<br>(撒谎的内疚感开始沉重地压在他的心头。)","tags":["心理压力"]},{"id":592,"verb":"Drag down","meaning":"把...拖垮 / 降低(标准/水平)<br><span style=\"font-size:0.8em;color:gray\">(往下拖)</span>","scenario":"<span class=\"context-tag tag-work\">团队评价</span> \"One bad employee can <b>drag down</b> the whole team.\"<br>(一颗老鼠屎能坏一锅汤/一个糟糕的员工能拖垮整个团队。)","tags":["团队评价"]},{"id":593,"verb":"Bring down","meaning":"推翻(政府) / 降低价格 / 使某人扫兴<br><span style=\"font-size:0.8em;color:gray\">(把高高在上的东西拉下来)</span>","scenario":"<span class=\"context-tag tag-social\">破坏气氛</span> \"Don't talk about politics right now, it's just going to <b>bring</b> everyone <b>down</b>.\"<br>(现在别谈政治了，这只会给大家扫兴/把全场气氛搞得很压抑。)","tags":["破坏气氛"]},{"id":594,"verb":"Take down","meaning":"记下(笔记) / 拆除 / 击败(对手)<br><span style=\"font-size:0.8em;color:gray\">(拿下来)</span>","scenario":"<span class=\"context-tag tag-work\">开会/安防</span> \"Let me <b>take down</b> your phone number.\" (让我记下你的电话。)<br>\"The police <b>took down</b> the criminal.\" (警察制服了罪犯。)","tags":["开会/安防"]},{"id":595,"verb":"Put down","meaning":"放下 / 镇压 / 羞辱(某人) / 支付定金<br><span style=\"font-size:0.8em;color:gray\">(极高频多义词)</span>","scenario":"<span class=\"context-tag tag-social\">买房/吐槽</span> \"Stop <b>putting</b> me <b>down</b> in front of my friends.\" (别在朋友面前贬低我。)<br>\"I'm going to <b>put down</b> a deposit on that car.\" (我要去给那辆车交定金。)","tags":["买房/吐槽"]},{"id":596,"verb":"Jot down","meaning":"匆匆记下<br><span style=\"font-size:0.8em;color:gray\">(比 write down 更有“快速速记”的感觉)</span>","scenario":"<span class=\"context-tag tag-work\">接电话时</span> \"Hold on, let me <b>jot down</b> your email address.\"<br>(等一下，让我赶紧把你的邮箱地址记下来。)","tags":["接电话时"]},{"id":597,"verb":"Note down","meaning":"记录下来<br><span style=\"font-size:0.8em;color:gray\">(与 jot down / write down 类似)</span>","scenario":"<span class=\"context-tag tag-work\">开会做笔记</span> \"Please <b>note down</b> the key points of the meeting.\"<br>(请记录下会议的关键点。)","tags":["开会做笔记"]},{"id":598,"verb":"Mark down","meaning":"标出/记下 / 降价(商品)<br><span style=\"font-size:0.8em;color:gray\">(做记号)</span>","scenario":"<span class=\"context-tag tag-life\">商场打折</span> \"All winter coats have been <b>marked down</b> by 50%.\"<br>(所有冬季外套都已降价/打半折了。)","tags":["商场打折"]},{"id":599,"verb":"Scale down","meaning":"缩减规模 / 降低比例<br><span style=\"font-size:0.8em;color:gray\">(按比例缩小)</span>","scenario":"<span class=\"context-tag tag-work\">削减预算</span> \"Due to budget cuts, we need to <b>scale down</b> our expansion plans.\"<br>(由于预算削减，我们需要缩减扩张计划的规模。)","tags":["削减预算"]},{"id":600,"verb":"Water down","meaning":"削弱 / 使(效果/规定)打折扣<br><span style=\"font-size:0.8em;color:gray\">(重复出现，加深印象)</span>","scenario":"<span class=\"context-tag tag-work\">政策妥协</span> \"The original proposal was heavily <b>watered down</b> by the committee.\"<br>(最初的提案被委员会大幅度注水/削弱了。)","tags":["政策妥协"]},{"id":601,"verb":"Bank on","meaning":"指望 / 依赖<br><span style=\"font-size:0.8em;color:gray\">(把钱存在银行一样可靠，等于 count on)</span>","scenario":"<span class=\"context-tag tag-work\">商业承诺</span> \"You can <b>bank on</b> us to deliver the project on time.\"<br>(你可以百分百指望我们按时交付项目。)","tags":["商业承诺"]},{"id":602,"verb":"Bargain for","meaning":"预料到 / 讨价还价<br><span style=\"font-size:0.8em;color:gray\">(More than I bargained for = 超出我的预料/吃不消)</span>","scenario":"<span class=\"context-tag tag-life\">吐槽感叹</span> \"This new puppy is a lot more work than I <b>bargained for</b>.\"<br>(养这只新小狗的工作量远远超出了我最初的预料/让我吃不消。)","tags":["吐槽感叹"]},{"id":603,"verb":"Bear out","meaning":"证实 / 证明(某人的说法)<br><span style=\"font-size:0.8em;color:gray\">(把真相承受并托举出来)</span>","scenario":"<span class=\"context-tag tag-work\">法律与调查</span> \"The newly discovered emails <b>bear out</b> his story.\"<br>(新发现的邮件证实了他的说法。)","tags":["法律与调查"]},{"id":604,"verb":"Black out","meaning":"审查屏蔽 / 停电 / 昏厥<br><span style=\"font-size:0.8em;color:gray\">(眼前一黑/全部变黑)</span>","scenario":"<span class=\"context-tag tag-work\">新闻与生活</span> \"The government tried to <b>black out</b> the news.\" (政府试图封锁这条新闻。)<br>\"The whole city <b>blacked out</b> during the storm.\" (暴风雨期间全城停电。)","tags":["新闻与生活"]},{"id":605,"verb":"Block in","meaning":"堵住(车) / 草草安排(时间)<br><span style=\"font-size:0.8em;color:gray\">(被块状物挡在里面)</span>","scenario":"<span class=\"context-tag tag-life\">交通与日程</span> \"I can't leave, someone <b>blocked</b> me <b>in</b>.\" (我走不了，有人把我的车堵里面了。)<br>\"Let's <b>block in</b> a meeting for Tuesday.\" (咱们暂且把周二的会先排上。)","tags":["交通与日程"]},{"id":606,"verb":"Blow up at","meaning":"突然对(某人)大发雷霆<br><span style=\"font-size:0.8em;color:gray\">(像炸弹一样对着某人爆炸)</span>","scenario":"<span class=\"context-tag tag-drama\">情绪失控</span> \"I'm sorry I <b>blew up at</b> you yesterday, I was just stressed.\"<br>(抱歉昨天突然冲你发无名火/原地爆炸，我只是压力太大了。)","tags":["情绪失控"]},{"id":607,"verb":"Botch up","meaning":"搞砸 / 弄糟(任务)<br><span style=\"font-size:0.8em;color:gray\">(极其地道的口语抱怨)</span>","scenario":"<span class=\"context-tag tag-work\">职场失误</span> \"He completely <b>botched up</b> the presentation.\"<br>(他把那场演示彻底搞砸了/弄得一塌糊涂。)","tags":["职场失误"]},{"id":608,"verb":"Bottom out","meaning":"触底反弹 / 到达最低点<br><span style=\"font-size:0.8em;color:gray\">(经济学/股市高频词)</span>","scenario":"<span class=\"context-tag tag-work\">金融财经</span> \"Economists believe the housing market has finally <b>bottomed out</b>.\"<br>(经济学家认为房地产市场终于触底了。)","tags":["金融财经"]},{"id":609,"verb":"Bowl over","meaning":"使...大为震惊 / 留下极深印象<br><span style=\"font-size:0.8em;color:gray\">(像保龄球一样被击倒)</span>","scenario":"<span class=\"context-tag tag-social\">极致夸赞</span> \"I was completely <b>bowled over</b> by her singing.\"<br>(她的歌声让我大为惊艳/彻底折服了。)","tags":["极致夸赞"]},{"id":610,"verb":"Breeze in","meaning":"轻松自信地走进来<br><span style=\"font-size:0.8em;color:gray\">(像微风一样吹进来)</span>","scenario":"<span class=\"context-tag tag-drama\">人物描写</span> \"He just <b>breezed in</b> like he owned the place.\"<br>(他大摇大摆地走了进来，仿佛这地方是他家开的。)","tags":["人物描写"]},{"id":611,"verb":"Brim over","meaning":"(情绪)洋溢着 / 满溢<br><span style=\"font-size:0.8em;color:gray\">(杯子边缘溢出来)</span>","scenario":"<span class=\"context-tag tag-social\">情感描写</span> \"She was <b>brimming over</b> with excitement.\"<br>(她激动得难以自已/兴奋之情溢于言表。)","tags":["情感描写"]},{"id":612,"verb":"Brush past","meaning":"擦肩而过 / 粗鲁地无视<br><span style=\"font-size:0.8em;color:gray\">(像刷子一样扫过去)</span>","scenario":"<span class=\"context-tag tag-drama\">动作描写</span> \"He just <b>brushed past</b> me without saying hello.\"<br>(他连招呼都没打，直接从我身边漠然地擦身而过。)","tags":["动作描写"]},{"id":613,"verb":"Buckle under","meaning":"在压力下垮掉 / 屈服<br><span style=\"font-size:0.8em;color:gray\">(膝盖弯曲跪下)</span>","scenario":"<span class=\"context-tag tag-work\">职场抗压</span> \"The team started to <b>buckle under</b> the pressure of the deadline.\"<br>(在截止日期的重压下，团队开始崩溃/扛不住了。)","tags":["职场抗压"]},{"id":614,"verb":"Bundle up","meaning":"穿得暖暖的 / 裹紧衣服<br><span style=\"font-size:0.8em;color:gray\">(把自己打包起来)</span>","scenario":"<span class=\"context-tag tag-life\">冬季日常</span> \"It's freezing outside, make sure you <b>bundle up</b>.\"<br>(外面冷爆了，一定要穿得严严实实的/多裹几层。)","tags":["冬季日常"]},{"id":615,"verb":"Burn off","meaning":"消耗掉(热量/多余精力)<br><span style=\"font-size:0.8em;color:gray\">(燃烧殆尽)</span>","scenario":"<span class=\"context-tag tag-life\">健身与育儿</span> \"I need to go for a run to <b>burn off</b> this pizza.\"<br>(我得去跑个步，把这顿披萨的热量消耗掉/燃烧掉。)","tags":["健身与育儿"]},{"id":616,"verb":"Buy out","meaning":"买断(股份) / 收购<br><span style=\"font-size:0.8em;color:gray\">(出钱让人出局)</span>","scenario":"<span class=\"context-tag tag-work\">商业并购</span> \"Microsoft is planning to <b>buy out</b> the smaller company.\"<br>(微软正计划彻底买断/收购那家小公司。)","tags":["商业并购"]},{"id":617,"verb":"Buy up","meaning":"全部买下 / 囤积<br><span style=\"font-size:0.8em;color:gray\">(买到顶，一点不剩)</span>","scenario":"<span class=\"context-tag tag-life\">抢购热潮</span> \"Investors are <b>buying up</b> all the real estate in this area.\"<br>(投资者正在疯狂扫货/囤积这个区域的所有房产。)","tags":["抢购热潮"]},{"id":618,"verb":"Call on","meaning":"号召 / 邀请某人发言 / 拜访<br><span style=\"font-size:0.8em;color:gray\">(正式场合点名)</span>","scenario":"<span class=\"context-tag tag-work\">课堂与会议</span> \"The teacher always <b>calls on</b> me when I don't know the answer.\"<br>(老师总是在我不知道答案的时候点我名/叫我发言。)","tags":["课堂与会议"]},{"id":619,"verb":"Carry off","meaning":"成功完成(极其困难的事)<br><span style=\"font-size:0.8em;color:gray\">(不仅扛起来了，还拿走了奖杯)</span>","scenario":"<span class=\"context-tag tag-work\">夸赞能力</span> \"It was a risky strategy, but she completely <b>carried it off</b>.\"<br>(这是个极具风险的策略，但她居然完美地驾驭了/搞定了。)","tags":["夸赞能力"]},{"id":620,"verb":"Cart off","meaning":"强行带走(人或物)<br><span style=\"font-size:0.8em;color:gray\">(像装进推车一样拉走)</span>","scenario":"<span class=\"context-tag tag-drama\">警匪与清场</span> \"The police <b>carted</b> the protesters <b>off</b> to jail.\"<br>(警察把抗议者强行塞进车里押去了监狱。)","tags":["警匪与清场"]},{"id":621,"verb":"Cast about","meaning":"四处寻找 / 苦思冥想(对策/借口)<br><span style=\"font-size:0.8em;color:gray\">(像撒网一样到处捞)</span>","scenario":"<span class=\"context-tag tag-work\">寻找出路</span> \"He was <b>casting about</b> for a way to explain his mistake.\"<br>(他正在绞尽脑汁/四处搜寻借口来掩饰他的失误。)","tags":["寻找出路"]},{"id":622,"verb":"Cave in to","meaning":"向...屈服 / 让步<br><span style=\"font-size:0.8em;color:gray\">(防线坍塌)</span>","scenario":"<span class=\"context-tag tag-work\">谈判与底线</span> \"The company refused to <b>cave in to</b> the hackers' demands.\"<br>(公司拒绝向黑客的要求屈服/低头。)","tags":["谈判与底线"]},{"id":623,"verb":"Chalk up","meaning":"取得(成绩/胜利) / 记录下<br><span style=\"font-size:0.8em;color:gray\">(在黑板上画正字记分)</span>","scenario":"<span class=\"context-tag tag-work\">体育与商业</span> \"The team <b>chalked up</b> another impressive victory.\"<br>(该团队又斩获/记下了一场令人瞩目的胜利。)","tags":["体育与商业"]},{"id":624,"verb":"Chip in","meaning":"凑钱 / 插话帮忙<br><span style=\"font-size:0.8em;color:gray\">(把筹码扔进池子里)</span>","scenario":"<span class=\"context-tag tag-social\">聚餐与买礼物</span> \"If everyone <b>chips in</b> $5, we can buy her a nice gift.\"<br>(如果大家每人凑/捐5刀，我们就能给她买个好礼物。)","tags":["聚餐与买礼物"]},{"id":625,"verb":"Choke back","meaning":"强忍住(眼泪/愤怒等情绪)<br><span style=\"font-size:0.8em;color:gray\">(卡在喉咙里咽回去)</span>","scenario":"<span class=\"context-tag tag-drama\">情感隐忍</span> \"She tried to <b>choke back</b> her tears during the funeral.\"<br>(在葬礼上，她努力强忍住眼泪不让自己哭出来。)","tags":["情感隐忍"]},{"id":626,"verb":"Come down hard on","meaning":"严厉惩罚 / 严厉打击<br><span style=\"font-size:0.8em;color:gray\">(像重物一样砸在头上)</span>","scenario":"<span class=\"context-tag tag-work\">管理与执法</span> \"The new boss is <b>coming down hard on</b> people who arrive late.\"<br>(新老板正在严厉整治/狠狠收拾那些迟到的人。)","tags":["管理与执法"]},{"id":627,"verb":"Clean out","meaning":"把...洗劫一空 / 彻底清理<br><span style=\"font-size:0.8em;color:gray\">(多义词：打扫干净或钱被掏空)</span>","scenario":"<span class=\"context-tag tag-life\">财务破产</span> \"Buying that house completely <b>cleaned</b> me <b>out</b>.\"<br>(买那套房子彻底掏空了我的钱包/让我倾家荡产了。)","tags":["财务破产"]},{"id":628,"verb":"Clear out of","meaning":"迅速离开 / 从...撤离<br><span style=\"font-size:0.8em;color:gray\">(腾出空间)</span>","scenario":"<span class=\"context-tag tag-drama\">紧急情况</span> \"You guys need to <b>clear out of</b> here right now!\"<br>(你们几个现在必须立刻从这儿撤走/清场！)","tags":["紧急情况"]},{"id":629,"verb":"Cloud over","meaning":"变得阴云密布 / (脸色)阴沉下来<br><span style=\"font-size:0.8em;color:gray\">(被乌云笼罩)</span>","scenario":"<span class=\"context-tag tag-drama\">情绪描写</span> \"His face <b>clouded over</b> when I mentioned the money.\"<br>(当我提到钱的时候，他的脸瞬间阴沉了下来。)","tags":["情绪描写"]},{"id":630,"verb":"Come apart","meaning":"散架 / (心理)崩溃<br><span style=\"font-size:0.8em;color:gray\">(类似于 fall apart)</span>","scenario":"<span class=\"context-tag tag-life\">物品与心理</span> \"This cheap chair is already starting to <b>come apart</b>.\"<br>(这把廉价椅子已经开始散架了。)","tags":["物品与心理"]},{"id":631,"verb":"Come away with","meaning":"带着(某种感觉/印象)离开 / 得出结论<br><span style=\"font-size:0.8em;color:gray\">(走的时候顺手带走了)</span>","scenario":"<span class=\"context-tag tag-work\">开会/观影体验</span> \"I <b>came away with</b> the impression that he was hiding something.\"<br>(这场谈话结束后，我带着一种“他在隐瞒什么”的强烈直觉。)","tags":["开会/观影体验"]},{"id":632,"verb":"Come in for","meaning":"遭到(批评/指责)<br><span style=\"font-size:0.8em;color:gray\">(走进来领受了骂声)</span>","scenario":"<span class=\"context-tag tag-work\">新闻与公关</span> \"The government has <b>come in for</b> a lot of criticism recently.\"<br>(政府最近饱受/遭到了一大波强烈的批评。)","tags":["新闻与公关"]},{"id":633,"verb":"Come into","meaning":"继承(财产或头衔)<br><span style=\"font-size:0.8em;color:gray\">(走进金库)</span>","scenario":"<span class=\"context-tag tag-life\">法律与生活</span> \"She <b>came into</b> a fortune when her grandfather passed away.\"<br>(她爷爷去世后，她意外继承了一大笔财富。)","tags":["法律与生活"]},{"id":634,"verb":"Come through","meaning":"安然度过 / 兑现承诺 / 获批<br><span style=\"font-size:0.8em;color:gray\">(穿过隧道见到曙光)</span>","scenario":"<span class=\"context-tag tag-social\">信任与危机</span> \"I knew I could count on you to <b>come through</b> for us.\"<br>(我就知道在关键时刻，你可以兑现承诺/挺身而出帮我们过关。)","tags":["信任与危机"]},{"id":635,"verb":"Conjure up","meaning":"使(脑海中)浮现 / 像变魔术般弄出<br><span style=\"font-size:0.8em;color:gray\">(施咒语召唤出来)</span>","scenario":"<span class=\"context-tag tag-work\">想象与创意</span> \"That smell always <b>conjures up</b> memories of my childhood.\"<br>(那种气味总能变魔术般唤起/勾起我童年的回忆。)","tags":["想象与创意"]},{"id":636,"verb":"Cop out of","meaning":"逃避(责任/承诺)<br><span style=\"font-size:0.8em;color:gray\">(找借口溜走，名词 a cop-out = 逃避的借口)</span>","scenario":"<span class=\"context-tag tag-social\">抱怨朋友</span> \"You can't just <b>cop out of</b> washing the dishes again.\"<br>(你不能又找借口逃避洗碗的责任了。)","tags":["抱怨朋友"]},{"id":637,"verb":"Cordon off","meaning":"拉起警戒线隔离<br><span style=\"font-size:0.8em;color:gray\">(用绳索圈起来)</span>","scenario":"<span class=\"context-tag tag-drama\">警匪与新闻</span> \"Police <b>cordoned off</b> the street after the explosion.\"<br>(爆炸发生后，警察拉起警戒线封锁了街道。)","tags":["警匪与新闻"]},{"id":638,"verb":"Cotton on","meaning":"开始明白 / 突然开窍<br><span style=\"font-size:0.8em;color:gray\">(英式/澳式极高频，类似于 catch on)</span>","scenario":"<span class=\"context-tag tag-social\">领悟真相</span> \"It took me a while to <b>cotton on</b> to what he was doing.\"<br>(我过了好一阵子才恍然大悟/看穿他到底在搞什么鬼。)","tags":["领悟真相"]},{"id":639,"verb":"Crack on","meaning":"(毫不迟疑地)继续努力干<br><span style=\"font-size:0.8em;color:gray\">(极具干劲的口语)</span>","scenario":"<span class=\"context-tag tag-work\">冲刺打气</span> \"We don't have much time, let's just <b>crack on</b> with it.\"<br>(我们时间不多了，别废话直接甩开膀子干吧。)","tags":["冲刺打气"]},{"id":640,"verb":"Strike out","meaning":"划掉 / 开始独立生活 / 三振出局<br><span style=\"font-size:0.8em;color:gray\">(源于棒球，引申为出击或彻底失败)</span>","scenario":"<span class=\"context-tag tag-life\">人生转折</span> \"It's time for him to <b>strike out</b> on his own.\"<br>(是时候让他出去闯荡/开始独立生活了。)","tags":["人生转折"]},{"id":641,"verb":"Cry out for","meaning":"极度需要 / 迫切渴望<br><span style=\"font-size:0.8em;color:gray\">(大声呼喊着要)</span>","scenario":"<span class=\"context-tag tag-work\">新闻评论</span> \"The education system is <b>crying out for</b> reform.\"<br>(当前的教育系统极度渴望/迫切需要一场改革。)","tags":["新闻评论"]},{"id":642,"verb":"Cut in on","meaning":"打断(对话) / (开车)强行加塞<br><span style=\"font-size:0.8em;color:gray\">(像刀子一样切入别人的队伍)</span>","scenario":"<span class=\"context-tag tag-social\">社交与交通</span> \"It's rude to <b>cut in on</b> someone else's conversation.\"<br>(强行插嘴/打断别人的谈话是很无礼的。)","tags":["社交与交通"]},{"id":643,"verb":"Dash off","meaning":"匆忙离开 / 一挥而就(写文章)<br><span style=\"font-size:0.8em;color:gray\">(极速冲刺)</span>","scenario":"<span class=\"context-tag tag-work\">赶时间</span> \"I need to <b>dash off</b> to a meeting, let's talk later.\"<br>(我得赶紧飞奔去开会了，晚点再聊。)","tags":["赶时间"]},{"id":644,"verb":"Happen upon","meaning":"偶然遇到 / 意外发现<br><span style=\"font-size:0.8em;color:gray\">(类似于 stumble upon，极具文学感)</span>","scenario":"<span class=\"context-tag tag-life\">惊喜邂逅</span> \"We <b>happened upon</b> a beautiful little restaurant in the alley.\"<br>(我们在小巷里意外邂逅/偶然发现了一家极美的小餐厅。)","tags":["惊喜邂逅"]},{"id":645,"verb":"Dip into","meaning":"动用(存款) / 随便翻阅<br><span style=\"font-size:0.8em;color:gray\">(把手探进去捞一点)</span>","scenario":"<span class=\"context-tag tag-life\">财务与阅读</span> \"I had to <b>dip into</b> my savings to pay for the car repair.\"<br>(我不得不动用我的积蓄来支付修车费。)","tags":["财务与阅读"]},{"id":646,"verb":"Dole out","meaning":"少量发放 / 施舍(食物或钱)<br><span style=\"font-size:0.8em;color:gray\">(像救济金一样发)</span>","scenario":"<span class=\"context-tag tag-work\">福利与管理</span> \"The government is <b>doling out</b> cash to help small businesses.\"<br>(政府正在分发/施舍现金来帮助小企业。)","tags":["福利与管理"]},{"id":647,"verb":"Do away with","meaning":"废除 / 摆脱 / 除掉(某人)<br><span style=\"font-size:0.8em;color:gray\">(彻底做完并扔掉)</span>","scenario":"<span class=\"context-tag tag-work\">政策与犯罪</span> \"The company decided to <b>do away with</b> the dress code.\"<br>(公司决定彻底废除/取消着装规定。)","tags":["政策与犯罪"]},{"id":648,"verb":"Draw down","meaning":"消耗 / 削减规模(资金或军队)<br><span style=\"font-size:0.8em;color:gray\">(往下拉低水位线)</span>","scenario":"<span class=\"context-tag tag-work\">军事与资源</span> \"The US is planning to <b>draw down</b> its troops in the region.\"<br>(美国正计划逐步撤回/削减该地区的驻军规模。)","tags":["军事与资源"]},{"id":649,"verb":"Dress down","meaning":"穿着随意 / 严厉训斥某人<br><span style=\"font-size:0.8em;color:gray\">(极其高频的多义词)</span>","scenario":"<span class=\"context-tag tag-work\">职场文化</span> \"Fridays are <b>dress down</b> days at our office.\" (周五是便装日。)<br>\"The manager <b>dressed</b> him <b>down</b> for missing the deadline.\" (经理把他狠狠训斥了一顿。)","tags":["职场文化"]},{"id":650,"verb":"Drop back","meaning":"落后 / 退居二线<br><span style=\"font-size:0.8em;color:gray\">(掉到后面去了)</span>","scenario":"<span class=\"context-tag tag-life\">比赛与竞争</span> \"He started strong, but eventually <b>dropped back</b> to third place.\"<br>(他开局很猛，但最终还是掉队/落后到了第三名。)","tags":["比赛与竞争"]},{"id":651,"verb":"Dry out","meaning":"戒酒 / 彻底晾干<br><span style=\"font-size:0.8em;color:gray\">(把体内的酒精沥干)</span>","scenario":"<span class=\"context-tag tag-drama\">医疗与生活</span> \"He checked into a clinic to <b>dry out</b>.\"<br>(他住进了一家诊所去强制戒酒。)","tags":["医疗与生活"]},{"id":652,"verb":"Eat up","meaning":"全部吃光 / 深信不疑(谎言)<br><span style=\"font-size:0.8em;color:gray\">(照单全收)</span>","scenario":"<span class=\"context-tag tag-social\">轻信八卦</span> \"He told her a bunch of lies, and she <b>ate</b> it all <b>up</b>.\"<br>(他跟她扯了一堆谎，她居然毫不怀疑地全盘相信了。)","tags":["轻信八卦"]},{"id":653,"verb":"Spin out","meaning":"使...拖延很久 / 勉强维持<br><span style=\"font-size:0.8em;color:gray\">(像纺线一样拉得很长)</span>","scenario":"<span class=\"context-tag tag-work\">吐槽开会</span> \"They managed to <b>spin out</b> a 10-minute topic into a 2-hour meeting.\"<br>(他们硬生生把一个10分钟的话题拉扯/拖延成了一个两小时的会。)","tags":["吐槽开会"]},{"id":654,"verb":"Face up to","meaning":"勇敢面对(困难或不愉快的事实)<br><span style=\"font-size:0.8em;color:gray\">(迎面直视不躲避)</span>","scenario":"<span class=\"context-tag tag-drama\">心理辅导</span> \"You need to <b>face up to</b> the fact that she's not coming back.\"<br>(你必须勇敢面对现实：她不会回来了。)","tags":["心理辅导"]},{"id":655,"verb":"Fall in with","meaning":"同意(计划) / 结交(坏朋友)<br><span style=\"font-size:0.8em;color:gray\">(掉进一个队伍里)</span>","scenario":"<span class=\"context-tag tag-social\">交友不慎</span> \"He <b>fell in with</b> a bad crowd in high school.\"<br>(他在高中时不幸跟一群坏孩子混在一起了。)","tags":["交友不慎"]},{"id":656,"verb":"Feel for","meaning":"同情某人 / 为某人难过<br><span style=\"font-size:0.8em;color:gray\">(把感情倾注给对方)</span>","scenario":"<span class=\"context-tag tag-social\">安慰朋友</span> \"I really <b>feel for</b> you, going through a divorce is tough.\"<br>(我极其同情/懂你的感受，经历离婚太折磨人了。)","tags":["安慰朋友"]},{"id":657,"verb":"Fight back","meaning":"反击 / 强忍住(眼泪/睡意)<br><span style=\"font-size:0.8em;color:gray\">(用力打回去)</span>","scenario":"<span class=\"context-tag tag-drama\">冲突与情感</span> \"She bit her lip, trying to <b>fight back</b> the tears.\"<br>(她咬着嘴唇，拼命想把眼泪憋回去/不让自己哭出来。)","tags":["冲突与情感"]},{"id":658,"verb":"Ferret out","meaning":"搜查出 / 查明(隐藏的真相)<br><span style=\"font-size:0.8em;color:gray\">(像雪貂一样钻进洞里抓猎物)</span>","scenario":"<span class=\"context-tag tag-work\">调查与新闻</span> \"The journalist managed to <b>ferret out</b> the truth.\"<br>(那位记者硬是像猎犬一样顺藤摸瓜查出了真相。)","tags":["调查与新闻"]},{"id":659,"verb":"Die away","meaning":"(声音/风/光线) 渐渐消失<br><span style=\"font-size:0.8em;color:gray\">(类似于 fade away，多用于听觉)</span>","scenario":"<span class=\"context-tag tag-life\">环境描写</span> \"The sound of his footsteps slowly <b>died away</b> in the distance.\"<br>(他的脚步声在远处渐渐消散了。)","tags":["环境描写"]},{"id":660,"verb":"Flip through","meaning":"快速翻阅(书本/频道)<br><span style=\"font-size:0.8em;color:gray\">(用手指弹着翻页)</span>","scenario":"<span class=\"context-tag tag-life\">阅读与休闲</span> \"I was just <b>flipping through</b> a magazine while waiting.\"<br>(等待的时候我就随手翻了翻杂志。)","tags":["阅读与休闲"]},{"id":661,"verb":"Fob off","meaning":"拿假货糊弄 / 找借口敷衍某人<br><span style=\"font-size:0.8em;color:gray\">(骗子的专属动作)</span>","scenario":"<span class=\"context-tag tag-social\">购物与维权</span> \"He tried to <b>fob</b> me <b>off</b> with a cheap fake.\"<br>(他试图拿个廉价的A货来糊弄/打发我。)","tags":["购物与维权"]},{"id":662,"verb":"Fold up","meaning":"(企业)倒闭 / 折叠起来<br><span style=\"font-size:0.8em;color:gray\">(折叠帐篷走人)</span>","scenario":"<span class=\"context-tag tag-work\">商业失败</span> \"The small bookstore had to <b>fold up</b> after the pandemic.\"<br>(疫情过后，那家小书店不得不关门大吉/倒闭了。)","tags":["商业失败"]},{"id":663,"verb":"Press ahead / on","meaning":"(不顾困难)奋力向前 / 强行推进<br><span style=\"font-size:0.8em;color:gray\">(硬顶着压力前进)</span>","scenario":"<span class=\"context-tag tag-work\">项目执行</span> \"Despite the funding issue, we must <b>press ahead</b> with the plan.\"<br>(尽管资金出了问题，我们仍必须硬着头皮强行推进这个计划。)","tags":["项目执行"]},{"id":664,"verb":"Fret about","meaning":"为...发愁 / 烦躁不安<br><span style=\"font-size:0.8em;color:gray\">(持续的焦虑摩擦)</span>","scenario":"<span class=\"context-tag tag-drama\">心理焦虑</span> \"Stop <b>fretting about</b> things you can't control.\"<br>(别再为你无法控制的事情瞎操心/内耗了。)","tags":["心理焦虑"]},{"id":665,"verb":"Brace oneself for","meaning":"为(即将到来的灾难)做准备 / 防备<br><span style=\"font-size:0.8em;color:gray\">(绷紧肌肉支撑住)</span>","scenario":"<span class=\"context-tag tag-work\">迎接风暴</span> \"We need to <b>brace ourselves for</b> a tough quarter.\"<br>(我们必须做好心理准备，迎接一个极其艰难的季度。)","tags":["迎接风暴"]},{"id":666,"verb":"Get ahead","meaning":"获得成功 / 出人头地<br><span style=\"font-size:0.8em;color:gray\">(跑到前面去了)</span>","scenario":"<span class=\"context-tag tag-work\">职场奋斗</span> \"You have to work extra hard if you want to <b>get ahead</b> in this company.\"<br>(如果你想在这家公司出人头地/往上爬，你必须加倍努力。)","tags":["职场奋斗"]},{"id":667,"verb":"Hint at","meaning":"暗示 / 隐隐透出<br><span style=\"font-size:0.8em;color:gray\">(给个线索)</span>","scenario":"<span class=\"context-tag tag-work\">沟通与公关</span> \"The CEO strongly <b>hinted at</b> a possible merger next year.\"<br>(CEO强烈暗示了明年可能会有一场并购。)","tags":["沟通与公关"]},{"id":668,"verb":"Get back at","meaning":"报复(某人)<br><span style=\"font-size:0.8em;color:gray\">(把受到的伤害还回去)</span>","scenario":"<span class=\"context-tag tag-drama\">矛盾与撕逼</span> \"I think she's just dating him to <b>get back at</b> her ex.\"<br>(我觉得她跟他约会纯粹是为了报复她的前男友。)","tags":["矛盾与撕逼"]},{"id":669,"verb":"Get carried away","meaning":"得意忘形 / 激动得上头<br><span style=\"font-size:0.8em;color:gray\">(被情绪带跑偏了)</span>","scenario":"<span class=\"context-tag tag-social\">冲动与消费</span> \"I went shopping and got a little <b>carried away</b>.\"<br>(我去逛街，一激动没忍住/上头上脑买了一大堆东西。)","tags":["冲动与消费"]},{"id":670,"verb":"Give over to","meaning":"把(时间/空间)专用于 / 移交<br><span style=\"font-size:0.8em;color:gray\">(全盘交出)</span>","scenario":"<span class=\"context-tag tag-life\">空间规划</span> \"We <b>gave</b> the entire basement <b>over to</b> his gaming setup.\"<br>(我们把整个地下室都腾出来专门给他弄电竞房了。)","tags":["空间规划"]},{"id":671,"verb":"Go about","meaning":"着手做 / (按部就班地)处理<br><span style=\"font-size:0.8em;color:gray\">(开始四处行动)</span>","scenario":"<span class=\"context-tag tag-work\">解决问题</span> \"How should we <b>go about</b> solving this issue?\"<br>(我们该如何着手处理/应对这个问题？)","tags":["解决问题"]},{"id":672,"verb":"Go back on","meaning":"违背(诺言/协议)<br><span style=\"font-size:0.8em;color:gray\">(走回头路)</span>","scenario":"<span class=\"context-tag tag-work\">商业信用</span> \"You promised to help me, you can't <b>go back on</b> your word now.\"<br>(你答应过帮我的，你现在不能食言/出尔反尔。)","tags":["商业信用"]},{"id":673,"verb":"Go down with","meaning":"染上(疾病)<br><span style=\"font-size:0.8em;color:gray\">(英式英语中极常用，等同于 come down with)</span>","scenario":"<span class=\"context-tag tag-life\">生病请假</span> \"Half the office has <b>gone down with</b> the flu.\"<br>(办公室里一半的人都倒下了/染上了流感。)","tags":["生病请假"]},{"id":674,"verb":"Go for","meaning":"选择 / 袭击 / 以...价格卖出<br><span style=\"font-size:0.8em;color:gray\">(直接冲着它去，多义词)</span>","scenario":"<span class=\"context-tag tag-life\">购物与动物</span> \"I think I'll <b>go for</b> the steak.\" (点餐：我想选牛排。)<br>\"The dog suddenly <b>went for</b> the mailman.\" (狗突然扑向/袭击邮递员。)","tags":["购物与动物"]},{"id":675,"verb":"Go in for","meaning":"喜欢 / 参加(比赛)<br><span style=\"font-size:0.8em;color:gray\">(投身进去)</span>","scenario":"<span class=\"context-tag tag-social\">谈论爱好</span> \"I don't really <b>go in for</b> extreme sports.\"<br>(我其实不太喜欢/不怎么参与极限运动。)","tags":["谈论爱好"]},{"id":676,"verb":"Go without","meaning":"没有...也行 / 忍受缺乏<br><span style=\"font-size:0.8em;color:gray\">(外部缺失依然前行)</span>","scenario":"<span class=\"context-tag tag-life\">艰苦生活</span> \"I guess we'll just have to <b>go without</b> internet for a few days.\"<br>(看来我们只能将就几天没有网的日子了。)","tags":["艰苦生活"]},{"id":677,"verb":"Hammer into","meaning":"反复灌输 / 使人牢记<br><span style=\"font-size:0.8em;color:gray\">(像用锤子把钉子砸进脑子里)</span>","scenario":"<span class=\"context-tag tag-work\">教育与培训</span> \"The coach constantly <b>hammers into</b> us the importance of teamwork.\"<br>(教练不断地向我们死命灌输团队合作的重要性。)","tags":["教育与培训"]},{"id":678,"verb":"Hand out","meaning":"分发(免费物品/资料)<br><span style=\"font-size:0.8em;color:gray\">(亲手递出去)</span>","scenario":"<span class=\"context-tag tag-work\">开会发文件</span> \"Could you help me <b>hand out</b> these flyers?\"<br>(你能帮我发一下这些传单吗？)","tags":["开会发文件"]},{"id":679,"verb":"Hit back","meaning":"反击 / 回击(批评或攻击)<br><span style=\"font-size:0.8em;color:gray\">(打回去)</span>","scenario":"<span class=\"context-tag tag-work\">舆论与公关</span> \"The company immediately <b>hit back</b> at the false accusations.\"<br>(公司立刻对那些虚假指控进行了猛烈回击。)","tags":["舆论与公关"]},{"id":680,"verb":"Hold back from","meaning":"克制住(不去做某事)<br><span style=\"font-size:0.8em;color:gray\">(把手收回来)</span>","scenario":"<span class=\"context-tag tag-drama\">自控力</span> \"I had to <b>hold back from</b> laughing out loud.\"<br>(我不得不死命憋着不让自己笑出声来。)","tags":["自控力"]},{"id":681,"verb":"Hole up","meaning":"躲藏起来 / 闭门不出<br><span style=\"font-size:0.8em;color:gray\">(像动物钻进洞里)</span>","scenario":"<span class=\"context-tag tag-drama\">警匪与生活</span> \"The bank robbers <b>holed up</b> in a motel for three days.\"<br>(抢劫犯在一家汽车旅馆里躲藏/死守了三天。)","tags":["警匪与生活"]},{"id":682,"verb":"Smooth out","meaning":"抚平(皱纹) / 解决(问题/分歧)<br><span style=\"font-size:0.8em;color:gray\">(把表面抹平，极其地道的职场词)</span>","scenario":"<span class=\"context-tag tag-work\">人际与项目</span> \"We need to <b>smooth out</b> a few problems before launching the app.\"<br>(我们在发布App前还得把几个小问题理顺/摆平。)","tags":["人际与项目"]},{"id":683,"verb":"Keel over","meaning":"晕倒 / (船只)倾覆<br><span style=\"font-size:0.8em;color:gray\">(像无根的树一样倒下)</span>","scenario":"<span class=\"context-tag tag-drama\">医疗与意外</span> \"It was so hot during the marathon that several runners <b>keeled over</b>.\"<br>(马拉松比赛时太热了，好几个跑者直接晕倒/栽倒在地。)","tags":["医疗与意外"]},{"id":684,"verb":"Kick in","meaning":"(药效)发作 / (机器/系统)开始运转 / 出资<br><span style=\"font-size:0.8em;color:gray\">(踢一脚让它启动)</span>","scenario":"<span class=\"context-tag tag-life\">医疗与财务</span> \"I have a headache, waiting for the Advil to <b>kick in</b>.\"<br>(我头疼，正等着布洛芬的药效发作/起效。)","tags":["医疗与财务"]},{"id":685,"verb":"Snap at","meaning":"恶语相向 / 厉声呵斥<br><span style=\"font-size:0.8em;color:gray\">(像狗咬人一样突然“咔嚓”咬一口)</span>","scenario":"<span class=\"context-tag tag-drama\">情绪与吵架</span> \"Don't <b>snap at</b> me! I'm just trying to help.\"<br>(别冲我嚷嚷/发脾气！我只是想帮忙。)","tags":["情绪与吵架"]},{"id":686,"verb":"Lay down","meaning":"制定(规则) / 放下(武器)<br><span style=\"font-size:0.8em;color:gray\">(Lay down the law = 摆出强硬的规矩)</span>","scenario":"<span class=\"context-tag tag-work\">法律与管理</span> \"The new principal immediately <b>laid down</b> the law.\"<br>(新校长一上任就立刻立下了死规矩/给众人来了个下马威。)","tags":["法律与管理"]},{"id":687,"verb":"Lead to","meaning":"导致 / 引起<br><span style=\"font-size:0.8em;color:gray\">(将路引向...)</span>","scenario":"<span class=\"context-tag tag-work\">结果与因果</span> \"Poor communication often <b>leads to</b> project failure.\"<br>(糟糕的沟通往往会导致项目失败。)","tags":["结果与因果"]},{"id":688,"verb":"Leave behind","meaning":"忘记带 / 抛在脑后 / 留下(烂摊子)<br><span style=\"font-size:0.8em;color:gray\">(丢在后面)</span>","scenario":"<span class=\"context-tag tag-life\">旅行与人生</span> \"Make sure you don't <b>leave</b> anything <b>behind</b> in the hotel room.\"<br>(确保你没有把任何东西遗落/落在酒店房间里。)","tags":["旅行与人生"]},{"id":689,"verb":"Let in on","meaning":"让某人知道(秘密/计划)<br><span style=\"font-size:0.8em;color:gray\">(开门让人进屋听秘密)</span>","scenario":"<span class=\"context-tag tag-social\">社交与八卦</span> \"Are you going to <b>let</b> me <b>in on</b> the secret?\"<br>(你打算把这个秘密透露给我/让我入伙吗？)","tags":["社交与八卦"]},{"id":690,"verb":"Let up","meaning":"(风雨/疼痛/压力) 减弱，放松<br><span style=\"font-size:0.8em;color:gray\">(不再压得那么紧)</span>","scenario":"<span class=\"context-tag tag-life\">天气与努力</span> \"The rain finally started to <b>let up</b>.\" (雨终于开始变小了。)<br>\"We can't <b>let up</b> now, the deadline is tomorrow.\" (我们现在绝对不能松劲。)","tags":["天气与努力"]},{"id":691,"verb":"Log off","meaning":"注销 / 下班 / (精神)断线<br><span style=\"font-size:0.8em;color:gray\">(拔掉电源)</span>","scenario":"<span class=\"context-tag tag-work\">IT与下班</span> \"It's 6 PM, time to <b>log off</b> and go home.\"<br>(六点了，是时候关电脑下班回家了。)","tags":["IT与下班"]},{"id":692,"verb":"Live off","meaning":"靠...生活 / 啃老<br><span style=\"font-size:0.8em;color:gray\">(像寄生虫一样吸取养分生活)</span>","scenario":"<span class=\"context-tag tag-life\">财务与生存</span> \"He's 30 years old and still <b>living off</b> his parents.\"<br>(他都三十岁了，还在靠父母养活/啃老。)","tags":["财务与生存"]},{"id":693,"verb":"Make for","meaning":"走向 / 导致 / 有助于(促成)<br><span style=\"font-size:0.8em;color:gray\">(为...制造条件)</span>","scenario":"<span class=\"context-tag tag-work\">结果描述</span> \"Good communication <b>makes for</b> a healthy relationship.\"<br>(良好的沟通造就/有助于建立健康的感情关系。)","tags":["结果描述"]},{"id":694,"verb":"Make off with","meaning":"携(赃款/赃物)潜逃 / 偷走<br><span style=\"font-size:0.8em;color:gray\">(极其形象的犯罪用语)</span>","scenario":"<span class=\"context-tag tag-drama\">犯罪新闻</span> \"The thieves managed to <b>make off with</b> a million dollars worth of jewelry.\"<br>(小偷们竟然成功卷走/偷走了一百万美元的珠宝。)","tags":["犯罪新闻"]},{"id":695,"verb":"Make out","meaning":"勉强辨认出 / (美剧俚语)亲热<br><span style=\"font-size:0.8em;color:gray\">(极高频的多义词，注意语境！)</span>","scenario":"<span class=\"context-tag tag-drama\">视听与美剧</span> \"I can barely <b>make out</b> the sign in the dark.\" (天太黑我几乎看不清那块牌子。)<br>\"They were <b>making out</b> in the back of the car.\" (他们正在汽车后座疯狂亲热。)","tags":["视听与美剧"]},{"id":696,"verb":"Measure out","meaning":"(精确地)量出 / 称出<br><span style=\"font-size:0.8em;color:gray\">(量好了拿出来)</span>","scenario":"<span class=\"context-tag tag-life\">烘焙与化学</span> \"Carefully <b>measure out</b> 200 grams of flour.\"<br>(小心地称出/量出200克面粉。)","tags":["烘焙与化学"]},{"id":697,"verb":"Mouth off","meaning":"顶嘴 / (狂妄地)放肆乱说<br><span style=\"font-size:0.8em;color:gray\">(只动嘴皮子不带脑子)</span>","scenario":"<span class=\"context-tag tag-drama\">青少年与吵架</span> \"He got suspended for <b>mouthing off</b> to the teacher.\"<br>(他因为对老师出言不逊/顶嘴被停学了。)","tags":["青少年与吵架"]},{"id":698,"verb":"Chew over","meaning":"仔细考虑 / 细细琢磨<br><span style=\"font-size:0.8em;color:gray\">(像牛反刍一样在脑子里咀嚼)</span>","scenario":"<span class=\"context-tag tag-work\">做决定前</span> \"That's an interesting offer, let me <b>chew</b> it <b>over</b> for a few days.\"<br>(这个报价很有意思，让我花几天时间细细琢磨/咀嚼一下。)","tags":["做决定前"]},{"id":699,"verb":"Muscle in on","meaning":"强行干涉 / 蛮横插手(别人的生意或利益)<br><span style=\"font-size:0.8em;color:gray\">(动用肌肉硬挤进去)</span>","scenario":"<span class=\"context-tag tag-work\">黑帮与职场争权</span> \"Are you trying to <b>muscle in on</b> my territory?\"<br>(你这是想强行插手/抢夺我的地盘吗？)","tags":["黑帮与职场争权"]},{"id":700,"verb":"Nail down","meaning":"敲定(细节/时间) / 最终确定<br><span style=\"font-size:0.8em;color:gray\">(用钉子死死钉住，防止再变动)</span>","scenario":"<span class=\"context-tag tag-work\">合同与谈判</span> \"We need to <b>nail down</b> the final price by tomorrow.\"<br>(我们明天之前必须把最终价格死死敲定/拍板。)","tags":["合同与谈判"]},{"id":701,"verb":"Pack in","meaning":"放弃 / 停止做某事(因太累或厌烦)<br><span style=\"font-size:0.8em;color:gray\">(把东西打包收工，多用于英式/美式口语)</span>","scenario":"<span class=\"context-tag tag-work\">放弃挣扎</span> \"The job was so stressful, I decided to <b>pack it in</b>.\"<br>(这工作压力太大，我决定不干了/直接打包走人。)","tags":["放弃挣扎"]},{"id":702,"verb":"Pal up with","meaning":"结为好友 / 套近乎<br><span style=\"font-size:0.8em;color:gray\">(Pal = 哥们/伙计)</span>","scenario":"<span class=\"context-tag tag-social\">职场社交</span> \"He immediately tried to <b>pal up with</b> the new boss.\"<br>(他立刻试图跟新老板套近乎/称兄道弟。)","tags":["职场社交"]},{"id":703,"verb":"Pan out","meaning":"(计划/尝试) 结果(通常指成功) / 发展<br><span style=\"font-size:0.8em;color:gray\">(淘金时用平底锅淘出金子，极高频！)</span>","scenario":"<span class=\"context-tag tag-work\">项目总结</span> \"I'm glad your business venture <b>panned out</b> well.\"<br>(很高兴你的创业冒险最终成功了/结出硕果了。)","tags":["项目总结"]},{"id":704,"verb":"Paper over","meaning":"掩盖(分歧/问题) / 粉饰太平<br><span style=\"font-size:0.8em;color:gray\">(用纸糊在裂缝上，治标不治本)</span>","scenario":"<span class=\"context-tag tag-work\">政治与谈判</span> \"The agreement merely <b>papered over</b> the fundamental issues.\"<br>(该协议只不过是勉强粉饰了根本性的问题/敷衍了事。)","tags":["政治与谈判"]},{"id":705,"verb":"Pare down","meaning":"削减 / 精简(数量/尺寸)<br><span style=\"font-size:0.8em;color:gray\">(像削皮一样一点点减小)</span>","scenario":"<span class=\"context-tag tag-work\">预算与写作</span> \"We need to <b>pare down</b> our expenses significantly.\"<br>(我们需要大幅度精简/削减我们的开支。)","tags":["预算与写作"]},{"id":706,"verb":"Pass off as","meaning":"冒充 / 假装是(别人/别的东西)<br><span style=\"font-size:0.8em;color:gray\">(试图蒙混过关)</span>","scenario":"<span class=\"context-tag tag-drama\">打假与骗局</span> \"He tried to <b>pass</b> the fake watch <b>off as</b> a real Rolex.\"<br>(他试图把那块假表冒充成真劳力士卖掉。)","tags":["打假与骗局"]},{"id":707,"verb":"Patch up","meaning":"修补(关系) / 临时包扎(伤口)<br><span style=\"font-size:0.8em;color:gray\">(用补丁暂时对付过去)</span>","scenario":"<span class=\"context-tag tag-social\">人际修复</span> \"They had a huge fight, but they eventually <b>patched things up</b>.\"<br>(他们大吵了一架，但最终还是修补了关系/和好了。)","tags":["人际修复"]},{"id":708,"verb":"Peel away","meaning":"(车辆等)脱离群体驶离 / 剥落<br><span style=\"font-size:0.8em;color:gray\">(像果皮一样剥离)</span>","scenario":"<span class=\"context-tag tag-drama\">动作描写</span> \"One police car <b>peeled away</b> to pursue the suspect.\"<br>(一辆警车脱离车队去追捕嫌疑人了。)","tags":["动作描写"]},{"id":709,"verb":"Peg down","meaning":"确定(细节) / 把某人限制在(某状态)<br><span style=\"font-size:0.8em;color:gray\">(用木钉死死钉住，类似于 pin down)</span>","scenario":"<span class=\"context-tag tag-work\">开会确认</span> \"Let's try to <b>peg down</b> exactly what caused the error.\"<br>(咱们试着精确敲定到底是什么导致了这个错误。)","tags":["开会确认"]},{"id":710,"verb":"Phase out","meaning":"逐步淘汰 / 分阶段停止使用<br><span style=\"font-size:0.8em;color:gray\">(分阶段退出，商业高频)</span>","scenario":"<span class=\"context-tag tag-work\">产品生命周期</span> \"The company is planning to <b>phase out</b> the older models.\"<br>(公司正计划逐步淘汰那些旧型号的产品。)","tags":["产品生命周期"]},{"id":711,"verb":"Pick at","meaning":"找茬 / (没胃口地)扒拉着吃<br><span style=\"font-size:0.8em;color:gray\">(用手一点点挑刺或挑食)</span>","scenario":"<span class=\"context-tag tag-life\">吐槽挑食</span> \"He wasn't hungry, just <b>picking at</b> his salad.\"<br>(他不饿，只是兴致缺缺地用叉子扒拉着沙拉。)","tags":["吐槽挑食"]},{"id":712,"verb":"Pin on","meaning":"把(责任/罪名)推给(某人)<br><span style=\"font-size:0.8em;color:gray\">(把标签死死钉在别人身上)</span>","scenario":"<span class=\"context-tag tag-drama\">职场甩锅</span> \"You can't <b>pin</b> this mistake <b>on</b> me!\"<br>(你不能把这个失误的锅甩到我头上/栽赃给我！)","tags":["职场甩锅"]},{"id":713,"verb":"Pine for","meaning":"极度渴望 / 苦苦思念(失去的人或物)<br><span style=\"font-size:0.8em;color:gray\">(极具文学色彩的渴望)</span>","scenario":"<span class=\"context-tag tag-social\">情感描写</span> \"He spent months <b>pining for</b> his ex-girlfriend.\"<br>(他花了几个月时间苦苦思念他的前女友。)","tags":["情感描写"]},{"id":714,"verb":"Pitch in","meaning":"凑钱 / 齐心协力帮忙<br><span style=\"font-size:0.8em;color:gray\">(把筹码扔进池子，职场极高频！)</span>","scenario":"<span class=\"context-tag tag-work\">团队协作</span> \"If we all <b>pitch in</b>, we can finish this project today.\"<br>(如果我们大家都搭把手/齐心协力，今天就能搞定这个项目。)","tags":["团队协作"]},{"id":715,"verb":"Play down","meaning":"淡化(重要性) / 轻描淡写<br><span style=\"font-size:0.8em;color:gray\">(故意压低音量或影响力，与 play up 相对)</span>","scenario":"<span class=\"context-tag tag-work\">公关危机</span> \"The government tried to <b>play down</b> the severity of the crisis.\"<br>(政府试图轻描淡写地淡化危机的严重程度。)","tags":["公关危机"]},{"id":716,"verb":"Plough into / Plow into","meaning":"猛撞向(某物) / 将(钱/精力)大量投入<br><span style=\"font-size:0.8em;color:gray\">(像犁地一样猛冲进去)</span>","scenario":"<span class=\"context-tag tag-work\">投资与事故</span> \"They <b>ploughed</b> all their savings <b>into</b> the new startup.\"<br>(他们把所有的积蓄都疯狂砸进了这家新创公司。)","tags":["投资与事故"]},{"id":717,"verb":"Plug away at","meaning":"坚持不懈地做(繁重枯燥的工作)<br><span style=\"font-size:0.8em;color:gray\">(类似于 slog away / keep at it)</span>","scenario":"<span class=\"context-tag tag-work\">赶进度</span> \"I've been <b>plugging away at</b> this code for hours.\"<br>(我已经连续好几个小时死磕这段代码了。)","tags":["赶进度"]},{"id":718,"verb":"Pore over","meaning":"仔细阅读 / 钻研(文件/书籍)<br><span style=\"font-size:0.8em;color:gray\">(极其专注，眼睛像要钻进纸里)</span>","scenario":"<span class=\"context-tag tag-work\">查阅资料</span> \"The lawyers spent days <b>poring over</b> the contract.\"<br>(律师们花了几天时间逐字逐句地死磕/研读这份合同。)","tags":["查阅资料"]},{"id":719,"verb":"Prey on","meaning":"利用(他人的弱点) / 捕食<br><span style=\"font-size:0.8em;color:gray\">(像猛兽一样锁定猎物)</span>","scenario":"<span class=\"context-tag tag-drama\">社会批判</span> \"Scammers often <b>prey on</b> the elderly.\"<br>(骗子经常专挑老年人下手/利用老年人的弱点。)","tags":["社会批判"]},{"id":720,"verb":"Prop up","meaning":"支撑(快要倒塌的事物) / 为...撑腰<br><span style=\"font-size:0.8em;color:gray\">(用支柱撑住，常用于经济)</span>","scenario":"<span class=\"context-tag tag-work\">金融救市</span> \"The central bank intervened to <b>prop up</b> the failing currency.\"<br>(央行干预以支撑那摇摇欲坠的货币。)","tags":["金融救市"]},{"id":721,"verb":"Pull away","meaning":"拉开距离 / (车辆等)开始驶离<br><span style=\"font-size:0.8em;color:gray\">(在比赛中甩开对手也极常用)</span>","scenario":"<span class=\"context-tag tag-life\">竞争与交通</span> \"In the final lap, the runner began to <b>pull away</b> from the pack.\"<br>(在最后一圈，那名跑者开始逐渐拉开差距/甩开大部队。)","tags":["竞争与交通"]},{"id":722,"verb":"Pull for","meaning":"支持(某人) / 为...加油<br><span style=\"font-size:0.8em;color:gray\">(类似于 root for)</span>","scenario":"<span class=\"context-tag tag-social\">鼓励打气</span> \"We're all <b>pulling for</b> you to get the promotion.\"<br>(我们都在为你加油，希望你能拿到那个升职机会。)","tags":["鼓励打气"]},{"id":723,"verb":"Put forth","meaning":"提出(建议/理论) / 展现(努力)<br><span style=\"font-size:0.8em;color:gray\">(拿出来放在众人面前)</span>","scenario":"<span class=\"context-tag tag-work\">会议提案</span> \"He <b>put forth</b> an interesting theory at the conference.\"<br>(他在会议上提出了一个极其有趣的理论。)","tags":["会议提案"]},{"id":724,"verb":"Quell down","meaning":"平息(暴乱/恐慌) / 镇压<br><span style=\"font-size:0.8em;color:gray\">(用强力压制)</span>","scenario":"<span class=\"context-tag tag-work\">新闻报道</span> \"Police were sent in to <b>quell down</b> the protests.\"<br>(警方被派去强力平息/镇压抗议活动。)","tags":["新闻报道"]},{"id":725,"verb":"Rack up","meaning":"累积(得分/利润/债务)<br><span style=\"font-size:0.8em;color:gray\">(在计分架上不断增加，极高频！)</span>","scenario":"<span class=\"context-tag tag-work\">财务与比赛</span> \"The company managed to <b>rack up</b> massive profits this year.\"<br>(公司今年成功斩获/狂揽了巨额利润。)","tags":["财务与比赛"]},{"id":726,"verb":"Rake in","meaning":"大把大把地赚钱 / 轻易敛财<br><span style=\"font-size:0.8em;color:gray\">(像用耙子耙树叶一样搂钱)</span>","scenario":"<span class=\"context-tag tag-work\">商业暴利</span> \"Since the app went viral, they've been <b>raking it in</b>.\"<br>(自从应用爆红后，他们简直是在疯狂数钱/日进斗金。)","tags":["商业暴利"]},{"id":727,"verb":"Ratchet up","meaning":"逐步增加(压力/紧张局势/价格)<br><span style=\"font-size:0.8em;color:gray\">(像棘轮一样只能进不能退地收紧)</span>","scenario":"<span class=\"context-tag tag-work\">局势分析</span> \"The new sanctions will further <b>ratchet up</b> the tension.\"<br>(新的制裁将进一步不断推高/加剧紧张局势。)","tags":["局势分析"]},{"id":728,"verb":"Reel back","meaning":"惊得倒退 / 退缩<br><span style=\"font-size:0.8em;color:gray\">(受到惊吓或打击时的生理反应)</span>","scenario":"<span class=\"context-tag tag-drama\">小说与影视</span> \"She <b>reeled back</b> in horror when she saw the body.\"<br>(当她看到尸体时，吓得猛然后退了几步。)","tags":["小说与影视"]},{"id":729,"verb":"Reel off","meaning":"一口气流利地说出(一长串名字/数据)<br><span style=\"font-size:0.8em;color:gray\">(像放线轴一样极其顺溜地倒出来)</span>","scenario":"<span class=\"context-tag tag-work\">炫技汇报</span> \"He confidently <b>reeled off</b> all the statistics from memory.\"<br>(他极其自信地凭记忆一口气报出了一连串的数据。)","tags":["炫技汇报"]},{"id":730,"verb":"Ring up","meaning":"(在收银台)结账打出(价格) / 达到(销售额)<br><span style=\"font-size:0.8em;color:gray\">(收银机发出的叮当声)</span>","scenario":"<span class=\"context-tag tag-life\">超市购物</span> \"The cashier <b>rung up</b> my groceries.\"<br>(收银员把我的杂货结账扫码了。)","tags":["超市购物"]},{"id":731,"verb":"Rip off","meaning":"敲竹杠 / 偷窃 / 抄袭<br><span style=\"font-size:0.8em;color:gray\">(极度口语化。名词 a rip-off = 坑人的东西)</span>","scenario":"<span class=\"context-tag tag-life\">旅游防坑</span> \"Don't buy anything there, they'll completely <b>rip you off</b>.\"<br>(别在那儿买任何东西，他们绝对会把你当肥羊宰/狠敲你一笔。)","tags":["旅游防坑"]},{"id":732,"verb":"Roll back","meaning":"撤销(政策/法律) / 削减到(之前的水平)<br><span style=\"font-size:0.8em;color:gray\">(让车轮倒转回去，新闻极高频)</span>","scenario":"<span class=\"context-tag tag-work\">政治与物价</span> \"The government plans to <b>roll back</b> the tax increases.\"<br>(政府计划撤销/回调之前的增税法案。)","tags":["政治与物价"]},{"id":733,"verb":"Rope in","meaning":"拉(某人)入伙 / 哄骗某人帮忙<br><span style=\"font-size:0.8em;color:gray\">(用绳子套进来，通常是被迫或不情愿的)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽抱怨</span> \"I got <b>roped into</b> organizing the office party.\"<br>(我硬是被生拉硬拽/忽悠着去组织办公室派对了。)","tags":["吐槽抱怨"]},{"id":734,"verb":"Rough out","meaning":"画出草图 / 粗略拟定(计划)<br><span style=\"font-size:0.8em;color:gray\">(不求细节，只求轮廓)</span>","scenario":"<span class=\"context-tag tag-work\">头脑风暴</span> \"Let's just <b>rough out</b> a plan for now and refine it later.\"<br>(咱们现在先粗略搭个计划的框架，晚点再细化。)","tags":["头脑风暴"]},{"id":735,"verb":"Round out","meaning":"使...圆满 / 补全 / 结束(一天的活动)<br><span style=\"font-size:0.8em;color:gray\">(把缺角补齐，使其圆润)</span>","scenario":"<span class=\"context-tag tag-life\">完美收官</span> \"We <b>rounded out</b> the evening with a nice dessert.\"<br>(我们用一份精美的甜点为这个夜晚画上了圆满的句号。)","tags":["完美收官"]},{"id":736,"verb":"Rub off on","meaning":"(品质/习惯)不知不觉影响(某人)<br><span style=\"font-size:0.8em;color:gray\">(像粉末一样蹭到了别人身上)</span>","scenario":"<span class=\"context-tag tag-social\">潜移默化</span> \"Her enthusiasm is starting to <b>rub off on</b> the rest of the team.\"<br>(她的热情开始渐渐感染/潜移默化地影响团队其他成员了。)","tags":["潜移默化"]},{"id":737,"verb":"Rule out","meaning":"排除(可能性/某人) / 认为...不合适<br><span style=\"font-size:0.8em;color:gray\">(划掉出局，逻辑推理必备)</span>","scenario":"<span class=\"context-tag tag-work\">调查与医疗</span> \"The doctor <b>ruled out</b> infection after the blood test.\"<br>(验血后，医生排除了感染的可能性。)","tags":["调查与医疗"]},{"id":738,"verb":"Sail through","meaning":"顺利通过(考试/难关) / 轻松完成<br><span style=\"font-size:0.8em;color:gray\">(像帆船顺风行驶一样毫无阻力)</span>","scenario":"<span class=\"context-tag tag-work\">夸赞表现</span> \"She studied hard and absolutely <b>sailed through</b> the final interview.\"<br>(她准备充分，极度丝滑/轻轻松松地过了终面。)","tags":["夸赞表现"]},{"id":739,"verb":"Scale down / back","meaning":"缩减规模 / 降低标准<br><span style=\"font-size:0.8em;color:gray\">(按比例缩小)</span>","scenario":"<span class=\"context-tag tag-work\">削减预算</span> \"Due to budget cuts, we need to <b>scale back</b> our expansion plans.\"<br>(由于预算削减，我们需要大幅缩水/收缩我们的扩张计划。)","tags":["削减预算"]},{"id":740,"verb":"Scrape by","meaning":"勉强糊口 / 艰难度日<br><span style=\"font-size:0.8em;color:gray\">(刮着锅底勉强过活)</span>","scenario":"<span class=\"context-tag tag-life\">经济拮据</span> \"With his minimum wage job, he is just <b>scraping by</b>.\"<br>(靠着那点最低工资，他也就是勉强糊口/艰难度日。)","tags":["经济拮据"]},{"id":741,"verb":"Scrub out","meaning":"彻底取消(计划) / 擦洗干净<br><span style=\"font-size:0.8em;color:gray\">(像用刷子狠狠刷掉)</span>","scenario":"<span class=\"context-tag tag-work\">航空与日常</span> \"The launch was <b>scrubbed</b> due to bad weather.\"<br>(因天气恶劣，发射任务被彻底取消/刷掉了。)","tags":["航空与日常"]},{"id":742,"verb":"See through","meaning":"看穿(谎言/把戏) / 坚持完成(艰难的任务)<br><span style=\"font-size:0.8em;color:gray\">(目光穿透表象)</span>","scenario":"<span class=\"context-tag tag-drama\">多义高频</span> \"I can completely <b>see through</b> his fake apologies.\" (我彻底看穿了他虚伪的道歉。)<br>\"We committed to this project and we will <b>see it through</b>.\" (我们接下了这项目就一定会负责到底。)","tags":["多义高频"]},{"id":743,"verb":"Sell out","meaning":"卖光 / 出卖原则(或朋友)<br><span style=\"font-size:0.8em;color:gray\">(名词 a sellout = 叛徒/没骨气的人)</span>","scenario":"<span class=\"context-tag tag-drama\">指责背叛</span> \"Indie fans accused the band of <b>selling out</b> when they signed with a major label.\"<br>(独立乐迷指责该乐队签了大唱片公司是彻底出卖了灵魂/向资本妥协。)","tags":["指责背叛"]},{"id":744,"verb":"Set off","meaning":"出发 / 触发(警报/爆炸) / 引发(一系列事件)<br><span style=\"font-size:0.8em;color:gray\">(按下开关，极高频！)</span>","scenario":"<span class=\"context-tag tag-life\">出行与安防</span> \"The smoke <b>set off</b> the fire alarm.\" (烟雾触发了火灾警报。)<br>\"We need to <b>set off</b> early tomorrow to avoid traffic.\" (我们明早得早点出发以避开早高峰。)","tags":["出行与安防"]},{"id":745,"verb":"Settle for","meaning":"勉强接受 / 凑合将就<br><span style=\"font-size:0.8em;color:gray\">(没有更好的选择，无奈妥协)</span>","scenario":"<span class=\"context-tag tag-life\">不甘将就</span> \"Don't <b>settle for</b> less than you deserve.\"<br>(千万不要委屈自己/勉强接受那些配不上你的东西。)","tags":["不甘将就"]},{"id":746,"verb":"Shake down","meaning":"勒索(钱财) / 彻底搜查<br><span style=\"font-size:0.8em;color:gray\">(把你倒过来摇，把硬币摇出来)</span>","scenario":"<span class=\"context-tag tag-drama\">黑帮警匪</span> \"The mobsters tried to <b>shake down</b> the local business owners.\"<br>(黑帮
