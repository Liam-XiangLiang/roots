<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Word Families: Top 71-80</title>
    <style>
        :root {
            /* Notion 暗黑模式核心色彩 */
            --bg-color: #191919;
            --table-border: #373737;
            --text-main: #D4D4D4;
            --text-sub: #9B9B9B;
            
            /* 词根词缀高亮色 */
            --c-prefix: #FF7B72; /* 粉红 - 前缀 */
            --c-root: #E5C07B;   /* 明黄 - 词根 */
            --c-suffix: #79C0FF; /* 天蓝 - 后缀 */
            
            /* 标签颜色 */
            --badge-trans: #316DCA;
            --badge-mnem: #347D39;
            --badge-exam: #B05C11;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 40px;
        }

        .root-section {
            margin-bottom: 60px;
        }

        .header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--c-root);
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .root-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            color: var(--c-root);
        }

        .root-meaning {
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: bold;
        }

        .word-table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
        }

        .word-row {
            border-bottom: 1px dashed var(--table-border);
        }
        
        .word-row:last-child {
            border-bottom: none;
        }

        .col-word {
            width: 30%;
            padding: 25px 25px;
            vertical-align: top;
            border-right: 1px dashed var(--table-border);
        }

        .col-details {
            width: 70%;
            padding: 25px;
            vertical-align: top;
        }

        .word-display {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }
        
        .p { color: var(--c-prefix); }
        .r { color: var(--c-root); }
        .s { color: var(--c-suffix); }

        .pronunciation {
            font-family: "Consolas", monospace;
            color: var(--text-sub);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .detail-item:last-child {
            margin-bottom: 0;
        }

        .badge {
            flex-shrink: 0;
            color: #fff;
            font-size: 0.8rem;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            margin-top: 2px;
            font-weight: bold;
        }
        
        .b-trans { background-color: var(--badge-trans); }
        .b-mnem { background-color: var(--badge-mnem); }
        .b-exam { background-color: var(--badge-exam); }

        .detail-content {
            flex-grow: 1;
            font-size: 1.05rem;
        }
        
        .highlight-word {
            color: var(--c-root);
            font-weight: bold;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
    </style>
</head>
<body>

    <div id="app">
    </div>

    <script>
        const database = [
            {
                root: "-aqua- / -aque-",
                meaning: "水 (water)",
                words: [
                    { word: "aquarium", display: "<span class='r'>aqua</span><span class='s'>rium</span>", pronunciation: "/əˈkweə·ri·əm/", translation: "n. 水族馆，水族箱", mnemonic: "aqua(水) + rium(场所) = 放满水供人参观的地方 = 水族馆", example: "We spent the afternoon looking at sharks in the <span class='highlight-word'>aquarium</span>. (我们下午在水族馆里看鲨鱼。)" },
                    { word: "aquatic", display: "<span class='r'>aqua</span><span class='s'>tic</span>", pronunciation: "/əˈkwæt·ɪk/", translation: "adj. 水生的，水中的", mnemonic: "aqua(水) + tic(形容词) = 跟水有关的 = 水生的", example: "Whales and dolphins are <span class='highlight-word'>aquatic</span> mammals. (鲸鱼和海豚是水生哺乳动物。)" },
                    { word: "aqueduct", display: "<span class='r'>aque</span><span class='r'>duct</span>", pronunciation: "/ˈæk·wɪ·dʌkt/", translation: "n. 沟渠，导水管", mnemonic: "aque(水) + duct(引导) = 引导水流过的通道 = 沟渠", example: "The ancient Romans built incredible <span class='highlight-word'>aqueducts</span>. (古罗马人建造了极其宏伟的导水渠。)" }
                ]
            },
            {
                root: "-hydr- / -hydro-",
                meaning: "水 (water)",
                words: [
                    { word: "hydrate", display: "<span class='r'>hydr</span><span class='s'>ate</span>", pronunciation: "/ˈhaɪ·dreɪt/", translation: "v. 补水", mnemonic: "hydr(水) + ate(动词) = 补充水分", example: "Make sure you <span class='highlight-word'>hydrate</span> well before the marathon. (马拉松赛前务必做好补水。)" },
                    { word: "dehydrate", display: "<span class='p'>de</span><span class='r'>hydr</span><span class='s'>ate</span>", pronunciation: "/ˌdiː·haɪˈdreɪt/", translation: "v. (使)脱水，失去水分", mnemonic: "de(向下/去除) + hydr(水) + ate = 把水分抽走 = 脱水", example: "Alcohol can severely <span class='highlight-word'>dehydrate</span> your body. (酒精会导致你的身体严重脱水。)" },
                    { word: "hydraulic", display: "<span class='r'>hydr</span><span class='s'>aulic</span>", pronunciation: "/haɪˈdrɔː·lɪk/", translation: "adj. 液压的，水力的", mnemonic: "hydr(水) + aulic(管子) = 通过液体在管内传导压力的 = 液压的", example: "The excavator uses <span class='highlight-word'>hydraulic</span> power to lift heavy dirt. (挖掘机利用液压动力来抬起沉重的泥土。)" },
                    { word: "hydrogen", display: "<span class='r'>hydro</span><span class='s'>gen</span>", pronunciation: "/ˈhaɪ·drə·dʒən/", translation: "n. 氢，氢气", mnemonic: "hydro(水) + gen(产生) = 燃烧后能产生水的元素 = 氢", example: "Water is composed of oxygen and <span class='highlight-word'>hydrogen</span>. (水是由氧和氢组成的。)" }
                ]
            },
            {
                root: "-aer- / -aero-",
                meaning: "空气，空中 (air/flight)",
                words: [
                    { word: "aerial", display: "<span class='r'>aer</span><span class='s'>ial</span>", pronunciation: "/ˈeə·ri·əl/", translation: "adj. 空中的，航空的 n. 天线", mnemonic: "aer(空气) + ial(形容词) = 在空气里的 = 空中的", example: "We took some stunning <span class='highlight-word'>aerial</span> photos using a drone. (我们用无人机拍了一些极其震撼的航拍照片。)" },
                    { word: "aerospace", display: "<span class='r'>aero</span><span class='r'>space</span>", pronunciation: "/ˈeə·rəʊ·speɪs/", translation: "n. 航空航天(工业)", mnemonic: "aero(空中) + space(太空) = 大气层内和大气层外的空间 = 航空航天", example: "She works as an engineer in the <span class='highlight-word'>aerospace</span> industry. (她在航空航天工业做工程师。)" },
                    { word: "aerobic", display: "<span class='r'>aero</span><span class='s'>bic</span>", pronunciation: "/eəˈrəʊ·bɪk/", translation: "adj. 有氧的", mnemonic: "aero(空气/氧气) + bic(有关生命的) = 依赖氧气的 = 有氧的", example: "Swimming and running are great <span class='highlight-word'>aerobic</span> exercises. (游泳和跑步是极好的有氧运动。)" }
                ]
            },
            {
                root: "-atm- / -atmo-",
                meaning: "蒸汽，空气 (vapor/air)",
                words: [
                    { word: "atmosphere", display: "<span class='r'>atmo</span><span class='s'>sphere</span>", pronunciation: "/ˈæt·mə·sfɪər/", translation: "n. 大气，大气层；气氛", mnemonic: "atmo(空气/蒸汽) + sphere(球体) = 包围地球的空气层 = 大气层", example: "The earth's <span class='highlight-word'>atmosphere</span> protects us from solar radiation. (地球大气层保护我们免受太阳辐射的伤害。)" },
                    { word: "atmospheric", display: "<span class='r'>atmo</span><span class='s'>spher</span><span class='s'>ic</span>", pronunciation: "/ˌæt·məsˈfer·ɪk/", translation: "adj. 大气的，营造氛围的", mnemonic: "atmo(空气) + spher(球) + ic(形容词) = 大气层的", example: "The restaurant has a very romantic and <span class='highlight-word'>atmospheric</span> setting. (这家餐厅有着极其浪漫和有情调的氛围环境。)" }
                ]
            },
            {
                root: "-stell- / -astr-",
                meaning: "星 (star)",
                words: [
                    { word: "stellar", display: "<span class='r'>stell</span><span class='s'>ar</span>", pronunciation: "/ˈstel·ər/", translation: "adj. 恒星的，极其优秀的", mnemonic: "stell(星) + ar(形容词) = 像星星一样闪耀的 = 极其优秀的", example: "The company reported <span class='highlight-word'>stellar</span> earnings this quarter. (公司本季度报告了极其耀眼/卓越的盈利。)" },
                    { word: "constellation", display: "<span class='p'>con</span><span class='r'>stell</span><span class='s'>ation</span>", pronunciation: "/ˌkɒn·stəˈleɪ·ʃn/", translation: "n. 星座，群英荟萃", mnemonic: "con(共同) + stell(星) + ation(名词) = 一群星星聚集在一起 = 星座", example: "Orion is one of the most recognizable <span class='highlight-word'>constellations</span>. (猎户座是最容易辨认的星座之一。)" },
                    { word: "asteroid", display: "<span class='r'>aster</span><span class='s'>oid</span>", pronunciation: "/ˈæs·tə·rɔɪd/", translation: "n. 小行星", mnemonic: "aster(星星) + oid(像...的东西) = 像星星一样的岩石块 = 小行星", example: "Scientists are tracking a large <span class='highlight-word'>asteroid</span> approaching Earth. (科学家们正在追踪一颗靠近地球的大型小行星。)" },
                    { word: "astronomy", display: "<span class='r'>astr</span><span class='s'>o</span><span class='s'>nomy</span>", pronunciation: "/əˈstrɒn·ə·mi/", translation: "n. 天文学", mnemonic: "astr(星星) + nomy(法则/学科) = 研究星星运行法则的学科 = 天文学", example: "She bought a telescope because she loves <span class='highlight-word'>astronomy</span>. (她买了一架望远镜，因为她热爱天文学。)" }
                ]
            },
            {
                root: "-lun-",
                meaning: "月亮 (moon)",
                words: [
                    { word: "lunar", display: "<span class='r'>lun</span><span class='s'>ar</span>", pronunciation: "/ˈluː·nər/", translation: "adj. 月亮的，月球的", mnemonic: "lun(月亮) + ar(形容词) = 属于月亮的", example: "Chinese New Year follows the <span class='highlight-word'>lunar</span> calendar. (中国新年遵循农历/月亮历。)" },
                    { word: "lunatic", display: "<span class='r'>lun</span><span class='s'>atic</span>", pronunciation: "/ˈluː·nə·tɪk/", translation: "n. 疯子，狂人 adj. 疯狂的", mnemonic: "lun(月亮) + atic = 古人认为人在满月时会精神失常 = 疯子", example: "He drives like a complete <span class='highlight-word'>lunatic</span>. (他开车简直像个疯子一样。)" }
                ]
            },
            {
                root: "-sol-",
                meaning: "太阳 (sun)",
                words: [
                    { word: "solar", display: "<span class='r'>sol</span><span class='s'>ar</span>", pronunciation: "/ˈsəʊ·lər/", translation: "adj. 太阳的，太阳能的", mnemonic: "sol(太阳) + ar(形容词) = 属于太阳的", example: "They installed <span class='highlight-word'>solar</span> panels on the roof to save energy. (他们在屋顶安装了太阳能电池板以节省能源。)" },
                    { word: "parasol", display: "<span class='p'>para</span><span class='r'>sol</span>", pronunciation: "/ˈpær·ə·sɒl/", translation: "n. 阳伞", mnemonic: "para(防避) + sol(太阳) = 用来防备太阳直射的东西 = 阳伞", example: "She brought a <span class='highlight-word'>parasol</span> to the beach to block the UV rays. (她带了一把阳伞去海滩遮挡紫外线。)" }
                ]
            },
            {
                root: "-terr-",
                meaning: "土地 (earth/land)",
                words: [
                    { word: "territory", display: "<span class='r'>terr</span><span class='s'>itory</span>", pronunciation: "/ˈter·ə·tri/", translation: "n. 领土，版图，领域", mnemonic: "terr(土地) + itory(场所) = 归属某人管辖的土地 = 领土", example: "Lions will fiercely defend their <span class='highlight-word'>territory</span>. (狮子会极其凶猛地捍卫它们的领地。)" },
                    { word: "terrain", display: "<span class='r'>terr</span><span class='s'>ain</span>", pronunciation: "/təˈreɪn/", translation: "n. 地形，地势", mnemonic: "terr(土地) + ain = 土地的起伏状态 = 地形", example: "The mountain bikes are designed for rough <span class='highlight-word'>terrain</span>. (这些山地车是专为崎岖地形设计的。)" },
                    { word: "terrestrial", display: "<span class='r'>terr</span><span class='s'>estrial</span>", pronunciation: "/təˈres·tri·əl/", translation: "adj. 陆地的，地球的", mnemonic: "terr(土地) + estrial(形容词) = 生活在陆地上的", example: "Dogs and cats are <span class='highlight-word'>terrestrial</span> animals. (狗和猫都是陆生动物。)" },
                    { word: "extraterrestrial", display: "<span class='p'>extra</span><span class='r'>terr</span><span class='s'>estrial</span>", pronunciation: "/ˌek·strə·təˈres·tri·əl/", translation: "adj. 外星的 n. 外星人 (简称 ET)", mnemonic: "extra(在...之外) + terrestrial(地球的) = 地球之外的 = 外星人", example: "Many scientists believe in <span class='highlight-word'>extraterrestrial</span> life. (许多科学家相信外星生命的存在。)" }
                ]
            },
            {
                root: "-geo-",
                meaning: "地球 (earth)",
                words: [
                    { word: "geography", display: "<span class='r'>geo</span><span class='s'>graphy</span>", pronunciation: "/dʒiˈɒɡ·rə·fi/", translation: "n. 地理，地理学", mnemonic: "geo(地球/土地) + graphy(记录/描绘) = 描绘地球山川的学科 = 地理", example: "Students need to study world <span class='highlight-word'>geography</span>. (学生需要学习世界地理。)" },
                    { word: "geology", display: "<span class='r'>geo</span><span class='s'>logy</span>", pronunciation: "/dʒiˈɒl·ə·dʒi/", translation: "n. 地质学", mnemonic: "geo(地球/岩石) + logy(学科) = 研究地球岩石构成的学科 = 地质学", example: "He has a degree in <span class='highlight-word'>geology</span>. (他拥有地质学学位。)" },
                    { word: "geometry", display: "<span class='r'>geo</span><span class='s'>metry</span>", pronunciation: "/dʒiˈɒm·ə·tri/", translation: "n. 几何，几何学", mnemonic: "geo(土地) + metry(测量) = 古代用来测量土地面积的学问 = 几何", example: "We learned how to calculate the area of a circle in <span class='highlight-word'>geometry</span> class. (我们在几何课上学习了如何计算圆的面积。)" },
                    { word: "geopolitics", display: "<span class='r'>geo</span><span class='s'>politics</span>", pronunciation: "/ˌdʒiː·əʊˈpɒl·ə·tɪks/", translation: "n. 地缘政治(学)", mnemonic: "geo(地理) + politics(政治) = 与地理位置紧密相关的政治博弈 = 地缘政治", example: "The conflict is driven by complex <span class='highlight-word'>geopolitics</span>. (这场冲突是由复杂的地缘政治所驱动的。)" }
                ]
            },
            {
                root: "-bio-",
                meaning: "生命 (life)",
                words: [
                    { word: "biology", display: "<span class='r'>bio</span><span class='s'>logy</span>", pronunciation: "/baɪˈɒl·ə·dʒi/", translation: "n. 生物学", mnemonic: "bio(生命) + logy(学科) = 研究生命的学科 = 生物学", example: "She is a marine <span class='highlight-word'>biology</span> major. (她主修海洋生物学。)" },
                    { word: "biography", display: "<span class='r'>bio</span><span class='s'>graphy</span>", pronunciation: "/baɪˈɒɡ·rə·fi/", translation: "n. 传记", mnemonic: "bio(生命/一生) + graphy(记录) = 记录某人一生的文字 = 传记", example: "I am reading a fascinating <span class='highlight-word'>biography</span> of Abraham Lincoln. (我正在读一本关于亚伯拉罕·林肯的极其迷人的传记。)" },
                    { word: "antibiotic", display: "<span class='p'>anti</span><span class='r'>bio</span><span class='s'>tic</span>", pronunciation: "/ˌæn·ti·baɪˈɒt·ɪk/", translation: "n. 抗生素", mnemonic: "anti(对抗) + bio(生命/细菌) + tic = 对抗细菌生命体的药 = 抗生素", example: "The doctor prescribed an <span class='highlight-word'>antibiotic</span> for my throat infection. (医生给我的嗓子感染开了一些抗生素。)" },
                    { word: "biodegradable", display: "<span class='r'>bio</span><span class='p'>de</span><span class='r'>grad</span><span class='s'>able</span>", pronunciation: "/ˌbaɪ·əʊ·dɪˈɡreɪ·də·bl/", translation: "adj. 可生物降解的", mnemonic: "bio(生物) + de(向下) + grad(走/降) + able(能) = 能被生物分解掉的", example: "We should use <span class='highlight-word'>biodegradable</span> plastic bags to protect the environment. (我们应该使用可生物降解的塑料袋来保护环境。)" }
                ]
            }
        ];

        const app = document.getElementById('app');

        database.forEach((group, index) => {
            let wordsHTML = '';
            
            group.words.forEach(item => {
                wordsHTML += `
                    <tr class="word-row">
                        <td class="col-word">
                            <div class="word-display">${item.display}</div>
                            <div class="pronunciation">${item.pronunciation}</div>
                        </td>
                        <td class="col-details">
                            <div class="detail-item">
                                <div class="badge b-trans">译</div>
                                <div class="detail-content">${item.translation}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-mnem">记</div>
                                <div class="detail-content">${item.mnemonic}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-exam">例</div>
                                <div class="detail-content">${item.example}</div>
                            </div>
                        </td>
                    </tr>
                `;
            });

            app.innerHTML += `
                <div class="root-section">
                    <div class="header">
                        <h1 class="root-title">${index + 71}. ${group.root}</h1>
                        <div class="root-meaning">【 核心含义：${group.meaning} 】</div>
                    </div>
                    <table class="word-table">
                        ${wordsHTML}
                    </table>
                </div>
            `;
        });
    </script>
</body>
</html>
