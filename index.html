io":"<span class=\"context-tag tag-work\">项目收尾</span> \"There are just a few minor bugs we need to <b>iron out</b> before the launch.\"<br>(在发布前，我们只需要解决几个小bug/熨平最后一点瑕疵。)","tags":["项目收尾"]},{"id":213,"verb":"Gloss over","meaning":"掩盖 / 对...轻描淡写<br><span style=\"font-size:0.8em;color:gray\">(给表面刷一层光泽，掩盖下面的丑陋)</span>","scenario":"<span class=\"context-tag tag-work\">公关危机</span> \"The CEO tried to <b>gloss over</b> the company's financial losses.\"<br>(CEO试图对公司的财务亏损轻描淡写/一带而过。)","tags":["公关危机"]},{"id":214,"verb":"Blurt out","meaning":"不假思索地脱口而出<br><span style=\"font-size:0.8em;color:gray\">(通常是把不该说的秘密说漏嘴)</span>","scenario":"<span class=\"context-tag tag-drama\">说错话</span> \"He <b>blurted out</b> the surprise before the party even started.\"<br>(派对还没开始，他就把惊喜脱口说漏了。)","tags":["说错话"]},{"id":215,"verb":"Dumb down","meaning":"使通俗易懂 / (为迎合大众)简化内容<br><span style=\"font-size:0.8em;color:gray\">(带有轻微贬义)</span>","scenario":"<span class=\"context-tag tag-work\">产品宣发</span> \"The movie was <b>dumbed down</b> for a younger audience.\"<br>(为了迎合更年轻的观众，这部电影的剧情被故意简单化/降智了。)","tags":["产品宣发"]},{"id":216,"verb":"Flesh out","meaning":"充实 / 使(计划/想法)变得具体<br><span style=\"font-size:0.8em;color:gray\">(给骨架长上血肉)</span>","scenario":"<span class=\"context-tag tag-work\">项目策划</span> \"That's a good idea, but we need to <b>flesh it out</b> more.\"<br>(这主意不错，但我们需要把它进一步丰富/细化。)","tags":["项目策划"]},{"id":217,"verb":"Jot down","meaning":"匆匆记下<br><span style=\"font-size:0.8em;color:gray\">(比 write down 更有“快速速记”的感觉)</span>","scenario":"<span class=\"context-tag tag-work\">开会/接电话</span> \"Hold on, let me <b>jot down</b> your phone number.\"<br>(等一下，让我赶紧把你的电话号码记下来。)","tags":["开会/接电话"]},{"id":218,"verb":"Draw up","meaning":"起草 / 草拟 (文件/合同/计划)<br><span style=\"font-size:0.8em;color:gray\">(法律与商务高频)</span>","scenario":"<span class=\"context-tag tag-work\">签约必备</span> \"The lawyer is <b>drawing up</b> the contract right now.\"<br>(律师现在正在起草合同。)","tags":["签约必备"]},{"id":219,"verb":"Lay out","meaning":"详细说明 / 布置(格局)<br><span style=\"font-size:0.8em;color:gray\">(摊开来给你看)</span>","scenario":"<span class=\"context-tag tag-work\">演讲陈述</span> \"Let me <b>lay out</b> my plan for you.\"<br>(让我给你详细阐述/摊开讲讲我的计划。)","tags":["演讲陈述"]},{"id":220,"verb":"Touch on","meaning":"简略提及 / 顺便谈到<br><span style=\"font-size:0.8em;color:gray\">(蜻蜓点水般提到)</span>","scenario":"<span class=\"context-tag tag-work\">会议议程</span> \"In today's meeting, we will also <b>touch on</b> the budget issue.\"<br>(在今天的会议上，我们也会顺便提一下预算问题。)","tags":["会议议程"]},{"id":221,"verb":"Beat up","meaning":"痛打 / (对自己)过分自责<br><span style=\"font-size:0.8em;color:gray\">(Don't beat yourself up!)</span>","scenario":"<span class=\"context-tag tag-drama\">影视高频</span> \"Don't <b>beat yourself up</b> over a small mistake.\"<br>(不要因为一点小失误就过度责怪自己。)","tags":["影视高频"]},{"id":222,"verb":"Blow up","meaning":"爆炸 / 大发脾气 / (照片)放大<br><span style=\"font-size:0.8em;color:gray\">(气球吹爆了)</span>","scenario":"<span class=\"context-tag tag-drama\">吵架/动作片</span> \"The bomb <b>blew up</b> the building.\" (炸弹炸毁了大楼。)<br>\"My dad <b>blew up</b> when he saw my grades.\" (我爸看到我的成绩后原地爆炸/大发雷霆。)","tags":["吵架/动作片"]},{"id":223,"verb":"Build up","meaning":"积累建立 / 增进 / 吹捧<br><span style=\"font-size:0.8em;color:gray\">(从无到有地堆积)</span>","scenario":"<span class=\"context-tag tag-life\">健康与财富</span> \"You need to rest to <b>build up</b> your strength.\" (你需要休息来恢复体力。)<br>\"Traffic is <b>building up</b> on the highway.\" (高速上开始堵车了。)","tags":["健康与财富"]},{"id":224,"verb":"Bust out","meaning":"突然拿出来 / 越狱<br><span style=\"font-size:0.8em;color:gray\">(极其口语化的破壳而出)</span>","scenario":"<span class=\"context-tag tag-social\">派对聚餐</span> \"It's time to <b>bust out</b> the champagne!\"<br>(是时候开香槟庆祝了！)","tags":["派对聚餐"]},{"id":225,"verb":"Cave in","meaning":"(顶棚等)坍塌 / 屈服妥协<br><span style=\"font-size:0.8em;color:gray\">(承受不住压力而垮掉)</span>","scenario":"<span class=\"context-tag tag-work\">谈判拉锯</span> \"The company finally <b>caved in</b> to the union's demands.\"<br>(公司最终顶不住压力，对工会的要求妥协/让步了。)","tags":["谈判拉锯"]},{"id":226,"verb":"Chalk up to","meaning":"把...归因于 / 算在...的账上<br><span style=\"font-size:0.8em;color:gray\">(以前在黑板上用粉笔记账的习惯)</span>","scenario":"<span class=\"context-tag tag-life\">解释原因</span> \"He forgot my birthday, but I just <b>chalked it up to</b> him being busy.\"<br>(他忘了我的生日，但我把这仅仅归咎于他太忙了。)","tags":["解释原因"]},{"id":227,"verb":"Chew out","meaning":"严厉责骂 / 把某人骂个狗血淋头<br><span style=\"font-size:0.8em;color:gray\">(美军和职场俚语，把你嚼烂吐出来)</span>","scenario":"<span class=\"context-tag tag-drama\">职场被骂</span> \"My boss totally <b>chewed me out</b> for missing the deadline.\"<br>(因为错过了截止日期，我老板把我劈头盖脸骂了一顿。)","tags":["职场被骂"]},{"id":228,"verb":"Choke up","meaning":"激动得哽咽 / 说不出话<br><span style=\"font-size:0.8em;color:gray\">(因为悲伤或极度感动)</span>","scenario":"<span class=\"context-tag tag-drama\">颁奖典礼</span> \"He <b>choked up</b> during his wedding speech.\"<br>(他在婚礼致辞时激动得哽咽了。)","tags":["颁奖典礼"]},{"id":229,"verb":"Clear out","meaning":"把...清理空 / 叫人离开<br><span style=\"font-size:0.8em;color:gray\">(彻底腾出空间)</span>","scenario":"<span class=\"context-tag tag-life\">搬家/警察清场</span> \"I need to <b>clear out</b> my closet.\" (我得把衣柜清空。)<br>\"<b>Clear out!</b> The building is on fire!\" (全闪开/撤离！大楼着火了！)","tags":["搬家/警察清场"]},{"id":230,"verb":"Close down","meaning":"彻底关闭 / 停业(倒闭)<br><span style=\"font-size:0.8em;color:gray\">(区别于普通的 close)</span>","scenario":"<span class=\"context-tag tag-life\">经济新闻</span> \"Many small businesses <b>closed down</b> during the pandemic.\"<br>(很多小企业在疫情期间倒闭了。)","tags":["经济新闻"]},{"id":231,"verb":"Come forward","meaning":"挺身而出 / 站出来提供信息<br><span style=\"font-size:0.8em;color:gray\">(常用于新闻：呼吁目击者站出来)</span>","scenario":"<span class=\"context-tag tag-drama\">法制新闻</span> \"The police are asking any witnesses to <b>come forward</b>.\"<br>(警方呼吁任何目击者站出来提供线索。)","tags":["法制新闻"]},{"id":232,"verb":"Come to","meaning":"苏醒(恢复意识) / (账单)总计达到<br><span style=\"font-size:0.8em;color:gray\">(回过神来)</span>","scenario":"<span class=\"context-tag tag-life\">医疗/结账</span> \"When he <b>came to</b>, he was in the hospital.\" (当他苏醒时，他在医院里。)<br>\"The bill <b>comes to</b> $50.\" (账单总计50美元。)","tags":["医疗/结账"]},{"id":233,"verb":"Cool off","meaning":"冷静下来 / (天气)变凉快<br><span style=\"font-size:0.8em;color:gray\">(平息愤怒或高温)</span>","scenario":"<span class=\"context-tag tag-social\">吵架缓冲</span> \"Leave him alone and let him <b>cool off</b> for a while.\"<br>(别管他，让他自己先冷静一会儿。)","tags":["吵架缓冲"]},{"id":234,"verb":"Cop out","meaning":"临阵退缩 / 逃避责任(找借口)<br><span style=\"font-size:0.8em;color:gray\">(俚语：逃避本该做的事)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽朋友</span> \"You promised to help me move, you can't <b>cop out</b> now!\"<br>(你答应帮我搬家的，你现在不能临阵退缩找借口跑路！)","tags":["吐槽朋友"]},{"id":235,"verb":"Dawn on","meaning":"使某人顿悟 / 猛然意识到<br><span style=\"font-size:0.8em;color:gray\">(It dawned on me that...)</span>","scenario":"<span class=\"context-tag tag-life\">恍然大悟</span> \"It suddenly <b>dawned on</b> me that I had left my keys inside.\"<br>(我突然猛地意识到我把钥匙落在屋里了。像黎明破晓一样明白过来。)","tags":["恍然大悟"]},{"id":236,"verb":"Dial back","meaning":"减弱 / 缓和(语气或行为)<br><span style=\"font-size:0.8em;color:gray\">(像把旋钮调低一样)</span>","scenario":"<span class=\"context-tag tag-work\">调整策略</span> \"We need to <b>dial back</b> our spending this month.\"<br>(我们这个月得缩减开支了/把消费降级了。)","tags":["调整策略"]},{"id":237,"verb":"Die down","meaning":"(风雨/喧闹/争论)逐渐平息<br><span style=\"font-size:0.8em;color:gray\">(慢慢减弱直到停止)</span>","scenario":"<span class=\"context-tag tag-life\">描述环境</span> \"We waited for the storm to <b>die down</b> before driving.\"<br>(我们等暴风雨渐渐平息后才开车。)","tags":["描述环境"]},{"id":238,"verb":"Dig in","meaning":"(吃饭)开动 / 坚持立场(死磕)<br><span style=\"font-size:0.8em;color:gray\">(把脚或勺子深扎进去)</span>","scenario":"<span class=\"context-tag tag-social\">餐桌/辩论</span> \"Dinner is served, <b>dig in</b>!\" (晚饭好了，开吃吧！)<br>\"Both sides <b>dug in</b> and refused to compromise.\" (双方都死磕到底拒绝妥协。)","tags":["餐桌/辩论"]},{"id":239,"verb":"Dish out","meaning":"大量分发 / 随意发出(批评等)<br><span style=\"font-size:0.8em;color:gray\">(像分菜一样发出去)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽双标</span> \"He loves to <b>dish out</b> criticism, but he can't take it.\"<br>(他喜欢对别人指手画脚/发号施令，但他自己却听不得批评。)","tags":["吐槽双标"]},{"id":240,"verb":"Dispense with","meaning":"摒弃 / 省去(不必要的东西)<br><span style=\"font-size:0.8em;color:gray\">(职场高级动词短语)</span>","scenario":"<span class=\"context-tag tag-work\">开会直入主题</span> \"Let's <b>dispense with</b> the formalities and get straight to business.\"<br>(咱们省去那些客套话，直接切入正题吧。)","tags":["开会直入主题"]},{"id":241,"verb":"Dispose of","meaning":"处理掉 / 丢弃 / 解决掉<br><span style=\"font-size:0.8em;color:gray\">(比 throw away 正式，黑帮片常指杀人毁尸)</span>","scenario":"<span class=\"context-tag tag-work\">垃圾处理</span> \"Please <b>dispose of</b> your trash properly.\"<br>(请妥善处理你的垃圾。)","tags":["垃圾处理"]},{"id":242,"verb":"Draw out","meaning":"拉长(时间) / 引导某人畅所欲言<br><span style=\"font-size:0.8em;color:gray\">(把东西拖拽出来)</span>","scenario":"<span class=\"context-tag tag-work\">主持会议</span> \"She is very good at <b>drawing out</b> shy people in a conversation.\"<br>(她很擅长在交谈中引导内向的人开口说话。)","tags":["主持会议"]},{"id":243,"verb":"Dry up","meaning":"干涸 / (资金等)枯竭 / 讲不出话<br><span style=\"font-size:0.8em;color:gray\">(彻底没水了)</span>","scenario":"<span class=\"context-tag tag-work\">财务/演讲卡壳</span> \"Their funding eventually <b>dried up</b>.\" (他们的资金最终枯竭了。)<br>\"I got so nervous on stage that I completely <b>dried up</b>.\" (我在台上紧张得完全忘词了。)","tags":["财务/演讲卡壳"]},{"id":244,"verb":"Ease off","meaning":"减轻 / (雨雪、疼痛)缓和下来<br><span style=\"font-size:0.8em;color:gray\">(变得没那么猛烈了)</span>","scenario":"<span class=\"context-tag tag-life\">病情/天气</span> \"The headache started to <b>ease off</b> after I took the pill.\"<br>(吃药后，头痛开始慢慢缓解了。)","tags":["病情/天气"]},{"id":245,"verb":"Edge out","meaning":"险胜 / 勉强挤掉(对手)<br><span style=\"font-size:0.8em;color:gray\">(以微弱优势把别人挤到边缘)</span>","scenario":"<span class=\"context-tag tag-work\">竞标/体育</span> \"We managed to <b>edge out</b> the competition and win the contract.\"<br>(我们设法险胜竞争对手，拿下了这份合同。)","tags":["竞标/体育"]},{"id":246,"verb":"Egg on","meaning":"怂恿 / 煽动(某人干坏事)<br><span style=\"font-size:0.8em;color:gray\">(egg sb. on)</span>","scenario":"<span class=\"context-tag tag-drama\">推卸责任</span> \"He wouldn't have done it if his friends hadn't <b>egged</b> him <b>on</b>.\"<br>(如果不是他朋友在一旁瞎起哄/怂恿，他才不会这么干呢。)","tags":["推卸责任"]},{"id":247,"verb":"Embark on","meaning":"开始 / 着手(一项漫长的重要事情)<br><span style=\"font-size:0.8em;color:gray\">(相当于 start a new journey)</span>","scenario":"<span class=\"context-tag tag-life\">人生转折</span> \"She is about to <b>embark on</b> a new career in tech.\"<br>(她即将开启在科技领域的一段新职业生涯。)","tags":["人生转折"]},{"id":248,"verb":"Even out","meaning":"使平坦 / 使(波动)变得平稳平衡<br><span style=\"font-size:0.8em;color:gray\">(抹平高低差)</span>","scenario":"<span class=\"context-tag tag-work\">财务/数据</span> \"The stock market fluctuations should <b>even out</b> over time.\"<br>(股市的波动随着时间推移应该会趋于平稳。)","tags":["财务/数据"]},{"id":249,"verb":"Fall behind","meaning":"落后(于进度) / 拖欠(付款)<br><span style=\"font-size:0.8em;color:gray\">(掉在后面跟不上了)</span>","scenario":"<span class=\"context-tag tag-life\">学业与账单</span> \"I've <b>fallen behind</b> on my rent.\" (我拖欠房租了。)<br>\"He is <b>falling behind</b> in his classes.\" (他学习跟不上了。)","tags":["学业与账单"]},{"id":250,"verb":"Fall for","meaning":"爱上(某人) / 上当受骗<br><span style=\"font-size:0.8em;color:gray\">(为某人倾倒，或掉进陷阱)</span>","scenario":"<span class=\"context-tag tag-social\">爱情与骗局</span> \"I completely <b>fell for</b> her the moment we met.\" (我对她一见钟情。)<br>\"I can't believe you <b>fell for</b> that scam.\" (真不敢相信你竟然中了那个骗局。)","tags":["爱情与骗局"]},{"id":251,"verb":"Farm out","meaning":"外包 / 把(工作)转包给他人<br><span style=\"font-size:0.8em;color:gray\">(像分配农田一样分包出去)</span>","scenario":"<span class=\"context-tag tag-work\">业务外包</span> \"They decided to <b>farm out</b> the design work to a freelancer.\"<br>(他们决定把设计工作外包给自由职业者。)","tags":["业务外包"]},{"id":252,"verb":"Fend off","meaning":"避开 / 抵挡(攻击/提问)<br><span style=\"font-size:0.8em;color:gray\">(防守动作)</span>","scenario":"<span class=\"context-tag tag-drama\">新闻发布会</span> \"The politician tried to <b>fend off</b> the awkward questions.\"<br>(那位政客试图打太极/避开那些尴尬的提问。)","tags":["新闻发布会"]},{"id":253,"verb":"Filter out","meaning":"过滤掉 / 筛除<br><span style=\"font-size:0.8em;color:gray\">(把不需要的杂质去掉)</span>","scenario":"<span class=\"context-tag tag-work\">IT与招聘</span> \"Our software can <b>filter out</b> spam emails.\"<br>(我们的软件能自动过滤掉垃圾邮件。)","tags":["IT与招聘"]},{"id":254,"verb":"Firm up","meaning":"最终敲定 / 使坚固<br><span style=\"font-size:0.8em;color:gray\">(把松散的计划固定下来)</span>","scenario":"<span class=\"context-tag tag-work\">安排行程</span> \"We need to <b>firm up</b> our travel plans for next week.\"<br>(我们需要把下周的旅行计划彻底敲定下来。)","tags":["安排行程"]},{"id":255,"verb":"Fizzle out","meaning":"逐渐破灭 / 无疾而终<br><span style=\"font-size:0.8em;color:gray\">(像汽水漏气一样最后没动静了)</span>","scenario":"<span class=\"context-tag tag-social\">感情与项目</span> \"Their relationship just <b>fizzled out</b> after a few months.\"<br>(他们的关系几个月后就自然而然地凉了/黄了。)","tags":["感情与项目"]},{"id":256,"verb":"Flake out","meaning":"爽约 / 临时放鸽子<br><span style=\"font-size:0.8em;color:gray\">(形容词 flaky = 经常放鸽子不靠谱的人)</span>","scenario":"<span class=\"context-tag tag-social\">美国社交超高频</span> \"He <b>flaked out</b> on me again at the last minute.\"<br>(他在最后一刻又双叒放了我鸽子。比 stand up 更随意。)","tags":["美国社交超高频"]},{"id":257,"verb":"Flare up","meaning":"(怒火/暴乱)突然爆发 / (疾病)复发<br><span style=\"font-size:0.8em;color:gray\">(像火苗突然窜高)</span>","scenario":"<span class=\"context-tag tag-drama\">新闻与医疗</span> \"Violence has <b>flared up</b> again in the region.\" (该地区再次爆发了暴力冲突。)<br>\"My allergies always <b>flare up</b> in spring.\" (我的过敏一到春天就复发。)","tags":["新闻与医疗"]},{"id":258,"verb":"Flip out","meaning":"情绪失控 / 发疯 / 惊恐<br><span style=\"font-size:0.8em;color:gray\">(极度口语化，像翻车一样失去理智)</span>","scenario":"<span class=\"context-tag tag-drama\">日常抓狂</span> \"Mom is going to <b>flip out</b> when she sees this mess.\"<br>(妈妈看到这一团糟肯定要疯了/气炸了。)","tags":["日常抓狂"]},{"id":259,"verb":"Flock to","meaning":"成群结队地涌向(某地)<br><span style=\"font-size:0.8em;color:gray\">(像鸟群一样聚集)</span>","scenario":"<span class=\"context-tag tag-life\">描述火爆现象</span> \"Tourists <b>flock to</b> Hawaii every winter.\"<br>(游客们每年冬天都会蜂拥至夏威夷。)","tags":["描述火爆现象"]},{"id":260,"verb":"Fly by","meaning":"(时间)飞逝<br><span style=\"font-size:0.8em;color:gray\">(像飞鸟一样掠过)</span>","scenario":"<span class=\"context-tag tag-social\">寒暄感慨</span> \"I can't believe it's already Friday. This week just <b>flew by</b>!\"<br>(真不敢相信已经是周五了。这周过得太快了！)","tags":["寒暄感慨"]},{"id":261,"verb":"Follow through","meaning":"坚持到底 / 把(承诺/计划)落实<br><span style=\"font-size:0.8em;color:gray\">(做事不半途而废，非常重要的职场品质)</span>","scenario":"<span class=\"context-tag tag-work\">职场评价</span> \"He makes a lot of promises, but he never <b>follows through</b>.\"<br>(他许下很多承诺，但从来没有真正兑现/落实过。)","tags":["职场评价"]},{"id":262,"verb":"Forge ahead","meaning":"稳步推进 / 克服困难继续前行<br><span style=\"font-size:0.8em;color:gray\">(打铁一样硬刚前进)</span>","scenario":"<span class=\"context-tag tag-work\">项目打气</span> \"Despite the budget cuts, we must <b>forge ahead</b> with the project.\"<br>(尽管削减了预算，我们仍必须硬着头皮推进这个项目。)","tags":["项目打气"]},{"id":263,"verb":"Free up","meaning":"腾出(时间/空间/资金)<br><span style=\"font-size:0.8em;color:gray\">(把被占用的资源释放出来)</span>","scenario":"<span class=\"context-tag tag-work\">IT与日程</span> \"I deleted some large files to <b>free up</b> space on my hard drive.\"<br>(我删了几个大文件来腾出硬盘空间。)<br>\"Let me see if I can <b>free up</b> some time tomorrow.\" (我看看明天能不能抽出点时间。)","tags":["IT与日程"]},{"id":264,"verb":"Freshen up","meaning":"梳洗打扮一下 / 补个妆<br><span style=\"font-size:0.8em;color:gray\">(去卫生间整理仪容)</span>","scenario":"<span class=\"context-tag tag-social\">做客/下班后</span> \"I just need a few minutes to <b>freshen up</b> before we go out to dinner.\"<br>(我们出去吃晚饭前，我只需要几分钟去梳洗补个妆。)","tags":["做客/下班后"]},{"id":265,"verb":"Frown upon","meaning":"不赞成 / 反对(某种行为)<br><span style=\"font-size:0.8em;color:gray\">(用皱眉来表示社会或公司的潜规则不容许)</span>","scenario":"<span class=\"context-tag tag-work\">企业文化</span> \"Dating a coworker is heavily <b>frowned upon</b> in our company.\"<br>(在我们公司，同事之间谈恋爱是极不提倡/被侧目的。)","tags":["企业文化"]},{"id":266,"verb":"Gear up","meaning":"为...做好准备 / 摩拳擦掌<br><span style=\"font-size:0.8em;color:gray\">(穿好装备准备大干一场)</span>","scenario":"<span class=\"context-tag tag-work\">迎接旺季</span> \"Retailers are <b>gearing up</b> for the holiday shopping season.\"<br>(零售商们正摩拳擦掌为假日购物季做准备。)","tags":["迎接旺季"]},{"id":267,"verb":"Goof off","meaning":"游手好闲 / 磨洋工 / 瞎胡闹<br><span style=\"font-size:0.8em;color:gray\">(同 goof around，美国俚语)</span>","scenario":"<span class=\"context-tag tag-life\">学校/职场</span> \"Stop <b>goofing off</b> and get back to work!\"<br>(别摸鱼/瞎闹了，赶紧回去工作！)","tags":["学校/职场"]},{"id":268,"verb":"Hand down","meaning":"把...传给后代 / 法官当庭宣布(判决)<br><span style=\"font-size:0.8em;color:gray\">(从上往下交)</span>","scenario":"<span class=\"context-tag tag-life\">家族传承与法律</span> \"This recipe was <b>handed down</b> from my grandmother.\" (这是祖传秘方。)<br>\"The judge <b>handed down</b> a 10-year sentence.\" (法官当庭宣判10年徒刑。)","tags":["家族传承与法律"]},{"id":269,"verb":"Head off","meaning":"拦截 / 抢在前面阻止(灾难等)<br><span style=\"font-size:0.8em;color:gray\">(挡在前面让它转弯)</span>","scenario":"<span class=\"context-tag tag-work\">危机公关</span> \"We need to release a statement to <b>head off</b> the negative press.\"<br>(我们需要发布声明，以抢先阻止负面报道的发酵。)","tags":["危机公关"]},{"id":270,"verb":"Hinge on","meaning":"取决于 / 关键在于<br><span style=\"font-size:0.8em;color:gray\">(hinge是门铰链，引申为全靠这一个支点)</span>","scenario":"<span class=\"context-tag tag-work\">分析局势</span> \"The success of this project <b>hinges on</b> your approval.\"<br>(这个项目的成功全凭/取决于你的批准。)","tags":["分析局势"]},{"id":271,"verb":"Hit upon","meaning":"偶然发现 / 突然灵光一现想出<br><span style=\"font-size:0.8em;color:gray\">(脑子里被击中了一下)</span>","scenario":"<span class=\"context-tag tag-work\">头脑风暴</span> \"We finally <b>hit upon</b> the perfect solution to the problem.\"<br>(我们终于灵光乍现，想出了解决这个问题的完美方案。)","tags":["头脑风暴"]},{"id":272,"verb":"Hold off","meaning":"推迟 / 顶住不让靠近<br><span style=\"font-size:0.8em;color:gray\">(Hold off on doing something 暂缓做某事)</span>","scenario":"<span class=\"context-tag tag-work\">暂缓决定</span> \"Let's <b>hold off</b> on signing the contract until we have more information.\"<br>(咱们先暂缓/压一压签合同的事，直到获取更多信息再说。)","tags":["暂缓决定"]},{"id":273,"verb":"Hold out","meaning":"坚持(不屈服) / (物资)还能维持多久<br><span style=\"font-size:0.8em;color:gray\">(死咬牙关挺住)</span>","scenario":"<span class=\"context-tag tag-drama\">谈判或求生</span> \"How long can they <b>hold out</b> without water?\" (没水他们能撑多久？)<br>\"The union is <b>holding out</b> for a better pay raise.\" (工会正死咬着要求更高的加薪。)","tags":["谈判或求生"]},{"id":274,"verb":"Hook up","meaning":"把...连接起来 / (俚语)约会或发生关系<br><span style=\"font-size:0.8em;color:gray\">(美国极其常用的双关语，注意语境！)</span>","scenario":"<span class=\"context-tag tag-social\">IT与八卦</span> \"Can you help me <b>hook up</b> my new printer?\" (帮我连下打印机。)<br>\"Did you hear? John and Sarah <b>hooked up</b> last night.\" (听说了吗？他俩昨晚搞在一起了。)","tags":["IT与八卦"]},{"id":275,"verb":"Jazz up","meaning":"使...变得更活泼/更生动/更吸引人<br><span style=\"font-size:0.8em;color:gray\">(像加了爵士乐一样带感)</span>","scenario":"<span class=\"context-tag tag-work\">修改PPT/设计</span> \"We need to <b>jazz up</b> this presentation with some graphics.\"<br>(我们得加点图表，把这个PPT弄得更花哨/生动一点。)","tags":["修改PPT/设计"]},{"id":276,"verb":"Kick back","meaning":"彻底放松 / 葛优瘫<br><span style=\"font-size:0.8em;color:gray\">(把脚踢出去靠在沙发上)</span>","scenario":"<span class=\"context-tag tag-life\">周末日常</span> \"It's Friday! Time to just <b>kick back</b> and watch a movie.\"<br>(周五啦！是时候瘫在沙发上舒服地看场电影了。)","tags":["周末日常"]},{"id":277,"verb":"Kick out","meaning":"开除 / 把某人赶出去<br><span style=\"font-size:0.8em;color:gray\">(像踢皮球一样踢出门)</span>","scenario":"<span class=\"context-tag tag-drama\">酒吧/学校</span> \"He got drunk and was <b>kicked out</b> of the bar.\"<br>(他喝醉了，被保安从酒吧里轰了出去。)","tags":["酒吧/学校"]},{"id":278,"verb":"Knock off","meaning":"下班停止工作 / 山寨仿冒(名词)<br><span style=\"font-size:0.8em;color:gray\">(A knock-off = 便宜的仿制品)</span>","scenario":"<span class=\"context-tag tag-life\">职场与购物</span> \"Let's <b>knock off</b> early today and get a drink.\" (今天咱们早点下班去喝一杯吧。)<br>\"Is that a real Rolex? No, it's a cheap <b>knock-off</b>.\" (那是真劳力士吗？不，是个便宜的A货/山寨货。)","tags":["职场与购物"]},{"id":279,"verb":"Knock out","meaning":"(拳击)击倒KO / 让人惊艳、迷倒<br><span style=\"font-size:0.8em;color:gray\">(She is a knockout! 她是个绝世美女！)</span>","scenario":"<span class=\"context-tag tag-social\">惊叹夸赞</span> \"That dress you are wearing simply <b>knocks</b> me <b>out</b>.\"<br>(你穿那条裙子简直要把我迷晕/惊艳死了。)","tags":["惊叹夸赞"]},{"id":280,"verb":"Lap up","meaning":"欣然接受 / 全盘听信(拍马屁等)<br><span style=\"font-size:0.8em;color:gray\">(像小狗舔牛奶一样全部照单全收)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽轻信</span> \"He told her she was a genius, and she just <b>lapped it up</b>.\"<br>(他夸她是天才，她居然就美滋滋地全盘相信了。)","tags":["吐槽轻信"]},{"id":281,"verb":"Lean on","meaning":"依赖 / 对...施加压力(逼迫)<br><span style=\"font-size:0.8em;color:gray\">(靠在别人身上)</span>","scenario":"<span class=\"context-tag tag-drama\">黑帮/人际</span> \"You can always <b>lean on</b> me when you are in trouble.\" (你可以依靠我。)<br>\"The mob tried to <b>lean on</b> the witness.\" (黑帮试图向目击者施压恐吓。)","tags":["黑帮/人际"]},{"id":282,"verb":"Let off","meaning":"放过某人 / 宽恕(不惩罚)<br><span style=\"font-size:0.8em;color:gray\">(Let someone off the hook = 饶过某人)</span>","scenario":"<span class=\"context-tag tag-life\">交警开罚单</span> \"The cop pulled me over for speeding, but gave me a warning and <b>let me off</b>.\"<br>(警察因为我超速拦下我，但只给了个警告就把我放走了。)","tags":["交警开罚单"]},{"id":283,"verb":"Let out","meaning":"发泄、发出(声音) / (衣服)放宽<br><span style=\"font-size:0.8em;color:gray\">(释放出来)</span>","scenario":"<span class=\"context-tag tag-life\">裁缝/情绪</span> \"She <b>let out</b> a loud scream.\" (她发出一声尖叫。)<br>\"I gained weight, so I need to get these pants <b>let out</b>.\" (我胖了，得把这裤子改肥一点。)","tags":["裁缝/情绪"]},{"id":284,"verb":"Light up","meaning":"点燃(香烟) / (脸上)突然亮起来、容光焕发<br><span style=\"font-size:0.8em;color:gray\">(极其形象的表情描写)</span>","scenario":"<span class=\"context-tag tag-social\">描写神态</span> \"Her face <b>lit up</b> when she saw the puppy.\"<br>(当她看到那只小狗时，脸上瞬间绽放出光彩。)","tags":["描写神态"]},{"id":285,"verb":"Line up","meaning":"排队 / 安排好(一系列事情)<br><span style=\"font-size:0.8em;color:gray\">(排成一条线)</span>","scenario":"<span class=\"context-tag tag-work\">日常与招聘</span> \"I have three interviews <b>lined up</b> for next week.\"<br>(我已经安排好/敲定了下周的三场面试。)","tags":["日常与招聘"]},{"id":286,"verb":"Live down","meaning":"随着时间让人忘记(自己的耻辱或丑事)<br><span style=\"font-size:0.8em;color:gray\">(Never live it down = 一辈子的黑历史)</span>","scenario":"<span class=\"context-tag tag-drama\">社交尴尬</span> \"If I mess up this presentation, I'll never <b>live it down</b>.\"<br>(如果我把这次演讲搞砸了，这会成为我一辈子洗不掉的黑历史。)","tags":["社交尴尬"]},{"id":287,"verb":"Live up to","meaning":"不辜负 / 达到(他人的期望或标准)<br><span style=\"font-size:0.8em;color:gray\">(活到了那个高度)</span>","scenario":"<span class=\"context-tag tag-life\">评价电影/产品</span> \"The new iPhone didn't really <b>live up to</b> the hype.\"<br>(新款iPhone真的配不上/没有达到它前期的逆天炒作。)","tags":["评价电影/产品"]},{"id":288,"verb":"Loosen up","meaning":"放松(肌肉或情绪) / 不再那么拘谨<br><span style=\"font-size:0.8em;color:gray\">(让某人别太紧张)</span>","scenario":"<span class=\"context-tag tag-social\">派对劝酒</span> \"Have a drink and <b>loosen up</b> a bit!\"<br>(喝杯酒，稍微放松点/别端着了！)","tags":["派对劝酒"]},{"id":289,"verb":"Luck out","meaning":"极其走运 / 走狗屎运<br><span style=\"font-size:0.8em;color:gray\">(纯口语，凭运气逃过一劫或得到好处)</span>","scenario":"<span class=\"context-tag tag-life\">谈论好运</span> \"We really <b>lucked out</b> with the weather for our beach trip.\"<br>(我们去海滩旅行时的天气真是好得撞大运了。)","tags":["谈论好运"]},{"id":290,"verb":"Map out","meaning":"详细规划 / 精心安排<br><span style=\"font-size:0.8em;color:gray\">(像画地图一样把每一步标出来)</span>","scenario":"<span class=\"context-tag tag-work\">战略规划</span> \"The CEO <b>mapped out</b> a clear strategy for the next five years.\"<br>(CEO详细规划出了未来五年的清晰战略。)","tags":["战略规划"]},{"id":291,"verb":"Max out","meaning":"达到极限 / 把(信用卡)刷爆<br><span style=\"font-size:0.8em;color:gray\">(极其高频的消费词汇)</span>","scenario":"<span class=\"context-tag tag-life\">信用卡/举重</span> \"I can't buy that TV, my credit card is already <b>maxed out</b>.\"<br>(我买不了那台电视了，我的信用卡已经被彻底刷爆了。)","tags":["信用卡/举重"]},{"id":292,"verb":"Mess up","meaning":"弄糟 / 搞砸 / 把屋子弄乱<br><span style=\"font-size:0.8em;color:gray\">(相当于 screw up / ruin)</span>","scenario":"<span class=\"context-tag tag-work\">认错道歉</span> \"I really <b>messed up</b> the interview.\"<br>(我真的把那场面试彻底搞砸了。)","tags":["认错道歉"]},{"id":293,"verb":"Mull over","meaning":"仔细考虑 / 反复思考(很长时间)<br><span style=\"font-size:0.8em;color:gray\">(比 think over 思考的时间更长，更有咀嚼的味道)</span>","scenario":"<span class=\"context-tag tag-work\">做重大决定</span> \"I need a few days to <b>mull over</b> your job offer.\"<br>(我需要几天时间好好琢磨/反复考虑一下你们的工作邀约。)","tags":["做重大决定"]},{"id":294,"verb":"Nod off","meaning":"打盹 / 不小心睡着了<br><span style=\"font-size:0.8em;color:gray\">(像小鸡啄米一样点头睡着)</span>","scenario":"<span class=\"context-tag tag-life\">上课/看电视</span> \"I was so tired that I kept <b>nodding off</b> during the movie.\"<br>(我太累了，看电影的时候一直不停地打瞌睡。)","tags":["上课/看电视"]},{"id":295,"verb":"Pan out","meaning":"结果(如何) / (事情)顺利发展并取得成功<br><span style=\"font-size:0.8em;color:gray\">(源于淘金热，把沙子筛掉最后淘出金子)</span>","scenario":"<span class=\"context-tag tag-work\">极其地道的口语</span> \"I hope this new job opportunity <b>pans out</b>.\" (希望这个新工作机会能成。)<br>\"Let's wait and see how things <b>pan out</b>.\" (咱们先走着瞧，看看事情最终会如何发展。)","tags":["极其地道的口语"]},{"id":296,"verb":"Patch up","meaning":"修补(关系等) / 临时包扎<br><span style=\"font-size:0.8em;color:gray\">(用补丁打补丁，通常指勉强修复)</span>","scenario":"<span class=\"context-tag tag-social\">修复友谊</span> \"They had a huge fight, but they managed to <b>patch things up</b>.\"<br>(他们大吵了一架，但还是设法修补了关系/和好了。)","tags":["修复友谊"]},{"id":297,"verb":"Phase in","meaning":"分阶段引入 / 逐步实施<br><span style=\"font-size:0.8em;color:gray\">(Phase out 的反义词)</span>","scenario":"<span class=\"context-tag tag-work\">政策与软件</span> \"The new tax policy will be <b>phased in</b> over the next three years.\"<br>(新的税收政策将在未来三年内分阶段逐步实施。)","tags":["政策与软件"]},{"id":298,"verb":"Pipe down","meaning":"安静下来 / 别吵了<br><span style=\"font-size:0.8em;color:gray\">(口语，相当于 shut up，但稍微缓和一点点)</span>","scenario":"<span class=\"context-tag tag-drama\">制止喧哗</span> \"Hey, you kids in the back, <b>pipe down</b>!\"<br>(嘿，后面那几个小孩，给我安静点/别吵了！)","tags":["制止喧哗"]},{"id":299,"verb":"Play along","meaning":"假装同意 / 顺从(别人的把戏)<br><span style=\"font-size:0.8em;color:gray\">(陪着别人演戏)</span>","scenario":"<span class=\"context-tag tag-drama\">合谋恶作剧</span> \"I knew he was lying, but I decided to just <b>play along</b>.\"<br>(我知道他在撒谎，但我决定就顺着他的意思/陪他演下去。)","tags":["合谋恶作剧"]},{"id":300,"verb":"Play down","meaning":"贬低 / 对...轻描淡写 / 淡化...的重要性<br><span style=\"font-size:0.8em;color:gray\">(不让人觉得这事很严重)</span>","scenario":"<span class=\"context-tag tag-work\">公关与谈判</span> \"The government tried to <b>play down</b> the threat of the virus.\"<br>(政府试图淡化病毒的威胁，不让公众恐慌。)","tags":["公关与谈判"]},{"id":301,"verb":"Pull off","meaning":"成功完成(困难的事)<br><span style=\"font-size:0.8em;color:gray\">(从险境中把它拽出来)</span>","scenario":"<span class=\"context-tag tag-work\">庆功赞美</span> \"I didn't think we could finish it, but we <b>pulled it off</b>!\"<br>(我本以为完不成了，但我们居然成功搞定了！)","tags":["庆功赞美"]},{"id":302,"verb":"Pencil in","meaning":"初步定下 / 暂定(时间)<br><span style=\"font-size:0.8em;color:gray\">(用铅笔写，意思是随时可擦除更改)</span>","scenario":"<span class=\"context-tag tag-work\">预约会议</span> \"Let's <b>pencil in</b> a meeting for 3 PM on Thursday.\"<br>(咱们先把周四下午3点的会暂定下来。职场极其高频！)","tags":["预约会议"]},{"id":303,"verb":"Weigh in","meaning":"(在讨论中)发表意见 / 介入<br><span style=\"font-size:0.8em;color:gray\">(把你的砝码放进天平里)</span>","scenario":"<span class=\"context-tag tag-work\">开会邀请</span> \"Does anyone else want to <b>weigh in</b> on this topic?\"<br>(还有其他人想就这个话题发表一下看法吗？)","tags":["开会邀请"]},{"id":304,"verb":"Sign off on","meaning":"正式批准 / 签字同意<br><span style=\"font-size:0.8em;color:gray\">(签上大名放行)</span>","scenario":"<span class=\"context-tag tag-work\">走审批流</span> \"We can't start until the CEO <b>signs off on</b> the budget.\"<br>(直到CEO签字批准预算，我们才能动工。)","tags":["走审批流"]},{"id":305,"verb":"Bone up on","meaning":"临时抱佛脚 / 恶补(知识)<br><span style=\"font-size:0.8em;color:gray\">(美国学生俚语，死磕骨头)</span>","scenario":"<span class=\"context-tag tag-work\">面试前准备</span> \"I need to <b>bone up on</b> my SQL skills before the interview.\"<br>(面试前我得恶补一下我的SQL技能。)","tags":["面试前准备"]},{"id":306,"verb":"Brush up on","meaning":"复习 / 重温(生疏的技能)<br><span style=\"font-size:0.8em;color:gray\">(把生锈的东西刷一刷)</span>","scenario":"<span class=\"context-tag tag-life\">技能回顾</span> \"I took some classes to <b>brush up on</b> my Spanish.\"<br>(我上了几节课来重温/找回我的西班牙语。)","tags":["技能回顾"]},{"id":307,"verb":"Crank out","meaning":"快速大量地生产(或写出)<br><span style=\"font-size:0.8em;color:gray\">(像摇曲柄机器一样源源不断地产出)</span>","scenario":"<span class=\"context-tag tag-work\">疯狂赶工</span> \"He <b>cranked out</b> three reports in just one afternoon.\"<br>(他仅仅一个下午就疯狂赶出了三份报告。)","tags":["疯狂赶工"]},{"id":308,"verb":"Churn out","meaning":"粗制滥造地大量生产<br><span style=\"font-size:0.8em;color:gray\">(贬义，像搅拌机一样无脑产出)</span>","scenario":"<span class=\"context-tag tag-work\">吐槽烂片/烂文章</span> \"Hollywood keeps <b>churning out</b> these boring superhero movies.\"<br>(好莱坞还在不断流水线般粗制滥造这些无聊的超级英雄电影。)","tags":["吐槽烂片/烂文章"]},{"id":309,"verb":"Hammer out","meaning":"艰难达成(协议或解决方案)<br><span style=\"font-size:0.8em;color:gray\">(像打铁一样反复敲打成型)</span>","scenario":"<span class=\"context-tag tag-work\">谈判桌拉锯</span> \"It took us five hours to <b>hammer out</b> a deal.\"<br>(我们花了五个小时才艰难敲定这项协议。)","tags":["谈判桌拉锯"]},{"id":310,"verb":"Roll out","meaning":"(盛大)推出 / 铺开(新产品/政策)<br><span style=\"font-size:0.8em;color:gray\">(像红地毯一样滚开铺展)</span>","scenario":"<span class=\"context-tag tag-work\">产品发布</span> \"Apple is planning to <b>roll out</b> the new software next month.\"<br>(苹果计划下个月全面推出这款新软件。名词：A product rollout)","tags":["产品发布"]},{"id":311,"verb":"Bail out","meaning":"经济援助 / 保释 / 中途放弃<br><span style=\"font-size:0.8em;color:gray\">(把船里的水舀出去挽救沉船)</span>","scenario":"<span class=\"context-tag tag-work\">金融/团队</span> \"The government had to <b>bail out</b> the failing banks.\" (政府不得不出资救助快破产的银行。)<br>\"The project was too hard, so he just <b>bailed out</b>.\" (项目太难了，他直接跳车/弃坑不干了。)","tags":["金融/团队"]},{"id":312,"verb":"Shell out","meaning":"(不情愿地)大笔付钱 / 掏腰包<br><span style=\"font-size:0.8em;color:gray\">(像剥贝壳一样把钱抠出来)</span>","scenario":"<span class=\"context-tag tag-life\">吐槽花销</span> \"I had to <b>shell out</b> $1000 for car repairs.\"<br>(我不得不含泪掏了1000刀修车。)","tags":["吐槽花销"]},{"id":313,"verb":"Pony up","meaning":"掏钱 / 付账(尤指之前欠的)<br><span style=\"font-size:0.8em;color:gray\">(口语，痛快点把钱拿出来)</span>","scenario":"<span class=\"context-tag tag-drama\">讨债/分摊</span> \"You broke my phone, now <b>pony up</b> the cash to fix it.\"<br>(你弄坏了我的手机，赶紧掏钱赔修手机的钱。)","tags":["讨债/分摊"]},{"id":314,"verb":"Scrape by","meaning":"勉强糊口 / 艰难度日<br><span style=\"font-size:0.8em;color:gray\">(刮着锅底勉强过活)</span>","scenario":"<span class=\"context-tag tag-life\">经济拮据</span> \"With his low salary, he is just <b>scraping by</b>.\"<br>(就他那点微薄的薪水，他也就是勉强糊口/喝西北风。)","tags":["经济拮据"]},{"id":315,"verb":"Tide over","meaning":"帮某人渡过(短暂的)难关<br><span style=\"font-size:0.8em;color:gray\">(乘着潮水度过浅滩)</span>","scenario":"<span class=\"context-tag tag-social\">借小钱</span> \"Can you lend me $50 to <b>tide me over</b> until payday?\"<br>(你能借我50刀让我撑到发工资那天吗？)","tags":["借小钱"]},{"id":316,"verb":"Rake in","meaning":"大把大把地赚钱 / 轻易敛财<br><span style=\"font-size:0.8em;color:gray\">(像用耙子耙落叶一样狂揽钞票)</span>","scenario":"<span class=\"context-tag tag-work\">商业暴利</span> \"Since they launched the game, they've been <b>raking in</b> the money.\"<br>(自从他们发布了这款游戏，他们简直是在疯狂数钱/日进斗金。)","tags":["商业暴利"]},{"id":317,"verb":"Squirrel away","meaning":"(秘密地)存钱以备不时之需<br><span style=\"font-size:0.8em;color:gray\">(像松鼠藏坚果准备过冬)</span>","scenario":"<span class=\"context-tag tag-life\">理财储蓄</span> \"She has a lot of money <b>squirreled away</b> in a secret account.\"<br>(她在一个秘密账户里偷偷攒了一大笔小金库。)","tags":["理财储蓄"]},{"id":318,"verb":"Scale back","meaning":"缩减规模 / 降低预算<br><span style=\"font-size:0.8em;color:gray\">(按比例缩小)</span>","scenario":"<span class=\"context-tag tag-work\">削减开支</span> \"Due to the economic downturn, we need to <b>scale back</b> our operations.\"<br>(由于经济下行，我们需要缩减运营规模。)","tags":["削减开支"]},{"id":319,"verb":"Double down","meaning":"加倍下注 / 固执己见(拒不认错)<br><span style=\"font-size:0.8em;color:gray\">(极其高频的美国政治和商业术语)</span>","scenario":"<span class=\"context-tag tag-drama\">强硬表态</span> \"Instead of apologizing, the politician <b>doubled down</b> on his controversial remarks.\"<br>(这位政客非但没道歉，反而更加头铁/变本加厉地坚持他那些充满争议的言论。)","tags":["强硬表态"]},{"id":320,"verb":"Shake up","meaning":"(人事)大洗牌 / 彻底改变结构<br><span style=\"font-size:0.8em;color:gray\">(摇晃打散重新排列)</span>","scenario":"<span class=\"context-tag tag-work\">公司裁员/改革</span> \"The new CEO is going to <b>shake up</b> the entire management team.\"<br>(新任CEO准备将整个管理层大洗牌。)","tags":["公司裁员/改革"]},{"id":321,"verb":"Pitch for","meaning":"为(某物)大力推销 / 极力争取<br><span style=\"font-size:0.8em;color:gray\">(像投球一样抛出卖点)</span>","scenario":"<span class=\"context-tag tag-work\">提案演讲</span> \"He is <b>pitching for</b> a promotion this year.\"<br>(他今年正在积极表现，极力为自己争取升职。)","tags":["提案演讲"]},{"id":322,"verb":"Step up","meaning":"挺身而出(承担责任) / 加紧步伐<br><span style=\"font-size:0.8em;color:gray\">(往前迈一步承担大任)</span>","scenario":"<span class=\"context-tag tag-work\">领导致辞</span> \"When the manager left, Sarah <b>stepped up</b> and led the team.\"<br>(经理走后，Sarah挺身而出挑起了领导团队的大梁。)","tags":["领导致辞"]},{"id":323,"verb":"Stick up for","meaning":"为...挺身而出 / 维护(某人)<br><span style=\"font-size:0.8em;color:gray\">(像棍子一样竖起来保护弱者)</span>","scenario":"<span class=\"context-tag tag-social\">仗义执言</span> \"Thanks for <b>sticking up for</b> me in the meeting.\"<br>(谢谢你在会议上站出来为我说话/维护我。)","tags":["仗义执言"]},{"id":324,"verb":"Vouch for","meaning":"为...担保 / 保证(其人品/质量)<br><span style=\"font-size:0.8em;color:gray\">(用自己的信誉背书)</span>","scenario":"<span class=\"context-tag tag-work\">内推背景调查</span> \"I can completely <b>vouch for</b> his integrity.\"<br>(我可以拿人格担保，他这人绝对正直可靠。)","tags":["内推背景调查"]},{"id":325,"verb":"Cover for","meaning":"替某人打掩护 / 替班<br><span style=\"font-size:0.8em;color:gray\">(提供掩护物)</span>","scenario":"<span class=\"context-tag tag-work\">帮人圆场</span> \"I'm running late. Can you <b>cover for</b> me if the boss asks?\"<br>(我迟到了，如果老板问起，你能帮我打个掩护吗？)","tags":["帮人圆场"]},{"id":326,"verb":"Gang up on","meaning":"结伙对付 / 合伙欺负(某人)<br><span style=\"font-size:0.8em;color:gray\">(像帮派一样围攻一个人)</span>","scenario":"<span class=\"context-tag tag-drama\">职场/校园霸凌</span> \"I felt like the whole committee was <b>ganging up on</b> me.\"<br>(我感觉整个委员会都在合伙针对我/围攻我。)","tags":["职场/校园霸凌"]},{"id":327,"verb":"Pick on","meaning":"刁难 / 找茬 / 针对(某人)<br><span style=\"font-size:0.8em;color:gray\">(专门挑某人欺负)</span>","scenario":"<span class=\"context-tag tag-drama\">吐槽抱怨</span> \"Why does the teacher always <b>pick on</b> me?\"<br>(为什么老师总是看我不顺眼/专门找我的茬？)","tags":["吐槽抱怨"]},{"id":328,"verb":"String along","meaning":"吊人胃口 / 拖延欺骗<br><span style=\"font-size:0.8em;color:gray\">(用一根线牵着你，不给痛快话)</span>","scenario":"<span class=\"context-tag tag-social\">职场与渣男/女</span> \"She's not going to marry you, she's just <b>stringing you along</b>.\"<br>(她才不会嫁给你，她只不过是在吊着你/把你当备胎。)","tags":["职场与渣男/女"]},{"id":329,"verb":"Lead on","meaning":"误导(让人产生非分之想或虚假希望)<br><span style=\"font-size:0.8em;color:gray\">(故意引人走上歧途)</span>","scenario":"<span class=\"context-tag tag-social\">画大饼</span> \"They <b>led</b> me <b>on</b> to believe I would get the job.\"<br>(他们误导我/给我画大饼，让我以为我肯定能拿到这份工作。)","tags":["画大饼"]},{"id":330,"verb":"Warm up to","meaning":"开始接受 / 开始喜欢(一开始不喜欢的人或事物)<br><span style=\"font-size:0.8em;color:gray\">(态度逐渐解冻变暖)</span>","scenario":"<span class=\"context-tag tag-life\">人际关系</span> \"At first I didn't like the new dog, but I'm starting to <b>warm up to</b> him.\"<br>(起初我不喜欢这只新狗，但我现在开始慢慢接纳并喜欢上它了。)","tags":["人际关系"]},{"id":331,"verb":"Clamp down on","meaning":"严厉取缔 / 强行压制<br><span style=\"font-size:0.8em;color:gray\">(用夹子死死夹住。类似于 crack down on)</span>","scenario":"<span class=\"context-tag tag-work\">政策监管</span> \"The government is <b>clamping down on</b> tax evasion.\"<br>(政府正在严厉打击/死抓逃税行为。)","tags":["政策监管"]},{"id":332,"verb":"Simmer down","meaning":"平息怒火 / (从沸腾状态)冷静下来<br><span style=\"font-size:0.8em;color:gray\">(锅里的水从沸腾变成文火慢炖)</span>","scenario":"<span class=\"context-tag tag-drama\">安抚吵架</span> \"Alright, everyone just <b>simmer down</b> and let's talk about this rationally.\"<br>(好了好了，大家都消消气/冷静一下，咱们理智地谈谈。)","tags":["安抚吵架"]},{"id":333,"verb":"Wind down","meaning":"逐渐放松 / (活动)逐渐接近尾声<br><span style=\"font-size:0.8em;color:gray\">(像发条慢下来一样)</span>","scenario":"<span class=\"context-tag tag-life\">下班/睡前</span> \"I like to read a book to <b>wind down</b> before bed.\" (我喜欢睡前看书来放松一下紧绷的神经。)<br>\"The party is finally <b>winding down</b>.\" (派对终于渐渐接近尾声了。)","tags":["下班/睡前"]},{"id":334,"verb":"Snap out of","meaning":"从(消极情绪/发呆)中迅速振作起来<br><span style=\"font-size:0.8em;color:gray\">(像打响指一样瞬间清醒)</span>","scenario":"<span class=\"context-tag tag-drama\">美剧神句</span> \"I know you're sad, but you need to <b>snap out of</b> it!\"<br>(我知道你很难过，但你必须马上振作起来/停止颓废！)","tags":["美剧神句"]},{"id":335,"verb":"Psych up","meaning":"作好心理准备 / 使(自己或团队)兴奋起来<br><span style=\"font-size:0.8em;color:gray\">(打鸡血)</span>","scenario":"<span class=\"context-tag tag-work\">赛前/面试前</span> \"I'm trying to <b>psych</b> myself <b>up</b> for this big presentation.\"<br>(我正在努力给自己打气/作心理建设，来迎接这场重要演讲。)","tags":["赛前/面试前"]},{"id":336,"verb":"Tear into","meaning":"严厉斥责 / 狼吞虎咽地吃<br><span style=\"font-size:0.8em;color:gray\">(像撕裂猎物一样扑上去)</span>","scenario":"<span class=\"context-tag tag-drama\">职场被骂</span> \"The boss absolutely <b>tore into</b> me for that mistake.\"<br>(因为那个失误，老板把我劈头盖脸地狠批/手撕了一顿。)","tags":["职场被骂"]},{"id":337,"verb":"Harp on","meaning":"喋喋不休地抱怨(同一件事)<br><span style=\"font-size:0.8em;color:gray\">(一直弹竖琴的同一个音，惹人烦)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽受不了</span> \"Stop <b>harping on</b> my past mistakes!\"<br>(别再揪着我过去的错误喋喋不休/翻旧账了！)","tags":["吐槽受不了"]},{"id":338,"verb":"Dwell on","meaning":"老是想着(不愉快的事) / 沉湎于<br><span style=\"font-size:0.8em;color:gray\">(在悲伤的地方长住不走)</span>","scenario":"<span class=\"context-tag tag-life\">心理疏导</span> \"You failed the test, but there's no point <b>dwelling on</b> it now.\"<br>(你考试没过，但现在沉湎于此/过度内耗毫无意义。)","tags":["心理疏导"]},{"id":339,"verb":"Sound out","meaning":"试探某人的意见 / 探口风<br><span style=\"font-size:0.8em;color:gray\">(发声探测深浅)</span>","scenario":"<span class=\"context-tag tag-work\">职场八卦</span> \"I'm going to <b>sound</b> him <b>out</b> and see if he is willing to sell the company.\"<br>(我准备去探探他的口风，看看他愿不愿意把公司卖了。)","tags":["职场八卦"]},{"id":340,"verb":"Butt in","meaning":"粗鲁地插嘴 / 多管闲事<br><span style=\"font-size:0.8em;color:gray\">(用头顶进去，极其粗鲁的 cut in)</span>","scenario":"<span class=\"context-tag tag-drama\">警告别人</span> \"This is a private conversation, please don't <b>butt in</b>.\"<br>(这是私人谈话，请你别插嘴/别多管闲事。)","tags":["警告别人"]},{"id":341,"verb":"Drone on","meaning":"单调乏味地喋喋不休(让人昏昏欲睡)<br><span style=\"font-size:0.8em;color:gray\">(像无人机一样嗡嗡作响)</span>","scenario":"<span class=\"context-tag tag-work\">吐槽开会</span> \"The professor <b>droned on</b> for two hours about ancient history.\"<br>(教授像念经一样单调地讲了两个小时的古代史。)","tags":["吐槽开会"]},{"id":342,"verb":"Reel in","meaning":"顺利钓到 / 吸引并抓住(客户/投资)<br><span style=\"font-size:0.8em;color:gray\">(转动渔线轮把大鱼收线拉上来)</span>","scenario":"<span class=\"context-tag tag-work\">拉拢业务</span> \"We managed to <b>reel in</b> a huge client today.\"<br>(我们今天成功钓到了/拿下了一个大客户。)","tags":["拉拢业务"]},{"id":343,"verb":"Sniff out","meaning":"嗅出 / 察觉出(隐藏的问题或机会)<br><span style=\"font-size:0.8em;color:gray\">(像警犬一样敏锐)</span>","scenario":"<span class=\"context-tag tag-work\">商业嗅觉</span> \"He has a great ability to <b>sniff out</b> a good business deal.\"<br>(他有极强的嗅觉，总能察觉出好的商业交易机会。)","tags":["商业嗅觉"]},{"id":344,"verb":"Root out","meaning":"根除 / 把(坏人或问题)挖出来清除掉<br><span style=\"font-size:0.8em;color:gray\">(连根拔起)</span>","scenario":"<span class=\"context-tag tag-work\">整顿反腐</span> \"The mayor promised to <b>root out</b> corruption in the city.\"<br>(市长承诺将把市里的腐败分子连根拔起/彻底清除。)","tags":["整顿反腐"]},{"id":345,"verb":"Dig up","meaning":"挖出(黑历史/秘密) / 费力搜集(情报)<br><span style=\"font-size:0.8em;color:gray\">(用铲子挖泥土)</span>","scenario":"<span class=\"context-tag tag-drama\">政治抹黑</span> \"The reporters are trying to <b>dig up</b> dirt on the candidate.\"<br>(记者们正试图挖出这个候选人的黑料/丑闻。)","tags":["政治抹黑"]},{"id":346,"verb":"Piece together","meaning":"拼凑出(真相/全貌)<br><span style=\"font-size:0.8em;color:gray\">(像拼图一样把线索组合起来)</span>","scenario":"<span class=\"context-tag tag-work\">破案/逻辑分析</span> \"Detectives are still trying to <b>piece together</b> what happened that night.\"<br>(侦探们仍在努力拼凑出那晚事件的真相/全貌。)","tags":["破案/逻辑分析"]},{"id":347,"verb":"Zero in on","meaning":"将注意力集中于 / 瞄准(核心问题)<br><span style=\"font-size:0.8em;color:gray\">(准星归零，死死锁定目标)</span>","scenario":"<span class=\"context-tag tag-work\">解决问题</span> \"We need to <b>zero in on</b> the root cause of this failure.\"<br>(我们需要把焦点死死锁定在这场失败的根本原因上。)","tags":["解决问题"]},{"id":348,"verb":"Breeze through","meaning":"轻松通过(测试/难关)<br><span style=\"font-size:0.8em;color:gray\">(像微风吹过一样不费吹灰之力)</span>","scenario":"<span class=\"context-tag tag-life\">考试/面试</span> \"She studied hard and <b>breezed through</b> the final exam.\"<br>(她努力学习，轻轻松松就拿捏了期末考试。)","tags":["考试/面试"]},{"id":349,"verb":"Sail through","meaning":"顺利完成 / 毫无阻碍地通过<br><span style=\"font-size:0.8em;color:gray\">(一帆风顺)</span>","scenario":"<span class=\"context-tag tag-work\">法案/审批</span> \"The new bill <b>sailed through</b> Congress.\"<br>(这项新法案在国会一帆风顺地获得了通过。)","tags":["法案/审批"]},{"id":350,"verb":"Scrape through","meaning":"勉强通过 / 惊险过关<br><span style=\"font-size:0.8em;color:gray\">(擦着边过去，差点挂了)</span>","scenario":"<span class=\"context-tag tag-life\">学渣感慨</span> \"I didn't study much, but I managed to <b>scrape through</b> the math test.\"<br>(我没怎么复习，但总算低空飞行/擦边勉强及格了数学考试。)","tags":["学渣感慨"]},{"id":351,"verb":"Bog down","meaning":"陷入泥潭 / 停滞不前 / 拘泥于细节<br><span style=\"font-size:0.8em;color:gray\">(Bog = 沼泽。Be bogged down)</span>","scenario":"<span class=\"context-tag tag-work\">项目卡壳</span> \"Let's not get <b>bogged down</b> in the details right now.\"<br>(咱们现在先别陷入这些琐碎细节的泥潭里拔不出来。)","tags":["项目卡壳"]},{"id":352,"verb":"Stamp out","meaning":"消除 / 杜绝(不良现象)<br><span style=\"font-size:0.8em;color:gray\">(用脚踩灭火苗)</span>","scenario":"<span class=\"context-tag tag-work\">企业宣言</span> \"Our company is determined to <b>stamp out</b> workplace discrimination.\"<br>(我们公司决心彻底铲除/杜绝职场歧视现象。)","tags":["企业宣言"]},{"id":353,"verb":"Boil over","meaning":"(愤怒等情绪)失去控制 / 沸腾溢出<br><span style=\"font-size:0.8em;color:gray\">(锅里的水烧开扑出来了)</span>","scenario":"<span class=\"context-tag tag-drama\">局势失控</span> \"The tension between the two departments finally <b>boiled over</b> into a public shouting match.\"<br>(两个部门之间的紧张关系终于失控爆发，变成了公开的争吵对骂。)","tags":["局势失控"]},{"id":354,"verb":"Tip over","meaning":"打翻 / 翻倒<br><span style=\"font-size:0.8em;color:gray\">(失去重心倒下)</span>","scenario":"<span class=\"context-tag tag-life\">生活意外</span> \"Be careful not to <b>tip over</b> that vase.\"<br>(小心别把那个花瓶碰翻了。)","tags":["生活意外"]},{"id":355,"verb":"Spill over","meaning":"溢出 / (情绪/影响)波及到其他领域<br><span style=\"font-size:0.8em;color:gray\">(水洒出来了蔓延开)</span>","scenario":"<span class=\"context-tag tag-work\">压力蔓延</span> \"I try not to let my work stress <b>spill over</b> into my family life.\"<br>(我尽量不让我工作的压力波及/影响到我的家庭生活。)","tags":["压力蔓延"]},{"id":356,"verb":"Pass around","meaning":"传阅 / 依次传递<br><span style=\"font-size:0.8em;color:gray\">(让大家轮流看)</span>","scenario":"<span class=\"context-tag tag-work\">开会发资料</span> \"Could you <b>pass</b> these documents <b>around</b>, please?\"<br>(请把这些文件传给大家看一看好吗？)","tags":["开会发资料"]},{"id":357,"verb":"Turn away","meaning":"把人拒之门外 / 拒绝某人进入<br><span style=\"font-size:0.8em;color:gray\">(让人转身离开)</span>","scenario":"<span class=\"context-tag tag-life\">酒吧/医院满员</span> \"The restaurant was so full they had to <b>turn</b> people <b>away</b>.\"<br>(餐厅爆满，他们不得不把后来的客人拒之门外。)","tags":["酒吧/医院满员"]},{"id":358,"verb":"Turn against","meaning":"反目成仇 / 彻底背叛<br><span style=\"font-size:0.8em;color:gray\">(转身对着干)</span>","scenario":"<span class=\"context-tag tag-drama\">权力斗争</span> \"After the scandal, even his closest allies <b>turned against</b> him.\"<br>(丑闻发生后，连他最亲密的盟友也跟他反目成仇/背叛了他。)","tags":["权力斗争"]},{"id":359,"verb":"Play off","meaning":"挑拨离间 (Play someone off against another)<br><span style=\"font-size:0.8em;color:gray\">(把别人当棋子互相消耗)</span>","scenario":"<span class=\"context-tag tag-drama\">职场甄嬛传</span> \"The manager is known to <b>play</b> his employees <b>off</b> against each other.\"<br>(这个经理出了名地喜欢在员工之间挑拨离间/让他们互相内斗。)","tags":["职场甄嬛传"]},{"id":360,"verb":"Stand down","meaning":"退位 / 退下(尤指在竞争或对峙中让步)<br><span style=\"font-size:0.8em;color:gray\">(从战斗位置上退下来)</span>","scenario":"<span class=\"context-tag tag-work\">新闻/竞选</span> \"The CEO was forced to <b>stand down</b> due to health reasons.\"<br>(CEO因健康原因被迫退位/卸任。)","tags":["新闻/竞选"]},{"id":361,"verb":"Back away","meaning":"退让 / (因害怕或反感而)放弃支持<br><span style=\"font-size:0.8em;color:gray\">(一步步往后退)</span>","scenario":"<span class=\"context-tag tag-work\">合作破裂</span> \"Investors started to <b>back away</b> from the deal when they saw the risks.\"<br>(投资者看到风险后，开始打退堂鼓/撤出这笔交易。)","tags":["合作破裂"]},{"id":362,"verb":"Hold out on","meaning":"对某人隐瞒真相 / 不给某人应得的东西<br><span style=\"font-size:0.8em;color:gray\">(口语抱怨神句)</span>","scenario":"<span class=\"context-tag tag-drama\">质问朋友</span> \"I know you know the secret. Are you <b>holding out on</b> me?\"<br>(我知道你知道秘密。你是不是在对我藏着掖着/隐瞒真相？)","tags":["质问朋友"]},{"id":363,"verb":"Hold against","meaning":"因某事对某人怀恨在心 / 有成见<br><span style=\"font-size:0.8em;color:gray\">(把某事当成攻击对方的把柄)</span>","scenario":"<span class=\"context-tag tag-social\">释怀原谅</span> \"I made a mistake years ago, and she still <b>holds it against</b> me.\"<br>(我多年前犯了个错，她到现在还对我耿耿于怀/揪着不放。)","tags":["释怀原谅"]},{"id":364,"verb":"Hold to","meaning":"要求某人信守(承诺或标准)<br><span style=\"font-size:0.8em;color:gray\">(Hold someone to a promise)</span>","scenario":"<span class=\"context-tag tag-work\">施加压力</span> \"You promised to finish it by Friday, and I'm going to <b>hold you to</b> that.\"<br>(你答应周五前做完的，我可指望着你兑现诺言/决不让你食言。)","tags":["施加压力"]},{"id":365,"verb":"Keep from","meaning":"忍住不做 / 向某人隐瞒<br><span style=\"font-size:0.8em;color:gray\">(保持距离不让发生)</span>","scenario":"<span class=\"context-tag tag-life\">保密/忍耐</span> \"I couldn't <b>keep from</b> laughing.\" (我实在没忍住笑出声了。)<br>\"Why did you <b>keep</b> this <b>from</b> me?\" (你为什么对我瞒着这件事？)","tags":["保密/忍耐"]},{"id":366,"verb":"Keep at","meaning":"坚持不懈地做(苦差事)<br><span style=\"font-size:0.8em;color:gray\">(死咬着不放)</span>","scenario":"<span class=\"context-tag tag-work\">鼓励打气</span> \"Learning English is hard, but if you <b>keep at it</b>, you'll succeed.\"<br>(学英语很难，但只要你坚持死磕下去，你一定会成功的。)","tags":["鼓励打气"]},{"id":367,"verb":"Catch on to","meaning":"察觉 / 看穿(某人的诡计或秘密)<br><span style=\"font-size:0.8em;color:gray\">(终于跟上节奏明白了)</span>","scenario":"<span class=\"context-tag tag-drama\">阴谋败露</span> \"It took me a while, but I finally <b>caught on to</b> his scam.\"<br>(花了我一阵子时间，但我最终还是看穿了他的骗局。)","tags":["阴谋败露"]},{"id":368,"verb":"Catch out","meaning":"识破某人说谎 / 抓到某人的把柄<br><span style=\"font-size:0.8em;color:gray\">(把骗子揪出来)</span>","scenario":"<span class=\"context-tag tag-work\">审计/盘问</span> \"The interviewer tried to <b>catch</b> me <b>out</b> with tricky questions.\"<br>(面试官试图用狡猾的问题给我下套/抓我的破绽。)","tags":["审计/盘问"]},{"id":369,"verb":"Put past","meaning":"(I wouldn't put it past him) = 我相信他干得出来那种事<br><span style=\"font-size:0.8em;color:gray\">(极其地道，表示某人毫无底线)</span>","scenario":"<span class=\"context-tag tag-social\">八卦吐槽</span> \"Did he really steal the money? Honestly, I <b>wouldn't put it past him</b>.\"<br>(他真偷了钱？说实话，以他的人品我绝对相信他干得出来。)","tags":["八卦吐槽"]},{"id":370,"verb":"Put through","meaning":"让某人经受苦难 / 接通电话<br><span style=\"font-size:0.8em;color:gray\">(强行穿过)</span>","scenario":"<span class=\"context-tag tag-drama\">指责抱怨</span> \"I can't believe the amount of stress you've <b>put me through</b>.\"<br>(真不敢相信你让我承受了这么多巨大的压力/折磨。)","tags":["指责抱怨"]},{"id":371,"verb":"Measure up to","meaning":"符合标准 / 比得上(期望)<br><span style=\"font-size:0.8em;color:gray\">(量一量够不够高度)</span>","scenario":"<span class=\"context-tag tag-work\">绩效评估</span> \"His performance just doesn't <b>measure up to</b> our expectations.\"<br>(他的表现实在达不到/够不上我们的预期标准。)","tags":["绩效评估"]},{"id":372,"verb":"Brush aside","meaning":"漠视 / 对...不理不睬(当耳旁风)<br><span style=\"font-size:0.8em;color:gray\">(像扫灰尘一样扫到一边)</span>","scenario":"<span class=\"context-tag tag-work\">抗议傲慢</span> \"The manager simply <b>brushed aside</b> all of our concerns.\"<br>(经理把我们所有的担忧完全当成了耳旁风/轻蔑地无视了。)","tags":["抗议傲慢"]},{"id":373,"verb":"Cast aside","meaning":"抛弃 / 丢弃(不再需要的人或物)<br><span style=\"font-size:0.8em;color:gray\">(比 brush aside 更无情)</span>","scenario":"<span class=\"context-tag tag-drama\">无情被甩</span> \"Once he became famous, he <b>cast aside</b> his old friends.\"<br>(他一出名，就把老朋友像破衣服一样抛弃了。)","tags":["无情被甩"]},{"id":374,"verb":"Set apart","meaning":"使...与众不同 / 脱颖而出<br><span style=\"font-size:0.8em;color:gray\">(放在一个单独的位置)</span>","scenario":"<span class=\"context-tag tag-work\">面试推销</span> \"What <b>sets</b> you <b>apart</b> from other candidates?\"<br>(是什么让你在其他候选人中与众不同/脱颖而出？面试必考题！)","tags":["面试推销"]},{"id":375,"verb":"Tell apart","meaning":"区分开 / 辨认出(极其相似的事物)<br><span style=\"font-size:0.8em;color:gray\">(说出区别)</span>","scenario":"<span class=\"context-tag tag-life\">双胞胎/假货</span> \"The twins are so identical, I can't <b>tell</b> them <b>apart</b>.\"<br>(这对双胞胎太像了，我根本分不清谁是谁。)","tags":["双胞胎/假货"]},{"id":376,"verb":"Take apart","meaning":"拆开 / 把...大卸八块 / 彻底驳倒<br><span style=\"font-size:0.8em;color:gray\">(拿掉使其分离)</span>","scenario":"<span class=\"context-tag tag-work\">修电脑/辩论</span> \"I had to <b>take</b> the laptop <b>apart</b> to fix it.\" (我得把笔记本电脑拆开修。)<br>\"The lawyer <b>took</b> her argument <b>apart</b>.\" (律师把她的论点驳得体无完肤。)","tags":["修电脑/辩论"]},{"id":377,"verb":"Fall back on","meaning":"退而求其次 / 依赖(最后的退路)<br><span style=\"font-size:0.8em;color:gray\">(往后倒下时有个垫背的)</span>","scenario":"<span class=\"context-tag tag-work\">备用计划</span> \"If the startup fails, he has his degree to <b>fall back on</b>.\"<br>(如果创业失败了，他至少还有学历这个退路/底牌可以仰仗。)","tags":["备用计划"]},{"id":378,"verb":"Lay into","meaning":"严厉责骂 / 痛打<br><span style=\"font-size:0.8em;color:gray\">(与 tear into 类似，火力全开)</span>","scenario":"<span class=\"context-tag tag-drama\">脾气爆发</span> \"My dad really <b>laid into</b> me for crashing his car.\"<br>(因为撞坏了他的车，我爸把我狠狠地劈头盖脸骂了一顿。)","tags":["脾气爆发"]},{"id":379,"verb":"Lean towards","meaning":"倾向于(某种选择或观点)<br><span style=\"font-size:0.8em;color:gray\">(身子往一边倾斜)</span>","scenario":"<span class=\"context-tag tag-work\">做选择时</span> \"I'm <b>leaning towards</b> accepting the job offer in New York.\"<br>(我个人比较偏向于接受纽约的那份工作Offer。)","tags":["做选择时"]},{"id":380,"verb":"Jump at","meaning":"迫不及待地接受(机会)<br><span style=\"font-size:0.8em;color:gray\">(像饿狼扑食一样跳过去)</span>","scenario":"<span class=\"context-tag tag-work\">绝佳良机</span> \"When they offered me a transfer to Hawaii, I <b>jumped at</b> the chance.\"<br>(当他们提出把我调到夏威夷时，我毫不犹豫地/迫不及待地答应了。)","tags":["绝佳良机"]},{"id":381,"verb":"Kick around","meaning":"(非正式地)反复讨论(想法) / 被人轻视对待<br><span style=\"font-size:0.8em;color:gray\">(像踢皮球一样踢来踢去)</span>","scenario":"<span class=\"context-tag tag-work\">头脑风暴</span> \"We've been <b>kicking around</b> a few ideas for the new ad campaign.\"<br>(我们一直在反复琢磨/讨论新广告活动的几个点子。)","tags":["头脑风暴"]},{"id":382,"verb":"Toss around","meaning":"抛出(想法/数字)以供讨论<br><span style=\"font-size:0.8em;color:gray\">(轻松地扔出来)</span>","scenario":"<span class=\"context-tag tag-work\">开会商量</span> \"Let's <b>toss around</b> some numbers and see what budget works.\"<br>(咱们随便抛几个数字出来讨论下，看看什么预算合适。)","tags":["开会商量"]},{"id":383,"verb":"Bandy about","meaning":"随口乱传(消息/谣言) / 随便抛出大词<br><span style=\"font-size:0.8em;color:gray\">(不负责任地打网球式互传)</span>","scenario":"<span class=\"context-tag tag-work\">批评八卦</span> \"The word 'innovation' is being <b>bandied about</b> too much these days.\"<br>(现在“创新”这个词被大家滥用/随口乱扯得太多了。)","tags":["批评八卦"]},{"id":384,"verb":"Toy with","meaning":"略加考虑 / 抱着试试看的心态(做某事)<br><span style=\"font-size:0.8em;color:gray\">(像把玩玩具一样不那么当真)</span>","scenario":"<span class=\"context-tag tag-life\">个人打算</span> \"I've been <b>toying with</b> the idea of moving to Canada.\"<br>(我最近心里一直痒痒，半认真半开玩笑地想着要不要搬去加拿大。)","tags":["个人打算"]},{"id":385,"verb":"Stumble upon","meaning":"偶然发现 / 意外遇到<br><span style=\"font-size:0.8em;color:gray\">(走路被绊了一下正好看到)</span>","scenario":"<span class=\"context-tag tag-life\">惊喜发现</span> \"I <b>stumbled upon</b> a great little cafe while walking downtown.\"<br>(我在市中心散步时，意外邂逅了一家超级棒的小咖啡馆。)","tags":["惊喜发现"]},{"id":386,"verb":"Rub off on","meaning":"(品质或习惯)不知不觉影响某人 / 沾染上<br><span style=\"font-size:0.8em;color:gray\">(身上的粉末蹭到了别人身上)</span>","scenario":"<span class=\"context-tag tag-social\">潜移默化</span> \"Her enthusiasm is starting to <b>rub off on</b> the rest of the team.\"<br>(她的热情开始渐渐感染/潜移默化地影响团队其他成员了。)","tags":["潜移默化"]},{"id":387,"verb":"Pass off as","meaning":"冒充 / 假装是(某人或某物)<br><span style=\"font-size:0.8em;color:gray\">(以假充真骗过去)</span>","scenario":"<span class=\"context-tag tag-life\">打假防骗</span> \"He tried to <b>pass</b> the fake Rolex <b>off as</b> a real one.\"<br>(他试图把那块假劳力士当真表糊弄/蒙混过关。)","tags":["打假防骗"]},{"id":388,"verb":"Pass down","meaning":"传承 / (把知识或物品)传给下一代<br><span style=\"font-size:0.8em;color:gray\">(同 hand down，往下传)</span>","scenario":"<span class=\"context-tag tag-life\">家族传统</span> \"This family tradition has been <b>passed down</b> for generations.\"<br>(这个家族传统已经代代相传了很久。)","tags":["家族传统"]},{"id":389,"verb":"Wear down","meaning":"使人筋疲力尽 / 磨损 / 渐渐软化(别人的态度)<br><span style=\"font-size:0.8em;color:gray\">(不断摩擦直到对方崩溃)</span>","scenario":"<span class=\"context-tag tag-work\">拉锯战</span> \"The kids finally <b>wore</b> me <b>down</b> and I bought them the toy.\"<br>(孩子们一直在旁边烦我，最终把我磨得妥协了，给他们买了玩具。)","tags":["拉锯战"]},{"id":390,"verb":"Wear on","meaning":"(时间)缓慢且枯燥地消逝 / 让人感到厌烦<br><span style=\"font-size:0.8em;color:gray\">(像穿在身上甩不掉的重负)</span>","scenario":"<span class=\"context-tag tag-life\">熬时间</span> \"As the meeting <b>wore on</b>, people started looking at their phones.\"<br>(随着会议枯燥且缓慢地熬着，人们开始看手机了。)","tags":["熬时间"]},{"id":391,"verb":"Bring down","meaning":"推翻(政府) / 降低价格 / 使某人扫兴<br><span style=\"font-size:0.8em;color:gray\">(把高高在上的东西拉下来)</span>","scenario":"<span class=\"context-tag tag-social\">破坏气氛</span> \"Don't talk about politics right now, it's just going to <b>bring</b> everyone <b>down</b>.\"<br>(现在别谈政治了，这只会给大家扫兴/把全场气氛搞得很压抑。)","tags":["破坏气氛"]},{"id":392,"verb":"Bring forward","meaning":"将(会议/计划)提前 / 提出(论点)<br><span style=\"font-size:0.8em;color:gray\">(拿到前面来)</span>","scenario":"<span class=\"context-tag tag-work\">调整日程</span> \"They <b>brought</b> the meeting <b>forward</b> to 1 PM.\"<br>(他们把会议提前到了下午1点。)","tags":["调整日程"]},{"id":393,"verb":"Bring up to speed","meaning":"让某人了解最新情况 / 同步信息<br><span style=\"font-size:0.8em;color:gray\">(把别人的速度拉到跟现状一样快)</span>","scenario":"<span class=\"context-tag tag-work\">新人入职必听</span> \"Let me <b>bring you up to speed</b> on what happened while you were on vacation.\"<br>(让我给你同步/恶补一下你休假期间发生的事。)","tags":["新人入职必听"]},{"id":394,"verb":"Get across","meaning":"把(观点或意思)讲清楚 / 传达给别人<br><span style=\"font-size:0.8em;color:gray\">(让信息跨越鸿沟到达对方脑中)</span>","scenario":"<span class=\"context-tag tag-work\">演讲沟通</span> \"I don't think I <b>got</b> my point <b>across</b> clearly in the meeting.\"<br>(我觉得我在会上没有把我的观点清晰地传达出去。)","tags":["演讲沟通"]},{"id":395,"verb":"Get at","meaning":"(你)真正想说的是什么 / 查明(真相) / 够得着<br><span style=\"font-size:0.8em;color:gray\">(What are you getting at? 你到底想暗示什么？)</span>","scenario":"<span class=\"context-tag tag-work\">听懂潜台词</span> \"I'm not quite sure what you're <b>getting at</b>.\"<br>(我不太明白你到底想拐弯抹角地表达什么意思。)","tags":["听懂潜台词"]},{"id":396,"verb":"Come down to","meaning":"归根结底是 / 最重要的一点是<br><span style=\"font-size:0.8em;color:gray\">(和 boil down to 一样，剥去外壳见核心)</span>","scenario":"<span class=\"context-tag tag-work\">做终极决定</span> \"It all <b>comes down to</b> whether we have enough budget.\"<br>(这件事说一千道一万/归根结底，就看我们有没有足够的预算了。)","tags":["做终极决定"]},{"id":397,"verb":"Come off as","meaning":"给人留下...的印象 / 表现得像<br><span style=\"font-size:0.8em;color:gray\">(散发出来的气场，类似于 come across as)</span>","scenario":"<span class=\"context-tag tag-social\">职场人设</span> \"I didn't mean to <b>come off as</b> rude.\"<br>(我本意并不是想表现得那么粗鲁无礼。)","tags":["职场人设"]},{"id":398,"verb":"Build on","meaning":"在...的基础上进一步发展<br><span style=\"font-size:0.8em;color:gray\">(添砖加瓦)</span>","scenario":"<span class=\"context-tag tag-work\">肯定别人</span> \"To <b>build on</b> what John just said, I think we should also...\"<br>(顺着John刚才的话/在John的发言基础上补充一点，我认为我们还应该...)","tags":["肯定别人"]},{"id":399,"verb":"Cash out","meaning":"把(筹码/投资)变现 / 抛售套现<br><span style=\"font-size:0.8em;color:gray\">(换成真金白银走人)</span>","scenario":"<span class=\"context-tag tag-work\">股票/期权</span> \"When the company went public, a lot of early employees <b>cashed out</b>.\"<br>(公司上市时，很多早期员工直接抛售股票套现走人了。)","tags":["股票/期权"]},{"id":400,"verb":"Top off","meaning":"以...圆满结束 / 把(杯子/油箱)加满<br><span style=\"font-size:0.8em;color:gray\">(在顶部加上最后的点缀)</span>","scenario":"<span class=\"context-tag tag-life\">完美收官</span> \"Let's <b>top off</b> this great dinner with some dessert.\" (咱们吃点甜点，为这顿丰盛的晚餐画上完美的句号。)<br>\"Can you <b>top off</b> my coffee?\" (能帮我把咖啡续满吗？)","tags":["完美收官"]},{"id":401,"verb":"Delve into","meaning":"深入探究 / 钻研<br><span style=\"font-size:0.8em;color:gray\">(播客节目最爱用的开场白)</span>","scenario":"<span class=\"context-tag tag-work\">深度播客</span> \"In today's episode, we are going to <b>delve into</b> the psychology of serial killers.\"<br>(在今天的节目中，我们将深入探讨连环杀手的心理机制。)","tags":["深度播客"]},{"id":402,"verb":"Play out","meaning":"(事态) 发展 / 产生结果<br><span style=\"font-size:0.8em;color:gray\">(静观其变，看戏怎么演)</span>","scenario":"<span class=\"context-tag tag-work\">新闻评论</span> \"It will be interesting to see how this election <b>plays out</b>.\"<br>(看看这场选举接下来会如何发展，肯定会很有趣。极其高频！)","tags":["新闻评论"]},{"id":403,"verb":"Shake out","meaning":"(局势) 明朗化 / 最终结果是<br><span style=\"font-size:0.8em;color:gray\">(像筛沙子一样，把结果摇出来)</span>","scenario":"<span class=\"context-tag tag-work\">市场分析</span> \"Let's wait and see how the market <b>shakes out</b> before investing.\"<br>(咱们先观望一下，等市场局势明朗了/尘埃落定后再投资。)","tags":["市场分析"]},{"id":404,"verb":"Shape up","meaning":"初见端倪 / 发展顺利 / 表现变好<br><span style=\"font-size:0.8em;color:gray\">(Shape up or ship out: 不好好干就滚蛋)</span>","scenario":"<span class=\"context-tag tag-work\">新闻/职场</span> \"The new project is really <b>shaping up</b> to be a success.\"<br>(这个新项目眼看着就要大获成功了。)","tags":["新闻/职场"]},{"id":405,"verb":"Tease out","meaning":"梳理出 / 巧妙地套出(信息)<br><span style=\"font-size:0.8em;color:gray\">(像理顺打结的头发一样抽出线索)</span>","scenario":"<span class=\"context-tag tag-work\">访谈/科研</span> \"The interviewer managed to <b>tease out</b> some fascinating details about his childhood.\"<br>(采访者巧妙地套出了/梳理出了关于他童年的一些极其有趣的细节。)","tags":["访谈/科研"]},{"id":406,"verb":"Hone in on","meaning":"死死盯住 / 将注意力集中在<br><span style=\"font-size:0.8em;color:gray\">(像制导导弹一样锁定目标)</span>","scenario":"<span class=\"context-tag tag-work\">深度讨论</span> \"Let's <b>hone in on</b> exactly what caused the delay.\"<br>(让我们把焦点死死锁定在到底是什么导致了延误上。)","tags":["深度讨论"]},{"id":407,"verb":"Zoom out","meaning":"宏观来看 / 拉远视角<br><span style=\"font-size:0.8em;color:gray\">(播客和商业分析高频词)</span>","scenario":"<span class=\"context-tag tag-work\">商业格局</span> \"If we <b>zoom out</b> for a second, the big picture looks very different.\"<br>(如果我们稍微拉远视角/从宏观来看，大局会显得截然不同。)","tags":["商业格局"]},{"id":408,"verb":"Factor into","meaning":"成为...的因素 / 被计算在内<br><span style=\"font-size:0.8em;color:gray\">(把...作为变量放进去)</span>","scenario":"<span class=\"context-tag tag-work\">逻辑推理</span> \"Did the weather <b>factor into</b> your decision to cancel the trip?\"<br>(你决定取消旅行，有没有把天气因素考虑在内？)","tags":["逻辑推理"]},{"id":409,"verb":"Play into","meaning":"正中下怀 / 成为...的推手<br><span style=\"font-size:0.8em;color:gray\">(Play into someone's hands 掉进某人的陷阱)</span>","scenario":"<span class=\"context-tag tag-work\">政治分析</span> \"His angry reaction completely <b>played into</b> their narrative.\"<br>(他愤怒的反应完全正中他们的下怀/配合了他们的话语体系。)","tags":["政治分析"]},{"id":410,"verb":"Buy into","meaning":"轻信 / 接受(某观念或计划)<br><span style=\"font-size:0.8em;color:gray\">(买账，觉得有道理)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽八卦</span> \"I just don't <b>buy into</b> all these conspiracy theories.\"<br>(我就是不买账/不相信所有这些阴谋论。)","tags":["吐槽八卦"]},{"id":411,"verb":"Beef up","meaning":"加强 / 充实(力量/军力/安保)<br><span style=\"font-size:0.8em;color:gray\">(多吃牛肉长肌肉)</span>","scenario":"<span class=\"context-tag tag-work\">新闻报道</span> \"The city is <b>beefing up</b> security ahead of the protest.\"<br>(在抗议活动前，这座城市正在加强安保力量。)","tags":["新闻报道"]},{"id":412,"verb":"Prop up","meaning":"支撑 / 为(快垮台的事物)撑腰<br><span style=\"font-size:0.8em;color:gray\">(用支柱撑住)</span>","scenario":"<span class=\"context-tag tag-work\">经济新闻</span> \"The government printed money to <b>prop up</b> the failing economy.\"<br>(政府印钱来支撑摇摇欲坠的经济。)","tags":["经济新闻"]},{"id":413,"verb":"Weigh on","meaning":"重压在心头 / 使...烦恼担忧<br><span style=\"font-size:0.8em;color:gray\">(像重量一样压着)</span>","scenario":"<span class=\"context-tag tag-drama\">心理访谈</span> \"The guilt of lying really started to <b>weigh on</b> him.\"<br>(撒谎的内疚感开始沉重地压在他的心头。)","tags":["心理访谈"]},{"id":414,"verb":"Touch off","meaning":"引发 / 触发(一连串事件或骚乱)<br><span style=\"font-size:0.8em;color:gray\">(类似于 spark off)</span>","scenario":"<span class=\"context-tag tag-work\">时事新闻</span> \"The police violence <b>touched off</b> a wave of riots across the country.\"<br>(警察的暴力行为引发了全国范围内的一波骚乱。)","tags":["时事新闻"]},{"id":415,"verb":"Run up against","meaning":"遭遇(困难/阻力/截止日期)<br><span style=\"font-size:0.8em;color:gray\">(迎头撞上)</span>","scenario":"<span class=\"context-tag tag-work\">诉苦抱怨</span> \"We <b>ran up against</b> some unexpected legal issues.\"<br>(我们遭遇了一些意想不到的法律问题/阻力。)","tags":["诉苦抱怨"]},{"id":416,"verb":"Bow out","meaning":"退出(比赛/竞争/职位)<br><span style=\"font-size:0.8em;color:gray\">(鞠躬退场，通常体面地离开)</span>","scenario":"<span class=\"context-tag tag-work\">政治与竞选</span> \"The candidate decided to <b>bow out</b> of the presidential race.\"<br>(那位候选人决定退出总统竞选。)","tags":["政治与竞选"]},{"id":417,"verb":"Step aside","meaning":"让位 / 退居二线<br><span style=\"font-size:0.8em;color:gray\">(往旁边走一步，把位置让给别人)</span>","scenario":"<span class=\"context-tag tag-work\">企业高管</span> \"The founder will <b>step aside</b> to let the new CEO take over.\"<br>(创始人将退居二线/让位，让新任CEO接管。)","tags":["企业高管"]},{"id":418,"verb":"Sift through","meaning":"仔细翻找 / 筛选(海量信息)<br><span style=\"font-size:0.8em;color:gray\">(像用筛子筛沙金一样)</span>","scenario":"<span class=\"context-tag tag-work\">调查取证</span> \"Detectives had to <b>sift through</b> hundreds of emails to find the clue.\"<br>(侦探们不得不在数百封邮件中仔细翻找/筛选线索。)","tags":["调查取证"]},{"id":419,"verb":"Capitalize on","meaning":"利用(机会/优势)获利<br><span style=\"font-size:0.8em;color:gray\">(商业新闻最核心短语之一)</span>","scenario":"<span class=\"context-tag tag-work\">商业战略</span> \"They quickly <b>capitalized on</b> the competitor's mistake.\"<br>(他们迅速利用竞争对手的失误大赚了一笔/占据了上风。)","tags":["商业战略"]},{"id":420,"verb":"Piggyback on","meaning":"借机利用 / 沾光<br><span style=\"font-size:0.8em;color:gray\">(骑在别人背上，顺风车)</span>","scenario":"<span class=\"context-tag tag-work\">营销与蹭热点</span> \"The new product is trying to <b>piggyback on</b> the success of the movie.\"<br>(这款新产品正试图沾这部电影成功的光/蹭热度。)","tags":["营销与蹭热点"]},{"id":421,"verb":"Rat out","meaning":"告密 / 出卖(同伙)<br><span style=\"font-size:0.8em;color:gray\">(像老鼠一样背叛。警匪片必备)</span>","scenario":"<span class=\"context-tag tag-drama\">美剧黑帮</span> \"I can't believe you <b>ratted</b> me <b>out</b> to the cops!\"<br>(真不敢相信你竟然向警察出卖了我/告了我的密！)","tags":["美剧黑帮"]},{"id":422,"verb":"Tell on","meaning":"告发 / 打小报告<br><span style=\"font-size:0.8em;color:gray\">(比 rat out 温和，通常指小孩告诉家长)</span>","scenario":"<span class=\"context-tag tag-social\">家庭生活</span> \"If you don't give me the toy, I'm going to <b>tell on</b> you!\"<br>(如果你不把玩具给我，我就去向妈妈告你的状！)","tags":["家庭生活"]},{"id":423,"verb":"Go off on","meaning":"突然对(某人)大发雷霆 / 猛烈发飙<br><span style=\"font-size:0.8em;color:gray\">(像炸弹一样被引爆)</span>","scenario":"<span class=\"context-tag tag-drama\">吵架撕逼</span> \"She just <b>went off on</b> me for absolutely no reason.\"<br>(她毫无缘由地突然冲我劈头盖脸一顿发飙/狂喷。)","tags":["吵架撕逼"]},{"id":424,"verb":"Act up","meaning":"(机器)出毛病 / (身体)旧伤复发 / (小孩)捣蛋<br><span style=\"font-size:0.8em;color:gray\">(表现异常)</span>","scenario":"<span class=\"context-tag tag-life\">日常吐槽</span> \"My old knee injury is <b>acting up</b> again because of the rain.\"<br>(因为下雨，我膝盖的旧伤又开始作祟/发作了。)","tags":["日常吐槽"]},{"id":425,"verb":"Weird out","meaning":"让人觉得极其怪异 / 感到不舒服<br><span style=\"font-size:0.8em;color:gray\">(极其口语化的社交吐槽)</span>","scenario":"<span class=\"context-tag tag-social\">社交反感</span> \"The way he keeps staring at me is really <b>weirding</b> me <b>out</b>.\"<br>(他那样一直盯着我看，真让我觉得毛骨悚然/心里发毛。)","tags":["社交反感"]},{"id":426,"verb":"Gross out","meaning":"使人觉得恶心 / 反胃<br><span style=\"font-size:0.8em;color:gray\">(Gross = 恶心的)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽电影/食物</span> \"That horror movie totally <b>grossed</b> me <b>out</b>.\"<br>(那部恐怖片真把我给恶心坏了。)","tags":["吐槽电影/食物"]},{"id":427,"verb":"Creep out","meaning":"使人毛骨悚然 / 浑身起鸡皮疙瘩<br><span style=\"font-size:0.8em;color:gray\">(Creepy = 令人毛骨悚然的)</span>","scenario":"<span class=\"context-tag tag-drama\">悬疑惊悚</span> \"This abandoned house is completely <b>creeping</b> me <b>out</b>.\"<br>(这栋废弃的房子真让我觉得浑身发毛/瘆得慌。)","tags":["悬疑惊悚"]},{"id":428,"verb":"Knock it off","meaning":"停止做(烦人的事) / 别闹了！<br><span style=\"font-size:0.8em;color:gray\">(带有严厉警告的口吻)</span>","scenario":"<span class=\"context-tag tag-drama\">美剧吵架台词</span> \"You guys are making too much noise. <b>Knock it off!</b>\"<br>(你们俩太吵了。给我停下/别闹了！)","tags":["美剧吵架台词"]},{"id":429,"verb":"Cut it out","meaning":"停下来 / 别恶作剧了<br><span style=\"font-size:0.8em;color:gray\">(和 Knock it off 类似，非常高频)</span>","scenario":"<span class=\"context-tag tag-social\">警告朋友</span> \"<b>Cut it out!</b> I'm trying to study here.\"<br>(别搞笑了/停手吧！我正试着学习呢。)","tags":["警告朋友"]},{"id":430,"verb":"Lay off","meaning":"别再烦/逼迫某人 (Lay off me!)<br><span style=\"font-size:0.8em;color:gray\">(和裁员的 lay off 是同一个词，但此料理是口语抱怨)</span>","scenario":"<span class=\"context-tag tag-drama\">极度烦躁时</span> \"Just <b>lay off</b> me! I'll do it when I have time.\"<br>(别再烦我/催我了！我有时间自然会做的。)","tags":["极度烦躁时"]},{"id":431,"verb":"Boss around","meaning":"对(某人)颐指气使 / 像老板一样发号施令<br><span style=\"font-size:0.8em;color:gray\">(极其形象的抱怨)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽同事/伴侣</span> \"I hate it when she tries to <b>boss</b> me <b>around</b>.\"<br>(我讨厌她总是对我颐指气使/呼来喝去的样子。)","tags":["吐槽同事/伴侣"]},{"id":432,"verb":"Push around","meaning":"摆布 / 欺负(某人)<br><span style=\"font-size:0.8em;color:gray\">(推来推去)</span>","scenario":"<span class=\"context-tag tag-drama\">反抗宣言</span> \"I'm not going to let them <b>push</b> me <b>around</b> anymore.\"<br>(我绝不会再让他们随便摆布/欺负我了。)","tags":["反抗宣言"]},{"id":433,"verb":"Talk up","meaning":"大肆吹捧 / 极力说好话<br><span style=\"font-size:0.8em;color:gray\">(把别人抬高)</span>","scenario":"<span class=\"context-tag tag-social\">内推/社交</span> \"Thanks for <b>talking</b> me <b>up</b> to the boss.\"<br>(谢谢你在老板面前替我疯狂美言/吹捧我。)","tags":["内推/社交"]},{"id":434,"verb":"Whip up","meaning":"迅速做出一顿饭 / 煽动(情绪)<br><span style=\"font-size:0.8em;color:gray\">(像挥动鞭子一样快)</span>","scenario":"<span class=\"context-tag tag-life\">日常做饭</span> \"Give me 10 minutes, I can <b>whip up</b> some pancakes.\"<br>(给我10分钟，我马上能飞速弄点煎饼出来。)","tags":["日常做饭"]},{"id":435,"verb":"Rustle up","meaning":"凑合弄点吃的 / 费力搞到(人或物)<br><span style=\"font-size:0.8em;color:gray\">(发出沙沙声在厨房里找吃的)</span>","scenario":"<span class=\"context-tag tag-life\">招待客人</span> \"Let me see if I can <b>rustle up</b> something for us to eat.\"<br>(让我看看能不能去厨房随便凑合捣鼓点吃的出来。)","tags":["招待客人"]},{"id":436,"verb":"Scarf down","meaning":"狼吞虎咽地吃<br><span style=\"font-size:0.8em;color:gray\">(像用围巾一样扫过)</span>","scenario":"<span class=\"context-tag tag-life\">赶时间干饭</span> \"He <b>scarfed down</b> a pizza and ran back to the office.\"<br>(他狼吞虎咽地塞下了一个披萨，就跑回办公室了。)","tags":["赶时间干饭"]},{"id":437,"verb":"Pig out","meaning":"大吃特吃 / 暴饮暴食<br><span style=\"font-size:0.8em;color:gray\">(像猪一样猛吃，放纵日必备)</span>","scenario":"<span class=\"context-tag tag-social\">周末放纵</span> \"We just watched Netflix and <b>pigged out</b> on junk food all weekend.\"<br>(我们整个周末就在看剧，然后疯狂暴风吸入垃圾食品。)","tags":["周末放纵"]},{"id":438,"verb":"Chow down","meaning":"大快朵颐 / 开吃<br><span style=\"font-size:0.8em;color:gray\">(口语极常用的吃喝词汇)</span>","scenario":"<span class=\"context-tag tag-life\">聚餐招呼</span> \"The barbecue is ready, let's <b>chow down</b>!\"<br>(烧烤烤好了，咱们开造/大快朵颐吧！)","tags":["聚餐招呼"]},{"id":439,"verb":"Load up on","meaning":"大量买进 / (吃自助餐)狂拿<br><span style=\"font-size:0.8em;color:gray\">(把车或盘子装满)</span>","scenario":"<span class=\"context-tag tag-life\">超市大采购</span> \"We need to <b>load up on</b> snacks before the road trip.\"<br>(公路旅行前我们需要疯狂囤积/装满一车零食。)","tags":["超市大采购"]},{"id":440,"verb":"Ease off on","meaning":"减轻 / 对...不再那么严格<br><span style=\"font-size:0.8em;color:gray\">(渐渐放松力度)</span>","scenario":"<span class=\"context-tag tag-life\">减肥/管教</span> \"You really need to <b>ease off on</b> the sugar.\"<br>(你真的得稍微控制下/少吃点糖了。)","tags":["减肥/管教"]},{"id":441,"verb":"Catch up on","meaning":"赶上 / 恶补 (睡眠/剧集/信息)<br><span style=\"font-size:0.8em;color:gray\">(弥补落下的进度)</span>","scenario":"<span class=\"context-tag tag-life\">周末日常</span> \"I'm planning to <b>catch up on</b> some sleep this weekend.\"<br>(我打算这个周末好好恶补一下睡眠。)","tags":["周末日常"]},{"id":442,"verb":"Read into","meaning":"过度解读 / 牵强附会<br><span style=\"font-size:0.8em;color:gray\">(把自己的意思读进别人的话里)</span>","scenario":"<span class=\"context-tag tag-social\">情感纠葛</span> \"He was just being polite, don't <b>read</b> too much <b>into</b> it.\"<br>(他只是出于礼貌，你别脑补太多/过度解读了。)","tags":["情感纠葛"]},{"id":443,"verb":"Chew on","meaning":"仔细考虑 / 好好想想(某主意)<br><span style=\"font-size:0.8em;color:gray\">(像咀嚼食物一样在脑子里咀嚼)</span>","scenario":"<span class=\"context-tag tag-work\">开会留悬念</span> \"That's an interesting proposal. Let me <b>chew on</b> it for a bit.\"<br>(这个提案很有意思。让我细细琢磨/咀嚼一下。)","tags":["开会留悬念"]},{"id":444,"verb":"Fixate on","meaning":"过度聚焦于 / 执念于<br><span style=\"font-size:0.8em;color:gray\">(心理学常用，老是盯着一点不放)</span>","scenario":"<span class=\"context-tag tag-drama\">心理剖析</span> \"Why do you always <b>fixate on</b> the negative things?\"<br>(你为什么总是死盯着/死磕那些负面的事情不放？)","tags":["心理剖析"]},{"id":445,"verb":"Skim over","meaning":"略读 / 粗略地扫过 / 掩盖<br><span style=\"font-size:0.8em;color:gray\">(像水面滑过)</span>","scenario":"<span class=\"context-tag tag-work\">阅读材料</span> \"I only had time to <b>skim over</b> the report before the meeting.\"<br>(开会前我只来得及粗略地扫了一眼这份报告。)","tags":["阅读材料"]},{"id":446,"verb":"Pore over","meaning":"仔细阅读 / 钻研<br><span style=\"font-size:0.8em;color:gray\">(和 skim over 相反，极其专注地看)</span>","scenario":"<span class=\"context-tag tag-work\">查阅文件</span> \"The lawyers spent days <b>poring over</b> the contract.\"<br>(律师们花了几天时间逐字逐句地钻研这份合同。)","tags":["查阅文件"]},{"id":447,"verb":"Run by","meaning":"跑去给某人看 / 征求某人意见<br><span style=\"font-size:0.8em;color:gray\">(职场极高频沟通语)</span>","scenario":"<span class=\"context-tag tag-work\">请示上级</span> \"I need to <b>run</b> this idea <b>by</b> my boss first.\"<br>(我得先把这个想法拿去给老板过一下/听听他的意见。)","tags":["请示上级"]},{"id":448,"verb":"Bounce off","meaning":"跟人交流想法 / 试探意见<br><span style=\"font-size:0.8em;color:gray\">(把球弹出去看对方怎么接)</span>","scenario":"<span class=\"context-tag tag-work\">头脑风暴</span> \"Can I <b>bounce</b> some ideas <b>off</b> you?\"<br>(我能跟你碰撞一下/交流几个点子吗？)","tags":["头脑风暴"]},{"id":449,"verb":"Feel out","meaning":"试探(某人的态度或局势) / 摸底<br><span style=\"font-size:0.8em;color:gray\">(像在黑暗中伸手摸索)</span>","scenario":"<span class=\"context-tag tag-social\">打探口风</span> \"I'm going to <b>feel</b> him <b>out</b> about the new job offer.\"<br>(我准备去试探/摸摸他的底，看他对这个新Offer什么态度。)","tags":["打探口风"]},{"id":450,"verb":"Snoop around","meaning":"偷偷摸摸地调查 / 四处窥探<br><span style=\"font-size:0.8em;color:gray\">(像侦探狗一样到处闻)</span>","scenario":"<span class=\"context-tag tag-drama\">电影台词</span> \"Stop <b>snooping around</b> in my room!\"<br>(别在我的房间里鬼鬼祟祟地乱翻/瞎打听！)","tags":["电影台词"]},{"id":451,"verb":"Poke around","meaning":"四处打听 / 东翻西找<br><span style=\"font-size:0.8em;color:gray\">(拿棍子到处戳一戳)</span>","scenario":"<span class=\"context-tag tag-life\">逛街/调查</span> \"I spent the afternoon just <b>poking around</b> the antique shop.\"<br>(我花了一个下午在古董店里东翻西找/瞎逛。)","tags":["逛街/调查"]},{"id":452,"verb":"Dig into","meaning":"深入挖掘(真相) / 深入研究<br><span style=\"font-size:0.8em;color:gray\">(和 delve into 类似)</span>","scenario":"<span class=\"context-tag tag-work\">调查新闻</span> \"Journalists are starting to <b>dig into</b> the politician's past.\"<br>(记者们开始深挖这位政客的过去。)","tags":["调查新闻"]},{"id":453,"verb":"Run across","meaning":"偶然遇到(人或物)<br><span style=\"font-size:0.8em;color:gray\">(类似于 come across)</span>","scenario":"<span class=\"context-tag tag-social\">生活小确幸</span> \"I <b>ran across</b> an amazing article online today.\"<br>(我今天在网上偶然刷到了一篇极好的文章。)","tags":["生活小确幸"]},{"id":454,"verb":"Meet up with","meaning":"碰头 / 聚会<br><span style=\"font-size:0.8em;color:gray\">(美国人最爱用的约饭词汇)</span>","scenario":"<span class=\"context-tag tag-social\">周末约人</span> \"I'm going to <b>meet up with</b> some friends for drinks later.\"<br>(我等会儿要去跟几个朋友碰头喝一杯。)","tags":["周末约人"]},{"id":455,"verb":"Team up with","meaning":"与...组队 / 联手<br><span style=\"font-size:0.8em;color:gray\">(强强联合)</span>","scenario":"<span class=\"context-tag tag-work\">商业合作</span> \"Apple is <b>teaming up with</b> OpenAI for their new feature.\"<br>(苹果正与OpenAI联手/组队开发他们的新功能。)","tags":["商业合作"]},{"id":456,"verb":"Pair up","meaning":"配对 / 结成对子<br><span style=\"font-size:0.8em;color:gray\">(通常是两人一组)</span>","scenario":"<span class=\"context-tag tag-work\">上课/团建</span> \"Everyone please <b>pair up</b> for the next activity.\"<br>(请大家两两配对/结对进行下一个活动。)","tags":["上课/团建"]},{"id":457,"verb":"Break away","meaning":"挣脱 / 摆脱(束缚) / 脱离群体<br><span style=\"font-size:0.8em;color:gray\">(打破绳索逃离)</span>","scenario":"<span class=\"context-tag tag-drama\">影视剧情</span> \"He finally managed to <b>break away</b> from the cult.\"<br>(他终于设法摆脱/逃离了那个邪教。)","tags":["影视剧情"]},{"id":458,"verb":"Pull away","meaning":"拉开距离 / (体育)脱颖而出<br><span style=\"font-size:0.8em;color:gray\">(开车驶离或比赛拉开差距)</span>","scenario":"<span class=\"context-tag tag-work\">商业竞争</span> \"Tesla is starting to <b>pull away</b> from its competitors.\"<br>(特斯拉开始将竞争对手远远甩在身后/拉开差距。)","tags":["商业竞争"]},{"id":459,"verb":"Shy away from","meaning":"回避 / 退缩 / 忌讳<br><span style=\"font-size:0.8em;color:gray\">(因害羞或害怕而躲避)</span>","scenario":"<span class=\"context-tag tag-work\">访谈评价</span> \"He never <b>shies away from</b> controversial topics.\"<br>(他从不回避/退缩那些充满争议的话题。)","tags":["访谈评价"]},{"id":460,"verb":"Pass on","meaning":"放弃(机会) / 决定不参加<br><span style=\"font-size:0.8em;color:gray\">(极其口语化的拒绝方式)</span>","scenario":"<span class=\"context-tag tag-social\">婉拒邀请</span> \"I think I'll <b>pass on</b> the dessert, I'm too full.\"<br>(甜点我就不吃了/放弃了，我太撑了。)","tags":["婉拒邀请"]},{"id":461,"verb":"Hold out for","meaning":"坚持要求得到 / 等待更好的<br><span style=\"font-size:0.8em;color:gray\">(不将就，死扛到底)</span>","scenario":"<span class=\"context-tag tag-work\">谈薪水/合同</span> \"I rejected the first offer because I'm <b>holding out for</b> a higher salary.\"<br>(我拒绝了第一个Offer，因为我在坚持等待/死扛一个更高的薪水。)","tags":["谈薪水/合同"]},{"id":462,"verb":"Settle in","meaning":"安顿下来 / 习惯新环境<br><span style=\"font-size:0.8em;color:gray\">(搬家或入职必备问候)</span>","scenario":"<span class=\"context-tag tag-life\">入职关怀</span> \"How are you <b>settling in</b> at the new apartment?\"<br>(你在新公寓安顿得/适应得怎么样了？)","tags":["入职关怀"]},{"id":463,"verb":"Fit in","meaning":"融入(圈子) / 合群<br><span style=\"font-size:0.8em;color:gray\">(尺寸刚好卡进去)</span>","scenario":"<span class=\"context-tag tag-social\">社交焦虑</span> \"When I moved to the US, it was hard to <b>fit in</b> at first.\"<br>(我刚搬到美国时，起初很难融入当地的圈子。)","tags":["社交焦虑"]},{"id":464,"verb":"Come along","meaning":"进展 / 跟着一起来<br><span style=\"font-size:0.8em;color:gray\">(多义词，极其高频)</span>","scenario":"<span class=\"context-tag tag-life\">日常随口</span> \"How is your English project <b>coming along</b>?\" (你的英语项目进展如何？)<br>\"We are going to the mall, want to <b>come along</b>?\" (去不去商场，要不要一起？)","tags":["日常随口"]},{"id":465,"verb":"Bring along","meaning":"带上(某人或某物)<br><span style=\"font-size:0.8em;color:gray\">(随身携带)</span>","scenario":"<span class=\"context-tag tag-social\">赴宴派对</span> \"Can I <b>bring</b> a friend <b>along</b> to the party?\"<br>(我能带个朋友一起来派对吗？)","tags":["赴宴派对"]},{"id":466,"verb":"Sneak up on","meaning":"偷偷靠近 / (时间等)悄然而至<br><span style=\"font-size:0.8em;color:gray\">(像贼一样摸过来)</span>","scenario":"<span class=\"context-tag tag-drama\">生活吐槽</span> \"Don't <b>sneak up on</b> me like that, you scared me!\"<br>(别那样悄无声息地摸到我背后，吓死我了！)","tags":["生活吐槽"]},{"id":467,"verb":"Creep up on","meaning":"不知不觉影响 / (老去/疲惫)悄悄降临<br><span style=\"font-size:0.8em;color:gray\">(像藤蔓一样慢慢爬上来)</span>","scenario":"<span class=\"context-tag tag-life\">感叹岁月</span> \"Old age really <b>creeps up on</b> you.\"<br>(衰老真的是不知不觉就悄然降临了。)","tags":["感叹岁月"]},{"id":468,"verb":"Start over","meaning":"重新开始 / 从头再来<br><span style=\"font-size:0.8em;color:gray\">(放弃过去的全部)</span>","scenario":"<span class=\"context-tag tag-drama\">人生转折</span> \"After the divorce, she moved to California to <b>start over</b>.\"<br>(离婚后，她搬到了加州一切从头开始。)","tags":["人生转折"]},{"id":469,"verb":"Do over","meaning":"重做 / 重新来过<br><span style=\"font-size:0.8em;color:gray\">(日常小事的重做。名词 a do-over)</span>","scenario":"<span class=\"context-tag tag-life\">游戏/工作</span> \"That was a mistake, can I get a <b>do-over</b>?\"<br>(那是个失误，我能重来一次吗？)","tags":["游戏/工作"]},{"id":470,"verb":"Make over","meaning":"改造 / 大变身<br><span style=\"font-size:0.8em;color:gray\">(名词 makeover 电视改造节目极爱用)</span>","scenario":"<span class=\"context-tag tag-life\">美妆/房屋</span> \"They completely <b>made over</b> the old kitchen.\"<br>(他们把那间旧厨房彻头彻尾地大改造了一番。)","tags":["美妆/房屋"]},{"id":471,"verb":"Put together","meaning":"组装 / 组织(活动) / (人)显得干练得体<br><span style=\"font-size:0.8em;color:gray\">(把散件拼在一起)</span>","scenario":"<span class=\"context-tag tag-life\">买宜家/夸人</span> \"It took me 3 hours to <b>put</b> this IKEA bed <b>together</b>.\" (我花了3小时组装这床。)<br>\"She always looks so <b>put together</b>.\" (她总是显得那么得体干练。)","tags":["买宜家/夸人"]},{"id":472,"verb":"Spruce up","meaning":"打扮 / 把...收拾整洁漂亮<br><span style=\"font-size:0.8em;color:gray\">(Spruce是云杉，引申为修剪整齐)</span>","scenario":"<span class=\"context-tag tag-life\">大扫除/出门</span> \"I need to <b>spruce up</b> the living room before guests arrive.\"<br>(客人来之前，我得把客厅好好收拾打扮一下。)","tags":["大扫除/出门"]},{"id":473,"verb":"Liven up","meaning":"使...变得生动 / 活跃(气氛)<br><span style=\"font-size:0.8em;color:gray\">(注入生命力)</span>","scenario":"<span class=\"context-tag tag-social\">派对救场</span> \"Let's put on some music to <b>liven up</b> the party.\"<br>(咱们放点音乐来活跃一下派对的气氛吧。)","tags":["派对救场"]},{"id":474,"verb":"Spice up","meaning":"给...增加趣味 / 加点调料<br><span style=\"font-size:0.8em;color:gray\">(像加了香料一样带劲)</span>","scenario":"<span class=\"context-tag tag-life\">感情与生活</span> \"They tried to <b>spice up</b> their marriage by traveling more.\"<br>(他们试图通过多旅行来给他们的婚姻生活增添些情趣。)","tags":["感情与生活"]},{"id":475,"verb":"Dummy up","meaning":"装傻 / 闭嘴不言<br><span style=\"font-size:0.8em;color:gray\">(像假人/哑巴一样)</span>","scenario":"<span class=\"context-tag tag-drama\">警匪盘问</span> \"When the police arrived, everyone <b>dummied up</b>.\"<br>(警察一到，所有人立刻装聋作哑闭口不言。)","tags":["警匪盘问"]},{"id":476,"verb":"Smarten up","meaning":"变聪明点 / 打扮精神 / 学乖<br><span style=\"font-size:0.8em;color:gray\">(从吃亏中长教训)</span>","scenario":"<span class=\"context-tag tag-social\">教训朋友</span> \"You need to <b>smarten up</b> and stop trusting him.\"
