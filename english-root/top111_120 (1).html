<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Word Families: Top 111-120</title>
    <style>
        :root {
            /* Notion 暗黑模式核心色彩 */
            --bg-color: #191919;
            --table-border: #373737;
            --text-main: #D4D4D4;
            --text-sub: #9B9B9B;
            
            /* 词根词缀高亮色 */
            --c-prefix: #FF7B72; /* 粉红 - 前缀 */
            --c-root: #E5C07B;   /* 明黄 - 词根 */
            --c-suffix: #79C0FF; /* 天蓝 - 后缀 */
            
            /* 标签颜色 */
            --badge-trans: #316DCA;
            --badge-mnem: #347D39;
            --badge-exam: #B05C11;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 40px;
        }

        .root-section {
            margin-bottom: 60px;
        }

        .header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--c-root);
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .root-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            color: var(--c-root);
        }

        .root-meaning {
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: bold;
        }

        .word-table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
        }

        .word-row {
            border-bottom: 1px dashed var(--table-border);
        }
        
        .word-row:last-child {
            border-bottom: none;
        }

        .col-word {
            width: 30%;
            padding: 25px 25px;
            vertical-align: top;
            border-right: 1px dashed var(--table-border);
        }

        .col-details {
            width: 70%;
            padding: 25px;
            vertical-align: top;
        }

        .word-display {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }
        
        .p { color: var(--c-prefix); }
        .r { color: var(--c-root); }
        .s { color: var(--c-suffix); }

        .pronunciation {
            font-family: "Consolas", monospace;
            color: var(--text-sub);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .detail-item:last-child {
            margin-bottom: 0;
        }

        .badge {
            flex-shrink: 0;
            color: #fff;
            font-size: 0.8rem;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            margin-top: 2px;
            font-weight: bold;
        }
        
        .b-trans { background-color: var(--badge-trans); }
        .b-mnem { background-color: var(--badge-mnem); }
        .b-exam { background-color: var(--badge-exam); }

        .detail-content {
            flex-grow: 1;
            font-size: 1.05rem;
        }
        
        .highlight-word {
            color: var(--c-root);
            font-weight: bold;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
    </style>
</head>
<body>

    <div id="app">
    </div>

    <script>
        const database = [
            {
                root: "-culp-",
                meaning: "罪过，责备 (blame/fault)",

                    { word: "culprit", display: "<span class='r'>culp</span><span class='s'>rit</span>", pronunciation: "/ˈkʌl·prɪt/", translation: "n. 犯人，罪犯，肇事者", mnemonic: "culp(罪过) + rit(人) = 有罪的人 = 罪犯", example: "The police finally caught the <span class='highlight-word'>culprit</span>. (警方终于抓住了罪犯。)" },
                    { word: "culpable", display: "<span class='r'>culp</span><span class='s'>able</span>", pronunciation: "/ˈkʌl·pə·bl/", translation: "adj. 难辞其咎的，该受谴责的", mnemonic: "culp(罪过) + able(能...的) = 能被定罪的/该背锅的 = 难辞其咎的", example: "He was held <span class='highlight-word'>culpable</span> for the tragic accident. (他被认为对这起悲惨的事故负有不可推卸的责任。)" },
                    { word: "exculpate", display: "<span class='p'>ex</span><span class='r'>culp</span><span class='s'>ate</span>", pronunciation: "/ˈek·skʌl·peɪt/", translation: "v. 开脱罪责，申明无罪", mnemonic: "ex(出/免除) + culp(罪过) + ate(动词) = 使其从罪过中解脱出来 = 开脱罪责", example: "The new video evidence <span class='highlight-word'>exculpated</span> him from the crime. (新的视频证据洗清了他的罪名。)" },
                    { word: "inculpate", display: "<span class='p'>in</span><span class='r'>culp</span><span class='s'>ate</span>", pronunciation: "/ˈɪn·kʌl·peɪt/", translation: "v. 归罪于，控告", mnemonic: "in(进入/加上) + culp(罪过) + ate = 把罪名加在别人身上 = 归罪于", example: "He tried to <span class='highlight-word'>inculpate</span> his colleague to save himself. (他试图把锅甩给同事以自保。)" }
                ]
            },
            {
                root: "-equ-",
                meaning: "相等 (equal)",
                words: [
                    { word: "equal", display: "<span class='r'>equ</span><span class='s'>al</span>", pronunciation: "/ˈiː·kwəl/", translation: "adj. 相等的，平等的", mnemonic: "equ(相等) + al(形容词) = 相等的", example: "All men are created <span class='highlight-word'>equal</span>. (人人生而平等。)" },
                    { word: "equation", display: "<span class='r'>equ</span><span class='s'>ation</span>", pronunciation: "/ɪˈkweɪ·ʒn/", translation: "n. 方程式，等式", mnemonic: "equ(相等) + ation(名词) = 左右两边相等的算式 = 方程式", example: "He solved the complex mathematical <span class='highlight-word'>equation</span>. (他解开了那个复杂的数学方程式。)" },
                    { word: "equity", display: "<span class='r'>equ</span><span class='s'>ity</span>", pronunciation: "/ˈek·wə·ti/", translation: "n. 公平，公正；资产净值(股票)", mnemonic: "equ(相等) + ity(性质) = 强调平等的价值 = 资产分配的公平性/股权", example: "We are fighting for gender <span class='highlight-word'>equity</span> in the workplace. (我们正在为职场性别平等而奋斗。)" },
                    { word: "adequate", display: "<span class='p'>ad</span><span class='r'>equ</span><span class='s'>ate</span>", pronunciation: "/ˈæd·ɪ·kwət/", translation: "adj. 充足的，胜任的", mnemonic: "ad(朝向) + equ(相等) + ate = 达到与需求相等的程度 = 充足的", example: "Make sure you drink <span class='highlight-word'>adequate</span> water every day. (确保你每天喝足够的水。)" }

                    { word: "reflect", display: "<span class='p'>re</span><span class='r'>flect</span>", pronunciation: "/rɪˈflekt/", translation: "v. 反射，反映；反思", mnemonic: "re(往回) + flect(弯曲) = 光线或思绪折返回来 = 反射/反思", example: "The statistics accurately <span class='highlight-word'>reflect</span> the current economic situation. (这些数据准确反映了当前的经济形势。)" },

                    { word: "effort", display: "<span class='p'>ef</span><span class='r'>fort</span>", pronunciation: "/ˈef·ət/", translation: "n. 努力，精力", mnemonic: "ef(向外) + fort(强大/力量) = 把全身的力量都使出来 = 努力", example: "Learning a new language requires a lot of <span class='highlight-word'>effort</span>. (学习一门新语言需要付出巨大的努力。)" },
                    { word: "comfort", display: "<span class='p'>com</span><span class='r'>fort</span>", pronunciation: "/ˈkʌm·fət/", translation: "n. 安慰，舒适 v. 抚慰", mnemonic: "com(共同/给予) + fort(力量) = 给予别人精神力量 = 安慰", example: "He tried to <span class='highlight-word'>comfort</span> her after the bad news. (听到坏消息后，他试图去安慰她。)" },

                    { word: "fundamental", display: "<span class='r'>fund</span><span class='s'>a</span><span class='s'>ment</span><span class='s'>al</span>", pronunciation: "/ˌfʌn·dəˈmen·tl/", translation: "adj. 根本的，基本的", mnemonic: "fund(底部) + amental(形容词) = 处于最底层的、不可动摇的 = 根本的", example: "Freedom of speech is a <span class='highlight-word'>fundamental</span> human right. (言论自由是一项根本的人权。)" },

                ]
            },
            {
                root: "-grav- / -griev-",
                meaning: "重，沉重 (heavy)",
                words: [
                    { word: "gravity", display: "<span class='r'>grav</span><span class='s'>ity</span>", pronunciation: "/ˈɡræv·ə·ti/", translation: "n. 重力，引力；严重性", mnemonic: "grav(重) + ity(名词) = 把物体往下拉的重量 = 重力", example: "Isaac Newton discovered the law of <span class='highlight-word'>gravity</span>. (艾萨克·牛顿发现了万有引力定律。)" },
                    { word: "grave", display: "<span class='r'>grav</span><span class='s'>e</span>", pronunciation: "/ɡreɪv/", translation: "adj. 严重的，严肃的 n. 坟墓", mnemonic: "grav(重) + e = 让人心情沉重的 = 严重的/坟墓", example: "He made a <span class='highlight-word'>grave</span> mistake that cost him his job. (他犯了一个极其严重的错误，导致他丢了工作。)" },
                    { word: "grief", display: "<span class='r'>grief</span>", pronunciation: "/ɡriːf/", translation: "n. 悲伤，悲痛", mnemonic: "griev(=grav重) = 心情极度沉重 = 悲伤", example: "She was overwhelmed with <span class='highlight-word'>grief</span> after her dog died. (她的狗死后，她悲痛欲绝。)" },

            },
            {
                root: "-greg-",

                    { word: "liberate", display: "<span class='r'>liber</span><span class='s'>ate</span>", pronunciation: "/ˈlɪb·ə·reɪt/", translation: "v. 解放，释放", mnemonic: "liber(自由) + ate(使动) = 使其获得自由 = 解放", example: "The soldiers fought to <span class='highlight-word'>liberate</span> the city. (士兵们为解放这座城市而战。)" },

                    { word: "magnitude", display: "<span class='r'>magn</span><span class='s'>itude</span>", pronunciation: "/ˈmæɡ·nɪ·tjuːd/", translation: "n. 巨大，规模，(地震)震级", mnemonic: "magn(大) + itude(状态) = 巨大的程度 = 规模", example: "We did not realize the <span class='highlight-word'>magnitude</span> of the problem. (我们起初并没有意识到问题的严重规模。)" },

            }
        ];

        const app = document.getElementById('app');

        database.forEach((group, index) => {
            let wordsHTML = '';
            
            group.words.forEach(item => {
                wordsHTML += `
                    <tr class="word-row">
                        <td class="col-word">
                            <div class="word-display">${item.display}</div>
                            <div class="pronunciation">${item.pronunciation}</div>
