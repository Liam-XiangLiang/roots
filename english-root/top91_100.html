<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Word Families: Top 91-100</title>
    <style>
        :root {
            /* Notion 暗黑模式核心色彩 */
            --bg-color: #191919;
            --table-border: #373737;
            --text-main: #D4D4D4;
            --text-sub: #9B9B9B;
            
            /* 词根词缀高亮色 */
            --c-prefix: #FF7B72; /* 粉红 - 前缀 */
            --c-root: #E5C07B;   /* 明黄 - 词根 */
            --c-suffix: #79C0FF; /* 天蓝 - 后缀 */
            
            /* 标签颜色 */
            --badge-trans: #316DCA;
            --badge-mnem: #347D39;
            --badge-exam: #B05C11;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 40px;
        }

        .root-section {
            margin-bottom: 60px;
        }

        .header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--c-root);
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .root-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            color: var(--c-root);
        }

        .root-meaning {
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: bold;
        }

        .word-table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
        }

        .word-row {
            border-bottom: 1px dashed var(--table-border);
        }
        
        .word-row:last-child {
            border-bottom: none;
        }

        .col-word {
            width: 30%;
            padding: 25px 25px;
            vertical-align: top;
            border-right: 1px dashed var(--table-border);
        }

        .col-details {
            width: 70%;
            padding: 25px;
            vertical-align: top;
        }

        .word-display {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }
        
        .p { color: var(--c-prefix); }
        .r { color: var(--c-root); }
        .s { color: var(--c-suffix); }

        .pronunciation {
            font-family: "Consolas", monospace;
            color: var(--text-sub);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .detail-item:last-child {
            margin-bottom: 0;
        }

        .badge {
            flex-shrink: 0;
            color: #fff;
            font-size: 0.8rem;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            margin-top: 2px;
            font-weight: bold;
        }
        
        .b-trans { background-color: var(--badge-trans); }
        .b-mnem { background-color: var(--badge-mnem); }
        .b-exam { background-color: var(--badge-exam); }

        .detail-content {
            flex-grow: 1;
            font-size: 1.05rem;
        }
        
        .highlight-word {
            color: var(--c-root);
            font-weight: bold;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
    </style>
</head>
<body>

    <div id="app">
    </div>

    <script>
        const database = [
            {
                root: "-val- / -vail-",

                    { word: "valid", display: "<span class='r'>val</span><span class='s'>id</span>", pronunciation: "/ˈvæl·ɪd/", translation: "adj. 有效的，合理的", mnemonic: "val(力量) + id(形容词) = 具有法律效力和力量的 = 有效的", example: "Do you have a <span class='highlight-word'>valid</span> passport? (你有有效的护照吗？)" },
                    { word: "value", display: "<span class='r'>val</span><span class='s'>ue</span>", pronunciation: "/ˈvæl·juː/", translation: "n. 价值，价值观", mnemonic: "val(价值) + ue = 物品或行为本身所具备的价值", example: "Our company places great <span class='highlight-word'>value</span> on teamwork. (我们公司极其看重团队合作的价值。)" },
                    { word: "evaluate", display: "<span class='p'>e</span><span class='r'>val</span><span class='s'>uate</span>", pronunciation: "/ɪˈvæl·ju·eɪt/", translation: "v. 评估，评价", mnemonic: "e(出) + val(价值) + uate = 把隐藏的价值估算出来 = 评估", example: "We need to <span class='highlight-word'>evaluate</span> the risks before making a decision. (在做决定之前，我们需要评估一下风险。)" },
                    { word: "prevail", display: "<span class='p'>pre</span><span class='r'>vail</span>", pronunciation: "/prɪˈveɪl/", translation: "v. 流行，盛行，战胜", mnemonic: "pre(在前面) + vail(力量) = 力量排在最前面，占据压倒性优势 = 占上风/战胜", example: "Justice will eventually <span class='highlight-word'>prevail</span>. (正义终将战胜邪恶。)" }
                ]
            },
            {
                root: "-junct- / -join-",
                meaning: "连接 (join)",
                words: [
                    { word: "join", display: "<span class='r'>join</span>", pronunciation: "/dʒɔɪn/", translation: "v. 参加，连接", mnemonic: "join = 走到一起产生联系 = 加入/连接", example: "Would you like to <span class='highlight-word'>join</span> us for dinner? (你想加入我们一起吃晚饭吗？)" },
                    { word: "junction", display: "<span class='r'>junct</span><span class='s'>ion</span>", pronunciation: "/ˈdʒʌŋk·ʃn/", translation: "n. 交叉路口，汇合处", mnemonic: "junct(连接) + ion(名词) = 几条路连接在一起的地方 = 交叉路口", example: "Turn right at the next <span class='highlight-word'>junction</span>. (在下一个交叉路口右转。)" },

                    { word: "disconnect", display: "<span class='p'>dis</span><span class='r'>connect</span>", pronunciation: "/ˌdɪs·kəˈnekt/", translation: "v. 断开，使分离", mnemonic: "dis(否定) + connect(连接) = 取消原本的连接 = 断开", example: "I had to <span class='highlight-word'>disconnect</span> the call because of a bad signal. (因为信号太差，我不得不挂断了电话。)" },
                    { word: "nexus", display: "<span class='r'>nex</span><span class='s'>us</span>", pronunciation: "/ˈnek·səs/", translation: "n. 核心，联系，纽带", mnemonic: "nex(连接) + us = 万事万物交汇的连接点 = 核心纽带", example: "The city is a <span class='highlight-word'>nexus</span> for international trade. (这座城市是国际贸易的核心枢纽。)" },

                    { word: "oblige", display: "<span class='p'>ob</span><span class='r'>lige</span>", pronunciation: "/əˈblaɪdʒ/", translation: "v. 迫使，施恩于", mnemonic: "ob(加强) + lige(绑定) = 用道德或法律的绳索强行绑定你 = 迫使", example: "I am <span class='highlight-word'>obliged</span> to tell you the truth. (我不得不/有责任告诉你真相。)" },

        const app = document.getElementById('app');

        database.forEach((group, index) => {
            let wordsHTML = '';
            
            group.words.forEach(item => {
                wordsHTML += `
                    <tr class="word-row">
                        <td class="col-word">
                            <div class="word-display">${item.display}</div>
                            <div class="pronunciation">${item.pronunciation}</div>
                        </td>
                        <td class="col-details">
                            <div class="detail-item">
                                <div class="badge b-trans">译</div>
                                <div class="detail-content">${item.translation}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-mnem">记</div>
                                <div class="detail-content">${item.mnemonic}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-exam">例</div>
                                <div class="detail-content">${item.example}</div>
                            </div>
                        </td>
                    </tr>
                `;
            });

            app.innerHTML += `
                <div class="root-section">
                    <div class="header">
                        <h1 class="root-title">${index + 91}. ${group.root}</h1>
                        <div class="root-meaning">【 核心含义：${group.meaning} 】</div>
                    </div>
                    <table class="word-table">
                        ${wordsHTML}
                    </table>
                </div>
            `;
        });
    </script>
</body>
</html>
