<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Word Families: Top 1-10</title>
    <style>
        :root {
            /* Notion 暗黑模式核心色彩 */
            --bg-color: #191919;
            --table-border: #373737;
            --text-main: #D4D4D4;
            --text-sub: #9B9B9B;
            
            /* 词根词缀高亮色 */
            --c-prefix: #FF7B72; /* 粉红 - 前缀 */
            --c-root: #E5C07B;   /* 明黄 - 词根 */
            --c-suffix: #79C0FF; /* 天蓝 - 后缀 */
            
            /* 标签颜色 */
            --badge-trans: #316DCA;
            --badge-mnem: #347D39;
            --badge-exam: #B05C11;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 40px;
        }

        .root-section {
            margin-bottom: 60px;
        }

        .header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--c-root);
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .root-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            color: var(--c-root);
        }

        .root-meaning {
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: bold;
        }

        /* 列表表格容器 */
        .word-table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
        }

        .word-row {
            border-bottom: 1px dashed var(--table-border);
        }
        
        .word-row:last-child {
            border-bottom: none;
        }

        .col-word {
            width: 30%;
            padding: 25px 25px;
            vertical-align: top;
            border-right: 1px dashed var(--table-border);
        }

        .col-details {
            width: 70%;
            padding: 25px;
            vertical-align: top;
        }

        /* 左侧单词区样式 */
        .word-display {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }
        
        /* 词根词缀颜色类 */
        .p { color: var(--c-prefix); }
        .r { color: var(--c-root); }
        .s { color: var(--c-suffix); }

        .pronunciation {
            font-family: "Consolas", monospace;
            color: var(--text-sub);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* 右侧详情区样式 */
        .detail-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .detail-item:last-child {
            margin-bottom: 0;
        }

        .badge {
            flex-shrink: 0;
            color: #fff;
            font-size: 0.8rem;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            margin-top: 2px;
            font-weight: bold;
        }
        
        .b-trans { background-color: var(--badge-trans); }
        .b-mnem { background-color: var(--badge-mnem); }
        .b-exam { background-color: var(--badge-exam); }

        .detail-content {
            flex-grow: 1;
            font-size: 1.05rem;
        }
        
        .highlight-word {
            color: var(--c-root);
            font-weight: bold;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
    </style>
</head>

                    { word: "perform", display: "<span class='p'>per</span><span class='r'>form</span>", pronunciation: "/pəˈfɔːm/", translation: "v. 执行，表演", mnemonic: "per(贯穿/到底) + form(形状) = 把形状做到底 = 彻底完成/表演", example: "The surgeon will <span class='highlight-word'>perform</span> the operation tomorrow. (外科医生明天将执行手术。)" },
                    { word: "reform", display: "<span class='p'>re</span><span class='r'>form</span>", pronunciation: "/rɪˈfɔːm/", translation: "v./n. 改革，改造", mnemonic: "re(重新) + form(形状) = 重新塑造形状 = 改革", example: "The government plans to <span class='highlight-word'>reform</span> the healthcare system. (政府计划改革医疗系统。)" },
                    { word: "transform", display: "<span class='p'>trans</span><span class='r'>form</span>", pronunciation: "/trænsˈfɔːm/", translation: "v. 转变，变形", mnemonic: "trans(跨越/改变) + form(形状) = 跨越原有的形状 = 改变形态", example: "Digitalization has completely <span class='highlight-word'>transformed</span> the industry. (数字化彻底改变了该行业。)" },
                    { word: "uniform", display: "<span class='p'>uni</span><span class='r'>form</span>", pronunciation: "/ˈjuːnɪfɔːm/", translation: "n. 制服 adj. 统一的", mnemonic: "uni(单一) + form(形状) = 同样的款式 = 制服/统一的", example: "All employees are required to wear a <span class='highlight-word'>uniform</span>. (所有员工都必须穿制服。)" }
                ]
            },
            {
                root: "-vid- / -vis-",
                meaning: "看见 (see)",
                words: [
                    { word: "vision", display: "<span class='r'>vis</span><span class='s'>ion</span>", pronunciation: "/ˈvɪʒn/", translation: "n. 视力，愿景", mnemonic: "vis(看) + ion(名词后缀) = 看到的东西 = 视力/愿景", example: "The CEO outlined his <span class='highlight-word'>vision</span> for the company's future. (CEO概述了他对公司未来的愿景。)" },
                    { word: "visible", display: "<span class='r'>vis</span><span class='s'>ible</span>", pronunciation: "/ˈvɪzəbl/", translation: "adj. 可见的，明显的", mnemonic: "vis(看) + ible(能...的) = 能被看见的 = 可见的", example: "The stars are <span class='highlight-word'>visible</span> on a clear night. (晴朗的夜晚星星清晰可见。)" },
                    { word: "visit", display: "<span class='r'>vis</span><span class='s'>it</span>", pronunciation: "/ˈvɪzɪt/", translation: "v./n. 拜访，参观", mnemonic: "vis(看) + it(走) = 走过去看 = 拜访", example: "We plan to <span class='highlight-word'>visit</span> our grandparents this weekend. (我们计划这周末去拜访祖父母。)" },
                    { word: "revise", display: "<span class='p'>re</span><span class='r'>vise</span>", pronunciation: "/rɪˈvaɪz/", translation: "v. 修订，复习", mnemonic: "re(重新) + vise(看) = 重新看一遍 = 修订/复习", example: "You should <span class='highlight-word'>revise</span> your essay before submitting it. (你提交论文前应该再修订一遍。)" },
                    { word: "provide", display: "<span class='p'>pro</span><span class='r'>vide</span>", pronunciation: "/prəˈvaɪd/", translation: "v. 提供，供应", mnemonic: "pro(向前/提前) + vide(看) = 提前看到需求并准备 = 提供", example: "The hotel will <span class='highlight-word'>provide</span> towels and soap. (酒店将提供毛巾和肥皂。)" },
                    { word: "evidence", display: "<span class='p'>e</span><span class='r'>vid</span><span class='s'>ence</span>", pronunciation: "/ˈevɪdəns/", translation: "n. 证据，证明", mnemonic: "e(出) + vid(看) + ence = 拿出来让人看到的东西 = 证据", example: "There is no <span class='highlight-word'>evidence</span> to support his claim. (没有证据支持他的说法。)" }

        database.forEach((group, index) => {

            group.words.forEach(item => {

                    <tr class="word-row">
