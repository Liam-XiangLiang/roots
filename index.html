分子试图狠狠勒索/敲诈当地的商户。)","tags":["黑帮警匪"]},{"id":747,"verb":"Shell out","meaning":"(极其不情愿地)大笔付钱 / 掏腰包<br><span style=\"font-size:0.8em;color:gray\">(像剥贝壳一样把钱硬抠出来，口语极高频)</span>","scenario":"<span class=\"context-tag tag-life\">吐槽开销</span> \"I had to <b>shell out</b> $500 for those concert tickets.\"<br>(我不得不含泪大出血/掏了500刀买那场演唱会的门票。)","tags":["吐槽开销"]},{"id":748,"verb":"Shore up","meaning":"支撑 / 加固(虚弱的经济/论点/防御)<br><span style=\"font-size:0.8em;color:gray\">(用支柱顶住海岸或危墙)</span>","scenario":"<span class=\"context-tag tag-work\">政治与经济</span> \"The government took measures to <b>shore up</b> the banking system.\"<br>(政府采取措施大力支撑/稳固摇摇欲坠的银行系统。)","tags":["政治与经济"]},{"id":749,"verb":"Shrug off","meaning":"对...满不在乎 / 一笑置之<br><span style=\"font-size:0.8em;color:gray\">(耸耸肩表示无所谓)</span>","scenario":"<span class=\"context-tag tag-social\">心理素质</span> \"He just <b>shrugged off</b> the criticism and kept working.\"<br>(他对那些批评根本不屑一顾/耸耸肩就过去了，继续干他的活。)","tags":["心理素质"]},{"id":750,"verb":"Sift through","meaning":"仔细翻找 / 筛选(海量信息/证据)<br><span style=\"font-size:0.8em;color:gray\">(像用筛子筛沙金一样)</span>","scenario":"<span class=\"context-tag tag-work\">调查取证</span> \"Detectives had to <b>sift through</b> hours of security footage.\"<br>(侦探们不得不耐着性子在数小时的监控录像中仔细筛查/大海捞针。)","tags":["调查取证"]},{"id":751,"verb":"Size up","meaning":"打量 / 评估(某人的实力或局势)<br><span style=\"font-size:0.8em;color:gray\">(用目光丈量对方的尺寸)</span>","scenario":"<span class=\"context-tag tag-drama\">竞技与谈判</span> \"The two boxers stood in the ring, <b>sizing</b> each other <b>up</b>.\"<br>(两名拳击手站在擂台上，用眼神互相打量/盘算对方的底细。)","tags":["竞技与谈判"]},{"id":752,"verb":"Skim over","meaning":"略读 / 粗略地扫过 / 掩盖(问题)<br><span style=\"font-size:0.8em;color:gray\">(像石头在水面打水漂滑过)</span>","scenario":"<span class=\"context-tag tag-work\">阅读材料</span> \"I only had time to <b>skim over</b> the report before the meeting.\"<br>(开会前我只来得及粗略地扫了一眼/泛读了那份报告。)","tags":["阅读材料"]},{"id":753,"verb":"Slack off","meaning":"偷懒 / 摸鱼 / 懈怠<br><span style=\"font-size:0.8em;color:gray\">(Slack 有松弛的意思。名词 a slacker = 摸鱼的人)</span>","scenario":"<span class=\"context-tag tag-work\">职场表现</span> \"You've been <b>slacking off</b> all week, get back to work!\"<br>(你这整个星期都在疯狂摸鱼/偷懒，赶紧给我回去干活！)","tags":["职场表现"]},{"id":754,"verb":"Slip up","meaning":"犯小错误 / 疏忽 / 说漏嘴<br><span style=\"font-size:0.8em;color:gray\">(不小心脚滑了一下)</span>","scenario":"<span class=\"context-tag tag-work\">检查工作</span> \"We can't afford to <b>slip up</b> on this important contract.\"<br>(在这份重要的合同上，我们绝对不能出任何岔子/纰漏。)","tags":["检查工作"]},{"id":755,"verb":"Smooth over","meaning":"平息(争端) / 掩饰(分歧) / 缓和(关系)<br><span style=\"font-size:0.8em;color:gray\">(把粗糙的表面抹平)</span>","scenario":"<span class=\"context-tag tag-social\">调解矛盾</span> \"I had to buy her flowers to <b>smooth over</b> our argument.\"<br>(我只好给她买花，来平息/缓和我们昨天的争吵。)","tags":["调解矛盾"]},{"id":756,"verb":"Sniff out","meaning":"嗅出 / 察觉出(隐藏的问题或机会)<br><span style=\"font-size:0.8em;color:gray\">(像警犬一样敏锐地闻出来)</span>","scenario":"<span class=\"context-tag tag-work\">商业嗅觉</span> \"He has a great ability to <b>sniff out</b> a good business deal.\"<br>(他有着极强的嗅觉，总能敏锐地察觉出绝佳的商业交易机会。)","tags":["商业嗅觉"]},{"id":757,"verb":"Sound out","meaning":"试探某人的意见 / 探探口风<br><span style=\"font-size:0.8em;color:gray\">(发声探测水深)</span>","scenario":"<span class=\"context-tag tag-work\">职场八卦</span> \"I'm going to <b>sound</b> him <b>out</b> and see if he wants to join our team.\"<br>(我准备去探探他的口风，看看他有没有意愿加入我们的团队。)","tags":["职场八卦"]},{"id":758,"verb":"Spell out","meaning":"把事情讲得清清楚楚 / 详细说明<br><span style=\"font-size:0.8em;color:gray\">(像拼写单词一样一个字母一个字母地解释)</span>","scenario":"<span class=\"context-tag tag-work\">职场沟通</span> \"Do I have to <b>spell it out</b> for you?\"<br>(非要我把话揉碎了/说得那么直白你才懂吗？)","tags":["职场沟通"]},{"id":759,"verb":"Spill over","meaning":"溢出 / (情绪/影响)波及到其他领域<br><span style=\"font-size:0.8em;color:gray\">(水洒出来了蔓延开)</span>","scenario":"<span class=\"context-tag tag-work\">压力蔓延</span> \"I try not to let my work stress <b>spill over</b> into my family life.\"<br>(我尽量不让我工作的压力波及/影响到我的家庭生活。)","tags":["压力蔓延"]},{"id":760,"verb":"Spin off","meaning":"(企业)剥离出(新公司) / (影视)衍生出(新剧)<br><span style=\"font-size:0.8em;color:gray\">(转着转着甩出去一部分)</span>","scenario":"<span class=\"context-tag tag-work\">商业与娱乐</span> \"The tech giant decided to <b>spin off</b> its autonomous driving division.\"<br>(该科技巨头决定将其自动驾驶部门剥离出去/独立门户。)","tags":["商业与娱乐"]},{"id":761,"verb":"Sponge off","meaning":"靠别人养活 / 蹭吃蹭喝<br><span style=\"font-size:0.8em;color:gray\">(像海绵一样吸取别人的汁水)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽啃老</span> \"He's 30 and still <b>sponging off</b> his parents.\"<br>(他都30岁了，还在没皮没脸地啃老/靠父母养活。)","tags":["吐槽啃老"]},{"id":762,"verb":"Spring up","meaning":"突然出现 / 如雨后春笋般涌现<br><span style=\"font-size:0.8em;color:gray\">(像弹簧一样蹦出来)</span>","scenario":"<span class=\"context-tag tag-life\">城市现象</span> \"New coffee shops are <b>springing up</b> all over the neighborhood.\"<br>(新的咖啡店如雨后春笋般在整个街区疯狂涌现。)","tags":["城市现象"]},{"id":763,"verb":"Spruce up","meaning":"打扮 / 把...收拾得整洁漂亮<br><span style=\"font-size:0.8em;color:gray\">(Spruce是云杉，引申为修剪整齐)</span>","scenario":"<span class=\"context-tag tag-life\">大扫除/出门</span> \"I need to <b>spruce up</b> the living room before guests arrive.\"<br>(客人来之前，我得把客厅好好捯饬/收拾打扮一下。)","tags":["大扫除/出门"]},{"id":764,"verb":"Square up","meaning":"结清(账目) / 准备好战斗的姿势<br><span style=\"font-size:0.8em;color:gray\">(把自己弄得方正平衡/挺起胸膛)</span>","scenario":"<span class=\"context-tag tag-social\">财务与打架</span> \"You paid for dinner, let me <b>square up</b> with you later.\" (晚饭你付的钱，晚点我把钱转给你结清。)<br>\"The two men <b>squared up</b>, ready to fight.\" (那两个男人摆开架势，准备动手。)","tags":["财务与打架"]},{"id":765,"verb":"Stamp out","meaning":"彻底消除 / 杜绝(不良现象/疾病)<br><span style=\"font-size:0.8em;color:gray\">(用脚死死踩灭火苗)</span>","scenario":"<span class=\"context-tag tag-work\">企业宣言</span> \"Our company is determined to <b>stamp out</b> workplace discrimination.\"<br>(我们公司决心彻底铲除/杜绝职场歧视现象。)","tags":["企业宣言"]},{"id":766,"verb":"Stand in for","meaning":"代替某人 / 替班<br><span style=\"font-size:0.8em;color:gray\">(站在别人的位置上)</span>","scenario":"<span class=\"context-tag tag-work\">请求帮忙</span> \"Could you <b>stand in for</b> me at tomorrow's meeting?\"<br>(明天的会议你能帮我顶个班/代我去一下吗？)","tags":["请求帮忙"]},{"id":767,"verb":"Stave off","meaning":"延缓 / 阻止(灾难/饥饿/破产)<br><span style=\"font-size:0.8em;color:gray\">(用棍子把危险挡在外面)</span>","scenario":"<span class=\"context-tag tag-work\">企业自救</span> \"The company took out a loan to <b>stave off</b> bankruptcy.\"<br>(公司申请了一笔贷款，以拼命延缓/阻挡破产的命运。)","tags":["企业自救"]},{"id":768,"verb":"Step up","meaning":"挺身而出(承担责任) / 加紧步伐(提高产量)<br><span style=\"font-size:0.8em;color:gray\">(往前迈一步承担大任，极高频！)</span>","scenario":"<span class=\"context-tag tag-work\">领导致辞</span> \"When the manager left, Sarah <b>stepped up</b> and led the team.\"<br>(经理走后，Sarah挺身而出挑起了领导团队的大梁。)","tags":["领导致辞"]},{"id":769,"verb":"Stick up for","meaning":"为...挺身而出 / 维护(某人/某事)<br><span style=\"font-size:0.8em;color:gray\">(像棍子一样竖起来保护弱者)</span>","scenario":"<span class=\"context-tag tag-social\">仗义执言</span> \"Thanks for <b>sticking up for</b> me when the boss was yelling.\"<br>(谢谢你在老板大吼大叫时站出来为我说话/维护我。)","tags":["仗义执言"]},{"id":770,"verb":"Stock up on","meaning":"大量囤积 / 备货<br><span style=\"font-size:0.8em;color:gray\">(把库存填满，美国生活必考词汇)</span>","scenario":"<span class=\"context-tag tag-life\">超市购物</span> \"We need to <b>stock up on</b> toilet paper before the storm.\"<br>(暴风雪来临前，我们需要疯狂囤积/备足卫生纸。)","tags":["超市购物"]},{"id":771,"verb":"String along","meaning":"吊人胃口 / 拖延欺骗<br><span style=\"font-size:0.8em;color:gray\">(用一根线牵着你，不给痛快话)</span>","scenario":"<span class=\"context-tag tag-social\">渣男渣女/不良企业</span> \"She's not going to marry you, she's just <b>stringing you along</b>.\"<br>(她才不会嫁给你，她只不过是在吊着你/把你当备胎。)","tags":["渣男渣女/不良企业"]},{"id":772,"verb":"Sum up","meaning":"总结 / 概括<br><span style=\"font-size:0.8em;color:gray\">(把所有东西加起来)</span>","scenario":"<span class=\"context-tag tag-work\">开会发言</span> \"To <b>sum up</b>, we need to cut costs and increase sales.\"<br>(总而言之/总结一下，我们需要削减成本并增加销量。)","tags":["开会发言"]},{"id":773,"verb":"Swear by","meaning":"极度信任(某产品或方法) / 逢人就夸<br><span style=\"font-size:0.8em;color:gray\">(拿这个东西发誓它绝对好用)</span>","scenario":"<span class=\"context-tag tag-life\">强力种草</span> \"My grandmother <b>swears by</b> this old home remedy for colds.\"<br>(我奶奶对这个治感冒的偏方深信不疑/极力推崇。)","tags":["强力种草"]},{"id":774,"verb":"Sweep aside","meaning":"轻易驳回 / 完全无视(意见/问题)<br><span style=\"font-size:0.8em;color:gray\">(像扫垃圾一样扫到一边)</span>","scenario":"<span class=\"context-tag tag-work\">抗议傲慢</span> \"The committee simply <b>swept aside</b> all of our safety concerns.\"<br>(委员会把我们所有的安全隐患担忧极其傲慢地当成了耳旁风/一扫而空。)","tags":["抗议傲慢"]},{"id":775,"verb":"Tack on","meaning":"附加 / 额外加上去(通常指原本不需要的)<br><span style=\"font-size:0.8em;color:gray\">(用图钉草草钉上去)</span>","scenario":"<span class=\"context-tag tag-work\">吐槽隐藏收费</span> \"The airline <b>tacked on</b> an extra $50 fee for baggage.\"<br>(航空公司极其鸡贼地额外附加了50刀的行李费。)","tags":["吐槽隐藏收费"]},{"id":776,"verb":"Take apart","meaning":"拆开 / 把...大卸八块 / 彻底驳倒(论点)<br><span style=\"font-size:0.8em;color:gray\">(拿掉使其分离)</span>","scenario":"<span class=\"context-tag tag-work\">修电脑/辩论</span> \"The lawyer <b>took</b> her argument <b>apart</b> piece by piece.\"<br>(律师将她的论点抽丝剥茧，驳得体无完肤。)","tags":["修电脑/辩论"]},{"id":777,"verb":"Take on","meaning":"承担(责任) / 雇佣 / 呈现(新面貌)<br><span style=\"font-size:0.8em;color:gray\">(把担子挑在肩上，高频多义)</span>","scenario":"<span class=\"context-tag tag-work\">接活儿</span> \"I can't <b>take on</b> any more projects right now, I'm at capacity.\"<br>(我现在真的接不下任何新项目了，我已经满负荷运转了。)","tags":["接活儿"]},{"id":778,"verb":"Talk down to","meaning":"居高临下地跟...说话 / 傲慢地说教<br><span style=\"font-size:0.8em;color:gray\">(表现出轻视对方智商的态度)</span>","scenario":"<span class=\"context-tag tag-work\">职场抱怨</span> \"I hate it when my manager <b>talks down to</b> me.\"<br>(我讨厌我经理用那种高高在上/说教的口吻跟我说话。)","tags":["职场抱怨"]},{"id":779,"verb":"Talk out of","meaning":"说服某人放弃做某事<br><span style=\"font-size:0.8em;color:gray\">(用言语把某人从错误决定中拉出来)</span>","scenario":"<span class=\"context-tag tag-social\">避免犯错</span> \"Luckily, my friend <b>talked me out of</b> quitting my job without a backup.\"<br>(幸好我朋友苦口婆心劝住了我，让我别在没有下家的情况下裸辞。)","tags":["避免犯错"]},{"id":780,"verb":"Tamp down","meaning":"压低 / 压抑(情绪) / 平息<br><span style=\"font-size:0.8em;color:gray\">(把泥土压实夯实)</span>","scenario":"<span class=\"context-tag tag-work\">控制通胀</span> \"The central bank raised interest rates to <b>tamp down</b> inflation.\"<br>(央行加息以强力压制/抑制通货膨胀。)","tags":["控制通胀"]},{"id":781,"verb":"Tear into","meaning":"严厉斥责 / 狼吞虎咽地吃<br><span style=\"font-size:0.8em;color:gray\">(像撕裂猎物一样扑上去)</span>","scenario":"<span class=\"context-tag tag-drama\">职场被骂</span> \"The boss absolutely <b>tore into</b> me for losing that client.\"<br>(因为丢了那个客户，老板把我劈头盖脸地狠批/手撕了一顿。)","tags":["职场被骂"]},{"id":782,"verb":"Tide over","meaning":"帮助某人渡过(短暂的)难关<br><span style=\"font-size:0.8em;color:gray\">(乘着潮水度过浅滩，多指借小钱)</span>","scenario":"<span class=\"context-tag tag-social\">借钱应急</span> \"Can you lend me $50 to <b>tide me over</b> until payday?\"<br>(你能借我50刀让我撑到/熬到发工资那天吗？)","tags":["借钱应急"]},{"id":783,"verb":"Tie down","meaning":"束缚 / 限制(自由)<br><span style=\"font-size:0.8em;color:gray\">(被绳子死死绑住)</span>","scenario":"<span class=\"context-tag tag-life\">人生规划</span> \"I don't want to buy a house yet, I don't want to be <b>tied down</b>.\"<br>(我还不打算买房，不想这么早被套牢/束缚住自由。)","tags":["人生规划"]},{"id":784,"verb":"Tip off","meaning":"走漏风声 / 通风报信<br><span style=\"font-size:0.8em;color:gray\">(警匪片高频词汇)</span>","scenario":"<span class=\"context-tag tag-drama\">影视剧情</span> \"Someone <b>tipped off</b> the police about the drug deal.\"<br>(有人向警方秘密举报/通风报信了那场毒品交易。)","tags":["影视剧情"]},{"id":785,"verb":"Tone down","meaning":"缓和 / 降低(语气/色彩)的强烈程度<br><span style=\"font-size:0.8em;color:gray\">(把音调或饱和度调低)</span>","scenario":"<span class=\"context-tag tag-work\">沟通建议</span> \"You might want to <b>tone down</b> your criticism in this email.\"<br>(你可能得在这封邮件里稍微缓和/收敛一下你那极其尖锐的批评语气。)","tags":["沟通建议"]},{"id":786,"verb":"Touch on","meaning":"简略提及 / 顺便谈到<br><span style=\"font-size:0.8em;color:gray\">(蜻蜓点水般碰到)</span>","scenario":"<span class=\"context-tag tag-work\">会议议程</span> \"In today's meeting, we will also <b>touch on</b> the Q3 budget.\"<br>(在今天的会议上，我们也会顺便点一下/简略提一下第三季度的预算。)","tags":["会议议程"]},{"id":787,"verb":"Track down","meaning":"追查到 / 费尽千辛万苦找到<br><span style=\"font-size:0.8em;color:gray\">(像猎犬一样循着踪迹找到)</span>","scenario":"<span class=\"context-tag tag-work\">找人找物</span> \"It took me hours, but I finally <b>tracked down</b> the source of the bug.\"<br>(花了我好几个小时，但我终于顺藤摸瓜揪出了那个代码bug的源头。)","tags":["找人找物"]},{"id":788,"verb":"Trade in","meaning":"以旧换新<br><span style=\"font-size:0.8em;color:gray\">(把旧的交进去抵扣部分买新钱)</span>","scenario":"<span class=\"context-tag tag-life\">买车/买手机</span> \"I'm planning to <b>trade in</b> my old iPhone for the new model.\"<br>(我打算把我的旧iPhone拿去以旧换新买个新款。)","tags":["买车/买手机"]},{"id":789,"verb":"Trip up","meaning":"绊倒 / (使)犯错 / 给某人下套<br><span style=\"font-size:0.8em;color:gray\">(被障碍物绊住)</span>","scenario":"<span class=\"context-tag tag-work\">面试坑人</span> \"The interviewer tried to <b>trip</b> me <b>up</b> with some tricky questions.\"<br>(面试官试图用一些狡猾的问题给我下绊子/套路我犯错。)","tags":["面试坑人"]},{"id":790,"verb":"Tuck away","meaning":"把...妥善藏好 / (在隐蔽处)大吃一顿<br><span style=\"font-size:0.8em;color:gray\">(塞进隐蔽的角落)</span>","scenario":"<span class=\"context-tag tag-life\">发现宝藏店</span> \"We found a beautiful little restaurant <b>tucked away</b> in a quiet alley.\"<br>(我们在一条幽静的小巷里，发现了一家隐藏得很深/极美的隐秘小餐厅。)","tags":["发现宝藏店"]},{"id":791,"verb":"Tune out","meaning":"不理会 / 把...当耳旁风 / 大脑放空<br><span style=\"font-size:0.8em;color:gray\">(像收音机调台一样把信号切掉，同 zone out)</span>","scenario":"<span class=\"context-tag tag-drama\">上课/开会发呆</span> \"When he starts talking about politics, I just <b>tune out</b>.\"<br>(当他开始高谈阔论政治时，我大脑就自动屏蔽/神游天外了。)","tags":["上课/开会发呆"]},{"id":792,"verb":"Turn out","meaning":"结果是 / 证明是 / (人群)出席<br><span style=\"font-size:0.8em;color:gray\">(极其高频的剧情反转词)</span>","scenario":"<span class=\"context-tag tag-life\">反转叙事</span> \"I was worried, but the event <b>turned out</b> to be a huge success.\"<br>(我本以为搞砸了，但这场活动最终被证明/结果是极其成功的。)","tags":["反转叙事"]},{"id":793,"verb":"Vouch for","meaning":"为...担保 / 保证(其人品/质量)<br><span style=\"font-size:0.8em;color:gray\">(用自己的信誉和身家性命背书)</span>","scenario":"<span class=\"context-tag tag-work\">内推背景调查</span> \"I've worked with him for years, I can completely <b>vouch for</b> his integrity.\"<br>(我和他共事多年，我可以拿人格担保/绝对保证他的人品没问题。)","tags":["内推背景调查"]},{"id":794,"verb":"Wait out","meaning":"苦等...结束 / 熬过<br><span style=\"font-size:0.8em;color:gray\">(在原地死等直到风波过去)</span>","scenario":"<span class=\"context-tag tag-life\">躲避风暴</span> \"We decided to stay in the cafe and <b>wait out</b> the rain.\"<br>(我们决定留在咖啡馆里死熬，直到这场雨彻底停下来。)","tags":["躲避风暴"]},{"id":795,"verb":"Walk out on","meaning":"抛弃 (家人/责任) / 愤然离席<br><span style=\"font-size:0.8em;color:gray\">(直接走出去不管了)</span>","scenario":"<span class=\"context-tag tag-drama\">狗血剧情</span> \"He <b>walked out on</b> his wife and kids when he lost his job.\"<br>(他失业后，极其不负责任地直接抛妻弃子跑路了。)","tags":["狗血剧情"]},{"id":796,"verb":"Warm up to","meaning":"开始接受 / 开始喜欢(一开始不喜欢的人或事物)<br><span style=\"font-size:0.8em;color:gray\">(态度逐渐解冻变暖)</span>","scenario":"<span class=\"context-tag tag-life\">人际关系</span> \"At first I didn't like the new city, but I'm slowly <b>warming up to</b> it.\"<br>(起初我不喜欢这座新城市，但我现在开始慢慢接纳并感受到它的魅力了。)","tags":["人际关系"]},{"id":797,"verb":"Wash over","meaning":"(情绪)突然涌上心头<br><span style=\"font-size:0.8em;color:gray\">(像海浪一样冲刷过全身)</span>","scenario":"<span class=\"context-tag tag-drama\">极致情感</span> \"A feeling of profound relief <b>washed over</b> her.\"<br>(一种如释重负的强烈感觉如潮水般瞬间涌上她的心头。)","tags":["极致情感"]},{"id":798,"verb":"Water down","meaning":"削弱 / 使(效果/规定)打折扣<br><span style=\"font-size:0.8em;color:gray\">(像酒里掺水一样稀释)</span>","scenario":"<span class=\"context-tag tag-work\">政策与妥协</span> \"The original environmental proposal was heavily <b>watered down</b> by lobbyists.\"<br>(最初极具野心的环保提案被说客们大幅度注水/严重削弱了。)","tags":["政策与妥协"]},{"id":799,"verb":"Weigh in","meaning":"(在讨论中)发表意见 / 介入<br><span style=\"font-size:0.8em;color:gray\">(把你的砝码放进天平里，职场高频！)</span>","scenario":"<span class=\"context-tag tag-work\">开会邀请</span> \"Before we make a decision, I'd like the legal team to <b>weigh in</b> on this.\"<br>(在我们做决定前，我想请法务团队也来发表一下专业意见/把把关。)","tags":["开会邀请"]},{"id":800,"verb":"Whip up","meaning":"迅速做(饭) / 煽动(情绪)<br><span style=\"font-size:0.8em;color:gray\">(像挥动鞭子一样快)</span>","scenario":"<span class=\"context-tag tag-life\">日常做饭</span> \"Give me ten minutes, I can <b>whip up</b> some pancakes for breakfast.\"<br>(给我十分钟，我马上能飞速弄点煎饼出来当早饭。)","tags":["日常做饭"]},{"id":801,"verb":"Abide by","meaning":"遵守(规则/法律) / 信守(承诺)<br><span style=\"font-size:0.8em;color:gray\">(极为正式且有力量的承诺)</span>","scenario":"<span class=\"context-tag tag-work\">法律与合同</span> \"Both parties must strictly <b>abide by</b> the terms of the contract.\"<br>(双方必须严格遵守/信守该合同的所有条款。)","tags":["法律与合同"]},{"id":802,"verb":"Account for","meaning":"对...负责 / 解释(原因) / 占据(比例)<br><span style=\"font-size:0.8em;color:gray\">(查账必备高频词)</span>","scenario":"<span class=\"context-tag tag-work\">汇报与责任</span> \"How do you <b>account for</b> the missing funds?\"<br>(你如何解释/对这笔不翼而飞的资金负责？)","tags":["汇报与责任"]},{"id":803,"verb":"Answer to","meaning":"向...汇报 / 听从...的指挥<br><span style=\"font-size:0.8em;color:gray\">(明确职场上下级关系)</span>","scenario":"<span class=\"context-tag tag-work\">确立层级</span> \"I don't <b>answer to</b> you, I only answer to the CEO.\"<br>(我不归你管/不用向你汇报，我只对CEO负责。)","tags":["确立层级"]},{"id":804,"verb":"Back up against","meaning":"背靠着 / 陷入退无可退的困境<br><span style=\"font-size:0.8em;color:gray\">(背贴着墙，形容被逼到绝境)</span>","scenario":"<span class=\"context-tag tag-drama\">商战博弈</span> \"The company is <b>backed up against</b> a wall financially.\"<br>(公司在财务上已经被逼到了退无可退的绝境。)","tags":["商战博弈"]},{"id":805,"verb":"Bail out on","meaning":"在危急关头背弃 / 抛弃(朋友或责任)<br><span style=\"font-size:0.8em;color:gray\">(极度口语化的抱怨，比 bail out 更强调“抛弃某人”)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽渣友</span> \"I can't believe you're <b>bailing out on</b> me right before the presentation!\"<br>(真不敢相信你竟然在演讲前临阵脱逃/把我给卖了！)","tags":["吐槽渣友"]},{"id":806,"verb":"Bang out","meaning":"匆匆赶制出 / 迅速敲打出(文章/代码)<br><span style=\"font-size:0.8em;color:gray\">(伴随着疯狂敲击键盘的声音)</span>","scenario":"<span class=\"context-tag tag-work\">死线赶工</span> \"Give me an hour, I'll <b>bang out</b> a rough draft.\"<br>(给我一小时，我马上狂敲/赶出一份初稿。)","tags":["死线赶工"]},{"id":807,"verb":"Barge in","meaning":"粗鲁地闯入 / 蛮横干涉<br><span style=\"font-size:0.8em;color:gray\">(像驳船一样撞进来)</span>","scenario":"<span class=\"context-tag tag-drama\">警告制止</span> \"You can't just <b>barge in</b> here without knocking!\"<br>(你不能连门都不敲就这么蛮横地闯进来！)","tags":["警告制止"]},{"id":808,"verb":"Bask in","meaning":"沉浸在(阳光/赞美/成功)之中<br><span style=\"font-size:0.8em;color:gray\">(极其享受地沐浴其中)</span>","scenario":"<span class=\"context-tag tag-life\">极致享受</span> \"After winning the championship, he took a moment to <b>bask in</b> the glory.\"<br>(赢得冠军后，他花了一刻时间尽情沉浸/沐浴在荣耀之中。)","tags":["极致享受"]},{"id":809,"verb":"Bear down on","meaning":"向...施加巨大压力 / 猛冲向<br><span style=\"font-size:0.8em;color:gray\">(像巨熊一样压迫过来)</span>","scenario":"<span class=\"context-tag tag-work\">高压局势</span> \"Regulators are <b>bearing down on</b> tech monopolies.\"<br>(监管机构正对科技巨头施加极其沉重的打击/压力。)","tags":["高压局势"]},{"id":810,"verb":"Bear with","meaning":"耐心等待 / 宽容忍耐<br><span style=\"font-size:0.8em;color:gray\">(服务业与职场安抚客户的神句)</span>","scenario":"<span class=\"context-tag tag-work\">客套请求</span> \"Please <b>bear with</b> me while I pull up your account.\"<br>(请您耐心等待/包涵一下，我正在为您调出账户信息。)","tags":["客套请求"]},{"id":811,"verb":"Beat down","meaning":"狠狠杀价 / (阳光/雨)猛烈击打 / 摧垮意志<br><span style=\"font-size:0.8em;color:gray\">(物理和心理上的双重打击)</span>","scenario":"<span class=\"context-tag tag-life\">买车买房</span> \"I managed to <b>beat</b> the dealer <b>down</b> to a reasonable price.\"<br>(我硬是把车贩子的价格狠狠砍/压到了一个合理的位置。)","tags":["买车买房"]},{"id":812,"verb":"Belt out","meaning":"大声唱出 / 引吭高歌<br><span style=\"font-size:0.8em;color:gray\">(扯着嗓子，极具爆发力)</span>","scenario":"<span class=\"context-tag tag-social\">KTV/车内</span> \"We were driving down the highway, <b>belting out</b> classic rock songs.\"<br>(我们开着车在高速上狂飙，扯着嗓子大唱经典摇滚乐。)","tags":["KTV/车内"]},{"id":813,"verb":"Binge on","meaning":"狂吃 / 狂看(剧) / 毫无节制地做<br><span style=\"font-size:0.8em;color:gray\">(美国周末宅家文化核心词 Binge-watch)</span>","scenario":"<span class=\"context-tag tag-life\">周末放纵</span> \"I spent the entire weekend <b>binging on</b> pizza and Netflix.\"<br>(我整个周末都在疯狂暴风吸入披萨并狂刷网飞剧。)","tags":["周末放纵"]},{"id":814,"verb":"Blank out","meaning":"大脑突然一片空白 / 刻意抹去(记忆)<br><span style=\"font-size:0.8em;color:gray\">(记忆断片或强行删除)</span>","scenario":"<span class=\"context-tag tag-drama\">紧张忘词</span> \"When the interviewer asked the first question, I completely <b>blanked out</b>.\"<br>(面试官问第一个问题时，我大脑瞬间一片空白/死机了。)","tags":["紧张忘词"]},{"id":815,"verb":"Blast off","meaning":"(火箭)发射升空 / 迅速离开<br><span style=\"font-size:0.8em;color:gray\">(伴随着巨大轰鸣声的起飞)</span>","scenario":"<span class=\"context-tag tag-work\">航天与科技</span> \"The SpaceX rocket is scheduled to <b>blast off</b> tomorrow morning.\"<br>(SpaceX的火箭按计划将于明早点火升空。)","tags":["航天与科技"]},{"id":816,"verb":"Bleed into","meaning":"渐渐融入 / 渗透到(另一个领域)<br><span style=\"font-size:0.8em;color:gray\">(像颜料渗色一样，边界模糊)</span>","scenario":"<span class=\"context-tag tag-work\">工作生活失衡</span> \"The boundary between his work and personal life started to <b>bleed into</b> one another.\"<br>(他的工作与个人生活之间的界限开始渐渐模糊/互相渗透。)","tags":["工作生活失衡"]},{"id":817,"verb":"Blow off","meaning":"无视 / 故意不见(某人) / 爽约<br><span style=\"font-size:0.8em;color:gray\">(像吹走灰尘一样不在乎，态度极度傲慢)</span>","scenario":"<span class=\"context-tag tag-drama\">指责态度</span> \"You can't just <b>blow off</b> the meeting because you don't feel like going.\"<br>(你不能仅仅因为不想去就极其傲慢地翘掉/无视这个会议。)","tags":["指责态度"]},{"id":818,"verb":"Blunder into","meaning":"跌跌撞撞地走入 / 极其愚蠢地卷入(麻烦)<br><span style=\"font-size:0.8em;color:gray\">(盲目且笨拙地闯入陷阱)</span>","scenario":"<span class=\"context-tag tag-work\">政治与决策</span> \"The company <b>blundered into</b> a massive PR crisis.\"<br>(这家公司极其愚蠢地一头栽进了一场巨大的公关危机中。)","tags":["政治与决策"]},{"id":819,"verb":"Board up","meaning":"用木板封住(门窗)<br><span style=\"font-size:0.8em;color:gray\">(防飓风或店铺倒闭时的标准动作)</span>","scenario":"<span class=\"context-tag tag-life\">灾难预防</span> \"Residents are <b>boarding up</b> their windows ahead of the hurricane.\"<br>(居民们正在飓风来临前用木板死死封住窗户。)","tags":["灾难预防"]},{"id":820,"verb":"Bolster up","meaning":"支撑 / 加强 / 鼓舞(士气)<br><span style=\"font-size:0.8em;color:gray\">(用长枕头垫高，常用于论点或经济)</span>","scenario":"<span class=\"context-tag tag-work\">经济新闻</span> \"The government announced new measures to <b>bolster up</b> the economy.\"<br>(政府宣布了新措施以大力支撑/提振经济。)","tags":["经济新闻"]},{"id":821,"verb":"Bolt down","meaning":"狼吞虎咽地吃<br><span style=\"font-size:0.8em;color:gray\">(像栓螺栓一样直接吞下去，同 scarf down)</span>","scenario":"<span class=\"context-tag tag-life\">赶时间</span> \"I only had five minutes, so I just <b>bolted down</b> a sandwich.\"<br>(我只有五分钟，所以我直接狼吞虎咽地塞下了一个三明治。)","tags":["赶时间"]},{"id":822,"verb":"Bombard with","meaning":"不断轰炸 / 连珠炮般地提出(问题/信息)<br><span style=\"font-size:0.8em;color:gray\">(信息过载，极具压迫感)</span>","scenario":"<span class=\"context-tag tag-drama\">记者会</span> \"Reporters <b>bombarded</b> the CEO <b>with</b> tough questions.\"<br>(记者们用极其尖锐的问题对CEO进行了连珠炮般的狂轰滥炸。)","tags":["记者会"]},{"id":823,"verb":"Bounce back","meaning":"受挫后恢复 / 触底反弹<br><span style=\"font-size:0.8em;color:gray\">(像皮球一样极具弹性和韧性)</span>","scenario":"<span class=\"context-tag tag-work\">励志与康复</span> \"She had a tough year, but she's determined to <b>bounce back</b>.\"<br>(她度过了艰难的一年，但她决心触底反弹/重振旗鼓。)","tags":["励志与康复"]},{"id":824,"verb":"Box in","meaning":"把...困住 / 限制(某人的选择)<br><span style=\"font-size:0.8em;color:gray\">(关在盒子里，动弹不得)</span>","scenario":"<span class=\"context-tag tag-social\">交通与谈判</span> \"I couldn't get my car out, someone <b>boxed</b> me <b>in</b>.\"<br>(我车出不去了，有人把我的车彻底堵死/困在里面了。)","tags":["交通与谈判"]},{"id":825,"verb":"Brace for","meaning":"为(即将到来的灾难或冲击)做防备<br><span style=\"font-size:0.8em;color:gray\">(绷紧肌肉支撑住，新闻极其高频)</span>","scenario":"<span class=\"context-tag tag-work\">迎接风暴</span> \"The entire tech industry is <b>bracing for</b> another round of layoffs.\"<br>(整个科技行业都在绷紧神经准备迎接/防备新一轮的裁员潮。)","tags":["迎接风暴"]},{"id":826,"verb":"Brew up","meaning":"酝酿 / 即将发生(风暴/麻烦)<br><span style=\"font-size:0.8em;color:gray\">(像煮咖啡一样渐渐冒泡)</span>","scenario":"<span class=\"context-tag tag-drama\">悬念铺垫</span> \"There's a major storm <b>brewing up</b> off the coast.\"<br>(海岸附近正有一场超级风暴在暗中酝酿/聚集力量。)","tags":["悬念铺垫"]},{"id":827,"verb":"Brim with","meaning":"充满 / (情绪)洋溢着<br><span style=\"font-size:0.8em;color:gray\">(满到杯子边缘快溢出来了)</span>","scenario":"<span class=\"context-tag tag-life\">夸赞活力</span> \"The young entrepreneur was absolutely <b>brimming with</b> confidence.\"<br>(这位年轻的创业者绝对是浑身上下都洋溢/充满了自信。)","tags":["夸赞活力"]},{"id":828,"verb":"Bristle at","meaning":"对...感到极度愤怒或反感<br><span style=\"font-size:0.8em;color:gray\">(像动物发怒时毛发直立一样)</span>","scenario":"<span class=\"context-tag tag-drama\">心理描写</span> \"He visibly <b>bristled at</b> the suggestion that he was lying.\"<br>(当有人暗示他在撒谎时，肉眼可见地瞬间炸毛/极度不悦。)","tags":["心理描写"]},{"id":829,"verb":"Brush up against","meaning":"偶然触碰到 / 极短地接触到(危险或伟大)<br><span style=\"font-size:0.8em;color:gray\">(擦身而过)</span>","scenario":"<span class=\"context-tag tag-life\">人生感慨</span> \"Working there, you felt like you were <b>brushing up against</b> history.\"<br>(在那儿工作，你会感觉自己仿佛在与历史擦肩而过/触摸到了历史。)","tags":["人生感慨"]},{"id":830,"verb":"Bubble over","meaning":"极其激动 / 兴奋得溢于言表<br><span style=\"font-size:0.8em;color:gray\">(像水烧开一样冒泡溢出)</span>","scenario":"<span class=\"context-tag tag-social\">极致开心</span> \"The kids were <b>bubbling over</b> with excitement before the trip.\"<br>(孩子们在旅行前兴奋得简直要炸开了锅/激动得难以自已。)","tags":["极致开心"]},{"id":831,"verb":"Buck up","meaning":"振作起来 / 给...打气<br><span style=\"font-size:0.8em;color:gray\">(老派但地道的鼓励用语)</span>","scenario":"<span class=\"context-tag tag-social\">鼓励朋友</span> \"Oh, <b>buck up</b>! It's not the end of the world.\"<br>(哎呀，打起精神来/振作点！又不是世界末日。)","tags":["鼓励朋友"]},{"id":832,"verb":"Budge up","meaning":"挪一挪 / 让点位置<br><span style=\"font-size:0.8em;color:gray\">(极其口语化的请求，同 move over)</span>","scenario":"<span class=\"context-tag tag-life\">日常挤座</span> \"Can you <b>budge up</b> a bit so I can sit down?\"<br>(你能稍微挪过去一点腾点位置让我坐下吗？)","tags":["日常挤座"]},{"id":833,"verb":"Bug out","meaning":"惊恐逃跑 / (眼睛)震惊得睁得大大的<br><span style=\"font-size:0.8em;color:gray\">(像虫子一样跑掉或眼球凸出)</span>","scenario":"<span class=\"context-tag tag-drama\">惊悚/夸张</span> \"When she saw the spider, she completely <b>bugged out</b>.\"<br>(当她看到那只蜘蛛时，她吓得眼珠子都快掉出来了/魂飞魄散。)","tags":["惊悚/夸张"]},{"id":834,"verb":"Bulk up","meaning":"增肌 / 扩大规模(增加重量或厚度)<br><span style=\"font-size:0.8em;color:gray\">(健身房高频词，也用于商业)</span>","scenario":"<span class=\"context-tag tag-work\">健身与企业</span> \"The company is trying to <b>bulk up</b> its legal department.\"<br>(公司正试图大力扩充/做大其法务部门的规模。)","tags":["健身与企业"]},{"id":835,"verb":"Bump up","meaning":"提升 / 增加 / 升舱<br><span style=\"font-size:0.8em;color:gray\">(像被顶了一下往上抬)</span>","scenario":"<span class=\"context-tag tag-life\">航空与职场</span> \"They <b>bumped</b> me <b>up</b> to first class for free!\"<br>(他们竟然免费把我的机票升舱/抬到了头等舱！)","tags":["航空与职场"]},{"id":836,"verb":"Buoy up","meaning":"使浮起 / 极大地鼓舞(士气/价格)<br><span style=\"font-size:0.8em;color:gray\">(像浮标一样托起)</span>","scenario":"<span class=\"context-tag tag-work\">股市与心理</span> \"The stock market was <b>buoyed up</b> by the positive employment report.\"<br>(受积极就业报告的极大鼓舞/托举，股市强势上扬。)","tags":["股市与心理"]},{"id":837,"verb":"Burst into","meaning":"突然爆发(情绪) / 闯入<br><span style=\"font-size:0.8em;color:gray\">(毫无预兆的激烈动作)</span>","scenario":"<span class=\"context-tag tag-drama\">情绪失控</span> \"Upon hearing the tragic news, she immediately <b>burst into</b> tears.\"<br>(一听到那悲惨的消息，她瞬间情绪崩溃/放声大哭。)","tags":["情绪失控"]},{"id":838,"verb":"Bust up","meaning":"(关系)破裂 / 打碎 / 打架<br><span style=\"font-size:0.8em;color:gray\">(极其暴力的终结)</span>","scenario":"<span class=\"context-tag tag-drama\">八卦分手</span> \"Did you hear that Brad and Angelina <b>busted up</b>?\"<br>(听说了吗？皮特和朱莉彻底闹掰/决裂了。)","tags":["八卦分手"]},{"id":839,"verb":"Butt out","meaning":"少管闲事 / 滚开<br><span style=\"font-size:0.8em;color:gray\">(与 butt in 相对，态度极度强硬)</span>","scenario":"<span class=\"context-tag tag-drama\">发飙警告</span> \"This is between me and my wife, so just <b>butt out</b>!\"<br>(这是我和我老婆之间的事，你给我少管闲事/滚一边去！)","tags":["发飙警告"]},{"id":840,"verb":"Butter up","meaning":"拍马屁 / 巴结(某人以获取好处)<br><span style=\"font-size:0.8em;color:gray\">(像抹黄油一样让人顺滑舒服)</span>","scenario":"<span class=\"context-tag tag-work\">职场心机</span> \"He's always trying to <b>butter up</b> the boss before asking for a favor.\"<br>(他总是在提要求前先对老板疯狂拍马屁/灌迷魂汤。)","tags":["职场心机"]},{"id":841,"verb":"Buy off","meaning":"收买 / 贿赂(使某人闭嘴)<br><span style=\"font-size:0.8em;color:gray\">(用钱让人出局)</span>","scenario":"<span class=\"context-tag tag-drama\">黑帮与政界</span> \"You can't just <b>buy off</b> the witness with cash.\"<br>(你不能指望仅仅用现金就能彻底收买/封住证人的口。)","tags":["黑帮与政界"]},{"id":842,"verb":"Buzz off","meaning":"走开 / 滚开<br><span style=\"font-size:0.8em;color:gray\">(像赶走烦人的苍蝇一样，略带粗鲁)</span>","scenario":"<span class=\"context-tag tag-social\">不耐烦</span> \"I'm trying to study, so just <b>buzz off</b> for a while.\"<br>(我正在努力学习，所以赶紧给我滚开/一边凉快去。)","tags":["不耐烦"]},{"id":843,"verb":"Call forth","meaning":"唤起(记忆) / 引起(反应/行动)<br><span style=\"font-size:0.8em;color:gray\">(呼唤其出来，颇具文学色彩)</span>","scenario":"<span class=\"context-tag tag-work\">深情演讲</span> \"The crisis <b>called forth</b> the best qualities in our leadership team.\"<br>(这场危机激发/唤起了我们领导团队中最卓越的品质。)","tags":["深情演讲"]},{"id":844,"verb":"Call out","meaning":"公开点名批评 / 大声呼唤 / 挑战<br><span style=\"font-size:0.8em;color:gray\">(当代互联网极高频：Call-out culture 点名批评文化)</span>","scenario":"<span class=\"context-tag tag-social\">网络舆论</span> \"She bravely <b>called out</b> the toxic behavior in her workplace.\"<br>(她极其勇敢地公开点名批评/揭露了工作场所里的有毒行为。)","tags":["网络舆论"]},{"id":845,"verb":"Camp out","meaning":"露营 / (为买东西等)死守在某处<br><span style=\"font-size:0.8em;color:gray\">(像扎营一样长期驻扎不走)</span>","scenario":"<span class=\"context-tag tag-life\">狂热粉丝</span> \"Fans are <b>camping out</b> in front of the Apple store for the new iPhone.\"<br>(果粉们为了买新iPhone，正死守/安营扎寨在苹果店门前。)","tags":["狂热粉丝"]},{"id":846,"verb":"Cancel out","meaning":"互相抵消 / 对消<br><span style=\"font-size:0.8em;color:gray\">(正负归零)</span>","scenario":"<span class=\"context-tag tag-work\">财务与逻辑</span> \"The new tax break will essentially <b>cancel out</b> the price increase.\"<br>(新的税收减免基本上会完全抵消掉/对冲掉价格的上涨。)","tags":["财务与逻辑"]},{"id":847,"verb":"Cap off","meaning":"为...画上圆满句号 / 作为完美结束<br><span style=\"font-size:0.8em;color:gray\">(在顶部加上盖子)</span>","scenario":"<span class=\"context-tag tag-life\">完美收官</span> \"They <b>capped off</b> a great evening with a walk along the beach.\"<br>(他们以在海滩上散步为这个美妙的夜晚画上了完美的句号。)","tags":["完美收官"]},{"id":848,"verb":"Care for","meaning":"喜欢 / 照料(某人)<br><span style=\"font-size:0.8em;color:gray\">(Would you care for...? 极礼貌地问你要不要)</span>","scenario":"<span class=\"context-tag tag-social\">待客之道</span> \"Would you <b>care for</b> a cup of tea?\"<br>(您愿意/有兴致来杯茶吗？)","tags":["待客之道"]},{"id":849,"verb":"Carry on about","meaning":"对(某事)喋喋不休地抱怨或讨论<br><span style=\"font-size:0.8em;color:gray\">(令人厌烦的持续状态)</span>","scenario":"<span class=\"context-tag tag-drama\">受不了唠叨</span> \"She's been <b>carrying on about</b> her ex-boyfriend all night.\"<br>(她整晚都在对她前男友的事喋喋不休/没完没了地唠叨。)","tags":["受不了唠叨"]},{"id":850,"verb":"Carry over","meaning":"结转 / (资金/习惯/情绪)延续到下一个阶段<br><span style=\"font-size:0.8em;color:gray\">(搬到下一页)</span>","scenario":"<span class=\"context-tag tag-work\">职场年假</span> \"You are allowed to <b>carry over</b> 5 days of PTO into next year.\"<br>(公司允许你将5天未休的带薪年假结转/延续到明年。)","tags":["职场年假"]},{"id":851,"verb":"Carve out","meaning":"艰难开创(事业/天地) / 雕刻出(时间)<br><span style=\"font-size:0.8em;color:gray\">(像刻木头一样费力开辟出来)</span>","scenario":"<span class=\"context-tag tag-work\">职场奋斗</span> \"She managed to <b>carve out</b> a highly successful career in finance.\"<br>(她硬生生在金融界为自己开创/杀出了一条极其成功的职业道路。)","tags":["职场奋斗"]},{"id":852,"verb":"Cash in on","meaning":"靠...捞一把 / 利用(某种局势/机会)大肆赚钱<br><span style=\"font-size:0.8em;color:gray\">(把机会变成现金)</span>","scenario":"<span class=\"context-tag tag-work\">商业暴利</span> \"Many influencers are trying to <b>cash in on</b> the new AI trend.\"<br>(许多网红正试图利用这波新的AI热潮狠狠捞一把/变现。)","tags":["商业暴利"]},{"id":853,"verb":"Cast about for","meaning":"四处寻找 / 搜索枯肠(寻找借口/答案)<br><span style=\"font-size:0.8em;color:gray\">(像在黑暗中撒网一样盲目寻找)</span>","scenario":"<span class=\"context-tag tag-work\">窘迫应对</span> \"He was desperately <b>casting about for</b> an excuse to leave.\"<br>(他正拼命地搜索枯肠/绞尽脑汁寻找一个可以离开的借口。)","tags":["窘迫应对"]},{"id":854,"verb":"Cast off","meaning":"摆脱(束缚) / 解开缆绳启航<br><span style=\"font-size:0.8em;color:gray\">(扔掉束缚物)</span>","scenario":"<span class=\"context-tag tag-life\">释放与航海</span> \"It's time to <b>cast off</b> the old mindset and embrace innovation.\"<br>(是时候彻底抛弃/摆脱旧有的思维模式并拥抱创新了。)","tags":["释放与航海"]},{"id":855,"verb":"Catch at","meaning":"死命抓住(最后一根稻草) / 急切领会<br><span style=\"font-size:0.8em;color:gray\">(Catch at straws 绝望中的挣扎)</span>","scenario":"<span class=\"context-tag tag-drama\">绝境求生</span> \"The failing company is just <b>catching at</b> straws now.\"<br>(这家濒临破产的公司现在不过是在死命抓救命稻草罢了。)","tags":["绝境求生"]},{"id":856,"verb":"Cave to","meaning":"向(压力/要求)屈服<br><span style=\"font-size:0.8em;color:gray\">(等同于 cave in to，极其干脆的坍塌)</span>","scenario":"<span class=\"context-tag tag-work\">政治与谈判</span> \"The mayor refused to <b>cave to</b> public pressure.\"<br>(市长顶住压力，拒绝向公众的呼声屈服/低头。)","tags":["政治与谈判"]},{"id":857,"verb":"Chalk out","meaning":"规划出 / 勾勒出(计划蓝图)<br><span style=\"font-size:0.8em;color:gray\">(像用粉笔画出轮廓)</span>","scenario":"<span class=\"context-tag tag-work\">项目蓝图</span> \"Let's sit down and <b>chalk out</b> a strategy for Q4.\"<br>(咱们坐下来，好好规划/勾勒一下第四季度的战略蓝图。)","tags":["项目蓝图"]},{"id":858,"verb":"Chase down","meaning":"穷追猛打地找到(人或信息)<br><span style=\"font-size:0.8em;color:gray\">(像猎犬一样追击到底)</span>","scenario":"<span class=\"context-tag tag-work\">死磕找人</span> \"I had to <b>chase down</b> the manager to get his signature.\"<br>(我不得不穷追不舍/围堵经理，才总算拿到了他的签字。)","tags":["死磕找人"]},{"id":859,"verb":"Chat up","meaning":"跟...搭讪 / 攀谈(通常带有调情或讨好目的)<br><span style=\"font-size:0.8em;color:gray\">(用言语把气氛烘托上去)</span>","scenario":"<span class=\"context-tag tag-social\">酒吧与职场</span> \"I saw him trying to <b>chat up</b> the bartender.\"<br>(我看到他正试图跟酒保搭讪/套近乎。)","tags":["酒吧与职场"]},{"id":860,"verb":"Cheat out of","meaning":"骗走 / 剥夺(某人应得的东西)<br><span style=\"font-size:0.8em;color:gray\">(用欺诈手段使其失去)</span>","scenario":"<span class=\"context-tag tag-drama\">维权申诉</span> \"They completely <b>cheated</b> him <b>out of</b> his inheritance.\"<br>(他们极其卑鄙地骗走/剥夺了他应得的全部遗产。)","tags":["维权申诉"]},{"id":861,"verb":"Check off","meaning":"在清单上打勾 / 逐项核对完成<br><span style=\"font-size:0.8em;color:gray\">(极度爽快的强迫症词汇)</span>","scenario":"<span class=\"context-tag tag-work\">任务管理</span> \"I love the feeling of <b>checking off</b> tasks on my to-do list.\"<br>(我极度享受在待办清单上逐项打勾/划掉任务的快感。)","tags":["任务管理"]},{"id":862,"verb":"Chime with","meaning":"与...一致 / 极其相符<br><span style=\"font-size:0.8em;color:gray\">(像和声一样和谐共鸣)</span>","scenario":"<span class=\"context-tag tag-work\">逻辑验证</span> \"His testimony doesn't quite <b>chime with</b> the evidence.\"<br>(他的证词与现有证据并不怎么相符/对不上号。)","tags":["逻辑验证"]},{"id":863,"verb":"Chip away at","meaning":"一点点削弱 / 逐渐破坏(信心/债务)<br><span style=\"font-size:0.8em;color:gray\">(像凿冰一样一点点凿掉)</span>","scenario":"<span class=\"context-tag tag-work\">水滴石穿</span> \"We need to continuously <b>chip away at</b> our massive debt.\"<br>(我们需要持之以恒地/像蚂蚁搬家一样一点点削减我们庞大的债务。)","tags":["水滴石穿"]},{"id":864,"verb":"Chomp at/on","meaning":"(Chomp at the bit) 焦急地等待 / 跃跃欲试<br><span style=\"font-size:0.8em;color:gray\">(像马咬着嚼子想冲出去)</span>","scenario":"<span class=\"context-tag tag-social\">迫不及待</span> \"The players are <b>chomping at the bit</b> to start the new season.\"<br>(球员们已经按捺不住/跃跃欲试地想开启新赛季了。)","tags":["迫不及待"]},{"id":865,"verb":"Chop down","meaning":"砍倒 / 大幅削减(预算/价格)<br><span style=\"font-size:0.8em;color:gray\">(极其暴力的动作)</span>","scenario":"<span class=\"context-tag tag-work\">财务危机</span> \"The board decided to <b>chop down</b> the marketing budget by 50%.\"<br>(董事会决定极其残忍地将营销预算一刀砍掉一半。)","tags":["财务危机"]},{"id":866,"verb":"Chuck out","meaning":"粗鲁地扔掉 / 把某人强行赶出<br><span style=\"font-size:0.8em;color:gray\">(比 throw out 更随便、更粗暴)</span>","scenario":"<span class=\"context-tag tag-life\">打扫与酒吧</span> \"I'm going to <b>chuck out</b> all this old junk in the garage.\"<br>(我打算把车库里这些破铜烂铁全部当垃圾扔出去。)","tags":["打扫与酒吧"]},{"id":867,"verb":"Chum up with","meaning":"与...结为密友 / 迅速打得火热<br><span style=\"font-size:0.8em;color:gray\">(Chum = 密友。类似于 pal up with)</span>","scenario":"<span class=\"context-tag tag-social\">职场站队</span> \"He quickly <b>chummed up with</b> the senior executives.\"<br>(他极快地跟几位高管打得火热/套上了交情。)","tags":["职场站队"]},{"id":868,"verb":"Cling onto","meaning":"紧紧依附 / 固执地死死抱住(权力/希望)<br><span style=\"font-size:0.8em;color:gray\">(绝望地抓住不放)</span>","scenario":"<span class=\"context-tag tag-drama\">政治与情感</span> \"The dictator is desperately <b>clinging onto</b> power.\"<br>(独裁者正在绝望地/死死地抓着权力不放。)","tags":["政治与情感"]},{"id":869,"verb":"Claw back","meaning":"慢慢挽回(劣势) / 艰难夺回(资金/选票)<br><span style=\"font-size:0.8em;color:gray\">(像用爪子死命抠回来，金融极其高频)</span>","scenario":"<span class=\"context-tag tag-work\">商战与股市</span> \"The stock market managed to <b>claw back</b> some of its early losses.\"<br>(股市艰难地/极其费力地扳回了早盘的部分跌幅。)","tags":["商战与股市"]},{"id":870,"verb":"Cleanse of","meaning":"彻底清除 / 洗净(罪恶/污点)<br><span style=\"font-size:0.8em;color:gray\">(精神或深层次的净化)</span>","scenario":"<span class=\"context-tag tag-drama\">公关洗白</span> \"The new CEO wants to <b>cleanse</b> the company <b>of</b> its toxic culture.\"<br>(新CEO希望彻底肃清/洗净公司内部的有毒文化。)","tags":["公关洗白"]},{"id":871,"verb":"Clear off","meaning":"离开 / 散开(通常带有不耐烦的驱赶意味)<br><span style=\"font-size:0.8em;color:gray\">(滚开，腾出地方)</span>","scenario":"<span class=\"context-tag tag-social\">驱逐警告</span> \"I told the kids playing near my car to <b>clear off</b>.\"<br>(我叫那些在我车旁玩耍的熊孩子们赶紧散开/走远点。)","tags":["驱逐警告"]},{"id":872,"verb":"Cling to","meaning":"紧紧抱住 / 坚持(某种信念)不放弃<br><span style=\"font-size:0.8em;color:gray\">(和 cling onto 一样，情感极度依恋)</span>","scenario":"<span class=\"context-tag tag-life\">信仰与情感</span> \"She still <b>clings to</b> the hope that he will return.\"<br>(她依然死死抱着/不肯放弃他会回来的那一丝希望。)","tags":["信仰与情感"]},{"id":873,"verb":"Clock in","meaning":"打卡上班 / (时间/重量)达到某个数值<br><span style=\"font-size:0.8em;color:gray\">(记录下打卡机的时间)</span>","scenario":"<span class=\"context-tag tag-work\">考勤与数据</span> \"I usually <b>clock in</b> at exactly 8:55 AM.\" (我通常在8:55准时打卡上班。)<br>\"The new laptop <b>clocks in</b> at just under 2 pounds.\" (这款新笔记本电脑的重量惊人地控制在不到2磅。)","tags":["考勤与数据"]},{"id":874,"verb":"Clog up","meaning":"严重阻塞 / 堵死(管道/系统)<br><span style=\"font-size:0.8em;color:gray\">(像黏液一样彻底堵住)</span>","scenario":"<span class=\"context-tag tag-life\">通下水道/交通</span> \"Grease and hair completely <b>clogged up</b> the drain.\"<br>(油脂和头发把下水道彻底堵死/塞住了。)","tags":["通下水道/交通"]},{"id":875,"verb":"Close in on","meaning":"不断逼近 / 包围(猎物或目标)<br><span style=\"font-size:0.8em;color:gray\">(包围圈越来越小，极具压迫感)</span>","scenario":"<span class=\"context-tag tag-drama\">警匪与竞争</span> \"The police are finally <b>closing in on</b> the suspect.\"<br>(警方终于步步紧逼/快要对嫌疑人形成合围了。)","tags":["警匪与竞争"]},{"id":876,"verb":"Cloud over","meaning":"(脸/心情)突然变得阴沉 / (天空)乌云密布<br><span style=\"font-size:0.8em;color:gray\">(被乌云笼罩)</span>","scenario":"<span class=\"context-tag tag-drama\">情绪突变</span> \"His face suddenly <b>clouded over</b> when I mentioned the debt.\"<br>(当我提到债务时，他的脸瞬间阴沉/拉了下来。)","tags":["情绪突变"]},{"id":877,"verb":"Coast along","meaning":"轻松度日 / 不思进取(凭借惯性滑行)<br><span style=\"font-size:0.8em;color:gray\">(在职场中指混日子不努力)</span>","scenario":"<span class=\"context-tag tag-work\">批评摸鱼</span> \"You can't just <b>coast along</b> and expect to get a promotion.\"<br>(你不能指望天天混日子/靠惯性滑行就能拿到升职。)","tags":["批评摸鱼"]},{"id":878,"verb":"Cobble together","meaning":"东拼西凑 / 粗制滥造地拼凑出(计划等)<br><span style=\"font-size:0.8em;color:gray\">(像修鞋匠用碎皮子补鞋)</span>","scenario":"<span class=\"context-tag tag-work\">吐槽劣质产出</span> \"We barely had time, so we just <b>cobbled together</b> a quick presentation.\"<br>(我们几乎没时间，所以只能极其敷衍地东拼西凑了一份演示文稿。)","tags":["吐槽劣质产出"]},{"id":879,"verb":"Coil up","meaning":"卷起来 / 盘绕成一团<br><span style=\"font-size:0.8em;color:gray\">(像蛇或弹簧一样)</span>","scenario":"<span class=\"context-tag tag-life\">收纳电线</span> \"Make sure you <b>coil up</b> the garden hose after using it.\"<br>(用完水管后，务必确保把它整齐地盘/卷起来。)","tags":["收纳电线"]},{"id":880,"verb":"Comb through","meaning":"仔细搜查 / 极其细致地梳理(信息)<br><span style=\"font-size:0.8em;color:gray\">(像用梳子梳头发一样不放过任何死角)</span>","scenario":"<span class=\"context-tag tag-work\">调查取证</span> \"Investigators are currently <b>combing through</b> the financial records.\"<br>(调查人员目前正在极其细致地筛查/梳理那些财务记录。)","tags":["调查取证"]},{"id":881,"verb":"Fritter away","meaning":"毫无意义地挥霍 / 虚度(时间/金钱)<br><span style=\"font-size:0.8em;color:gray\">(把东西弄得粉碎撒掉)</span>","scenario":"<span class=\"context-tag tag-life\">懊悔浪费</span> \"He <b>frittered away</b> his entire inheritance on gambling.\"<br>(他极其败家地把全部遗产都挥霍在/扔进了赌博里。)","tags":["懊悔浪费"]},{"id":882,"verb":"Gad about","meaning":"到处游荡 / 寻欢作乐<br><span style=\"font-size:0.8em;color:gray\">(不务正业地四处乱跑)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽不着家</span> \"She spends her weekends just <b>gadding about</b> town.\"<br>(她整个周末都在城里无所事事地游荡/寻欢作乐。)","tags":["吐槽不着家"]},{"id":883,"verb":"Gang up on","meaning":"结伙对付 / 合伙欺负(某人)<br><span style=\"font-size:0.8em;color:gray\">(像黑帮一样群殴，职场霸凌极高频)</span>","scenario":"<span class=\"context-tag tag-drama\">职场被孤立</span> \"I felt like the entire board of directors was <b>ganging up on</b> me.\"<br>(我感觉整个董事会都在合伙针对我/将我围剿。)","tags":["职场被孤立"]},{"id":884,"verb":"Gear towards","meaning":"使(产品/服务)特别适合于(某类人群)<br><span style=\"font-size:0.8em;color:gray\">(把齿轮转向那个方向)</span>","scenario":"<span class=\"context-tag tag-work\">产品定位</span> \"This new marketing campaign is heavily <b>geared towards</b> Gen Z.\"<br>(这项新的营销活动是极其精准地针对/偏向Z世代受众的。)","tags":["产品定位"]},{"id":885,"verb":"Get back at","meaning":"报复(某人)<br><span style=\"font-size:0.8em;color:gray\">(把受到的伤害原封不动地还回去)</span>","scenario":"<span class=\"context-tag tag-drama\">宫斗撕逼</span> \"I think she's just dating him to <b>get back at</b> her ex.\"<br>(我觉得她跟他约会纯粹是为了报复她的前男友。)","tags":["宫斗撕逼"]},{"id":886,"verb":"Get in on","meaning":"参与 / 分一杯羹 / 加入(某个有利可图的局)<br><span style=\"font-size:0.8em;color:gray\">(挤进去上车)</span>","scenario":"<span class=\"context-tag tag-work\">投资与内幕</span> \"Everyone wants to <b>get in on</b> the AI investment boom.\"<br>(每个人都想挤上车/参与到这波AI投资热潮中分一杯羹。)","tags":["投资与内幕"]},{"id":887,"verb":"Glance off","meaning":"擦过 / 掠过(表面)<br><span style=\"font-size:0.8em;color:gray\">(未能正面击中，物理或语言上的弹开)</span>","scenario":"<span class=\"context-tag tag-drama\">子弹或批评</span> \"The bullet just <b>glanced off</b> his shoulder.\"<br>(子弹仅仅是极其惊险地擦过了他的肩膀。)","tags":["子弹或批评"]},{"id":888,"verb":"Gloss over","meaning":"掩盖 / 避重就轻地敷衍(错误或瑕疵)<br><span style=\"font-size:0.8em;color:gray\">(刷上一层光泽来掩人耳目)</span>","scenario":"<span class=\"context-tag tag-work\">公关与甩锅</span> \"You can't just <b>gloss over</b> a $2 million deficit!\"<br>(你不能就这么极其敷衍地/轻描淡写地把两百万的亏空掩盖过去！)","tags":["公关与甩锅"]},{"id":889,"verb":"Gnaw at","meaning":"(焦虑/内疚等)持续折磨 / 啃噬(内心)<br><span style=\"font-size:0.8em;color:gray\">(像老鼠咬木头一样持续的心理消耗)</span>","scenario":"<span class=\"context-tag tag-drama\">极度内耗</span> \"The guilt of that lie has been <b>gnawing at</b> me for years.\"<br>(那个谎言带来的负罪感，多年来一直在疯狂啃噬/折磨着我的内心。)","tags":["极度内耗"]},{"id":890,"verb":"Goad into","meaning":"不断刺激 / 激将法怂恿(某人做蠢事)<br><span style=\"font-size:0.8em;color:gray\">(用赶牛棒戳着赶牛)</span>","scenario":"<span class=\"context-tag tag-drama\">争吵与挑衅</span> \"He successfully <b>goaded</b> his opponent <b>into</b> making a stupid mistake.\"<br>(他极其成功地用激将法刺激对手犯下了一个愚蠢的错误。)","tags":["争吵与挑衅"]},{"id":891,"verb":"Goof around","meaning":"瞎胡闹 / 摸鱼混日子<br><span style=\"font-size:0.8em;color:gray\">(极其纯正的美国俚语，同 goof off)</span>","scenario":"<span class=\"context-tag tag-life\">学校与办公室</span> \"Stop <b>goofing around</b> and finish your homework!\"<br>(别在那儿瞎胡闹/摸鱼了，赶紧写你的作业！)","tags":["学校与办公室"]},{"id":892,"verb":"Grate on","meaning":"使(某人)极度烦躁 / (声音)刺耳难听<br><span style=\"font-size:0.8em;color:gray\">(像在擦菜板上摩擦一样令人不适)</span>","scenario":"<span class=\"context-tag tag-social\">忍无可忍</span> \"His constant complaining is really starting to <b>grate on</b> my nerves.\"<br>(他那没完没了的抱怨，真让我神经极度抓狂/像用指甲刮黑板一样难受。)","tags":["忍无可忍"]},{"id":893,"verb":"Grind down","meaning":"残酷折磨至屈服 / 慢慢磨损压垮<br><span style=\"font-size:0.8em;color:gray\">(像在磨盘里慢慢碾碎，极其残酷)</span>","scenario":"<span class=\"context-tag tag-drama\">战争与高压</span> \"The constant high-pressure environment eventually <b>ground</b> him <b>down</b>.\"<br>(持续的高压环境最终彻底磨灭/压垮了他的意志。)","tags":["战争与高压"]},{"id":894,"verb":"Grow out of","meaning":"因长大而不再做(某事) / 穿不下(衣服) / 源于<br><span style=\"font-size:0.8em;color:gray\">(长大了壳子装不下了)</span>","scenario":"<span class=\"context-tag tag-life\">育儿与起因</span> \"He'll eventually <b>grow out of</b> this rebellious phase.\" (他长大后最终会脱离/不再有这个叛逆期的。)<br>\"The project <b>grew out of</b> a simple conversation.\" (这个项目源于/脱胎于一次简单的谈话。)","tags":["育儿与起因"]},{"id":895,"verb":"Gun for","meaning":"极力追求(职位) / 试图猛烈击败(某人)<br><span style=\"font-size:0.8em;color:gray\">(端着枪死死瞄准目标)</span>","scenario":"<span class=\"context-tag tag-work\">职场野心</span> \"It's obvious that she is <b>gunning for</b> the VP position.\"<br>(很明显，她正在火力全开/极力图谋拿下副总裁的位子。)","tags":["职场野心"]},{"id":896,"verb":"Hack away at","meaning":"不断猛烈削弱 / 大刀阔斧地砍掉<br><span style=\"font-size:0.8em;color:gray\">(用斧头胡乱砍击)</span>","scenario":"<span class=\"context-tag tag-work\">解决庞大问题</span> \"We've been <b>hacking away at</b> this massive codebase for weeks.\"<br>(我们已经连续几周在这庞大的代码库里大刀阔斧地砍/艰难推进了。)","tags":["解决庞大问题"]},{"id":897,"verb":"Hand down","meaning":"把...传给后代 / (法官当庭)宣布(判决)<br><span style=\"font-size:0.8em;color:gray\">(从长辈或高位向下传)</span>","scenario":"<span class=\"context-tag tag-life\">传家宝与法律</span> \"The judge is expected to <b>hand down</b> a verdict tomorrow.\"<br>(预计法官将于明天当庭宣判/下达判决书。)","tags":["传家宝与法律"]},{"id":898,"verb":"Hang on to","meaning":"紧紧抓住 / 固执保留(不舍得扔)<br><span style=\"font-size:0.8em;color:gray\">(强烈的占有欲)</span>","scenario":"<span class=\"context-tag tag-life\">囤积癖</span> \"Why do you still <b>hang on to</b> all these old magazines?\"<br>(你为什么还要死死留着/囤着所有这些旧杂志不扔？)","tags":["囤积癖"]},{"id":899,"verb":"Harp on","meaning":"喋喋不休地抱怨 / 死咬着(同一件事)不放<br><span style=\"font-size:0.8em;color:gray\">(像一直拨弄竖琴的同一根弦，极度烦人)</span>","scenario":"<span class=\"context-tag tag-social\">忍无可忍</span> \"Please stop <b>harping on</b> the mistake I made three years ago!\"<br>(拜托别再死死揪着/喋喋不休我三年前犯的那个错了！)","tags":["忍无可忍"]},{"id":900,"verb":"Hash out","meaning":"经过漫长激烈的讨论来解决(分歧或细节)<br><span style=\"font-size:0.8em;color:gray\">(把肉剁碎了揉烂了讨论清楚)</span>","scenario":"<span class=\"context-tag tag-work\">硬核谈判</span> \"The leaders stayed up all night to <b>hash out</b> the final peace treaty.\"<br>(领导人们熬了整整一夜，才死磕/艰难敲定了最终和平条约的细节。)","tags":["硬核谈判"]},{"id":901,"verb":"Walk back","meaning":"撤回(言论) / 做出妥协让步<br><span style=\"font-size:0.8em;color:gray\">(往回走，政界与商界极高频用词)</span>","scenario":"<span class=\"context-tag tag-work\">公关危机</span> \"The CEO was forced to <b>walk back</b> his controversial comments.\"<br>(CEO被迫撤回/收回了他那极具争议的言论。)","tags":["公关危机"]},{"id":902,"verb":"Walk all over","meaning":"肆意践踏 / 骑在(某人)头上欺负<br><span style=\"font-size:0.8em;color:gray\">(毫不留情地踩过去，极其形象)</span>","scenario":"<span class=\"context-tag tag-drama\">职场反抗</span> \"You can't just let them <b>walk all over</b> you like that!\"<br>(你不能就这么任由他们骑在你头上肆意欺负你！)","tags":["职场反抗"]},{"id":903,"verb":"Wash hands of","meaning":"洗手不干 / 彻底推卸责任<br><span style=\"font-size:0.8em;color:gray\">(撇清关系，源于圣经里彼拉多洗手)</span>","scenario":"<span class=\"context-tag tag-work\">甩锅断交</span> \"I am completely <b>washing my hands of</b> this disastrous project.\"<br>(我要彻底撒手不管/撇清与这个灾难级项目的所有关系。)","tags":["甩锅断交"]},{"id":904,"verb":"Wring out","meaning":"拧干(水分) / 竭力榨取(资金/利润)<br><span style=\"font-size:0.8em;color:gray\">(像拧干毛巾一样极其用力)</span>","scenario":"<span class=\"context-tag tag-work\">商业压榨</span> \"The company is trying to <b>wring</b> every last drop of profit <b>out</b> of the market.\"<br>(公司正试图从市场上榨干最后一滴利润。)","tags":["商业压榨"]},{"id":905,"verb":"Whittle down","meaning":"逐渐削减 / 缩小(候选/预算)范围<br><span style=\"font-size:0.8em;color:gray\">(像削木头一样一点点削小)</span>","scenario":"<span class=\"context-tag tag-work\">筛选候选人</span> \"We managed to <b>whittle down</b> the 100 applicants to a shortlist of 5.\"<br>(我们成功将100名申请者大浪淘沙/缩减到了最终的5人候选名单。)","tags":["筛选候选人"]},{"id":906,"verb":"Wriggle out of","meaning":"(用狡猾手段)设法逃避(责任/惩罚)<br><span style=\"font-size:0.8em;color:gray\">(像虫子一样扭动身躯滑脱出去)</span>","scenario":"<span class=\"context-tag tag-drama\">揭穿谎言</span> \"Don't try to <b>wriggle out of</b> your responsibilities this time.\"<br>(这次别再妄图耍滑头逃避你的责任了。)","tags":["揭穿谎言"]},{"id":907,"verb":"Wade through","meaning":"艰难地处理 / 费力地阅读(海量文件)<br><span style=\"font-size:0.8em;color:gray\">(像在深水或泥沼中跋涉)</span>","scenario":"<span class=\"context-tag tag-work\">枯燥加班</span> \"I have to <b>wade through</b> 50 pages of legal documents tonight.\"<br>(今晚我不得不极其痛苦地趟过/啃完50页的法律文件。)","tags":["枯燥加班"]},{"id":908,"verb":"While away","meaning":"惬意地消磨(时间)<br><span style=\"font-size:0.8em;color:gray\">(通常指愉快且无所事事地度过)</span>","scenario":"<span class=\"context-tag tag-life\">周末休闲</span> \"We <b>whiled away</b> the entire afternoon chatting on the porch.\"<br>(我们在门廊上聊着天，惬意地消磨了整整一个下午。)","tags":["周末休闲"]},{"id":909,"verb":"Write up","meaning":"正式记录 / 开(罚单) / 写(报道)<br><span style=\"font-size:0.8em;color:gray\">(把结果写成书面文件)</span>","scenario":"<span class=\"context-tag tag-work\">交规与职场</span> \"The police officer <b>wrote</b> me <b>up</b> for speeding.\" (警察给我开了一张超速罚单。)<br>\"I'll <b>write up</b> the meeting minutes and send them out.\" (我会整理出会议纪要并发给大家。)","tags":["交规与职场"]},{"id":910,"verb":"Wind up","meaning":"最终落得(某种结局) / 给...上发条 / 惹怒<br><span style=\"font-size:0.8em;color:gray\">(极其高频且多义的词。等于 end up)</span>","scenario":"<span class=\"context-tag tag-drama\">人生结局</span> \"If you keep drinking like this, you're going to <b>wind up</b> in the hospital.\"<br>(如果你继续这么喝下去，你早晚会落得个进医院的下场。)","tags":["人生结局"]},{"id":911,"verb":"Whip into shape","meaning":"严格训练使之成型 / 迅速整顿(团队)<br><span style=\"font-size:0.8em;color:gray\">(像挥舞鞭子一样强力管教)</span>","scenario":"<span class=\"context-tag tag-work\">空降高管</span> \"The new manager is determined to <b>whip</b> the team <b>into shape</b>.\"<br>(新任经理下定决心要用铁腕手段把团队狠狠整顿一番。)","tags":["空降高管"]},{"id":912,"verb":"Wish away","meaning":"希望(问题)凭空消失<br><span style=\"font-size:0.8em;color:gray\">(自欺欺人，通常带有否定含义)</span>","scenario":"<span class=\"context-tag tag-life\">面对现实</span> \"You can't just <b>wish away</b> your debt, you have to pay it.\"<br>(你不能指望你的债务会凭空消失，你必须得还钱。)","tags":["面对现实"]},{"id":913,"verb":"Yak on / Yammer on","meaning":"喋喋不休地废话 / 唠叨<br><span style=\"font-size:0.8em;color:gray\">(极其地道的美式口语吐槽)</span>","scenario":"<span class=\"context-tag tag-social\">忍无可忍</span> \"He just kept <b>yammering on</b> about his new car for an hour.\"<br>(他足足对他的新车喋喋不休地废话了一个小时。)","tags":["忍无可忍"]},{"id":914,"verb":"Yank around","meaning":"粗暴地使唤 / 忽悠(某人)<br><span style=\"font-size:0.8em;color:gray\">(像拽绳子一样把人拽来拽去)</span>","scenario":"<span class=\"context-tag tag-drama\">商业陷阱</span> \"I feel like this car dealer is just <b>yanking</b> us <b>around</b>.\"<br>(我感觉这个二手车贩子纯粹是在忽悠/耍我们玩。)","tags":["商业陷阱"]},{"id":915,"verb":"Yield up","meaning":"被迫交出 / 展现出(隐藏的东西)<br><span style=\"font-size:0.8em;color:gray\">(屈服并呈上)</span>","scenario":"<span class=\"context-tag tag-work\">调查取证</span> \"The investigation finally <b>yielded up</b> some hard evidence.\"<br>(调查最终挖掘/逼出了几项铁证。)","tags":["调查取证"]},{"id":916,"verb":"Zero out","meaning":"将...清零 / 彻底削减至零<br><span style=\"font-size:0.8em;color:gray\">(极具科技感和财务色彩)</span>","scenario":"<span class=\"context-tag tag-work\">预算审计</span> \"The board decided to completely <b>zero out</b> the marketing budget.\"<br>(董事会决定极其绝情地将营销预算彻底清零。)","tags":["预算审计"]},{"id":917,"verb":"Zip around","meaning":"快速穿梭 / 跑来跑去<br><span style=\"font-size:0.8em;color:gray\">(带有一种轻快、拉风的画面感)</span>","scenario":"<span class=\"context-tag tag-life\">周末日常</span> \"We spent the day just <b>zipping around</b> town on a scooter.\"<br>(我们骑着小踏板车在城里快速穿梭，玩了一整天。)","tags":["周末日常"]},{"id":918,"verb":"Zip up","meaning":"闭嘴 / 拉上拉链<br><span style=\"font-size:0.8em;color:gray\">(Zip it up! = 给我闭嘴！粗鲁警告)</span>","scenario":"<span class=\"context-tag tag-drama\">争吵发火</span> \"Just <b>zip it up</b>! I don't want to hear another word.\"<br>(给我闭上你的嘴！我一个字都不想再听了。)","tags":["争吵发火"]},{"id":919,"verb":"Zone in on","meaning":"全神贯注于 / 死死锁定(目标)<br><span style=\"font-size:0.8em;color:gray\">(类似于 zero in on，极其专注)</span>","scenario":"<span class=\"context-tag tag-work\">头脑风暴</span> \"We need to <b>zone in on</b> the exact cause of this system failure.\"<br>(我们需要全神贯注地死磕/锁定导致系统崩溃的确切原因。)","tags":["头脑风暴"]},{"id":920,"verb":"Zoom past","meaning":"飞驰而过 / 极其轻松地超越<br><span style=\"font-size:0.8em;color:gray\">(带有“嗖”的一声的画面感)</span>","scenario":"<span class=\"context-tag tag-work\">商业竞争</span> \"Our startup completely <b>zoomed past</b> the legacy competitors.\"<br>(我们的初创公司极其轻松地弯道超车/甩开了那些传统竞争对手。)","tags":["商业竞争"]},{"id":921,"verb":"Argue down","meaning":"通过辩论压倒对方 / 狠狠砍价<br><span style=\"font-size:0.8em;color:gray\">(用言语把对方的气焰或价格压下去)</span>","scenario":"<span class=\"context-tag tag-life\">购物谈判</span> \"I managed to <b>argue</b> the landlord <b>down</b> on the rent.\"<br>(我硬是凭三寸不烂之舌，把房东的租金给狠狠砍下来了。)","tags":["购物谈判"]},{"id":922,"verb":"Angle for","meaning":"转弯抹角地谋求 / 钓取(赞美/职位)<br><span style=\"font-size:0.8em;color:gray\">(像抛下鱼钩一样试探)</span>","scenario":"<span class=\"context-tag tag-work\">职场心机</span> \"It's obvious that he is <b>angling for</b> a promotion.\"<br>(很明显，他正在转弯抹角地/处心积虑地谋求升职。)","tags":["职场心机"]},{"id":923,"verb":"Answer for","meaning":"对...负责 / 承担(罪过)的后果<br><span style=\"font-size:0.8em;color:gray\">(为自己做过的事给个说法)</span>","scenario":"<span class=\"context-tag tag-drama\">法庭与指责</span> \"One day, you will have to <b>answer for</b> your crimes.\"<br>(总有一天，你必将为你犯下的罪行付出代价/给个交代。)","tags":["法庭与指责"]},{"id":924,"verb":"Auction off","meaning":"将...拍卖掉<br><span style=\"font-size:0.8em;color:gray\">(大甩卖，彻底清仓)</span>","scenario":"<span class=\"context-tag tag-work\">公司破产</span> \"The bankrupt company is <b>auctioning off</b> all its equipment.\"<br>(这家破产的公司正在将其所有设备悉数拍卖掉。)","tags":["公司破产"]},{"id":925,"verb":"Average out","meaning":"最终达到平衡 / 平均下来(结果不错)<br><span style=\"font-size:0.8em;color:gray\">(抹平高低起伏)</span>","scenario":"<span class=\"context-tag tag-work\">股市与心态</span> \"We had some bad months, but the profits will <b>average out</b> over the year.\"<br>(我们有几个月业绩很差，但把全年的利润拉平/平均下来还是可以的。)","tags":["股市与心态"]},{"id":926,"verb":"Bail on","meaning":"放鸽子 / 抛弃 / 爽约<br><span style=\"font-size:0.8em;color:gray\">(超级无敌极度高频的美国年轻人俚语)</span>","scenario":"<span class=\"context-tag tag-social\">美国社交</span> \"Are you seriously going to <b>bail on</b> me tonight?\"<br>(你今晚真的是打算要放我鸽子吗？)","tags":["美国社交"]},{"id":927,"verb":"Balance out","meaning":"互相抵消 / 保持平衡<br><span style=\"font-size:0.8em;color:gray\">(放在天平两端)</span>","scenario":"<span class=\"context-tag tag-work\">优势与劣势</span> \"His brilliant creativity <b>balances out</b> his lack of organization.\"<br>(他极其卓越的创造力恰好抵消/弥补了他缺乏条理的缺点。)","tags":["优势与劣势"]},{"id":928,"verb":"Band together","meaning":"团结起来 / 抱团取暖<br><span style=\"font-size:0.8em;color:gray\">(绑在一起对抗外敌)</span>","scenario":"<span class=\"context-tag tag-work\">维权抗议</span> \"The employees decided to <b>band together</b> to demand better pay.\"<br>(员工们决定抱团取暖/团结一致，要求提高待遇。)","tags":["维权抗议"]},{"id":929,"verb":"Bargain down","meaning":"讨价还价使之降价<br><span style=\"font-size:0.8em;color:gray\">(与 argue down 类似，专用于买卖)</span>","scenario":"<span class=\"context-tag tag-life\">买车买房</span> \"I <b>bargained</b> the seller <b>down</b> to a price I could afford.\"<br>(我硬是和卖家讨价还价，把价格砍到了我能承受的范围。)","tags":["买车买房"]},{"id":930,"verb":"Bawl out","meaning":"大声痛骂 / 狂斥<br><span style=\"font-size:0.8em;color:gray\">(极其严厉且音量巨大的责骂)</span>","scenario":"<span class=\"context-tag tag-drama\">情绪爆发</span> \"The coach <b>bawled out</b> the entire team after the terrible loss.\"<br>(遭遇惨败后，教练把整个球队痛骂得狗血淋头。)","tags":["情绪爆发"]},{"id":931,"verb":"Bear witness to","meaning":"证明 / 见证(某事)<br><span style=\"font-size:0.8em;color:gray\">(极其正式、极具历史沉淀感的表达)</span>","scenario":"<span class=\"context-tag tag-work\">宏大叙事</span> \"These ancient ruins <b>bear witness to</b> a once-great civilization.\"<br>(这些古老的废墟见证了一个曾经伟大无比的文明。)","tags":["宏大叙事"]},{"id":932,"verb":"Beat out","meaning":"击败(竞争对手) / 险胜<br><span style=\"font-size:0.8em;color:gray\">(把别人打出局)</span>","scenario":"<span class=\"context-tag tag-work\">商战与求职</span> \"She managed to <b>beat out</b> 50 other candidates for the job.\"<br>(她成功击败/卷赢了其他50名候选人，拿下了这份工作。)","tags":["商战与求职"]},{"id":933,"verb":"Bed down","meaning":"临时借宿 / 铺床睡觉<br><span style=\"font-size:0.8em;color:gray\">(打地铺或随便找个地方对付一宿)</span>","scenario":"<span class=\"context-tag tag-life\">沙发客</span> \"You can <b>bed down</b> on the sofa for tonight.\"<br>(今晚你可以就在沙发上凑合/对付一宿。)","tags":["沙发客"]},{"id":934,"verb":"Beef about","meaning":"发牢骚 / 没完没了地抱怨<br><span style=\"font-size:0.8em;color:gray\">(Beef 在俚语中即“抱怨/纠纷”之意)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽同事</span> \"What is he always <b>beefing about</b> now?\"<br>(他现在又在天天发什么牢骚/逼逼赖赖些什么呢？)","tags":["吐槽同事"]},{"id":935,"verb":"Belt up","meaning":"闭嘴！ / 系好安全带<br><span style=\"font-size:0.8em;color:gray\">(口语中非常粗鲁的“安静点”)</span>","scenario":"<span class=\"context-tag tag-drama\">极度烦躁</span> \"Oh, just <b>belt up</b>! I'm trying to concentrate.\"<br>(哎呀，给我闭嘴！我正试着集中注意力呢。)","tags":["极度烦躁"]},{"id":936,"verb":"Bite back","meaning":"反咬一口 / 强行把话咽回去<br><span style=\"font-size:0.8em;color:gray\">(生理与心理的双重反击/克制)</span>","scenario":"<span class=\"context-tag tag-drama\">隐忍不发</span> \"I wanted to insult him, but I <b>bit back</b> my words.\"<br>(我本想羞辱他，但我死死咬住舌头/把话硬生生憋了回去。)","tags":["隐忍不发"]},{"id":937,"verb":"Blend into","meaning":"完美融入(背景/环境)<br><span style=\"font-size:0.8em;color:gray\">(像变色龙一样，不露痕迹)</span>","scenario":"<span class=\"context-tag tag-social\">社交隐身</span> \"He is very quiet and just tries to <b>blend into</b> the background.\"<br>(他非常安静，只想着尽量变成个小透明/融入背景中不被注意。)","tags":["社交隐身"]},{"id":938,"verb":"Blot out","meaning":"遮盖住(光线) / 刻意抹去(痛苦的记忆)<br><span style=\"font-size:0.8em;color:gray\">(像墨水弄脏纸一样抹除)</span>","scenario":"<span class=\"context-tag tag-drama\">心理创伤</span> \"She tried to <b>blot out</b> the memories of the terrible accident.\"<br>(她试图将那场可怕事故的记忆彻底抹去/强行屏蔽。)","tags":["心理创伤"]},{"id":939,"verb":"Blow past","meaning":"轻易超过 / 远超(预期或截止日期)<br><span style=\"font-size:0.8em;color:gray\">(像一阵风一样刮过去)</span>","scenario":"<span class=\"context-tag tag-work\">业绩汇报</span> \"The new iPhone <b>blew past</b> all sales expectations.\"<br>(新款iPhone的销量极其轻松地远超/碾压了所有人的预期。)","tags":["业绩汇报"]},{"id":940,"verb":"Blunder through","meaning":"跌跌撞撞地完成 / 笨拙地搞定<br><span style=\"font-size:0.8em;color:gray\">(没头没脑，全是失误但居然做完了)</span>","scenario":"<span class=\"context-tag tag-work\">吐槽能力</span> \"He didn't prepare at all, he just <b>blundered through</b> the presentation.\"<br>(他根本没准备，硬是连滚带爬/跌跌撞撞地糊弄完了那场演示。)","tags":["吐槽能力"]},{"id":941,"verb":"Bog off","meaning":"滚开！ / 走开<br><span style=\"font-size:0.8em;color:gray\">(极其不客气的驱赶，英式/美式口语)</span>","scenario":"<span class=\"context-tag tag-drama\">冲突爆发</span> \"I've had enough of you. Just <b>bog off</b>!\"<br>(我受够你了。赶紧给我滚得远远的！)","tags":["冲突爆发"]},{"id":942,"verb":"Book up","meaning":"预订一空 / 把时间排满<br><span style=\"font-size:0.8em;color:gray\">(全满了，塞不下了)</span>","scenario":"<span class=\"context-tag tag-work\">日程极满</span> \"I can't meet you today, my schedule is completely <b>booked up</b>.\"<br>(我今天见不了你，我的日程表已经彻底排满了/插不进针了。)","tags":["日程极满"]},{"id":943,"verb":"Boot up","meaning":"启动(电脑) / 准备就绪<br><span style=\"font-size:0.8em;color:gray\">(穿上靴子准备出发 / IT词汇)</span>","scenario":"<span class=\"context-tag tag-work\">IT与日常</span> \"Give me a second, my laptop is still <b>booting up</b>.\"<br>(等我一秒钟，我的笔记本电脑还在启动/开机中。)","tags":["IT与日常"]},{"id":944,"verb":"Bounce around","meaning":"反复讨论(想法) / 四处漂泊跳槽<br><span style=\"font-size:0.8em;color:gray\">(像皮球一样弹来弹去)</span>","scenario":"<span class=\"context-tag tag-work\">头脑风暴</span> \"We <b>bounced around</b> a few ideas, but didn't decide on anything.\"<br>(我们抛出几个想法互相碰撞/反复探讨了一番，但什么都没定下来。)","tags":["头脑风暴"]},{"id":945,"verb":"Brazen out","meaning":"厚颜无耻地扛过去 / 死不认账硬顶<br><span style=\"font-size:0.8em;color:gray\">(脸皮像黄铜一样厚)</span>","scenario":"<span class=\"context-tag tag-drama\">丑闻公关</span> \"Despite the scandal, the politician decided to just <b>brazen it out</b>.\"<br>(尽管丑闻缠身，这位政客还是决定厚着脸皮硬顶过去/死不认错。)","tags":["丑闻公关"]},{"id":946,"verb":"Break through","meaning":"取得重大突破 / 冲破(防线或障碍)<br><span style=\"font-size:0.8em;color:gray\">(极其有力量的冲刺)</span>","scenario":"<span class=\"context-tag tag-work\">科研与医疗</span> \"Scientists finally <b>broke through</b> and discovered a cure.\"<br>(科学家们终于取得了重大突破，发现了一种疗法。)","tags":["科研与医疗"]},{"id":947,"verb":"Bring off","meaning":"(出人意料地)成功完成极难的事<br><span style=\"font-size:0.8em;color:gray\">(类似于 pull off)</span>","scenario":"<span class=\"context-tag tag-work\">惊叹赞美</span> \"It was an impossible task, but she actually <b>brought it off</b>.\"<br>(那是个不可能完成的任务，但她竟然真特么给办成了/搞定了。)","tags":["惊叹赞美"]},{"id":948,"verb":"Bubble up","meaning":"(情绪/问题)渐渐显露并涌现出来<br><span style=\"font-size:0.8em;color:gray\">(像水底的气泡一样慢慢浮上水面)</span>","scenario":"<span class=\"context-tag tag-drama\">潜藏的危机</span> \"His deep-seated anger finally started to <b>bubble up</b> to the surface.\"<br>(他内心深处根深蒂固的愤怒终于开始慢慢浮出水面/涌现出来了。)","tags":["潜藏的危机"]},{"id":949,"verb":"Buckle up","meaning":"系好安全带 / 准备迎接(严峻的挑战)<br><span style=\"font-size:0.8em;color:gray\">(扣紧卡扣，美剧装逼必备台词)</span>","scenario":"<span class=\"context-tag tag-drama\">电影台词</span> \"<b>Buckle up</b>, it's going to be a bumpy ride!\"<br>(系好安全带/坐稳了，接下来将是一场极其颠簸的旅程/硬仗！)","tags":["电影台词"]},{"id":950,"verb":"Build around","meaning":"以...为核心构建 / 围绕...展开<br><span style=\"font-size:0.8em;color:gray\">(确立绝对的基石)</span>","scenario":"<span class=\"context-tag tag-work\">商业模式</span> \"The entire marketing strategy is <b>built around</b> their new AI technology.\"<br>(整个营销战略都是以他们的新AI技术为核心来量身打造的。)","tags":["商业模式"]},{"id":951,"verb":"Bump off","meaning":"谋杀 / 偷偷干掉(某人)<br><span style=\"font-size:0.8em;color:gray\">(黑帮/犯罪片经典俚语)</span>","scenario":"<span class=\"context-tag tag-drama\">美剧黑帮</span> \"The mafia boss ordered his men to <b>bump off</b> the witness.\"<br>(黑手党老大命令手下把那个目击证人给暗中做掉。)","tags":["美剧黑帮"]},{"id":952,"verb":"Bundle off","meaning":"匆匆打发走 / 赶走(某人)<br><span style=\"font-size:0.8em;color:gray\">(像打包行李一样把人扔出去)</span>","scenario":"<span class=\"context-tag tag-social\">家庭生活</span> \"She <b>bundled</b> the kids <b>off</b> to school so she could work in peace.\"<br>(她匆匆忙忙把孩子们打发去了学校，好让自己能清静地工作。)","tags":["家庭生活"]},{"id":953,"verb":"Burn down","meaning":"彻底烧毁 / (喻)火力全开地反击<br><span style=\"font-size:0.8em;color:gray\">(烧成灰烬)</span>","scenario":"<span class=\"context-tag tag-drama\">绝地反击</span> \"If they try to fire me, I will <b>burn</b> this place <b>down</b>.\"<br>(如果他们敢解雇我，我会把这地方彻底掀翻/同归于尽。)","tags":["绝地反击"]},{"id":954,"verb":"Buzz around","meaning":"到处忙碌 / 像蜜蜂一样飞来飞去<br><span style=\"font-size:0.8em;color:gray\">(形容极其忙碌且带有嗡嗡的背景音)</span>","scenario":"<span class=\"context-tag tag-work\">办公室日常</span> \"The interns are always <b>buzzing around</b> the office doing chores.\"<br>(实习生们总是在办公室里像蜜蜂一样到处跑来跑去干杂活。)","tags":["办公室日常"]},{"id":955,"verb":"Call down","meaning":"祈求(惩罚或灾难)降临 / 大声责骂<br><span style=\"font-size:0.8em;color:gray\">(呼唤神罚)</span>","scenario":"<span class=\"context-tag tag-drama\">神话与诅咒</span> \"He raised his hands and <b>called down</b> a curse upon them.\"<br>(他高举双手，对他们降下了恶毒的诅咒。)","tags":["神话与诅咒"]},{"id":956,"verb":"Camp it up","meaning":"表现得极其夸张、做作 / 疯狂抢戏<br><span style=\"font-size:0.8em;color:gray\">(Campy = 夸张俗艳的)</span>","scenario":"<span class=\"context-tag tag-drama\">娱乐八卦</span> \"The actor really <b>camped it up</b> in that ridiculous costume.\"<br>(那个演员穿着那身滑稽的戏服，在台上疯狂抢戏/极其做作地表演。)","tags":["娱乐八卦"]},{"id":957,"verb":"Carry weight","meaning":"有分量 / 极具影响力<br><span style=\"font-size:0.8em;color:gray\">(掂量起来很重)</span>","scenario":"<span class=\"context-tag tag-work\">高管背书</span> \"Her opinion really <b>carries</b> a lot of <b>weight</b> in this company.\"<br>(她的意见在这家公司里极其有分量/举足轻重。)","tags":["高管背书"]},{"id":958,"verb":"Cast away","meaning":"抛弃 / 扔掉 / (船遇难)流落荒岛<br><span style=\"font-size:0.8em;color:gray\">(汤姆·汉克斯的经典电影《Cast Away》)</span>","scenario":"<span class=\"context-tag tag-drama\">人生绝境</span> \"He was left feeling completely <b>cast away</b> and forgotten by society.\"<br>(他感觉自己被彻底抛弃了，成了社会的遗忘者。)","tags":["人生绝境"]},{"id":959,"verb":"Chase away","meaning":"赶走 / 驱散(担忧/坏心情)<br><span style=\"font-size:0.8em;color:gray\">(追着把它赶跑)</span>","scenario":"<span class=\"context-tag tag-life\">心理治愈</span> \"A hot cup of coffee helps to <b>chase away</b> the morning blues.\"<br>(一杯热咖啡能帮你完美地驱散/赶走清晨的忧郁。)","tags":["心理治愈"]},{"id":960,"verb":"Chop up","meaning":"切成碎块 / 将(公司或文章)拆解打碎<br><span style=\"font-size:0.8em;color:gray\">(残忍的物理动作，极具破坏性)</span>","scenario":"<span class=\"context-tag tag-work\">资本收购</span> \"The hedge fund bought the company and immediately <b>chopped</b> it <b>up</b> to sell.\"<br>(对冲基金买下了这家公司，随后立即将其大卸八块拆开卖掉了。)","tags":["资本收购"]},{"id":961,"verb":"Clear away","meaning":"清除(障碍/垃圾) / 收走(餐具)<br><span style=\"font-size:0.8em;color:gray\">(扫清路面)</span>","scenario":"<span class=\"context-tag tag-life\">餐厅与办事</span> \"The waitress came to <b>clear away</b> the plates.\" (女服务员过来把盘子撤走了。)<br>\"We need to <b>clear away</b> all these legal obstacles first.\" (我们必须先扫清所有的法律障碍。)","tags":["餐厅与办事"]},{"id":962,"verb":"Climb down","meaning":"做出让步 / 承认错误 / 认怂<br><span style=\"font-size:0.8em;color:gray\">(从高高的梯子上爬下来，不再强硬)</span>","scenario":"<span class=\"context-tag tag-work\">强硬博弈</span> \"The union was forced to <b>climb down</b> from their impossible demands.\"<br>(工会被迫放下了身段/做出让步，放弃了那些不可能的要求。)","tags":["强硬博弈"]},{"id":963,"verb":"Color in","meaning":"涂色 / 补充细节(使故事更生动完整)<br><span style=\"font-size:0.8em;color:gray\">(给草图上色)</span>","scenario":"<span class=\"context-tag tag-work\">讲故事/汇报</span> \"Let me <b>color in</b> some of the background details for you.\"<br>(让我来为你们补充/描绘一下这背后的详细来龙去脉。)","tags":["讲故事/汇报"]},{"id":964,"verb":"Come forward with","meaning":"主动站出来提供(证据/信息)<br><span style=\"font-size:0.8em;color:gray\">(极其正式且高频的法律、新闻用语)</span>","scenario":"<span class=\"context-tag tag-work\">举报与调查</span> \"Several employees <b>came forward with</b> allegations of harassment.\"<br>(几名员工勇敢地站出来，主动提供了关于骚扰的指控证据。)","tags":["举报与调查"]},{"id":965,"verb":"Consign to","meaning":"打发到 / 把...贬谪到(被人遗忘的角落)<br><span style=\"font-size:0.8em;color:gray\">(极其有文采的贬低词)</span>","scenario":"<span class=\"context-tag tag-drama\">历史评价</span> \"His terrible performance will be <b>consigned to</b> the garbage bin of history.\"<br>(他那极其糟糕的表现必将被直接扫进/打发到历史的垃圾堆里。)","tags":["历史评价"]},{"id":966,"verb":"Cook up","meaning":"捏造(借口) / 虚构(阴谋)<br><span style=\"font-size:0.8em;color:gray\">(像做菜一样把瞎话编造出来)</span>","scenario":"<span class=\"context-tag tag-drama\">揭穿谎言</span> \"What kind of ridiculous excuse did you <b>cook up</b> this time?\"<br>(这次你又现编/捏造了什么荒唐透顶的借口？)","tags":["揭穿谎言"]},{"id":967,"verb":"Coop up","meaning":"将(某人)禁闭 / 关在狭小的空间里<br><span style=\"font-size:0.8em;color:gray\">(像把鸡关在笼子里一样)</span>","scenario":"<span class=\"context-tag tag-life\">抱怨宅家</span> \"I hate being <b>cooped up</b> in this tiny office all day long.\"<br>(我讨厌整天被死死关在/困在这个憋屈的办公室里。)","tags":["抱怨宅家"]},{"id":968,"verb":"Count against","meaning":"对...极其不利 / 算作(某人)的劣势<br><span style=\"font-size:0.8em;color:gray\">(在评分表上记下负分)</span>","scenario":"<span class=\"context-tag tag-work\">面试与考核</span> \"Will my lack of a degree <b>count against</b> me in the interview?\"<br>(我没有学位这事儿，会在面试中对我极其不利/成为扣分项吗？)","tags":["面试与考核"]},{"id":969,"verb":"Crank up","meaning":"把(音量/机器)调到最大 / 加快步伐<br><span style=\"font-size:0.8em;color:gray\">(转动曲柄到极限)</span>","scenario":"<span class=\"context-tag tag-work\">加班冲刺</span> \"We need to <b>crank up</b> production to meet the holiday demand.\"<br>(我们必须火力全开/疯狂加快生产，以满足假期的暴增需求。)","tags":["加班冲刺"]},{"id":970,"verb":"Crop up","meaning":"突然出现 / (问题)毫无预兆地冒出来<br><span style=\"font-size:0.8em;color:gray\">(像庄稼破土而出一样防不胜防)</span>","scenario":"<span class=\"context-tag tag-work\">吐槽麻烦</span> \"A few unexpected issues have <b>cropped up</b> with the new software.\"<br>(新软件突然毫无预兆地爆出/冒出了几个意想不到的bug。)","tags":["吐槽麻烦"]},{"id":971,"verb":"Cross off","meaning":"从名单上划掉 / 完成并剔除<br><span style=\"font-size:0.8em;color:gray\">(比 check off 更有“排除”的意味)</span>","scenario":"<span class=\"context-tag tag-work\">任务管理</span> \"You can <b>cross</b> that task <b>off</b> your list, I already did it.\"<br>(你可以把那个任务从清单上彻底划掉了，我已经搞定了。)","tags":["任务管理"]},{"id":972,"verb":"Crowd out","meaning":"挤出 / 强行排挤(其他人或投资)<br><span style=\"font-size:0.8em;color:gray\">(金融学常用：挤出效应 crowding out effect)</span>","scenario":"<span class=\"context-tag tag-work\">商业与投资</span> \"Big tech companies are <b>crowding out</b> smaller startups.\"<br>(科技巨头正在利用体量强行排挤/挤死那些小型初创公司。)","tags":["商业与投资"]},{"id":973,"verb":"Cry off","meaning":"(因借口)打退堂鼓 / 临时取消约定<br><span style=\"font-size:0.8em;color:gray\">(英式常用，类似于 bail on)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽朋友</span> \"He was supposed to help me move, but he <b>cried off</b> at the last minute.\"<br>(他本该帮我搬家的，但在最后一刻却找借口缩了/打退堂鼓了。)","tags":["吐槽朋友"]},{"id":974,"verb":"Cut corners","meaning":"偷工减料 / 图省事走捷径<br><span style=\"font-size:0.8em;color:gray\">(切掉转角，美国职场极高频大忌词汇！)</span>","scenario":"<span class=\"context-tag tag-work\">严厉警告</span> \"We don't <b>cut corners</b> when it comes to safety protocols.\"<br>(在安全规程这个问题上，我们绝对不允许有任何偷工减料/投机取巧！)","tags":["严厉警告"]},{"id":975,"verb":"Decide upon","meaning":"最终选定 / 拍板决定(某物)<br><span style=\"font-size:0.8em;color:gray\">(极其正式的“做出抉择”，等同于 settle on)</span>","scenario":"<span class=\"context-tag tag-life\">买房与规划</span> \"Have you <b>decided upon</b> a name for the new baby yet?\"<br>(你们已经拍板/最终敲定好新生儿的名字了吗？)","tags":["买房与规划"]},{"id":976,"verb":"Delegate to","meaning":"下放权力给 / 把任务委派给(下属)<br><span style=\"font-size:0.8em;color:gray\">(高端管理类词汇)</span>","scenario":"<span class=\"context-tag tag-work\">领导力</span> \"A good manager knows how to <b>delegate</b> tasks <b>to</b> their team.\"<br>(一个优秀的管理者懂得如何完美地将任务下放/委派给团队成员。)","tags":["领导力"]},{"id":977,"verb":"Descend into","meaning":"陷入(混乱/堕落等极其糟糕的状态)<br><span style=\"font-size:0.8em;color:gray\">(极具画面感的“滑向深渊”)</span>","scenario":"<span class=\"context-tag tag-drama\">局势失控</span> \"The peaceful protest quickly <b>descended into</b> complete chaos.\"<br>(这场和平的抗议活动迅速堕落/陷入了彻底的混乱深渊。)","tags":["局势失控"]},{"id":978,"verb":"Dig deep","meaning":"深入挖掘 / 倾囊而出(努力或金钱)<br><span style=\"font-size:0.8em;color:gray\">(把潜力或钱包掏空)</span>","scenario":"<span class=\"context-tag tag-work\">募捐与拼搏</span> \"We need everyone to <b>dig deep</b> if we want to win this championship.\"<br>(如果我们想赢下这个冠军，我们需要每个人都榨干潜力/拼尽全力。)","tags":["募捐与拼搏"]},{"id":979,"verb":"Dispense with","meaning":"彻底免除 / 省去(客套/手续)<br><span style=\"font-size:0.8em;color:gray\">(极其干脆的职场高阶表达)</span>","scenario":"<span class=\"context-tag tag-work\">直奔主题</span> \"Let's <b>dispense with</b> the formalities and get straight to the numbers.\"<br>(咱们彻底省去/抛开那些虚伪的客套话，直接看数据吧。)","tags":["直奔主题"]},{"id":980,"verb":"Dissolve into","meaning":"崩溃化作(泪水/笑声) / 演变成<br><span style=\"font-size:0.8em;color:gray\">(固体消融，极具文学张力的描写)</span>","scenario":"<span class=\"context-tag tag-drama\">情绪描写</span> \"When she heard the news, she immediately <b>dissolved into</b> tears.\"<br>(一听到那消息，她整个人瞬间崩溃，哭成了泪人。)","tags":["情绪描写"]},{"id":981,"verb":"Finish off","meaning":"彻底干掉 / 为...画上完美的句号<br><span style=\"font-size:0.8em;color:gray\">(极其干脆利落的终结)</span>","scenario":"<span class=\"context-tag tag-life\">工作与干饭</span> \"I just need ten more minutes to <b>finish off</b> this report.\" (我只需要十分钟就能彻底搞定这份报告。)<br>\"Let's <b>finish off</b> the rest of the pizza.\" (咱们把剩下的披萨全干掉吧。)","tags":["工作与干饭"]},{"id":982,"verb":"Fire away","meaning":"开始提问吧！/ 说吧！<br><span style=\"font-size:0.8em;color:gray\">(像开枪一样放马过来，接受提问的经典口语)</span>","scenario":"<span class=\"context-tag tag-work\">Q&amp;A环节</span> \"If anyone has any questions about the new policy, just <b>fire away</b>.\"<br>(如果谁对新政策有任何疑问，尽管放马过来/直接问吧。)","tags":["Q&A环节"]},{"id":983,"verb":"Fob off on","meaning":"把(次品/麻烦事)极其敷衍地甩给某人<br><span style=\"font-size:0.8em;color:gray\">(极度不负责任的坑人行为)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽甩锅</span> \"He managed to <b>fob</b> his boring tasks <b>off on</b> the new intern.\"<br>(他极其鸡贼地把自己那些无聊的破活儿全甩给/糊弄给新实习生了。)","tags":["吐槽甩锅"]},{"id":984,"verb":"Freeze out","meaning":"冻结 / 冷暴力排挤(某人出局)<br><span style=\"font-size:0.8em;color:gray\">(用冰冷的环境把人逼走)</span>","scenario":"<span class=\"context-tag tag-drama\">职场甄嬛传</span> \"The other executives conspired to <b>freeze</b> the founder <b>out</b> of the company.\"<br>(其他高管暗中合谋，用冷暴力彻底把创始人从公司里排挤了出去。)","tags":["职场甄嬛传"]},{"id":985,"verb":"Front for","meaning":"出面为...做掩护 / 当(黑帮/幕后大佬)的替身<br><span style=\"font-size:0.8em;color:gray\">(站在前面当挡箭牌)</span>","scenario":"<span class=\"context-tag tag-drama\">警匪与商业</span> \"That legitimate business is actually just <b>fronting for</b> the cartel.\"<br>(那家表面合法的企业，实际上不过是在给贩毒集团打掩护/洗钱。)","tags":["警匪与商业"]},{"id":986,"verb":"Gas up","meaning":"给(车)加满油 / 给(人)疯狂打气吹捧<br><span style=\"font-size:0.8em;color:gray\">(充满能量)</span>","scenario":"<span class=\"context-tag tag-social\">嘻哈/派对文化</span> \"Stop trying to <b>gas</b> me <b>up</b>, I know my performance was bad.\"<br>(别在那儿拼命给我戴高帽/瞎打气了，我知道我表现得很烂。)","tags":["嘻哈/派对文化"]},{"id":98
