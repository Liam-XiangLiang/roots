<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Word Families: Top 161-170</title>
    <style>
        :root {
            /* Notion 暗黑模式核心色彩 */
            --bg-color: #191919;
            --table-border: #373737;
            --text-main: #D4D4D4;
            --text-sub: #9B9B9B;
            
            /* 词根词缀高亮色 */
            --c-prefix: #FF7B72; /* 粉红 - 前缀 */
            --c-root: #E5C07B;   /* 明黄 - 词根 */
            --c-suffix: #79C0FF; /* 天蓝 - 后缀 */
            
            /* 标签颜色 */
            --badge-trans: #316DCA;
            --badge-mnem: #347D39;
            --badge-exam: #B05C11;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 40px;
        }

        .root-section {
            margin-bottom: 60px;
        }

        .header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--c-root);
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .root-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            color: var(--c-root);
        }

        .root-meaning {
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: bold;
        }

        /* 列表表格容器 */
        .word-table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
        }

        .word-row {
            border-bottom: 1px dashed var(--table-border);
        }
        
        .word-row:last-child {
            border-bottom: none;
        }

        .col-word {
            width: 30%;
            padding: 25px 25px;
            vertical-align: top;
            border-right: 1px dashed var(--table-border);
        }

        .col-details {
            width: 70%;
            padding: 25px;
            vertical-align: top;
        }

        /* 左侧单词区样式 */
        .word-display {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }
        
        /* 词根词缀颜色类 */
        .p { color: var(--c-prefix); }
        .r { color: var(--c-root); }
        .s { color: var(--c-suffix); }

        .pronunciation {
            font-family: "Consolas", monospace;
            color: var(--text-sub);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* 右侧详情区样式 */
        .detail-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .detail-item:last-child {
            margin-bottom: 0;
        }

        .badge {
            flex-shrink: 0;
            color: #fff;
            font-size: 0.8rem;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            margin-top: 2px;
            font-weight: bold;
        }
        
        .b-trans { background-color: var(--badge-trans); }
        .b-mnem { background-color: var(--badge-mnem); }
        .b-exam { background-color: var(--badge-exam); }

        .detail-content {
            flex-grow: 1;
            font-size: 1.05rem;
        }
        
        .highlight-word {
            color: var(--c-root);
            font-weight: bold;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- JS将在这里生成所有的词根区块 -->
    </div>

    <script>
        const database = [
            {
                root: "-iter-",
                meaning: "重复 (repeat)",
                words: [
                    { word: "iterate", display: "<span class='r'>iter</span><span class='s'>ate</span>", pronunciation: "/ˈɪt·ə·reɪt/", translation: "v. 迭代，反复做", mnemonic: "iter(重复) + ate(动词) = 一再重复同一过程 = 迭代", example: "Software developers <span class='highlight-word'>iterate</span> their code to improve performance. (软件开发者通过迭代代码来提升性能。)" },
                    { word: "reiterate", display: "<span class='p'>re</span><span class='r'>iter</span><span class='s'>ate</span>", pronunciation: "/riˈɪt·ə·reɪt/", translation: "v. 重申，反复地说", mnemonic: "re(再次) + iter(重复) + ate = 再次重复说 = 重申", example: "The boss had to <span class='highlight-word'>reiterate</span> the new policy to the team. (老板不得不向团队重申这项新政策。)" },
                    { word: "iteration", display: "<span class='r'>iter</span><span class='s'>ation</span>", pronunciation: "/ˌɪt·əˈreɪ·ʃn/", translation: "n. 迭代过程，版本", mnemonic: "iter(重复) + ation(名词) = 迭代更新的过程或结果", example: "This is the third <span class='highlight-word'>iteration</span> of our product design. (这是我们产品设计的第三次迭代版本。)" }
                ]
            },
            {
                root: "-jud- / -judic-",
                meaning: "判断 (judge)",
                words: [
                    { word: "judge", display: "<span class='r'>judge</span>", pronunciation: "/dʒʌdʒ/", translation: "n. 法官，裁判 v. 判断，审判", mnemonic: "jud(判断) + ge = 做出评判的人 = 法官", example: "Don't <span class='highlight-word'>judge</span> a book by its cover. (不要以貌取人。/ 别仅凭封面判断一本书。)" },
                    { word: "prejudice", display: "<span class='p'>pre</span><span class='r'>jud</span><span class='s'>ice</span>", pronunciation: "/ˈpredʒ·u·dɪs/", translation: "n. 偏见，成见", mnemonic: "pre(提前) + jud(判断) + ice = 还没了解真相就提前下的结论 = 偏见", example: "We must eliminate racial <span class='highlight-word'>prejudice</span> in our society. (我们必须消除社会中的种族偏见。)" },
                    { word: "judicial", display: "<span class='r'>judic</span><span class='s'>ial</span>", pronunciation: "/dʒuˈdɪʃ·l/", translation: "adj. 司法的，法庭的", mnemonic: "judic(判断/司法) + ial(形容词) = 属于法院或判决的 = 司法的", example: "The <span class='highlight-word'>judicial</span> system needs to be independent. (司法系统必须保持独立。)" }
                ]
            },
            {
                root: "-juven-",
                meaning: "年轻 (young)",
                words: [
                    { word: "juvenile", display: "<span class='r'>juven</span><span class='s'>ile</span>", pronunciation: "/ˈdʒuː·və·naɪl/", translation: "adj. 青少年的，幼稚的 n. 未成年人", mnemonic: "juven(年轻) + ile(与...有关的) = 属于年轻人的 = 青少年的", example: "He was charged with <span class='highlight-word'>juvenile</span> delinquency. (他被指控犯有青少年违法罪。)" },
                    { word: "rejuvenate", display: "<span class='p'>re</span><span class='r'>juven</span><span class='s'>ate</span>", pronunciation: "/rɪˈdʒuː·və·neɪt/", translation: "v. 使恢复活力，使返老还童", mnemonic: "re(再次) + juven(年轻) + ate = 让人再次回到年轻状态 = 恢复活力", example: "A good vacation will <span class='highlight-word'>rejuvenate</span> your body and mind. (一个好假期会让你身心重新焕发活力。)" }
                ]
            },
            {
                root: "-lat-",
                meaning: "携带，拿 (carry)",
                words: [
                    { word: "translate", display: "<span class='p'>trans</span><span class='r'>late</span>", pronunciation: "/trænsˈleɪt/", translation: "v. 翻译，转化", mnemonic: "trans(跨越) + lat(拿) + e = 把意思从一种语言跨越拿到另一种语言 = 翻译", example: "Can you <span class='highlight-word'>translate</span> this document into Spanish? (你能把这份文件翻译成西班牙语吗？)" },
                    { word: "relate", display: "<span class='p'>re</span><span class='r'>late</span>", pronunciation: "/rɪˈleɪt/", translation: "v. 有关联，讲述", mnemonic: "re(往回) + lat(拿) + e = 把过去发生的事拿回来说 = 讲述/产生联系", example: "The evidence does not <span class='highlight-word'>relate</span> to this case. (该证据与本案无关。)" },
                    { word: "collate", display: "<span class='p'>col</span><span class='r'>late</span>", pronunciation: "/kəˈleɪt/", translation: "v. 核对，整理，排页", mnemonic: "col(共同) + lat(拿) + e = 拿放到一起进行比对 = 校对/整理", example: "Please <span class='highlight-word'>collate</span> the printed pages before binding them. (装订前请先整理核对好打印页。)" }
                ]
            },
            {
                root: "-later-",
                meaning: "边，侧面 (side)",
                words: [
                    { word: "lateral", display: "<span class='r'>later</span><span class='s'>al</span>", pronunciation: "/ˈlæt·ər·əl/", translation: "adj. 侧面的，横向的", mnemonic: "later(边) + al(形容词) = 侧向的", example: "He made a <span class='highlight-word'>lateral</span> career move within the same company. (他在同一家公司内进行了横向平级调动。)" },
                    { word: "bilateral", display: "<span class='p'>bi</span><span class='r'>later</span><span class='s'>al</span>", pronunciation: "/ˌbaɪˈlæt·ər·əl/", translation: "adj. 双边的，双方的", mnemonic: "bi(两个) + later(边) + al = 牵涉两个侧面的 = 双边的", example: "The two countries signed a <span class='highlight-word'>bilateral</span> trade agreement. (两国签署了一项双边贸易协定。)" },
                    { word: "collateral", display: "<span class='p'>col</span><span class='r'>later</span><span class='s'>al</span>", pronunciation: "/kəˈlæt·ər·əl/", translation: "n. 抵押品 adj. 旁系的", mnemonic: "col(共同) + later(旁边) + al = 放在旁边作为共同担保的东西 = 抵押品", example: "He used his house as <span class='highlight-word'>collateral</span> for the bank loan. (他用自己的房子作为银行贷款的抵押品。)" }
                ]
            },
            {
                root: "-lav- / -lu- / -luv-",
                meaning: "洗，冲刷 (wash)",
                words: [
                    { word: "lavish", display: "<span class='r'>lav</span><span class='s'>ish</span>", pronunciation: "/ˈlæv·ɪʃ/", translation: "adj. 奢华的，挥霍的 v. 慷慨给予", mnemonic: "lav(洗/冲) + ish = 像流水一样猛烈冲刷(金钱) = 挥霍的/奢华的", example: "They hosted a <span class='highlight-word'>lavish</span> banquet for the guests. (他们为宾客举办了一场极其奢华的晚宴。)" },
                    { word: "dilute", display: "<span class='p'>di</span><span class='r'>lut</span><span class='s'>e</span>", pronunciation: "/daɪˈluːt/", translation: "v. 稀释，冲淡", mnemonic: "di(分开) + lut(冲刷) + e = 用水流把它冲开 = 稀释", example: "You need to <span class='highlight-word'>dilute</span> the concentrated juice with water. (你需要用水稀释浓缩果汁。)" },
                    { word: "laundry", display: "<span class='r'>laun</span><span class='s'>dry</span>", pronunciation: "/ˈlɔːn·dri/", translation: "n. 洗衣店，要洗的衣服", mnemonic: "laun(=lav洗) + dry(干) = 洗完弄干的地方/衣服 = 洗衣房/待洗衣物", example: "I have a pile of dirty <span class='highlight-word'>laundry</span> to do. (我有一大堆脏衣服要洗。)" }
                ]
            },
            {
                root: "-lax- / -leas-",
                meaning: "放松 (loose)",
                words: [
                    { word: "relax", display: "<span class='p'>re</span><span class='r'>lax</span>", pronunciation: "/rɪˈlæks/", translation: "v. 放松，休息", mnemonic: "re(再次) + lax(松) = 一再松弛下来 = 放松", example: "Music helps me <span class='highlight-word'>relax</span> after a stressful day. (音乐能帮我在高压的一天后放松下来。)" },
                    { word: "release", display: "<span class='p'>re</span><span class='r'>leas</span><span class='s'>e</span>", pronunciation: "/rɪˈliːs/", translation: "v./n. 释放，发布", mnemonic: "re(往回) + leas(松开) + e = 解除束缚松开 = 释放", example: "The company will <span class='highlight-word'>release</span> a new product next month. (公司下个月将发布一款新产品。)" },
                    { word: "laxative", display: "<span class='r'>lax</span><span class='s'>ative</span>", pronunciation: "/ˈlæk·sə·tɪv/", translation: "n. 轻泻剂，通便药", mnemonic: "lax(放松) + ative(物品) = 让肠道放松通畅的药物 = 泻药", example: "The doctor prescribed a mild <span class='highlight-word'>laxative</span>. (医生开了一副温和的通便药。)" }
                ]
            },
            {
                root: "-liter-",
                meaning: "文字，字母 (letter)",
                words: [
                    { word: "literature", display: "<span class='r'>liter</span><span class='s'>ature</span>", pronunciation: "/ˈlɪt·rə·tʃər/", translation: "n. 文学，文献", mnemonic: "liter(文字) + ature(名词) = 由文字写成的艺术 = 文学", example: "He majored in English <span class='highlight-word'>literature</span>. (他主修英国文学。)" },
                    { word: "literal", display: "<span class='r'>liter</span><span class='s'>al</span>", pronunciation: "/ˈlɪt·ər·əl/", translation: "adj. 字面上的，逐字的", mnemonic: "liter(文字) + al(形容词) = 纯粹按照文字表面的", example: "Do not take his words in a <span class='highlight-word'>literal</span> sense; he was joking. (别按字面意思去理解他的话；他在开玩笑。)" },
                    { word: "illiterate", display: "<span class='p'>il</span><span class='r'>liter</span><span class='s'>ate</span>", pronunciation: "/ɪˈlɪt·ər·ət/", translation: "adj. 文盲的，不识字的 n. 文盲", mnemonic: "il(不) + liter(文字) + ate = 不认识文字的人 = 文盲", example: "Many people in the remote village are <span class='highlight-word'>illiterate</span>. (那个偏远村庄里的许多人都是文盲。)" }
                ]
            },
            {
                root: "-long-",
                meaning: "长 (long)",
                words: [
                    { word: "prolong", display: "<span class='p'>pro</span><span class='r'>long</span>", pronunciation: "/prəˈlɒŋ/", translation: "v. 延长，拖延", mnemonic: "pro(向前) + long(长) = 向前拉长 = 延长(时间)", example: "The medicine can <span class='highlight-word'>prolong</span> the patient's life. (这种药能延长病人的生命。)" },
                    { word: "longitude", display: "<span class='r'>long</span><span class='s'>itude</span>", pronunciation: "/ˈlɒn·dʒɪ·tjuːd/", translation: "n. 经度", mnemonic: "long(长) + itude(状态) = 地球纵向的长线 = 经度", example: "The ship's exact <span class='highlight-word'>longitude</span> and latitude were recorded. (船只极其精确的经纬度被记录了下来。)" },
                    { word: "longevity", display: "<span class='r'>long</span><span class='s'>ev</span><span class='s'>ity</span>", pronunciation: "/lɒnˈdʒev·ə·ti/", translation: "n. 长寿，耐久性", mnemonic: "long(长) + ev(时代/生命) + ity = 极长的生命 = 长寿", example: "Japanese people are known for their <span class='highlight-word'>longevity</span>. (日本人以长寿而闻名。)" }
                ]
            },
            {
                root: "-medi-",
                meaning: "中间 (middle)",
                words: [
                    { word: "medium", display: "<span class='r'>medi</span><span class='s'>um</span>", pronunciation: "/ˈmiː·di·əm/", translation: "n. 媒介，方法 adj. 中等的", mnemonic: "medi(中间) + um(物品) = 处于中间用来传导的物品 = 媒介", example: "Water is a <span class='highlight-word'>medium</span> for sound. (水是声音传播的一种媒介。)" },
                    { word: "median", display: "<span class='r'>medi</span><span class='s'>an</span>", pronunciation: "/ˈmiː·di·ən/", translation: "n. 中位数 adj. 中间的", mnemonic: "medi(中间) + an = 处于正中间的数值 = 中位数", example: "The <span class='highlight-word'>median</span> house price has increased again. (房价中位数又上涨了。)" },
                    { word: "medieval", display: "<span class='p'>medi</span><span class='s'>eval</span>", pronunciation: "/ˌmed·iˈiː·vl/", translation: "adj. 中世纪的", mnemonic: "medi(中间) + eval(时代) = 夹在古代和现代中间的时代 = 中世纪", example: "We visited an authentic <span class='highlight-word'>medieval</span> castle in Europe. (我们在欧洲参观了一座原汁原味的中世纪城堡。)" }
                ]
            }
        ];

        const app = document.getElementById('app');

        database.forEach((group, index) => {
            let wordsHTML = '';
            
            group.words.forEach(item => {
                wordsHTML += `
                    <tr class="word-row">
                        <td class="col-word">
                            <div class="word-display">${item.display}</div>
                            <div class="pronunciation">${item.pronunciation}</div>
                        </td>
                        <td class="col-details">
                            <div class="detail-item">
                                <div class="badge b-trans">译</div>
                                <div class="detail-content">${item.translation}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-mnem">记</div>
                                <div class="detail-content">${item.mnemonic}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-exam">例</div>
                                <div class="detail-content">${item.example}</div>
                            </div>
                        </td>
                    </tr>
                `;
            });

            app.innerHTML += `
                <div class="root-section">
                    <div class="header">
                        <h1 class="root-title">${index + 161}. ${group.root}</h1>
                        <div class="root-meaning">【 核心含义：${group.meaning} 】</div>
                    </div>
                    <table class="word-table">
                        ${wordsHTML}
                    </table>
                </div>
            `;
        });
    </script>
</body>
</html>
