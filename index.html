<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phrasal Verbs Cockpit - 1000 地道短语卡片终端</title>
    <style>
        :root {
            --bg-main: #0c0c0e; --bg-surface: #16161a; --bg-card-front: #1e1e24; --bg-card-back: #1b1b22;
            --border-color: rgba(255, 255, 255, 0.08); --text-primary: rgba(255, 255, 255, 0.9); --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-blue: #64B5F6; --accent-green: #81c784; --accent-gold: #FFD54F; --accent-red: #ff6b6b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-main); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        header { background-color: var(--bg-surface); border-bottom: 1px solid var(--border-color); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo-section h1 { font-size: 1.25rem; font-weight: 700; color: var(--accent-blue); letter-spacing: -0.02em; }
        .logo-section p { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.2rem; }
        .dashboard-stats { display: flex; gap: 1.5rem; align-items: center; }
        .stat-item { text-align: right; }
        .stat-val { font-size: 1.1rem; font-weight: 600; font-family: monospace; }
        .stat-val.blue { color: var(--accent-blue); } .stat-val.green { color: var(--accent-green); } .stat-val.gold { color: var(--accent-gold); }
        .stat-lbl { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; }
        .progress-container { width: 180px; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); transition: width 0.4s ease; }
        .cockpit-container { flex: 1; display: grid; grid-template-columns: 300px 1fr; max-width: 1440px; width: 100%; margin: 0 auto; }
        .sidebar { background-color: var(--bg-surface); border-right: 1px solid var(--border-color); padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; height: calc(100vh - 70px); }
        .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .control-label { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .search-box input { width: 100%; padding: 0.6rem 1rem; background-color: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 6px; color: #fff; font-size: 0.85rem; outline: none; }
        .search-box input:focus { border-color: var(--accent-blue); }
        .filter-options { display: flex; flex-direction: column; gap: 0.35rem; }
        .filter-btn { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0.8rem; background: transparent; border: 1px solid transparent; border-radius: 6px; color: var(--text-primary); text-align: left; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        .filter-btn:hover { background-color: rgba(255,255,255,0.03); }
        .filter-btn.active { background-color: rgba(100, 181, 246, 0.1); border-color: rgba(100, 181, 246, 0.2); color: var(--accent-blue); font-weight: 600; }
        .filter-count { font-size: 0.75rem; background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 10px; font-family: monospace; color: var(--text-secondary); }
        select.custom-select { width: 100%; padding: 0.6rem; background-color: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); outline: none; font-size: 0.85rem; }
        .workspace-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; background: radial-gradient(circle at center, #141419 0%, var(--bg-main) 100%); flex: 1; }
        .view-mode-toggle { position: absolute; top: 1.5rem; right: 2rem; display: flex; background: rgba(255,255,255,0.05); padding: 2px; border-radius: 6px; border: 1px solid var(--border-color); z-index: 10; }
        .mode-btn { padding: 0.4rem 1rem; background: transparent; border: none; color: var(--text-secondary); font-size: 0.8rem; cursor: pointer; border-radius: 4px; }
        .mode-btn.active { background-color: var(--bg-card-front); color: var(--accent-blue); font-weight: 600; }
        .flashcard-wrapper { width: 100%; max-width: 640px; height: 380px; perspective: 1200px; margin-bottom: 2rem; }
        .flashcard-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .flashcard-wrapper.flipped .flashcard-inner { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 16px; border: 1px solid var(--border-color); padding: 2.5rem; display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6); }
        .card-front-face { background: linear-gradient(145deg, var(--bg-card-front), #15151a); justify-content: center; align-items: center; }
        .card-meta-top { position: absolute; top: 1.5rem; left: 1.5rem; right: 1.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-secondary); font-family: monospace; }
        .card-id-badge { background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border-color); }
        .card-verb-title { font-size: 3rem; font-weight: 800; color: #fff; text-align: center; letter-spacing: -0.02em; }
        .card-tags-area { margin-top: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
        .tag-pill { font-size: 0.75rem; font-weight: 600; padding: 4px 10px; border-radius: 12px; background-color: rgba(100, 181, 246, 0.12); color: var(--accent-blue); border: 1px solid rgba(100, 181, 246, 0.2); }
        .hint-click-flip { position: absolute; bottom: 1.5rem; font-size: 0.75rem; color: rgba(255,255,255,0.25); }
        .card-back-face { background: linear-gradient(145deg, var(--bg-card-back), #111116); transform: rotateY(180deg); justify-content: flex-start; }
        .back-title-row { display: flex; align-items: center; justify-content: space-between; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.75rem; margin-bottom: 1.25rem; }
        .back-verb { font-size: 1.5rem; font-weight: 700; color: var(--accent-blue); }
        .back-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; }
        .meaning-section { font-size: 1.25rem; color: #fff; line-height: 1.4; font-weight: 600; margin-bottom: 1.2rem; }
        .scenario-section { flex: 1; background: rgba(0, 0, 0, 0.15); border-radius: 8px; padding: 1.2rem; border: 1px solid rgba(255,255,255,0.03); overflow-y: auto; font-size: 0.95rem; line-height: 1.6; }
        .scenario-section b { color: var(--accent-gold); font-weight: 700; background: rgba(255, 213, 79, 0.08); padding: 0 4px; border-radius: 3px; }
        .action-dock { display: flex; gap: 1rem; align-items: center; width: 100%; max-width: 640px; justify-content: space-between; }
        .nav-controls { display: flex; gap: 0.5rem; }
        .btn-action { background-color: rgba(255,255,255,0.04); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.6rem 1.2rem; font-size: 0.85rem; font-weight: 600; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
        .btn-action:hover { background-color: rgba(255,255,255,0.08); }
        .btn-status-toggle { padding: 0.6rem 1.5rem; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; border: 1px solid transparent; }
        .btn-mastered { background-color: rgba(129, 199, 132, 0.1); border-color: rgba(129, 199, 132, 0.2); color: var(--accent-green); }
        .btn-mastered.active { background-color: var(--accent-green); color: #000; }
        .btn-star { background-color: rgba(255, 213, 79, 0.1); border-color: rgba(255, 213, 79, 0.2); color: var(--accent-gold); }
        .btn-star.active { background-color: var(--accent-gold); color: #000; }
        .list-stage { display: none; width: 100%; height: calc(100vh - 120px); padding: 1.5rem 2rem; overflow-y: auto; }
        .list-stage.active { display: block; }
        .dense-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; text-align: left; }
        .dense-table th, .dense-table td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-color); }
        .dense-table th { background-color: rgba(255,255,255,0.02); color: var(--text-secondary); font-size: 0.75rem; position: sticky; top: 0; }
        .dense-table tbody tr.mastered { opacity: 0.4; }
        .star-icon-btn { background: transparent; border: none; cursor: pointer; font-size: 1.1rem; color: rgba(255,255,255,0.15); }
        .star-icon-btn.active { color: var(--accent-gold); }
        .youglish-btn { display: inline-block; padding: 4px 10px; background: rgba(255, 213, 79, 0.1); color: var(--accent-gold); text-decoration: none; font-size: 0.75rem; font-weight: 600; border-radius: 6px; border: 1px solid rgba(255, 213, 79, 0.25); transition: all 0.2s; cursor: pointer; }
        .youglish-btn:hover { background: var(--accent-gold); color: #000; }
        .context-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-right: 4px; background: rgba(255,255,255,0.08); }
        .tag-work { background-color: rgba(35, 131, 226, 0.15); color: #90caf9; }
        .tag-life { background-color: rgba(76, 175, 80, 0.15); color: #a5d6a7; }
        .tag-social { background-color: rgba(255, 152, 0, 0.15); color: #ffcc80; }

        @media only screen and (max-width: 850px) {
            header { flex-direction: column; gap: 1rem; padding: 1rem; align-items: flex-start; }
            .dashboard-stats { width: 100%; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
            .progress-container { width: 100%; flex-basis: 100%; }
            .cockpit-container { display: flex; flex-direction: column; height: auto; }
            main { order: 1; height: auto; min-height: 480px; width: 100%; display: flex; flex-direction: column; }
            #cardStage { order: -1; padding: 1rem; }
            .sidebar { order: 2; border-right: none; border-top: 1px solid var(--border-color); height: auto; padding: 1.2rem; }
            .view-mode-toggle { position: static; margin: 0.5rem 1rem 0 auto; width: fit-content; }
            .workspace-stage { padding: 1rem; }
            .flashcard-wrapper { height: 320px; margin-bottom: 1.2rem; }
            .card-verb-title { font-size: 2.2rem; word-break: break-word; }
            .action-dock { flex-direction: column; gap: 0.6rem; width: 100%; }
            .action-dock .btn-status-toggle, .action-dock .nav-controls { width: 100%; justify-content: center; }
            .nav-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; width: 100%; }
            .action-dock .nav-controls .btn-action { justify-content: center; }
            .dense-table th, .dense-table td { padding: 0.5rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <h1>PHRASAL VERBS COCKPIT</h1>
            <p>1000 高频核心英美地道动词短语高效复习系统</p>
        </div>
        <div class="dashboard-stats">
            <div class="stat-item"><div class="stat-val blue" id="totalCountDisplay">0</div><div class="stat-lbl">当前队列</div></div>
            <div class="stat-item"><div class="stat-val green" id="masteredCountDisplay">0 / 1000</div><div class="stat-lbl">已熟练</div></div>
            <div class="stat-item"><div class="stat-val gold" id="starredCountDisplay">0</div><div class="stat-lbl">标星难点</div></div>
            <div class="stat-container"><div class="progress-container"><div class="progress-bar" id="progressBarFill"></div></div></div>
        </div>
    </header>

    <div class="cockpit-container">
        <aside class="sidebar">
            <div class="control-group">
                <div class="control-label">智能搜索</div>
                <div class="search-box"><input type="text" id="searchInput" placeholder="搜索短语/释义/例句..."></div>
            </div>
            <div class="control-group">
                <div class="control-label">进度过滤</div>
                <div class="filter-options">
                    <button class="filter-btn active" data-status="all"><span>全部短语库</span><span class="filter-count" id="countAll">0</span></button>
                    <button class="filter-btn" data-status="unlearned"><span>未掌握 (生词)</span><span class="filter-count" id="countUnlearned">0</span></button>
                    <button class="filter-btn" data-status="mastered"><span>已熟练掌握</span><span class="filter-count" id="countMastered">0</span></button>
                    <button class="filter-btn" data-status="starred"><span>标星重点复习</span><span class="filter-count" id="countStarred">0</span></button>
                </div>
            </div>
            <div class="control-group">
                <div class="control-label">语境标签分类</div>
                <select class="custom-select" id="tagSelect"><option value="all">显示全部语境</option></select>
            </div>
            <div class="control-group">
                <div class="control-label">出卡模式</div>
                <button class="btn-action" id="randomToggleBtn" style="justify-content: center;"><span id="randomStatusText">顺序播放模式</span></button>
            </div>
            <button class="btn-action" id="resetProgressBtn" style="justify-content: center; margin-top: 0.5rem; color: var(--accent-red); border-color: rgba(255,107,107,0.2);">重置系统全部数据</button>
        </aside>

        <main>
            <div class="view-mode-toggle">
                <button class="mode-btn active" data-mode="card">卡片模式</button>
                <button class="mode-btn" data-mode="list">列表模式</button>
            </div>

            <section class="workspace-stage" id="cardStage">
                <div class="flashcard-wrapper" id="flashcardWrapper">
                    <div class="flashcard-inner">
                        <div class="card-face card-front-face">
                            <div class="card-meta-top">
                                <span class="card-id-badge">ID: <span id="cardId">-</span></span>
                                <span id="cardProgressIndex">0 / 0</span>
                            </div>
                            <h2 class="card-verb-title" id="cardVerb">-</h2>
                            <a id="frontYouGlishBtn" class="youglish-btn" target="_blank" style="margin-top: 1rem; z-index: 10;" onclick="event.stopPropagation();">🔊 YouGlish 地道发音</a>
                            <div class="card-tags-area" id="cardTags"></div>
                            <div class="hint-click-flip">点击卡片或按 [空格] 翻面</div>
                        </div>
                        <div class="card-face card-back-face">
                            <div class="back-title-row">
                                <div style="display: flex; align-items: baseline; gap: 0.5rem;">
                                    <span class="back-label">Phrasal Verb</span>
                                    <span class="back-verb" id="backVerb">-</span>
                                </div>
                                <a id="backYouGlishBtn" class="youglish-btn" target="_blank" onclick="event.stopPropagation();">🔊 发音</a>
                            </div>
                            <div class="back-label" style="margin-bottom: 0.2rem;">核心精准释义</div>
                            <div class="meaning-section" id="cardMeaning">-</div>
                            <div class="back-label" style="margin-bottom: 0.2rem;">🇺🇸 实战语境 & 地道例句</div>
                            <div class="scenario-section" id="cardScenario">-</div>
                        </div>
                    </div>
                </div>

                <div class="action-dock">
                    <button class="btn-status-toggle btn-star" id="starCardBtn">☆ 标星难点 (S)</button>
                    <div class="nav-controls">
                        <button class="btn-action" id="prevCardBtn">◀ 上一张 (A)</button>
                        <button class="btn-action" id="nextCardBtn">下一张 (D) ▶</button>
                    </div>
                    <button class="btn-status-toggle btn-mastered" id="masterCardBtn">✔ 我已学会 (Enter)</button>
                </div>
            </section>

            <section class="list-stage" id="listStage">
                <table class="dense-table">
                    <thead>
                        <tr><th>序号</th><th>动词短语</th><th>核心含义</th><th>实战语境例句</th><th>状态</th></tr>
                    </thead>
                    <tbody id="denseTableBody"></tbody>
                </table>
            </section>
        </main>
    </div>

    <script>
        const DATASET = [{"id":1,"verb":"Figure out","meaning":"解决 / 弄清楚<br><span style=\"font-size:0.8em;color:gray\">(替代 understand / solve)</span>","scenario":"<span class=\"context-tag tag-work\">职场高频</span> \"Give me a few minutes, I'll <b>figure it out</b>.\"<br>(工作中遇到bug或难题，老美最爱说“我去搞清楚/搞定它”。)","tags":["职场高频"]},{"id":2,"verb":"Follow up","meaning":"跟进 / 后续联系<br><span style=\"font-size:0.8em;color:gray\">(极其重要)</span>","scenario":"<span class=\"context-tag tag-work\">职场高频</span> \"I will <b>follow up</b> with the client tomorrow.\"<br>(发邮件催进度必用词，名词形式是 a follow-up email。)","tags":["职场高频"]},{"id":3,"verb":"Reach out","meaning":"主动联系<br><span style=\"font-size:0.8em;color:gray\">(替代 contact)</span>","scenario":"<span class=\"context-tag tag-work\">职场社交</span> \"Feel free to <b>reach out</b> to me if you have any questions.\"<br>(非常典型的职场套话，比 contact 听起来更平易近人，有“伸出援手”的画面感。)","tags":["职场社交"]},{"id":4,"verb":"Wrap up","meaning":"结束 / 收尾<br><span style=\"font-size:0.8em;color:gray\">(替代 conclude / finish)</span>","scenario":"<span class=\"context-tag tag-work\">开会必用</span> \"Let's <b>wrap up</b> this meeting and get back to work.\"<br>(会议快结束时，主持人用来控场“总结陈词”的标准用语。)","tags":["开会必用"]},{"id":5,"verb":"Catch up","meaning":"赶上进度 / 叙旧<br><span style=\"font-size:0.8em;color:gray\">(多场景通用)</span>","scenario":"<span class=\"context-tag tag-work\">职场</span> \"I need to <b>catch up</b> on my emails.\" (我得赶快回邮件了。)<br><span class=\"context-tag tag-social\">生活</span> \"Let's grab coffee and <b>catch up</b> soon!\" (咱们赶紧喝个咖啡叙叙旧！)","tags":["职场","生活"]},{"id":6,"verb":"Set up","meaning":"建立 / 安排 / 安装<br><span style=\"font-size:0.8em;color:gray\">(替代 establish / arrange)</span>","scenario":"<span class=\"context-tag tag-work\">职场通用</span> \"Can we <b>set up</b> a meeting for next week?\"<br>(安排会议、建立账号、布置场地，全都用它。)","tags":["职场通用"]},{"id":7,"verb":"Bring up","meaning":"提出 (话题 / 问题)<br><span style=\"font-size:0.8em;color:gray\">(替代 mention)</span>","scenario":"<span class=\"context-tag tag-work\">开会讨论</span> \"I'm glad you <b>brought that up</b>.\"<br>(开会时常用的客套话：“很高兴你提出了这一点”。)","tags":["开会讨论"]},{"id":8,"verb":"Point out","meaning":"指出 / 提醒注意<br><span style=\"font-size:0.8em;color:gray\">(替代 indicate)</span>","scenario":"<span class=\"context-tag tag-work\">沟通纠错</span> \"I'd like to <b>point out</b> a minor error in the report.\"<br>(委婉地指出别人的错误，比直接说 You are wrong 要礼貌得多。)","tags":["沟通纠错"]},{"id":9,"verb":"Sort out","meaning":"理清 / 解决问题<br><span style=\"font-size:0.8em;color:gray\">(替代 organize / resolve)</span>","scenario":"<span class=\"context-tag tag-work\">职场救援</span> \"Don't worry, we will <b>sort this out</b>.\"<br>(安抚客户或同事的绝佳用语：别慌，我们会摆平/理顺它的。)","tags":["职场救援"]},{"id":10,"verb":"Check in","meaning":"报平安 / 简单同步<br><span style=\"font-size:0.8em;color:gray\">(除了酒店登记外的用法)</span>","scenario":"<span class=\"context-tag tag-work\">职场日常</span> \"I just wanted to <b>check in</b> and see how the project is going.\"<br>(这是老板或同事常做的事，不带压力的“简单沟通一下进度”。)","tags":["职场日常"]},{"id":11,"verb":"Put off","meaning":"推迟<br><span style=\"font-size:0.8em;color:gray\">(替代 postpone)</span>","scenario":"<span class=\"context-tag tag-work\">时间管理</span> \"Never <b>put off</b> until tomorrow what you can do today.\"<br>(职场中经常说 The meeting was put off until Friday.)","tags":["时间管理"]},{"id":12,"verb":"Push back","meaning":"推迟 / 抵制反驳<br><span style=\"font-size:0.8em;color:gray\">(高级职场词)</span>","scenario":"<span class=\"context-tag tag-work\">时间线调整</span> \"Can we <b>push back</b> the deadline by two days?\" (能把截止日期往后推两天吗？)<br>*(引申义：提出反对意见 - \"Expect some pushback from the legal team.\" 法务部可能会有阻力。)*","tags":["时间线调整"]},{"id":13,"verb":"Call off","meaning":"取消<br><span style=\"font-size:0.8em;color:gray\">(替代 cancel)</span>","scenario":"<span class=\"context-tag tag-work\">日程变更</span> \"They had to <b>call off</b> the event due to the rain.\"<br>(通常用于取消活动、会议、罢工等。)","tags":["日程变更"]},{"id":14,"verb":"Look into","meaning":"调查 / 研究一下<br><span style=\"font-size:0.8em;color:gray\">(替代 investigate)</span>","scenario":"<span class=\"context-tag tag-work\">职场承诺</span> \"I will <b>look into</b> the matter and get back to you.\"<br>(客服或IT经常用这句回复：我会去查一下，然后回复你。)","tags":["职场承诺"]},{"id":15,"verb":"Deal with","meaning":"处理 / 应付<br><span style=\"font-size:0.8em;color:gray\">(替代 handle)</span>","scenario":"<span class=\"context-tag tag-work\">解决麻烦</span> \"I have a lot of emails to <b>deal with</b> this morning.\"<br>(常带有“处理繁杂或棘手事务”的意味。)","tags":["解决麻烦"]},{"id":16,"verb":"Take over","meaning":"接管 / 接手<br><span style=\"font-size:0.8em;color:gray\">(替代 assume control)</span>","scenario":"<span class=\"context-tag tag-work\">工作交接</span> \"I'll be taking some time off, and Sarah will <b>take over</b> my duties.\"<br>(请假或离职交接时必用的黄金短语。)","tags":["工作交接"]},{"id":17,"verb":"Step in","meaning":"介入 / 伸出援手<br><span style=\"font-size:0.8em;color:gray\">(替代 intervene)</span>","scenario":"<span class=\"context-tag tag-work\">团队协作</span> \"Thanks for <b>stepping in</b> when I was sick last week.\"<br>(当局面失控或别人需要帮助时，你“跨步进去”接手盘子。)","tags":["团队协作"]},{"id":18,"verb":"Back up","meaning":"支持 / 备份<br><span style=\"font-size:0.8em;color:gray\">(替代 support)</span>","scenario":"<span class=\"context-tag tag-work\">IT与团队</span> \"Always <b>back up</b> your files.\" (永远备份你的文件。)<br>\"My team will <b>back me up</b> on this.\" (我的团队会在这件事上支持我。)","tags":["IT与团队"]},{"id":19,"verb":"Fill out","meaning":"填写 (表格/表单)<br><span style=\"font-size:0.8em;color:gray\">(替代 complete a form)</span>","scenario":"<span class=\"context-tag tag-life\">生活刚需</span> \"Please <b>fill out</b> this application form.\"<br>(去医院、银行、办签证、租房，最常听到的三个字就是 Fill this out。)","tags":["生活刚需"]},{"id":20,"verb":"Work out","meaning":"解决 / 锻炼 / 结果良好<br><span style=\"font-size:0.8em;color:gray\">(超高频多义词)</span>","scenario":"<span class=\"context-tag tag-life\">生活万金油</span> \"I usually <b>work out</b> at the gym 3 times a week.\" (健身)<br>\"Things will <b>work out</b> in the end.\" (事情最终会圆满解决的/会好起来的。)","tags":["生活万金油"]},{"id":21,"verb":"Run out of","meaning":"用完 / 耗尽<br><span style=\"font-size:0.8em;color:gray\">(替代 exhaust)</span>","scenario":"<span class=\"context-tag tag-life\">日常琐事</span> \"We’ve <b>run out of</b> toilet paper!\" (纸巾用完了！)<br>\"I'm <b>running out of</b> time.\" (我没时间了。)","tags":["日常琐事"]},{"id":22,"verb":"Pick up","meaning":"捡起 / 接人 / 顺便买<br><span style=\"font-size:0.8em;color:gray\">(使用极广)</span>","scenario":"<span class=\"context-tag tag-life\">生活万能词</span> \"Can you <b>pick me up</b> from the airport?\" (去机场接我)<br>\"I'll <b>pick up</b> some milk on my way home.\" (顺手买点牛奶)","tags":["生活万能词"]},{"id":23,"verb":"Drop off","meaning":"放下 / 送下<br><span style=\"font-size:0.8em;color:gray\">(通常指开车送)</span>","scenario":"<span class=\"context-tag tag-life\">出行快递</span> \"I'll <b>drop you off</b> at the station.\" (开车把你放在车站。)<br>\"I need to <b>drop off</b> this package at FedEx.\" (把包裹扔在快递点寄走。)","tags":["出行快递"]},{"id":24,"verb":"Show up","meaning":"出现 / 露面<br><span style=\"font-size:0.8em;color:gray\">(替代 appear)</span>","scenario":"<span class=\"context-tag tag-social\">社交聚会</span> \"He didn't even <b>show up</b> for the meeting.\"<br>(常带有迟到、或者出乎意料露面的语境。没出席叫 \"No-show\"。)","tags":["社交聚会"]},{"id":25,"verb":"Hang out","meaning":"闲聊 / 一起玩<br><span style=\"font-size:0.8em;color:gray\">(替代 spend time)</span>","scenario":"<span class=\"context-tag tag-social\">美式社交</span> \"Do you want to <b>hang out</b> this weekend?\"<br>(美国年轻人最爱用，泛指一起打游戏、逛街、喝茶等一切休闲社交。)","tags":["美式社交"]},{"id":26,"verb":"Look forward to","meaning":"期待<br><span style=\"font-size:0.8em;color:gray\">(替代 anticipate)</span>","scenario":"<span class=\"context-tag tag-work\">邮件必写结尾</span> \"I <b>look forward to</b> hearing from you.\" (期待您的回复。)<br>*注意：to是介词，后面必须加名词或动名词(V-ing)。*","tags":["邮件必写结尾"]},{"id":27,"verb":"Put up with","meaning":"忍受 / 容忍<br><span style=\"font-size:0.8em;color:gray\">(替代 tolerate)</span>","scenario":"<span class=\"context-tag tag-life\">抱怨吐槽</span> \"I don't know how she <b>puts up with</b> that noisy neighbor.\"<br>(常用于抱怨恶劣的环境、糟糕的服务或难缠的老板。)","tags":["抱怨吐槽"]},{"id":28,"verb":"Rule out","meaning":"排除 / 否定可能性<br><span style=\"font-size:0.8em;color:gray\">(替代 exclude)</span>","scenario":"<span class=\"context-tag tag-work\">逻辑推理</span> \"We can't <b>rule out</b> the possibility of a software glitch.\"<br>(职场排查问题，或者医生看病排查病因时极常用。)","tags":["逻辑推理"]},{"id":29,"verb":"Hold up","meaning":"延迟 / 耽搁<br><span style=\"font-size:0.8em;color:gray\">(替代 delay)</span>","scenario":"<span class=\"context-tag tag-work\">解释迟到</span> \"Sorry I'm late, I was <b>held up</b> in traffic.\"<br>(极其地道的借口：我被交通/会议“拖住”了。)","tags":["解释迟到"]},{"id":30,"verb":"Turn out","meaning":"结果是 / 证明是<br><span style=\"font-size:0.8em;color:gray\">(替代 result in)</span>","scenario":"<span class=\"context-tag tag-life\">反转叙事</span> \"The presentation <b>turned out</b> to be a huge success.\"<br>(一开始可能没底，但“最终结果”很好。口语常说 It turns out that...)","tags":["反转叙事"]},{"id":31,"verb":"End up","meaning":"最终成为 / 结局是<br><span style=\"font-size:0.8em;color:gray\">(意想不到的结局)</span>","scenario":"<span class=\"context-tag tag-life\">讲故事必备</span> \"We got lost and <b>ended up</b> in New Jersey.\"<br>(本没打算去，最后竟然“落得如此下场/去了那里”。)","tags":["讲故事必备"]},{"id":32,"verb":"Break down","meaning":"出故障 / 崩溃 / 分解<br><span style=\"font-size:0.8em;color:gray\">(多义词)</span>","scenario":"<span class=\"context-tag tag-life\">生活与职场</span> \"My car <b>broke down</b> on the highway.\" (车抛锚了。)<br>\"Let's <b>break down</b> the costs.\" (让我们把成本拆解/细分一下。)","tags":["生活与职场"]},{"id":33,"verb":"Run into","meaning":"偶遇 / 遇到困难<br><span style=\"font-size:0.8em;color:gray\">(替代 encounter)</span>","scenario":"<span class=\"context-tag tag-social\">生活与工作</span> \"I <b>ran into</b> my old boss at the supermarket.\" (偶遇)<br>\"We've <b>run into</b> a few issues with the new system.\" (碰壁/遇到问题)","tags":["生活与工作"]},{"id":34,"verb":"Come up with","meaning":"想出 (主意 / 计划)<br><span style=\"font-size:0.8em;color:gray\">(替代 invent / propose)</span>","scenario":"<span class=\"context-tag tag-work\">头脑风暴</span> \"We need to <b>come up with</b> a better marketing strategy.\"<br>(灵光一现“想出”一个点子或搞到一笔钱。)","tags":["头脑风暴"]},{"id":35,"verb":"Cut down on","meaning":"削减 / 减少<br><span style=\"font-size:0.8em;color:gray\">(替代 reduce)</span>","scenario":"<span class=\"context-tag tag-life\">健康与预算</span> \"I'm trying to <b>cut down on</b> sugar.\" (我正在努力少吃糖。)<br>\"The company is <b>cutting down on</b> travel expenses.\" (削减出差预算。)","tags":["健康与预算"]},{"id":36,"verb":"Lay off","meaning":"解雇 / 裁员<br><span style=\"font-size:0.8em;color:gray\">(残酷但极高频)</span>","scenario":"<span class=\"context-tag tag-work\">职场危机</span> \"The company had to <b>lay off</b> 200 employees.\"<br>(美国企业的新闻常态。名词是 Layoffs，比 fired 听起来客观一些。)","tags":["职场危机"]},{"id":37,"verb":"Burn out","meaning":"精疲力尽 / 职业倦怠<br><span style=\"font-size:0.8em;color:gray\">(身心透支)</span>","scenario":"<span class=\"context-tag tag-work\">心理健康</span> \"If you keep working 80 hours a week, you'll <b>burn out</b>.\"<br>(现代美国职场极度关注的问题，形容油尽灯枯。名词是 Burnout。)","tags":["心理健康"]},{"id":38,"verb":"Look over","meaning":"快速查看 / 粗略检查<br><span style=\"font-size:0.8em;color:gray\">(替代 review briefly)</span>","scenario":"<span class=\"context-tag tag-work\">请人帮忙</span> \"Could you <b>look over</b> this document before I send it?\"<br>(发邮件前，请同事帮忙“过一眼/扫一下”找错别字。)","tags":["请人帮忙"]},{"id":39,"verb":"Hand in","meaning":"提交 / 上交<br><span style=\"font-size:0.8em;color:gray\">(替代 submit)</span>","scenario":"<span class=\"context-tag tag-work\">行政事务</span> \"Don't forget to <b>hand in</b> your expense reports.\"<br>(把实物或电子报告“递交”给上级或行政部。)","tags":["行政事务"]},{"id":40,"verb":"Carry out","meaning":"执行 / 落实<br><span style=\"font-size:0.8em;color:gray\">(替代 execute)</span>","scenario":"<span class=\"context-tag tag-work\">发号施令</span> \"We need to <b>carry out</b> this plan effectively.\"<br>(常与 research, tests, tasks, orders 连用。)","tags":["发号施令"]},{"id":41,"verb":"Check out","meaning":"结账离开 / 去看看<br><span style=\"font-size:0.8em;color:gray\">(多义词)</span>","scenario":"<span class=\"context-tag tag-life\">购物与社交</span> \"I'm ready to <b>check out</b>.\" (超市收银台结账。)<br>\"You should <b>check out</b> that new restaurant.\" (你应该去那家新餐厅看看/试试。)","tags":["购物与社交"]},{"id":42,"verb":"Turn down","meaning":"拒绝 / 调低(音量)<br><span style=\"font-size:0.8em;color:gray\">(替代 reject)</span>","scenario":"<span class=\"context-tag tag-work\">求职与生活</span> \"I had to <b>turn down</b> the job offer.\" (我不得不拒绝了那个工作录用。)<br>\"Please <b>turn down</b> the music.\" (把音乐关小点。)","tags":["求职与生活"]},{"id":43,"verb":"Pitch in","meaning":"凑钱 / 出一份力<br><span style=\"font-size:0.8em;color:gray\">(替代 contribute)</span>","scenario":"<span class=\"context-tag tag-social\">团队凝聚</span> \"We all <b>pitched in</b> $10 to buy a gift for the boss.\"<br>(美国同事过生日或买披萨时，大家一起“凑份子/出力”。)","tags":["团队凝聚"]},{"id":44,"verb":"Go over","meaning":"复习 / 仔细审查<br><span style=\"font-size:0.8em;color:gray\">(替代 review carefully)</span>","scenario":"<span class=\"context-tag tag-work\">开会核对</span> \"Let's <b>go over</b> the details of the contract one more time.\"<br>(不同于 look over 的粗略看，go over 是一项一项仔细过一遍。)","tags":["开会核对"]},{"id":45,"verb":"Hold on","meaning":"稍等 / 坚持住<br><span style=\"font-size:0.8em;color:gray\">(替代 wait)</span>","scenario":"<span class=\"context-tag tag-life\">日常口语</span> \"<b>Hold on</b> a second, I need to tie my shoe.\" (等一秒钟。)<br>(打电话时也极常用：Please hold on, I'll transfer your call.)","tags":["日常口语"]},{"id":46,"verb":"Stand out","meaning":"脱颖而出 / 显眼<br><span style=\"font-size:0.8em;color:gray\">(惹人注意)</span>","scenario":"<span class=\"context-tag tag-work\">求职与评价</span> \"Your resume really <b>stands out</b> from the rest.\"<br>(褒义贬义皆可，像鹤立鸡群一样“站出来”。名词 outstanding 就是优秀的。)","tags":["求职与评价"]},{"id":47,"verb":"Pay off","meaning":"见效 / 得到回报 / 还清<br><span style=\"font-size:0.8em;color:gray\">(成果显现)</span>","scenario":"<span class=\"context-tag tag-life\">财务与励志</span> \"All your hard work will <b>pay off</b>.\" (你的努力会有回报的。)<br>\"It took me 5 years to <b>pay off</b> my student loans.\" (还清贷款。)","tags":["财务与励志"]},{"id":48,"verb":"Give back","meaning":"回馈社会 / 归还<br><span style=\"font-size:0.8em;color:gray\">(美国核心价值观)</span>","scenario":"<span class=\"context-tag tag-social\">企业文化</span> \"Our company believes in <b>giving back</b> to the community.\"<br>(美国企业非常看重 volunteer 志愿服务和回馈社区的文化。)","tags":["企业文化"]},{"id":49,"verb":"Bring about","meaning":"引起 / 导致<br><span style=\"font-size:0.8em;color:gray\">(替代 cause)</span>","scenario":"<span class=\"context-tag tag-work\">正式讨论</span> \"The new CEO plans to <b>bring about</b> major changes.\"<br>(谈论改革、创新或导致某种重大结果时使用。)","tags":["正式讨论"]},{"id":50,"verb":"Pass out","meaning":"分发 / 昏倒<br><span style=\"font-size:0.8em;color:gray\">(替代 distribute / faint)</span>","scenario":"<span class=\"context-tag tag-work\">会议与医疗</span> \"Could you <b>pass out</b> these agendas?\" (麻烦分发一下议程表。)<br>\"It was so hot that she almost <b>passed out</b>.\" (热得快晕过去了。)","tags":["会议与医疗"]},{"id":51,"verb":"Freak out","meaning":"情绪失控 / 吓坏<br><span style=\"font-size:0.8em;color:gray\">(惊恐/愤怒/极度兴奋)</span>","scenario":"<span class=\"context-tag tag-drama\">美剧极高频</span> \"Don't <b>freak out</b>, but I crashed your car.\"<br>(别发疯/别抓狂，但我把你的车撞了。)","tags":["美剧极高频"]},{"id":52,"verb":"Chill out","meaning":"放松 / 冷静下来<br><span style=\"font-size:0.8em;color:gray\">(替代 relax)</span>","scenario":"<span class=\"context-tag tag-social\">社交口语</span> \"Hey, just <b>chill out</b>. Everything will be fine.\"<br>(嘿，放轻松。一切都会好的。常说 Let's chill 咱们待会吧。)","tags":["社交口语"]},{"id":53,"verb":"Crack up","meaning":"狂笑 / 精神崩溃<br><span style=\"font-size:0.8em;color:gray\">(替代 laugh hard)</span>","scenario":"<span class=\"context-tag tag-social\">日常聊天</span> \"That joke really <b>cracked me up</b>!\"<br>(那个笑话真让我笑抽了/笑不活了！)","tags":["日常聊天"]},{"id":54,"verb":"Piss off","meaning":"激怒 / 滚开 (粗口)<br><span style=\"font-size:0.8em;color:gray\">(替代 annoy)</span>","scenario":"<span class=\"context-tag tag-drama\">争吵撕逼</span> \"He really <b>pisses me off</b>.\" (他真特么惹毛我了。)<br>\"<b>Piss off!</b>\" (滚开！- 英国和美国都有用)","tags":["争吵撕逼"]},{"id":55,"verb":"Tell off","meaning":"责骂 / 训斥<br><span style=\"font-size:0.8em;color:gray\">(替代 scold)</span>","scenario":"<span class=\"context-tag tag-work\">职场/生活</span> \"My boss <b>told me off</b> for being late.\"<br>(因为迟到，我老板把我狠狠批了一顿。)","tags":["职场/生活"]},{"id":56,"verb":"Let down","meaning":"使失望<br><span style=\"font-size:0.8em;color:gray\">(替代 disappoint)</span>","scenario":"<span class=\"context-tag tag-social\">情感关系</span> \"I trusted you, and you really <b>let me down</b>.\"<br>(我信任你，但你真的让我很失望。)","tags":["情感关系"]},{"id":57,"verb":"Make up","meaning":"和好 / 化妆 / 编造<br><span style=\"font-size:0.8em;color:gray\">(神级多义词)</span>","scenario":"<span class=\"context-tag tag-social\">多场景</span> \"They fought, but they <b>made up</b>.\" (他们打架了，但又和好了。)<br>\"Did you just <b>make that up</b>?\" (那是你瞎编的吧？)","tags":["多场景"]},{"id":58,"verb":"Break up","meaning":"分手 / 打碎<br><span style=\"font-size:0.8em;color:gray\">(替代 end a relationship)</span>","scenario":"<span class=\"context-tag tag-social\">情感八卦</span> \"Did you hear? Tom and Mary <b>broke up</b>!\"<br>(听说了吗？Tom和Mary分手了！)","tags":["情感八卦"]},{"id":59,"verb":"Hit on","meaning":"搭讪 / 撩某人<br><span style=\"font-size:0.8em;color:gray\">(替代 flirt with)</span>","scenario":"<span class=\"context-tag tag-social\">酒吧社交</span> \"Is that guy trying to <b>hit on</b> you?\"<br>(那个男的是不是在试着撩你/跟你搭讪？)","tags":["酒吧社交"]},{"id":60,"verb":"Ask out","meaning":"约某人出去 (约会)<br><span style=\"font-size:0.8em;color:gray\">(替代 invite on a date)</span>","scenario":"<span class=\"context-tag tag-social\">情感关系</span> \"I finally gathered the courage to <b>ask her out</b>.\"<br>(我终于鼓起勇气约她出去了。)","tags":["情感关系"]},{"id":61,"verb":"Stand up","meaning":"放鸽子<br><span style=\"font-size:0.8em;color:gray\">(stand someone up)</span>","scenario":"<span class=\"context-tag tag-social\">抱怨吐槽</span> \"I waited for two hours. She <b>stood me up</b>.\"<br>(我等了两个小时。她放了我鸽子。)","tags":["抱怨吐槽"]},{"id":62,"verb":"Settle down","meaning":"安顿下来 / 成家<br><span style=\"font-size:0.8em;color:gray\">(替代 establish life)</span>","scenario":"<span class=\"context-tag tag-life\">人生规划</span> \"I'm not ready to get married and <b>settle down</b> yet.\"<br>(我还没准备好结婚并安稳过日子。)","tags":["人生规划"]},{"id":63,"verb":"Cheat on","meaning":"出轨 / 不忠<br><span style=\"font-size:0.8em;color:gray\">(替代 be unfaithful)</span>","scenario":"<span class=\"context-tag tag-drama\">影视剧情</span> \"She found out her husband was <b>cheating on</b> her.\"<br>(她发现她老公背叛/出轨了她。)","tags":["影视剧情"]},{"id":64,"verb":"Fall out","meaning":"闹翻 / 争吵后断绝关系<br><span style=\"font-size:0.8em;color:gray\">(替代 quarrel)</span>","scenario":"<span class=\"context-tag tag-social\">社交决裂</span> \"They <b>fell out</b> over a money dispute.\"<br>(他们因为金钱纠纷彻底闹翻了。)","tags":["社交决裂"]},{"id":65,"verb":"Walk out on","meaning":"抛弃 (某人)<br><span style=\"font-size:0.8em;color:gray\">(替代 abandon)</span>","scenario":"<span class=\"context-tag tag-drama\">狗血剧情</span> \"He <b>walked out on</b> his family when the baby was born.\"<br>(孩子刚出生，他就抛妻弃子跑了。)","tags":["狗血剧情"]},{"id":66,"verb":"Bump into","meaning":"偶然遇见<br><span style=\"font-size:0.8em;color:gray\">(替代 run into / encounter)</span>","scenario":"<span class=\"context-tag tag-social\">生活闲聊</span> \"I <b>bumped into</b> my college professor at the mall.\"<br>(我在商场撞见了我的大学教授。)","tags":["生活闲聊"]},{"id":67,"verb":"Hit it off","meaning":"一见如故 / 聊得来<br><span style=\"font-size:0.8em;color:gray\">(替代 get along well instantly)</span>","scenario":"<span class=\"context-tag tag-social\">社交结识</span> \"We met at the party and immediately <b>hit it off</b>.\"<br>(我们在派对上认识，立刻就看对眼/聊得火热了。)","tags":["社交结识"]},{"id":68,"verb":"Drift apart","meaning":"渐行渐远<br><span style=\"font-size:0.8em;color:gray\">(随着时间推移疏远)</span>","scenario":"<span class=\"context-tag tag-social\">友情/爱情</span> \"We used to be best friends, but we just <b>drifted apart</b>.\"<br>(我们曾是最好的朋友，但慢慢就疏远了。)","tags":["友情/爱情"]},{"id":69,"verb":"Go out","meaning":"出去玩 / 约会交往<br><span style=\"font-size:0.8em;color:gray\">(Are you going out with him?)</span>","scenario":"<span class=\"context-tag tag-social\">社交状态</span> \"They've been <b>going out</b> for three months.\"<br>(他们已经正式交往三个月了。)","tags":["社交状态"]},{"id":70,"verb":"Show off","meaning":"炫耀 / 卖弄<br><span style=\"font-size:0.8em;color:gray\">(替代 boast)</span>","scenario":"<span class=\"context-tag tag-social\">吐槽抱怨</span> \"He bought a Ferrari just to <b>show off</b>.\"<br>(他买法拉利纯粹是为了装逼/炫耀。)","tags":["吐槽抱怨"]},{"id":71,"verb":"Dress up","meaning":"盛装打扮 / 变装<br><span style=\"font-size:0.8em;color:gray\">(节日或派对必备)</span>","scenario":"<span class=\"context-tag tag-life\">万圣节/派对</span> \"You don't need to <b>dress up</b> for this party, it's casual.\"<br>(这个派对很随意，你不需要穿得那么隆重。)","tags":["万圣节/派对"]},{"id":72,"verb":"Wake up","meaning":"醒来<br><span style=\"font-size:0.8em;color:gray\">(仅指睁眼有意识)</span>","scenario":"<span class=\"context-tag tag-life\">日常起居</span> \"I <b>woke up</b> at 6 AM but stayed in bed until 7.\"<br>(我六点就醒了，但在床上赖到七点。)","tags":["日常起居"]},{"id":73,"verb":"Sleep in","meaning":"睡懒觉<br><span style=\"font-size:0.8em;color:gray\">(故意晚起)</span>","scenario":"<span class=\"context-tag tag-life\">周末日常</span> \"It's Saturday! I'm going to <b>sleep in</b> tomorrow.\"<br>(周六啦！我明天要睡到自然醒。)","tags":["周末日常"]},{"id":74,"verb":"Stay up","meaning":"熬夜<br><span style=\"font-size:0.8em;color:gray\">(不睡觉)</span>","scenario":"<span class=\"context-tag tag-work\">赶工/娱乐</span> \"I had to <b>stay up</b> late to finish the report.\"<br>(我不得不熬夜完成这份报告。)","tags":["赶工/娱乐"]},{"id":75,"verb":"Doze off","meaning":"打瞌睡 / 不小心睡着<br><span style=\"font-size:0.8em;color:gray\">(开会/上课常见)</span>","scenario":"<span class=\"context-tag tag-work\">开会摸鱼</span> \"The meeting was so boring, I almost <b>dozed off</b>.\"<br>(会议太无聊了，我差点钓鱼/睡着了。)","tags":["开会摸鱼"]},{"id":76,"verb":"Wash up","meaning":"洗手洗脸 / 洗碗<br><span style=\"font-size:0.8em;color:gray\">(吃饭前或回家后)</span>","scenario":"<span class=\"context-tag tag-life\">生活习惯</span> \"Dinner is ready! Go <b>wash up</b>.\"<br>(晚饭好了！快去洗手洗脸。)","tags":["生活习惯"]},{"id":77,"verb":"Clean up","meaning":"彻底打扫 / 赚大钱<br><span style=\"font-size:0.8em;color:gray\">(多义词)</span>","scenario":"<span class=\"context-tag tag-life\">家务/商业</span> \"We need to <b>clean up</b> this mess.\" (我们得收拾烂摊子。)<br>\"They really <b>cleaned up</b> in the stock market.\" (他们在股市大赚了一笔。)","tags":["家务/商业"]},{"id":78,"verb":"Throw away","meaning":"扔掉<br><span style=\"font-size:0.8em;color:gray\">(替代 discard)</span>","scenario":"<span class=\"context-tag tag-life\">日常清理</span> \"Don't <b>throw away</b> those boxes, I need them.\"<br>(别把那些纸箱扔了，我还需要。)","tags":["日常清理"]},{"id":79,"verb":"Put away","meaning":"把...收好 / 放回原处<br><span style=\"font-size:0.8em;color:gray\">(用完东西后)</span>","scenario":"<span class=\"context-tag tag-life\">生活整理</span> \"Please <b>put away</b> your clothes.\"<br>(请把你的衣服收拾好放到柜子里。)","tags":["生活整理"]},{"id":80,"verb":"Stock up","meaning":"囤货<br><span style=\"font-size:0.8em;color:gray\">(美国生活特色，去Costco必备)</span>","scenario":"<span class=\"context-tag tag-life\">超市购物</span> \"We need to <b>stock up</b> on toilet paper before the storm.\"<br>(暴风雪来临前，我们需要囤点卫生纸。)","tags":["超市购物"]},{"id":81,"verb":"Shop around","meaning":"货比三家<br><span style=\"font-size:0.8em;color:gray\">(买大件前)</span>","scenario":"<span class=\"context-tag tag-life\">消费购物</span> \"Don't buy the first car you see, <b>shop around</b> a bit.\"<br>(别看到第一辆车就买，多逛几家比比价。)","tags":["消费购物"]},{"id":82,"verb":"Rip off","meaning":"敲竹杠 / 坑钱<br><span style=\"font-size:0.8em;color:gray\">(名词：A rip-off)</span>","scenario":"<span class=\"context-tag tag-life\">旅游防坑</span> \"They charged me $50 for a burger? I got <b>ripped off</b>!\"<br>(一个汉堡收我50刀？我被当韭菜宰了！)","tags":["旅游防坑"]},{"id":83,"verb":"Save up","meaning":"攒钱<br><span style=\"font-size:0.8em;color:gray\">(为了某个目标)</span>","scenario":"<span class=\"context-tag tag-life\">财务规划</span> \"I'm <b>saving up</b> for a trip to Europe.\"<br>(我正在为去欧洲旅行存钱。)","tags":["财务规划"]},{"id":84,"verb":"Pay back","meaning":"还钱 / 报复<br><span style=\"font-size:0.8em;color:gray\">(替代 repay / retaliate)</span>","scenario":"<span class=\"context-tag tag-social\">借钱与恩怨</span> \"Can I borrow $20? I'll <b>pay you back</b> tomorrow.\" (借20刀行吗？明天还。)<br>\"I swear I'll <b>pay him back</b> for this.\" (我发誓我会为这事报复他。)","tags":["借钱与恩怨"]},{"id":85,"verb":"Sell out","meaning":"售罄 / 出卖原则<br><span style=\"font-size:0.8em;color:gray\">(音乐会或商品卖光)</span>","scenario":"<span class=\"context-tag tag-life\">购物看剧</span> \"The Taylor Swift concert tickets <b>sold out</b> in minutes.\"<br>(霉霉演唱会的票几分钟就被抢光了。)","tags":["购物看剧"]},{"id":86,"verb":"Splash out","meaning":"挥霍 / 砸大钱买<br><span style=\"font-size:0.8em;color:gray\">(英美通用，偶尔任性)</span>","scenario":"<span class=\"context-tag tag-life\">奢侈消费</span> \"She <b>splashed out</b> on a designer bag for her birthday.\"<br>(她生日时大放血买了个名牌包。)","tags":["奢侈消费"]},{"id":87,"verb":"Cough up","meaning":"被迫交出 (钱) / 大出血<br><span style=\"font-size:0.8em;color:gray\">(非常不情愿地付钱)</span>","scenario":"<span class=\"context-tag tag-life\">罚单账单</span> \"I had to <b>cough up</b> $500 for a speeding ticket.\"<br>(我不得不含泪掏了500刀交超速罚单。)","tags":["罚单账单"]},{"id":88,"verb":"Cut back","meaning":"削减开支 / 减少(摄入)<br><span style=\"font-size:0.8em;color:gray\">(替代 reduce)</span>","scenario":"<span class=\"context-tag tag-life\">财务与健康</span> \"I'm trying to <b>cut back</b> on coffee.\" (我在努力少喝咖啡。)<br>\"We need to <b>cut back</b> on our spending.\" (我们得削减开销了。)","tags":["财务与健康"]},{"id":89,"verb":"Take out","meaning":"拿出来 / 点外卖 / 约某人出去<br><span style=\"font-size:0.8em;color:gray\">(高频多义词)</span>","scenario":"<span class=\"context-tag tag-life\">生活吃饭</span> \"Let's just get <b>takeout</b> tonight.\" (今晚咱们直接叫外卖吧。)<br>\"Can I <b>take you out</b> to dinner?\" (我能请你吃个晚饭吗？)","tags":["生活吃饭"]},{"id":90,"verb":"Eat out","meaning":"下馆子 / 在外面吃饭<br><span style=\"font-size:0.8em;color:gray\">(不在家吃)</span>","scenario":"<span class=\"context-tag tag-life\">周末日常</span> \"I'm too tired to cook. Let's <b>eat out</b>.\"<br>(我累得不想做饭了。咱们出去吃吧。)","tags":["周末日常"]},{"id":91,"verb":"Pull over","meaning":"靠边停车<br><span style=\"font-size:0.8em;color:gray\">(美国开车极其重要的一句)</span>","scenario":"<span class=\"context-tag tag-life\">驾驶被警车追</span> \"The police officer signaled me to <b>pull over</b>.\"<br>(警察示意我靠边停车。听到警笛必须马上 Pull over！)","tags":["驾驶被警车追"]},{"id":92,"verb":"Speed up","meaning":"加速<br><span style=\"font-size:0.8em;color:gray\">(替代 accelerate)</span>","scenario":"<span class=\"context-tag tag-life\">开车与进度</span> \"You need to <b>speed up</b>, or we'll be late!\"<br>(你得开快点/加快速度，不然我们迟到了！)","tags":["开车与进度"]},{"id":93,"verb":"Slow down","meaning":"减速 / 慢点说<br><span style=\"font-size:0.8em;color:gray\">(替代 decelerate)</span>","scenario":"<span class=\"context-tag tag-life\">沟通求助</span> \"Please <b>slow down</b>, my English isn't very good.\"<br>(请慢点说，我的英语不太好。刚到美国必备金句！)","tags":["沟通求助"]},{"id":94,"verb":"Pick out","meaning":"精心挑选<br><span style=\"font-size:0.8em;color:gray\">(替代 choose / select)</span>","scenario":"<span class=\"context-tag tag-life\">购物送礼</span> \"I <b>picked out</b> a nice tie for my dad.\"<br>(我为我爸精心挑了一条领带。)","tags":["购物送礼"]},{"id":95,"verb":"Set off","meaning":"出发 / 触发(警报)<br><span style=\"font-size:0.8em;color:gray\">(开启旅程)</span>","scenario":"<span class=\"context-tag tag-life\">出行安防</span> \"We plan to <b>set off</b> early tomorrow morning.\" (我们计划明早出发。)<br>\"Cooking smoke <b>set off</b> the fire alarm.\" (做饭的烟触发了火灾警报。)","tags":["出行安防"]},{"id":96,"verb":"See off","meaning":"送行<br><span style=\"font-size:0.8em;color:gray\">(去机场/车站送人)</span>","scenario":"<span class=\"context-tag tag-social\">离别社交</span> \"My friends came to the airport to <b>see me off</b>.\"<br>(我的朋友们来机场为我送行。)","tags":["离别社交"]},{"id":97,"verb":"Get away","meaning":"逃离 / 出去度假<br><span style=\"font-size:0.8em;color:gray\">(名词：a weekend getaway 周末短途游)</span>","scenario":"<span class=\"context-tag tag-life\">假期放松</span> \"I just want to <b>get away</b> for the weekend and relax.\"<br>(我只想周末出去旅个游放松一下。)","tags":["假期放松"]},{"id":98,"verb":"Head out","meaning":"出发 / 离开某地<br><span style=\"font-size:0.8em;color:gray\">(极地道的美式口语)</span>","scenario":"<span class=\"context-tag tag-social\">告别</span> \"It's getting late, I should probably <b>head out</b>.\"<br>(时间不早了，我差不多该撤了/出发了。)","tags":["告别"]},{"id":99,"verb":"Sneak out","meaning":"偷偷溜出去<br><span style=\"font-size:0.8em;color:gray\">(怕被发现)</span>","scenario":"<span class=\"context-tag tag-drama\">影视高频</span> \"The teenager <b>sneaked out</b> of the house at midnight.\"<br>(那个青少年半夜偷偷溜出了家门。)","tags":["影视高频"]},{"id":100,"verb":"Tag along","meaning":"尾随 / 跟着去<br><span style=\"font-size:0.8em;color:gray\">(别人没主动邀请，你跟着去)</span>","scenario":"<span class=\"context-tag tag-social\">朋友聚会</span> \"I'm going to the mall, want to <b>tag along</b>?\"<br>(我要去商场，你想跟着一起去吗？)","tags":["朋友聚会"]},{"id":101,"verb":"Grow up","meaning":"长大 / 成熟点<br><span style=\"font-size:0.8em;color:gray\">(可作背景介绍，也可作骂人话)</span>","scenario":"<span class=\"context-tag tag-social\">自我介绍</span> \"I <b>grew up</b> in California.\" (我在加州长大。)<br>\"Oh, <b>grow up</b>!\" (拜托，成熟点好吗/别幼稚了！)","tags":["自我介绍"]},{"id":102,"verb":"Take after","meaning":"(长相或性格) 像某个长辈<br><span style=\"font-size:0.8em;color:gray\">(替代 resemble)</span>","scenario":"<span class=\"context-tag tag-social\">家庭闲聊</span> \"He really <b>takes after</b> his father. They both love fishing.\"<br>(他真像他爸。他们都爱钓鱼。)","tags":["家庭闲聊"]},{"id":103,"verb":"Bring back","meaning":"带回 / 使回想起<br><span style=\"font-size:0.8em;color:gray\">(唤起记忆)</span>","scenario":"<span class=\"context-tag tag-social\">怀旧感慨</span> \"Hearing that song really <b>brings back</b> memories.\"<br>(听到那首歌真的唤起了我的回忆。)","tags":["怀旧感慨"]},{"id":104,"verb":"Look back","meaning":"回顾 / 回首往事<br><span style=\"font-size:0.8em;color:gray\">(思考过去)</span>","scenario":"<span class=\"context-tag tag-life\">人生哲理</span> \"When I <b>look back</b> on my 20s, I have no regrets.\"<br>(当回首我的20岁时，我没有遗憾。)","tags":["人生哲理"]},{"id":105,"verb":"Look up to","meaning":"敬仰 / 尊重<br><span style=\"font-size:0.8em;color:gray\">(替代 respect / admire)</span>","scenario":"<span class=\"context-tag tag-work\">面试/谈论偶像</span> \"I've always <b>looked up to</b> my older brother.\"<br>(我一直很敬仰我的哥哥。画面感：仰头看。)","tags":["面试/谈论偶像"]},{"id":106,"verb":"Look down on","meaning":"看不起 / 鄙视<br><span style=\"font-size:0.8em;color:gray\">(替代 despise)</span>","scenario":"<span class=\"context-tag tag-drama\">社会现象</span> \"He <b>looks down on</b> people who don't have a college degree.\"<br>(他看不起没有大学学历的人。画面感：低头看。)","tags":["社会现象"]},{"id":107,"verb":"Pass away","meaning":"去世<br><span style=\"font-size:0.8em;color:gray\">(polite way to say \"die\")</span>","scenario":"<span class=\"context-tag tag-social\">委婉表达</span> \"I'm sorry to hear that your grandfather <b>passed away</b>.\"<br>(很遗憾听到你爷爷过世的消息。绝对不要直接说 died，太生硬。)","tags":["委婉表达"]},{"id":108,"verb":"Give away","meaning":"免费赠送 / 泄露(秘密)<br><span style=\"font-size:0.8em;color:gray\">(博主抽奖常用 Giveaway)</span>","scenario":"<span class=\"context-tag tag-life\">网购与剧透</span> \"They are <b>giving away</b> free samples.\" (他们在发免费试用品。)<br>\"Don't <b>give away</b> the ending of the movie!\" (别剧透电影结局！)","tags":["网购与剧透"]},{"id":109,"verb":"Give up","meaning":"放弃 / 戒掉<br><span style=\"font-size:0.8em;color:gray\">(替代 quit)</span>","scenario":"<span class=\"context-tag tag-life\">习惯与坚持</span> \"I <b>gave up</b> smoking last year.\" (我去年戒烟了。)<br>\"Never <b>give up</b> on your dreams.\" (永远别放弃梦想。)","tags":["习惯与坚持"]},{"id":110,"verb":"Give in","meaning":"屈服 / 让步<br><span style=\"font-size:0.8em;color:gray\">(替代 surrender / yield)</span>","scenario":"<span class=\"context-tag tag-social\">谈判与争吵</span> \"The kids kept asking for candy, and eventually I <b>gave in</b>.\"<br>(孩子们一直要糖，最后我还是妥协/屈服了。)","tags":["谈判与争吵"]},{"id":111,"verb":"Back down","meaning":"退让 / 认输<br><span style=\"font-size:0.8em;color:gray\">(在争论或对抗中)</span>","scenario":"<span class=\"context-tag tag-work\">谈判硬碰硬</span> \"Neither side is willing to <b>back down</b>.\"<br>(双方都不愿意退让/认怂。)","tags":["谈判硬碰硬"]},{"id":112,"verb":"Back out","meaning":"反悔 / 退出(协议/计划)<br><span style=\"font-size:0.8em;color:gray\">(答应了又不去)</span>","scenario":"<span class=\"context-tag tag-work\">商业与约定</span> \"You signed the contract, you can't <b>back out</b> now.\"<br>(你签了合同，现在不能反悔抽身了。)","tags":["商业与约定"]},{"id":113,"verb":"Back off","meaning":"后退 / 别插手 / 别逼我<br><span style=\"font-size:0.8em;color:gray\">(美剧警察拔枪必备台词)</span>","scenario":"<span class=\"context-tag tag-drama\">警告语气</span> \"Just <b>back off</b> and let me handle this!\"<br>(退后/别管闲事，让我来处理！)","tags":["警告语气"]},{"id":114,"verb":"Drop out","meaning":"退学 / 退出(比赛等)<br><span style=\"font-size:0.8em;color:gray\">(名词：a dropout 辍学生)</span>","scenario":"<span class=\"context-tag tag-social\">谈论学历</span> \"Steve Jobs <b>dropped out</b> of college.\"<br>(乔布斯大学辍学了。)","tags":["谈论学历"]},{"id":115,"verb":"Fall through","meaning":"(计划/交易) 泡汤 / 落空<br><span style=\"font-size:0.8em;color:gray\">(替代 fail)</span>","scenario":"<span class=\"context-tag tag-work\">项目失败</span> \"Our vacation plans <b>fell through</b> because of the storm.\"<br>(我们的度假计划因为暴风雨泡汤了。像掉进冰窟窿一样落空。)","tags":["项目失败"]},{"id":116,"verb":"Fall apart","meaning":"散架 / 崩溃<br><span style=\"font-size:0.8em;color:gray\">(物体损坏或人精神崩溃)</span>","scenario":"<span class=\"context-tag tag-drama\">情感与物品</span> \"My old car is slowly <b>falling apart</b>.\" (我的旧车快散架了。)<br>\"When her dog died, she completely <b>fell apart</b>.\" (狗死后，她精神崩溃了。)","tags":["情感与物品"]},{"id":117,"verb":"Pull through","meaning":"挺过难关 / (大病)康复<br><span style=\"font-size:0.8em;color:gray\">(替代 survive / recover)</span>","scenario":"<span class=\"context-tag tag-life\">医疗抢救</span> \"The surgery was dangerous, but he <b>pulled through</b>.\"<br>(手术很危险，但他挺过来了。有种被“拉过来”死里逃生的感觉。)","tags":["医疗抢救"]},{"id":118,"verb":"Get through","meaning":"打通(电话) / 熬过(困难)<br><span style=\"font-size:0.8em;color:gray\">(穿越障碍)</span>","scenario":"<span class=\"context-tag tag-work\">客服与生活</span> \"I tried calling customer service, but I couldn't <b>get through</b>.\" (打不通。)<br>\"We will <b>get through</b> this tough time together.\" (我们会一起熬过去。)","tags":["客服与生活"]},{"id":119,"verb":"Go through","meaning":"经历(苦难) / 仔细检查<br><span style=\"font-size:0.8em;color:gray\">(替代 experience / examine)</span>","scenario":"<span class=\"context-tag tag-work\">安检与审查</span> \"I'm <b>going through</b> a lot right now.\" (我最近经历了很多事。)<br>\"Let's <b>go through</b> the contract line by line.\" (我们逐行过一遍合同。)","tags":["安检与审查"]},{"id":120,"verb":"Look through","meaning":"浏览 / 快速翻阅<br><span style=\"font-size:0.8em;color:gray\">(替代 skim)</span>","scenario":"<span class=\"context-tag tag-work\">办公日常</span> \"I <b>looked through</b> your resume, and it looks impressive.\"<br>(我翻看了一下你的简历，令人印象深刻。)","tags":["办公日常"]},{"id":121,"verb":"Read up on","meaning":"研读 / 为...查阅大量资料<br><span style=\"font-size:0.8em;color:gray\">(工作或考试前做功课)</span>","scenario":"<span class=\"context-tag tag-work\">研究学习</span> \"I need to <b>read up on</b> the new tax laws.\"<br>(我得去研读/恶补一下新的税法知识了。)","tags":["研究学习"]},{"id":122,"verb":"Think over","meaning":"仔细考虑<br><span style=\"font-size:0.8em;color:gray\">(替代 consider carefully)</span>","scenario":"<span class=\"context-tag tag-work\">收到Offer时</span> \"Thanks for the offer. I'll <b>think it over</b> and let you know.\"<br>(谢谢你们的录用。我会仔细考虑并在稍后回复。)","tags":["收到Offer时"]},{"id":123,"verb":"Sleep on","meaning":"把问题留到明天决定<br><span style=\"font-size:0.8em;color:gray\">(不要立刻做决定)</span>","scenario":"<span class=\"context-tag tag-work\">谈判策略</span> \"It's a big decision. Let me <b>sleep on</b> it.\"<br>(这是个重大决定。让我睡一觉想想/明早再答复你。)","tags":["谈判策略"]},{"id":124,"verb":"Boil down to","meaning":"归结于 / 最关键的原因是<br><span style=\"font-size:0.8em;color:gray\">(把水煮干只剩精华)</span>","scenario":"<span class=\"context-tag tag-work\">总结问题</span> \"In the end, it all <b>boils down to</b> money.\"<br>(归根结底，这一切都是钱的问题。)","tags":["总结问题"]},{"id":125,"verb":"Narrow down","meaning":"缩小(选择)范围<br><span style=\"font-size:0.8em;color:gray\">(在多个选项中筛选)</span>","scenario":"<span class=\"context-tag tag-work\">招聘/购物</span> \"We've <b>narrowed down</b> the candidates to three.\"<br>(我们已经把候选人范围缩小到了三个。)","tags":["招聘/购物"]},{"id":126,"verb":"Track down","meaning":"追查到 / 费力找到<br><span style=\"font-size:0.8em;color:gray\">(替代 find after a search)</span>","scenario":"<span class=\"context-tag tag-work\">找人找物</span> \"It took me hours, but I finally <b>tracked down</b> the bug.\"<br>(花了我好几个小时，但我终于揪出了这个代码bug。)","tags":["找人找物"]},{"id":127,"verb":"Puzzle out","meaning":"琢磨透 / 苦思冥想解决<br><span style=\"font-size:0.8em;color:gray\">(像拼图一样解开)</span>","scenario":"<span class=\"context-tag tag-work\">技术难题</span> \"I'm trying to <b>puzzle out</b> how this machine works.\"<br>(我正在努力琢磨这台机器是怎么运作的。)","tags":["技术难题"]},{"id":128,"verb":"Single out","meaning":"单独挑出(批评或表扬)<br><span style=\"font-size:0.8em;color:gray\">(在人群中孤立出来)</span>","scenario":"<span class=\"context-tag tag-work\">职场甩锅</span> \"It's not fair to <b>single him out</b> for the team's failure.\"<br>(因为团队失败而单独揪出他来指责是不公平的。)","tags":["职场甩锅"]},{"id":129,"verb":"Sum up","meaning":"总结 / 概括<br><span style=\"font-size:0.8em;color:gray\">(替代 summarize)</span>","scenario":"<span class=\"context-tag tag-work\">演讲结尾</span> \"To <b>sum up</b>, we need to cut costs by 20%.\"<br>(总而言之，我们需要削减20%的成本。)","tags":["演讲结尾"]},{"id":130,"verb":"Spell out","meaning":"讲得清清楚楚 / 详细说明<br><span style=\"font-size:0.8em;color:gray\">(像拼写单词一样给你解释)</span>","scenario":"<span class=\"context-tag tag-work\">职场沟通</span> \"Do I have to <b>spell it out</b> for you?\"<br>(非要我把话揉碎了/说得那么直白你才懂吗？)","tags":["职场沟通"]},{"id":131,"verb":"Leave out","meaning":"遗漏 / 忽略 / 没把人算在内<br><span style=\"font-size:0.8em;color:gray\">(替代 omit)</span>","scenario":"<span class=\"context-tag tag-work\">写报告/开群建</span> \"You <b>left out</b> an important detail in the report.\" (你漏掉了一个重要细节。)<br>\"I felt <b>left out</b> at the party.\" (在派对上我感觉被冷落了。)","tags":["写报告/开群建"]},{"id":132,"verb":"Cross out","meaning":"划掉 (文字)<br><span style=\"font-size:0.8em;color:gray\">(在名单或纸上划个叉)</span>","scenario":"<span class=\"context-tag tag-life\">核对清单</span> \"Just <b>cross out</b> my name from the list.\"<br>(把我的名字从名单上划掉就行了。)","tags":["核对清单"]},{"id":133,"verb":"Cut off","meaning":"切断 / 打断讲话 / 强行超车<br><span style=\"font-size:0.8em;color:gray\">(极高频多义词)</span>","scenario":"<span class=\"context-tag tag-life\">开车与聊天</span> \"The phone company <b>cut off</b> our internet.\" (网被断了。)<br>\"Some jerk <b>cut me off</b> on the highway!\" (高速上有个混蛋强行别我的车！)","tags":["开车与聊天"]},{"id":134,"verb":"Hang up","meaning":"挂断电话 / 挂起<br><span style=\"font-size:0.8em;color:gray\">(Don't hang up on me!)</span>","scenario":"<span class=\"context-tag tag-social\">通电话</span> \"He got angry and <b>hung up</b> on me.\"<br>(他生气了，直接挂了我的电话。注意加 on somebody)","tags":["通电话"]},{"id":135,"verb":"Hold back","meaning":"憋住 / 控制(情绪) / 阻挡<br><span style=\"font-size:0.8em;color:gray\">(替代 suppress)</span>","scenario":"<span class=\"context-tag tag-drama\">发泄情绪</span> \"She couldn't <b>hold back</b> her tears.\" (她忍不住眼泪。)<br>\"Don't <b>hold back</b>, tell me what you really think.\" (别藏着掖着，说实话。)","tags":["发泄情绪"]},{"id":136,"verb":"Keep up","meaning":"保持 / 跟上节奏<br><span style=\"font-size:0.8em;color:gray\">(Keep up the good work!)</span>","scenario":"<span class=\"context-tag tag-work\">老板表扬/上课</span> \"<b>Keep up</b> the good work!\" (继续保持优良表现！)<br>\"You're walking too fast, I can't <b>keep up</b>.\" (你走太快我跟不上。)","tags":["老板表扬/上课"]},{"id":137,"verb":"Catch on","meaning":"流行起来 / 终于明白过来<br><span style=\"font-size:0.8em;color:gray\">(替代 become popular / understand)</span>","scenario":"<span class=\"context-tag tag-work\">讨论趋势</span> \"TikTok <b>caught on</b> very quickly.\" (TikTok很快就火爆起来了。)<br>\"It took me a while to <b>catch on</b> to the joke.\" (我过了一会儿才听懂那个笑话。)","tags":["讨论趋势"]},{"id":138,"verb":"Sign up","meaning":"报名 / 注册<br><span style=\"font-size:0.8em;color:gray\">(各种App或活动通用)</span>","scenario":"<span class=\"context-tag tag-life\">上网/健身</span> \"I decided to <b>sign up</b> for a yoga class.\"<br>(我决定报名参加瑜伽课。)","tags":["上网/健身"]},{"id":139,"verb":"Log in","meaning":"登录 (电脑或网站)<br><span style=\"font-size:0.8em;color:gray\">(反义词：Log out)</span>","scenario":"<span class=\"context-tag tag-work\">IT必备</span> \"I can't <b>log in</b> to my account, I forgot the password.\"<br>(我登不进账号了，我忘了密码。)","tags":["IT必备"]},{"id":140,"verb":"Opt out","meaning":"选择退出 / 拒收推送<br><span style=\"font-size:0.8em;color:gray\">(替代 choose not to participate)</span>","scenario":"<span class=\"context-tag tag-work\">商业邮件/隐私</span> \"You can <b>opt out</b> of receiving marketing emails at any time.\"<br>(你可以随时退订营销邮件。美国非常强调 Opt-in 和 Opt-out 机制。)","tags":["商业邮件/隐私"]},{"id":141,"verb":"Scroll down","meaning":"向下滚动 (网页/屏幕)<br><span style=\"font-size:0.8em;color:gray\">(看手机和电脑动作)</span>","scenario":"<span class=\"context-tag tag-work\">开会投屏</span> \"Can you <b>scroll down</b> to the next paragraph?\"<br>(你能向下滚动到下一段吗？向上是 Scroll up。)","tags":["开会投屏"]},{"id":142,"verb":"Zoom in","meaning":"放大 (画面或镜头)<br><span style=\"font-size:0.8em;color:gray\">(反义词：Zoom out 缩小)</span>","scenario":"<span class=\"context-tag tag-work\">看图/设计</span> \"<b>Zoom in</b> on the top left corner of the image.\"<br>(把图片左上角放大看看。)","tags":["看图/设计"]},{"id":143,"verb":"Kick off","meaning":"开始 (会议/活动/足球赛)<br><span style=\"font-size:0.8em;color:gray\">(替代 start)</span>","scenario":"<span class=\"context-tag tag-work\">项目启动</span> \"We will <b>kick off</b> the new project next Monday.\"<br>(我们下周一将正式启动这个新项目。Kickoff meeting: 启动会。)","tags":["项目启动"]},{"id":144,"verb":"Drag on","meaning":"拖延得很长 / 没完没了<br><span style=\"font-size:0.8em;color:gray\">(形容会议或战争，带贬义)</span>","scenario":"<span class=\"context-tag tag-work\">吐槽老板开会</span> \"The meeting <b>dragged on</b> for three hours.\"<br>(这破会拖拖拉拉开了三个小时。)","tags":["吐槽老板开会"]},{"id":145,"verb":"Slack off","meaning":"偷懒 / 摸鱼 / 懈怠<br><span style=\"font-size:0.8em;color:gray\">(Slack 有松弛的意思)</span>","scenario":"<span class=\"context-tag tag-work\">职场表现</span> \"Don't <b>slack off</b>, the deadline is tomorrow.\"<br>(别摸鱼了，明天就是截止日期了。名词 slacker = 摸鱼的人。)","tags":["职场表现"]},{"id":146,"verb":"Knuckle down","meaning":"开始拼命干活 / 卷起袖子加油干<br><span style=\"font-size:0.8em;color:gray\">(Knuckle是手指关节)</span>","scenario":"<span class=\"context-tag tag-work\">冲刺打气</span> \"Exams are coming, it's time to <b>knuckle down</b> and study.\"<br>(考试要来了，是时候埋头苦读了。)","tags":["冲刺打气"]},{"id":147,"verb":"Take on","meaning":"承担(责任) / 雇佣<br><span style=\"font-size:0.8em;color:gray\">(接下担子)</span>","scenario":"<span class=\"context-tag tag-work\">接活儿</span> \"I can't <b>take on</b> any more projects right now.\" (我现在接不了更多项目了。)<br>\"The company is <b>taking on</b> 50 new staff.\" (公司正在招50名新员工。)","tags":["接活儿"]},{"id":148,"verb":"Hand over","meaning":"移交 (权力/工作/物品)<br><span style=\"font-size:0.8em;color:gray\">(交接工作常用)</span>","scenario":"<span class=\"context-tag tag-work\">离职交接/警察抓人</span> \"I <b>handed over</b> my files to my successor.\" (我把文件交接给了继任者。)<br>\"<b>Hand over</b> your wallet!\" (抢劫：交出钱包！)","tags":["离职交接/警察抓人"]},{"id":149,"verb":"Step down","meaning":"辞职 / 下台 (高管)<br><span style=\"font-size:0.8em;color:gray\">(替代 resign)</span>","scenario":"<span class=\"context-tag tag-work\">商业新闻</span> \"The CEO decided to <b>step down</b> after the scandal.\"<br>(丑闻发生后，CEO决定引咎辞职。)","tags":["商业新闻"]},{"id":150,"verb":"Crack down","meaning":"严厉打击 / 镇压<br><span style=\"font-size:0.8em;color:gray\">(警察或公司出台严规)</span>","scenario":"<span class=\"context-tag tag-work\">行政管理</span> \"The police are <b>cracking down</b> on drunk driving.\"<br>(警方正在严打酒驾。)","tags":["行政管理"]},{"id":151,"verb":"Shut down","meaning":"关闭 / 停工 (电脑或工厂)<br><span style=\"font-size:0.8em;color:gray\">(彻底关停)</span>","scenario":"<span class=\"context-tag tag-work\">IT与工业</span> \"Remember to <b>shut down</b> your computer before you leave.\"<br>(走之前记得电脑关机。)","tags":["IT与工业"]},{"id":152,"verb":"Wipe out","meaning":"彻底摧毁 / 摔得四脚朝天<br><span style=\"font-size:0.8em;color:gray\">(替代 destroy)</span>","scenario":"<span class=\"context-tag tag-drama\">灾难片/滑雪</span> \"The tsunami <b>wiped out</b> the entire village.\" (海啸摧毁了整个村庄。)<br>\"I completely <b>wiped out</b> on the ski slope.\" (我在雪道上摔惨了。)","tags":["灾难片/滑雪"]},{"id":153,"verb":"Weed out","meaning":"清除 / 淘汰 (不合格的)<br><span style=\"font-size:0.8em;color:gray\">(像拔杂草一样)</span>","scenario":"<span class=\"context-tag tag-work\">简历筛选</span> \"The first round of interviews is used to <b>weed out</b> weak candidates.\"<br>(第一轮面试是为了淘汰掉能力不行的候选人。)","tags":["简历筛选"]},{"id":154,"verb":"Phase out","meaning":"逐步淘汰 / 分阶段停止使用<br><span style=\"font-size:0.8em;color:gray\">(产品线管理高频词)</span>","scenario":"<span class=\"context-tag tag-work\">企业战略</span> \"Apple decided to <b>phase out</b> the old iPhone models.\"<br>(苹果决定逐步淘汰老款iPhone。)","tags":["企业战略"]},{"id":155,"verb":"Wear out","meaning":"穿破 / 使精疲力尽<br><span style=\"font-size:0.8em;color:gray\">(物品坏了或人累瘫了)</span>","scenario":"<span class=\"context-tag tag-life\">吐槽累成狗</span> \"My shoes are completely <b>worn out</b>.\" (我的鞋彻底穿破了。)<br>\"This project has really <b>worn me out</b>.\" (这个项目把我累瘫了。)","tags":["吐槽累成狗"]},{"id":156,"verb":"Wear off","meaning":"(药效/新鲜感) 逐渐消退<br><span style=\"font-size:0.8em;color:gray\">(替代 fade away)</span>","scenario":"<span class=\"context-tag tag-life\">看病吃药</span> \"The painkillers are starting to <b>wear off</b>.\"<br>(止痛药的药效开始退了。)","tags":["看病吃药"]},{"id":157,"verb":"Shrug off","meaning":"对...满不在乎 / 一笑置之<br><span style=\"font-size:0.8em;color:gray\">(耸耸肩表示无所谓)</span>","scenario":"<span class=\"context-tag tag-social\">面对批评</span> \"He just <b>shrugged off</b> the criticism like it was nothing.\"<br>(他对批评耸耸肩一笑置之，好像什么都没发生。)","tags":["面对批评"]},{"id":158,"verb":"Brush off","meaning":"敷衍 / 不理睬 (某人)<br><span style=\"font-size:0.8em;color:gray\">(像弹灰尘一样把人打发走)</span>","scenario":"<span class=\"context-tag tag-social\">社交吃瘪</span> \"I tried to talk to her, but she just <b>brushed me off</b>.\"<br>(我试图和她搭话，但她直接把我打发/敷衍了。)","tags":["社交吃瘪"]},{"id":159,"verb":"Fight off","meaning":"击退 / 抵抗(疾病或袭击)<br><span style=\"font-size:0.8em;color:gray\">(努力战胜)</span>","scenario":"<span class=\"context-tag tag-life\">生病请假</span> \"I'm trying to <b>fight off</b> a cold, so I won't come to the office.\"<br>(我正在努力对抗感冒，所以就不去办公室了。)","tags":["生病请假"]},{"id":160,"verb":"Ward off","meaning":"避开 / 预防 (危险或邪恶)<br><span style=\"font-size:0.8em;color:gray\">(替代 prevent)</span>","scenario":"<span class=\"context-tag tag-life\">养生/迷信</span> \"Eat lots of Vitamin C to <b>ward off</b> illness.\"<br>(多吃维C来预防疾病。)","tags":["养生/迷信"]},{"id":161,"verb":"Tip off","meaning":"走漏风声 / 通风报信<br><span style=\"font-size:0.8em;color:gray\">(警匪片高频词汇)</span>","scenario":"<span class=\"context-tag tag-drama\">影视剧情</span> \"Someone <b>tipped off</b> the police about the robbery.\"<br>(有人向警方密报了抢劫案。)","tags":["影视剧情"]},{"id":162,"verb":"Cover up","meaning":"掩盖真相 / 掩饰<br><span style=\"font-size:0.8em;color:gray\">(丑闻爆发时必备)</span>","scenario":"<span class=\"context-tag tag-work\">商业丑闻</span> \"The company tried to <b>cover up</b> the data leak.\"<br>(公司试图掩盖数据泄露的真相。名词：A cover-up。)","tags":["商业丑闻"]},{"id":163,"verb":"Turn up","meaning":"音量调大 / 意外出现<br><span style=\"font-size:0.8em;color:gray\">(替代 increase volume / appear)</span>","scenario":"<span class=\"context-tag tag-social\">聚会找人</span> \"Can you <b>turn up</b> the music?\" (把音乐调大点。)<br>\"He didn't <b>turn up</b> until 10 PM.\" (他晚上十点才意外现身。)","tags":["聚会找人"]},{"id":164,"verb":"Tone down","meaning":"缓和 / 使语气温和 / 降调<br><span style=\"font-size:0.8em;color:gray\">(说话太冲时被提醒)</span>","scenario":"<span class=\"context-tag tag-work\">公关/写邮件</span> \"You should <b>tone down</b> your language in this email.\"<br>(你应该让这封邮件的用词稍微缓和/客气一点。)","tags":["公关/写邮件"]},{"id":165,"verb":"Settle for","meaning":"勉强接受 / 凑合<br><span style=\"font-size:0.8em;color:gray\">(没有更好的选择)</span>","scenario":"<span class=\"context-tag tag-life\">买东西/找对象</span> \"I wanted the red car, but I had to <b>settle for</b> the blue one.\"<br>(我想要红车，但买不到，只能勉强凑合要蓝色的了。)","tags":["买东西/找对象"]},{"id":166,"verb":"Stand for","meaning":"代表 / 容忍<br><span style=\"font-size:0.8em;color:gray\">(缩写代表什么)</span>","scenario":"<span class=\"context-tag tag-work\">解释缩写/底线</span> \"What does ASAP <b>stand for</b>?\" (ASAP代表什么？)<br>\"I will not <b>stand for</b> this kind of behavior.\" (我绝不容忍这种行为。)","tags":["解释缩写/底线"]},{"id":167,"verb":"Go against","meaning":"违背 (原则/意愿)<br><span style=\"font-size:0.8em;color:gray\">(反其道而行)</span>","scenario":"<span class=\"context-tag tag-work\">坚持立场</span> \"Doing this would <b>go against</b> company policy.\"<br>(这样做会违背公司政策。)","tags":["坚持立场"]},{"id":168,"verb":"Blend in","meaning":"融入(环境或人群)<br><span style=\"font-size:0.8em;color:gray\">(不引人注目)</span>","scenario":"<span class=\"context-tag tag-social\">新移民/卧底</span> \"As a spy, you must learn to <b>blend in</b>.\"<br>(作为一个间谍，你必须学会伪装融入人群。)","tags":["新移民/卧底"]},{"id":169,"verb":"Stand by","meaning":"袖手旁观 / 支持(某人) / 待命<br><span style=\"font-size:0.8em;color:gray\">(视语境而定)</span>","scenario":"<span class=\"context-tag tag-social\">多义场景</span> \"I can't just <b>stand by</b> and watch him suffer.\" (我不能袖手旁观。)<br>\"I will always <b>stand by</b> you.\" (我会永远支持你。)","tags":["多义场景"]},{"id":170,"verb":"Root for","meaning":"为...加油 / 支持某队<br><span style=\"font-size:0.8em;color:gray\">(美国体育文化极高频词)</span>","scenario":"<span class=\"context-tag tag-life\">看超级碗/NBA</span> \"Which team are you <b>rooting for</b>?\"<br>(你支持/你替哪支球队加油？)","tags":["看超级碗/NBA"]},{"id":171,"verb":"Count on","meaning":"指望 / 依靠<br><span style=\"font-size:0.8em;color:gray\">(替代 depend on)</span>","scenario":"<span class=\"context-tag tag-work\">承诺办事</span> \"You can <b>count on</b> me, I'll get it done.\"<br>(包在我身上/你可以指望我，我会搞定的。)","tags":["承诺办事"]},{"id":172,"verb":"Rely on","meaning":"依赖 / 依靠<br><span style=\"font-size:0.8em;color:gray\">(比 Count on 更正式一点)</span>","scenario":"<span class=\"context-tag tag-work\">职场与生活</span> \"We heavily <b>rely on</b> this software for our daily work.\"<br>(我们日常工作严重依赖这款软件。)","tags":["职场与生活"]},{"id":173,"verb":"Base on","meaning":"基于... / 以...为基础<br><span style=\"font-size:0.8em;color:gray\">(做决定或电影改编)</span>","scenario":"<span class=\"context-tag tag-life\">看电影/分析</span> \"This movie is <b>based on</b> a true story.\"<br>(这部电影改编自真实故事。)","tags":["看电影/分析"]},{"id":174,"verb":"Bring in","meaning":"引进(人才/技术) / 赚取<br><span style=\"font-size:0.8em;color:gray\">(搞钱必备词)</span>","scenario":"<span class=\"context-tag tag-work\">商业模式</span> \"The new product line <b>brought in</b> millions of dollars.\"<br>(新产品线带来了数百万美元的收入。)","tags":["商业模式"]},{"id":175,"verb":"Take in","meaning":"收留 / 欺骗 / 理解吸收<br><span style=\"font-size:0.8em;color:gray\">(多义词)</span>","scenario":"<span class=\"context-tag tag-life\">生活场景</span> \"I adopted a stray cat and <b>took him in</b>.\" (我收留了一只流浪猫。)<br>\"It was a lot of information to <b>take in</b> at once.\" (一下子要吸收这么多信息太难了。)","tags":["生活场景"]},{"id":176,"verb":"Factor in","meaning":"把...考虑/计算在内<br><span style=\"font-size:0.8em;color:gray\">(做预算或计划时)</span>","scenario":"<span class=\"context-tag tag-work\">财务与时间规划</span> \"Did you <b>factor in</b> the shipping costs?\"<br>(你把运费也算/考虑进去了吗？)","tags":["财务与时间规划"]},{"id":177,"verb":"Pass up","meaning":"放弃(大好机会)<br><span style=\"font-size:0.8em;color:gray\">(通常指不该错过的机会)</span>","scenario":"<span class=\"context-tag tag-work\">跳槽做决定</span> \"I can't <b>pass up</b> such a great job offer.\"<br>(我不能放过这么好的一份工作Offer。)","tags":["跳槽做决定"]},{"id":178,"verb":"Miss out","meaning":"错过(体验/乐趣)<br><span style=\"font-size:0.8em;color:gray\">(FOMO: Fear of Missing Out)</span>","scenario":"<span class=\"context-tag tag-social\">派对邀请</span> \"You're not coming to the party? You're going to <b>miss out</b>!\"<br>(你不来派对吗？你会错过大好乐趣的！)","tags":["派对邀请"]},{"id":179,"verb":"Cash in","meaning":"兑现 / 从中牟利<br><span style=\"font-size:0.8em;color:gray\">(把筹码换成钱，引申为捞钱)</span>","scenario":"<span class=\"context-tag tag-work\">股市与商业</span> \"Many investors are trying to <b>cash in</b> on the AI boom.\"<br>(许多投资者正试图从AI热潮中大捞一笔/变现。)","tags":["股市与商业"]},{"id":180,"verb":"Write off","meaning":"注销(债务) / 认定...失败无用<br><span style=\"font-size:0.8em;color:gray\">(财务术语变日常口语)</span>","scenario":"<span class=\"context-tag tag-work\">财务与评价</span> \"I <b>wrote off</b> the car after the accident.\" (车撞废了，我直接报废了。)<br>\"Don't <b>write him off</b> just yet, he might surprise us.\" (别这么早认定他不行，他可能会给我们惊喜。)","tags":["财务与评价"]},{"id":181,"verb":"Put in","meaning":"投入 (时间/精力/金钱)<br><span style=\"font-size:0.8em;color:gray\">(付出成本)</span>","scenario":"<span class=\"context-tag tag-work\">努力工作</span> \"She <b>put in</b> a lot of extra hours this week.\"<br>(她这周投入了很多额外时间加班。)","tags":["努力工作"]},{"id":182,"verb":"Put out","meaning":"扑灭(火) / 给某人添麻烦<br><span style=\"font-size:0.8em;color:gray\">(It's no put out at all.)</span>","scenario":"<span class=\"context-tag tag-social\">消防与客套</span> \"The firefighters quickly <b>put out</b> the fire.\" (消防员迅速扑灭了火。)<br>\"I hope I'm not <b>putting you out</b> by staying here.\" (希望我住这儿没给你添麻烦。)","tags":["消防与客套"]},{"id":183,"verb":"Put forward","meaning":"提出 (计划/建议)<br><span style=\"font-size:0.8em;color:gray\">(替代 propose)</span>","scenario":"<span class=\"context-tag tag-work\">开会发言</span> \"He <b>put forward</b> a great idea at the meeting.\"<br>(他在会上提出了一个绝佳的想法。)","tags":["开会发言"]},{"id":184,"verb":"Set aside","meaning":"留出(钱/时间) / 把...放一边<br><span style=\"font-size:0.8em;color:gray\">(专款专用)</span>","scenario":"<span class=\"context-tag tag-work\">财务与时间管理</span> \"I try to <b>set aside</b> 10% of my salary for investments.\"<br>(我尽量把工资的10%预留出来做投资。)","tags":["财务与时间管理"]},{"id":185,"verb":"Take off","meaning":"起飞 / 突然成功爆红 / 请假<br><span style=\"font-size:0.8em;color:gray\">(脱衣服/飞机起飞/事业起飞)</span>","scenario":"<span class=\"context-tag tag-work\">多场景霸主</span> \"His business really <b>took off</b> this year.\" (他的生意今年起飞了。)<br>\"I need to <b>take</b> tomorrow <b>off</b>.\" (我明天需要请假。)","tags":["多场景霸主"]},{"id":186,"verb":"Get along","meaning":"相处融洽<br><span style=\"font-size:0.8em;color:gray\">(Get along with someone)</span>","scenario":"<span class=\"context-tag tag-social\">职场人际</span> \"I don't really <b>get along</b> with my new manager.\"<br>(我跟我新经理相处得不太好。)","tags":["职场人际"]},{"id":187,"verb":"Get around","meaning":"四处走动 / 规避(法规)<br><span style=\"font-size:0.8em;color:gray\">(找到漏洞绕过去)</span>","scenario":"<span class=\"context-tag tag-work\">法务/出行</span> \"We need to find a way to <b>get around</b> this regulation.\"<br>(我们得想个办法绕过这项规定。)<br>\"How do you <b>get around</b> in New York?\" (你在纽约怎么出行？)","tags":["法务/出行"]},{"id":188,"verb":"Get by","meaning":"勉强过活 / 勉强过关<br><span style=\"font-size:0.8em;color:gray\">(刚好及格，钱刚好够花)</span>","scenario":"<span class=\"context-tag tag-life\">哭穷/考试</span> \"My Spanish isn't great, but I can <b>get by</b>.\" (我西语不太好，但勉强能应付。)<br>\"We don't have much money, but we <b>get by</b>.\" (我们没多少钱，但日子还过得去。)","tags":["哭穷/考试"]},{"id":189,"verb":"Get away with","meaning":"做坏事而侥幸逃脱惩罚<br><span style=\"font-size:0.8em;color:gray\">(美剧犯罪片灵魂台词)</span>","scenario":"<span class=\"context-tag tag-drama\">影视悬疑</span> \"You'll never <b>get away with</b> this!\"<br>(你绝不会得逞/你绝对逃脱不了惩罚的！)","tags":["影视悬疑"]},{"id":190,"verb":"Get rid of","meaning":"摆脱 / 扔掉 (人或物)<br><span style=\"font-size:0.8em;color:gray\">(替代 eliminate / throw away)</span>","scenario":"<span class=\"context-tag tag-life\">断舍离</span> \"I need to <b>get rid of</b> these old clothes.\" (我得把这些旧衣服处理掉。)<br>\"How do I <b>get rid of</b> a cold fast?\" (怎样才能快速摆脱感冒？)","tags":["断舍离"]},{"id":191,"verb":"Look after","meaning":"照顾 / 照看<br><span style=\"font-size:0.8em;color:gray\">(替代 take care of)</span>","scenario":"<span class=\"context-tag tag-life\">宠物与孩子</span> \"Can you <b>look after</b> my dog while I'm away?\"<br>(我不在的时候你能帮我照看一下狗吗？)","tags":["宠物与孩子"]},{"id":192,"verb":"Look around","meaning":"四处看看 / 逛逛<br><span style=\"font-size:0.8em;color:gray\">(进店不想被导购烦的时候用)</span>","scenario":"<span class=\"context-tag tag-life\">逛街购物</span> \"Can I help you?\" - \"No thanks, I'm just <b>looking around</b>.\"<br>(需要帮忙吗？- 不了谢谢，我就是随便看看。)","tags":["逛街购物"]},{"id":193,"verb":"Come across","meaning":"偶然发现 / 给人留下...的印象<br><span style=\"font-size:0.8em;color:gray\">(替代 find by chance)</span>","scenario":"<span class=\"context-tag tag-social\">职场评价/找东西</span> \"He <b>comes across</b> as a bit arrogant.\" (他给人的印象有点傲慢。)<br>\"I <b>came across</b> this old photo yesterday.\" (我昨天偶然翻到了这张老照片。)","tags":["职场评价/找东西"]},{"id":194,"verb":"Come down with","meaning":"染上 (较轻的病)<br><span style=\"font-size:0.8em;color:gray\">(替代 become ill with)</span>","scenario":"<span class=\"context-tag tag-life\">请病假必备</span> \"I think I'm <b>coming down with</b> the flu.\"<br>(我觉得我好像得了流感了。)","tags":["请病假必备"]},{"id":195,"verb":"Break in","meaning":"强行闯入 / 突然插嘴<br><span style=\"font-size:0.8em;color:gray\">(打破门禁或对话)</span>","scenario":"<span class=\"context-tag tag-drama\">安防/沟通</span> \"Someone tried to <b>break in</b> to my car last night.\" (昨晚有人试图撬我的车。)<br>\"Sorry to <b>break in</b>, but I have a question.\" (抱歉打断一下，我有个问题。)","tags":["安防/沟通"]},{"id":196,"verb":"Break out","meaning":"爆发 (战争/疫情) / 长痘痘<br><span style=\"font-size:0.8em;color:gray\">(打破平静爆发出来)</span>","scenario":"<span class=\"context-tag tag-life\">新闻/护肤</span> \"World War II <b>broke out</b> in 1939.\" (二战爆发于1939年。)<br>\"My face is <b>breaking out</b> because of stress.\" (我因为压力太大脸上疯狂爆痘。)","tags":["新闻/护肤"]},{"id":197,"verb":"Run over","meaning":"碾压过去 / 讲超时了<br><span style=\"font-size:0.8em;color:gray\">(车开过去/时间跑过去)</span>","scenario":"<span class=\"context-tag tag-work\">开车/开会</span> \"I accidentally <b>ran over</b> a squirrel.\" (我不小心压死了一只松鼠。)<br>\"The meeting <b>ran over</b> by 20 minutes.\" (会议超时了20分钟。)","tags":["开车/开会"]},{"id":198,"verb":"Run for","meaning":"竞选 (某个职位)<br><span style=\"font-size:0.8em;color:gray\">(为获取职位而奔走)</span>","scenario":"<span class=\"context-tag tag-drama\">美国政治文化</span> \"He is planning to <b>run for</b> President.\"<br>(他正计划竞选总统。)","tags":["美国政治文化"]},{"id":199,"verb":"Work up","meaning":"激发(食欲/情绪) / 渐渐发展<br><span style=\"font-size:0.8em;color:gray\">(努力酝酿出来)</span>","scenario":"<span class=\"context-tag tag-life\">吃饭/胆量</span> \"I went for a run to <b>work up</b> an appetite.\" (我去跑了个步来刺激食欲。)<br>\"I'm trying to <b>work up</b> the courage to ask for a raise.\" (我在努力鼓起勇气去要求加薪。)","tags":["吃饭/胆量"]},{"id":200,"verb":"Give out","meaning":"分发 / 筋疲力尽/出故障<br><span style=\"font-size:0.8em;color:gray\">(替代 distribute / stop working)</span>","scenario":"<span class=\"context-tag tag-work\">街头/机器</span> \"They are <b>giving out</b> flyers on the street.\" (他们在街上发传单。)<br>\"My car engine finally <b>gave out</b>.\" (我的汽车引擎终于彻底罢工了。)","tags":["街头/机器"]},{"id":201,"verb":"Chime in","meaning":"插嘴 / 加入谈话 / 附和<br><span style=\"font-size:0.8em;color:gray\">(像风铃一样突然响一声)</span>","scenario":"<span class=\"context-tag tag-work\">开会发言</span> \"Feel free to <b>chime in</b> if you have any ideas.\"<br>(有想法随时插话/补充。非常友好的开会开场白。)","tags":["开会发言"]},{"id":202,"verb":"Cut in","meaning":"强行插嘴 / 开车强行超车加塞<br><span style=\"font-size:0.8em;color:gray\">(比较粗鲁的打断)</span>","scenario":"<span class=\"context-tag tag-social\">日常交际</span> \"I was talking to him when she suddenly <b>cut in</b>.\"<br>(我正跟他说着话，她突然强行插嘴。)","tags":["日常交际"]},{"id":203,"verb":"Speak up","meaning":"大声点说 / 勇敢表达意见<br><span style=\"font-size:0.8em;color:gray\">(不再保持沉默)</span>","scenario":"<span class=\"context-tag tag-work\">争取权益</span> \"If you disagree with the boss, you should <b>speak up</b>.\"<br>(如果你不同意老板的观点，你应该勇敢说出来。)","tags":["争取权益"]},{"id":204,"verb":"Clam up","meaning":"一言不发 / 像蛤蜊一样紧闭嘴巴<br><span style=\"font-size:0.8em;color:gray\">(因紧张、害怕或拒绝回答)</span>","scenario":"<span class=\"context-tag tag-drama\">警察审问/吵架</span> \"When they asked him about the missing money, he just <b>clammed up</b>.\"<br>(当问起丢失的钱时，他死不开口。)","tags":["警察审问/吵架"]},{"id":205,"verb":"Bottle up","meaning":"压抑(情感) / 憋在心里<br><span style=\"font-size:0.8em;color:gray\">(像装在瓶子里一样)</span>","scenario":"<span class=\"context-tag tag-drama\">心理疏导</span> \"You shouldn't <b>bottle up</b> your feelings like that.\"<br>(你不该那样把情绪全都憋在心里。)","tags":["心理疏导"]},{"id":206,"verb":"Lash out","meaning":"猛烈抨击 / 大发雷霆<br><span style=\"font-size:0.8em;color:gray\">(由于压抑太久或受到刺激)</span>","scenario":"<span class=\"context-tag tag-drama\">情绪崩溃</span> \"She <b>lashed out</b> at me for no reason.\"<br>(她毫无缘由地冲我大发脾气。)","tags":["情绪崩溃"]},{"id":207,"verb":"Talk down to","meaning":"居高临下地跟...说话<br><span style=\"font-size:0.8em;color:gray\">(表现出傲慢，轻视对方)</span>","scenario":"<span class=\"context-tag tag-social\">职场/社交抱怨</span> \"I hate it when my manager <b>talks down to</b> me.\"<br>(我讨厌我经理用那种居高临下/说教的口吻跟我说话。)","tags":["职场/社交抱怨"]},{"id":208,"verb":"Talk into","meaning":"说服某人做某事<br><span style=\"font-size:0.8em;color:gray\">(Talk someone into doing something)</span>","scenario":"<span class=\"context-tag tag-social\">劝说朋友</span> \"He <b>talked me into</b> buying this expensive watch.\"<br>(他忽悠/说服我买了这块昂贵的手表。)","tags":["劝说朋友"]},{"id":209,"verb":"Talk out of","meaning":"说服某人放弃做某事<br><span style=\"font-size:0.8em;color:gray\">(Talk someone out of doing something)</span>","scenario":"<span class=\"context-tag tag-life\">避免犯错</span> \"Luckily, my friend <b>talked me out of</b> quitting my job.\"<br>(幸好我朋友劝我别辞职。)","tags":["避免犯错"]},{"id":210,"verb":"Rattle off","meaning":"一口气说出 / 流利地背诵<br><span style=\"font-size:0.8em;color:gray\">(像机关枪一样快速念完)</span>","scenario":"<span class=\"context-tag tag-work\">开会汇报</span> \"She just <b>rattled off</b> a list of statistics.\"<br>(她一口气流利地报出了一堆统计数据。)","tags":["开会汇报"]},{"id":211,"verb":"Hash out","meaning":"经过漫长讨论来解决(问题)<br><span style=\"font-size:0.8em;color:gray\">(把问题掰碎了揉烂了讨论清楚)</span>","scenario":"<span class=\"context-tag tag-work\">商务谈判</span> \"We need a meeting to <b>hash out</b> the details of the contract.\"<br>(我们需要开个会把合同的细节彻底讨论清楚。)","tags":["商务谈判"]},{"id":212,"verb":"Iron out","meaning":"解决 / 消除(分歧或小问题)<br><span style=\"font-size:0.8em;color:gray\">(像熨斗熨平衣服上的褶皱一样)</span>","scenar
