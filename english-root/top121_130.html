<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Word Families: Top 121-130</title>
    <style>
        :root {
            /* Notion 暗黑模式核心色彩 */
            --bg-color: #191919;
            --table-border: #373737;
            --text-main: #D4D4D4;
            --text-sub: #9B9B9B;
            
            /* 词根词缀高亮色 */
            --c-prefix: #FF7B72; /* 粉红 - 前缀 */
            --c-root: #E5C07B;   /* 明黄 - 词根 */
            --c-suffix: #79C0FF; /* 天蓝 - 后缀 */
            
            /* 标签颜色 */
            --badge-trans: #316DCA;
            --badge-mnem: #347D39;
            --badge-exam: #B05C11;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 40px;
        }

        .root-section {
            margin-bottom: 60px;
        }

        .header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--c-root);
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .root-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            color: var(--c-root);
        }

        .root-meaning {
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: bold;
        }

        .word-table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
        }

        .word-row {
            border-bottom: 1px dashed var(--table-border);
        }
        
        .word-row:last-child {
            border-bottom: none;
        }

        .col-word {
            width: 30%;
            padding: 25px 25px;
            vertical-align: top;
            border-right: 1px dashed var(--table-border);
        }

        .col-details {
            width: 70%;
            padding: 25px;
            vertical-align: top;
        }

        .word-display {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }
        
        .p { color: var(--c-prefix); }
        .r { color: var(--c-root); }
        .s { color: var(--c-suffix); }

        .pronunciation {
            font-family: "Consolas", monospace;
            color: var(--text-sub);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .detail-item:last-child {
            margin-bottom: 0;
        }

        .badge {
            flex-shrink: 0;
            color: #fff;
            font-size: 0.8rem;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            margin-top: 2px;
            font-weight: bold;
        }
        
        .b-trans { background-color: var(--badge-trans); }
        .b-mnem { background-color: var(--badge-mnem); }
        .b-exam { background-color: var(--badge-exam); }

        .detail-content {
            flex-grow: 1;
            font-size: 1.05rem;
        }
        
        .highlight-word {
            color: var(--c-root);
            font-weight: bold;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
    </style>
</head>
<body>

    <div id="app">
    </div>

    <script>
        const database = [
            {
                root: "-alter- / -ali-",
                meaning: "其他，改变 (other)",
                words: [
                    { word: "alter", display: "<span class='r'>alter</span>", pronunciation: "/ˈɔːl·tər/", translation: "v. 改变，修改", mnemonic: "alter(其他) = 变成其他的样子 = 改变", example: "We had to <span class='highlight-word'>alter</span> our plans because of the rain. (因为下雨，我们不得不改变计划。)" },
                    { word: "alternative", display: "<span class='r'>alter</span><span class='s'>native</span>", pronunciation: "/ɔːlˈtɜː·nə·tɪv/", translation: "n. 替代品 adj. 备选的", mnemonic: "alter(其他) + native(产生) = 产生出来的其他选项 = 替代品", example: "We need to find an <span class='highlight-word'>alternative</span> solution. (我们需要找到一个替代方案。)" },
                    { word: "alien", display: "<span class='r'>ali</span><span class='s'>en</span>", pronunciation: "/ˈeɪ·li·ən/", translation: "n. 外星人，外国人 adj. 陌生的", mnemonic: "ali(其他) + en(人) = 其他地方来的人 = 外国人/外星人", example: "Do you believe in <span class='highlight-word'>aliens</span>? (你相信有外星人吗？)" },
                    { word: "alienate", display: "<span class='r'>ali</span><span class='s'>en</span><span class='s'>ate</span>", pronunciation: "/ˈeɪ·li·ə·neɪt/", translation: "v. 使疏远，离间", mnemonic: "alien(外人) + ate(使动) = 把别人当外人对待 = 使疏远", example: "His arrogant behavior <span class='highlight-word'>alienated</span> his friends. (他傲慢的行为让朋友们疏远了他。)" }
                ]
            },
            {
                root: "-am- / -amor-",
                meaning: "爱 (love)",
                words: [
                    { word: "amateur", display: "<span class='r'>am</span><span class='s'>ateur</span>", pronunciation: "/ˈæm·ə·tʃər/", translation: "n. 业余爱好者 adj. 业余的", mnemonic: "am(爱) + ateur(人) = 纯粹出于热爱而做的人(非职业) = 业余爱好者", example: "He is an <span class='highlight-word'>amateur</span> photographer. (他是一名业余摄影师。)" },
                    { word: "amiable", display: "<span class='r'>am</span><span class='s'>iable</span>", pronunciation: "/ˈeɪ·mi·ə·bl/", translation: "adj. 和蔼可亲的，亲切的", mnemonic: "am(爱) + iable(能...的) = 能让人产生喜爱之情的 = 和蔼可亲的", example: "She is a very <span class='highlight-word'>amiable</span> person. (她是个极其和蔼可亲的人。)" },
                    { word: "amorous", display: "<span class='r'>amor</span><span class='s'>ous</span>", pronunciation: "/ˈæm·ə·rəs/", translation: "adj. 多情的，恋爱的", mnemonic: "amor(爱) + ous(充满...的) = 充满爱意的", example: "He sent her an <span class='highlight-word'>amorous</span> letter. (他给她寄了一封极其多情的情书。)" },
                    { word: "enamor", display: "<span class='p'>en</span><span class='r'>amor</span>", pronunciation: "/ɪˈnæm·ər/", translation: "v. 使迷恋", mnemonic: "en(使进入) + amor(爱) = 使陷入爱河 = 使迷恋", example: "He was completely <span class='highlight-word'>enamored</span> with Paris. (他彻底迷恋上了巴黎。)" }
                ]
            },
            {
                root: "-apt- / -ept-",
                meaning: "适应，能力 (fit)",
                words: [
                    { word: "adapt", display: "<span class='p'>ad</span><span class='r'>apt</span>", pronunciation: "/əˈdæpt/", translation: "v. 适应，改编", mnemonic: "ad(朝向) + apt(适应) = 使自己朝向新环境去适合 = 适应", example: "It took him a while to <span class='highlight-word'>adapt</span> to the new culture. (他花了一阵子才适应新文化。)" },
                    { word: "aptitude", display: "<span class='r'>apt</span><span class='s'>itude</span>", pronunciation: "/ˈæp·tɪ·tjuːd/", translation: "n. 天赋，资质", mnemonic: "apt(适应/能力) + itude(状态) = 天生就能适应某种技能的状态 = 天赋", example: "She has a natural <span class='highlight-word'>aptitude</span> for languages. (她有极强的语言天赋。)" },
                    { word: "adept", display: "<span class='p'>ad</span><span class='r'>ept</span>", pronunciation: "/ˈæd·ept/", translation: "adj. 熟练的，内行的", mnemonic: "ad(强调) + ept(能力) = 极具能力的 = 熟练的", example: "He is highly <span class='highlight-word'>adept</span> at solving complex problems. (他极其擅长解决复杂问题。)" },
                    { word: "inept", display: "<span class='p'>in</span><span class='r'>ept</span>", pronunciation: "/ɪˈnept/", translation: "adj. 无能的，笨拙的", mnemonic: "in(无) + ept(能力) = 没有能力的 = 无能的", example: "His <span class='highlight-word'>inept</span> handling of the crisis caused more trouble. (他对危机的笨拙处理引来了更多麻烦。)" }
                ]
            },
            {
                root: "-arm-",
                meaning: "武器 (weapon)",
                words: [
                    { word: "army", display: "<span class='r'>arm</span><span class='s'>y</span>", pronunciation: "/ˈɑː·mi/", translation: "n. 军队，陆军", mnemonic: "arm(武器) + y(群体) = 携带武器的群体 = 军队", example: "He served in the <span class='highlight-word'>army</span> for five years. (他在陆军服役了五年。)" },
                    { word: "armor", display: "<span class='r'>arm</span><span class='s'>or</span>", pronunciation: "/ˈɑː·mər/", translation: "n. 盔甲，装甲", mnemonic: "arm(武器/防具) + or(物品) = 用来防御的装备 = 盔甲", example: "Knights used to wear heavy steel <span class='highlight-word'>armor</span>. (骑士过去常穿沉重的钢铁盔甲。)" },
                    { word: "disarm", display: "<span class='p'>dis</span><span class='r'>arm</span>", pronunciation: "/dɪsˈɑːm/", translation: "v. 缴械，解除武装；消除(敌意)", mnemonic: "dis(去除) + arm(武器) = 卸下武器 = 缴械", example: "The police managed to <span class='highlight-word'>disarm</span> the suspect. (警察设法解除了嫌疑人的武装。)" },
                    { word: "alarm", display: "<span class='p'>al</span><span class='r'>arm</span>", pronunciation: "/əˈlɑːm/", translation: "n. 警报，恐慌 v. 使惊恐", mnemonic: "al(=to) + arm(武器) = 拿起武器！(源自古法语报警口号) = 警报", example: "The fire <span class='highlight-word'>alarm</span> went off in the middle of the night. (火灾警报在半夜响了。)" }
                ]
            },
            {
                root: "-art-",
                meaning: "技巧，艺术 (skill)",
                words: [
                    { word: "artist", display: "<span class='r'>art</span><span class='s'>ist</span>", pronunciation: "/ˈɑː·tɪst/", translation: "n. 艺术家，画家", mnemonic: "art(艺术) + ist(人) = 从事艺术的人 = 艺术家", example: "Picasso is a famous <span class='highlight-word'>artist</span>. (毕加索是一位著名的艺术家。)" },
                    { word: "artificial", display: "<span class='r'>art</span><span class='s'>ific</span><span class='s'>ial</span>", pronunciation: "/ˌɑː·tɪˈfɪʃ·l/", translation: "adj. 人造的，虚伪的", mnemonic: "art(技巧) + ific(做) + ial = 用人工技巧做出来的 = 人造的", example: "This product contains no <span class='highlight-word'>artificial</span> flavors. (本产品不含任何人工香料。)" },
                    { word: "artifact", display: "<span class='r'>art</span><span class='s'>i</span><span class='r'>fact</span>", pronunciation: "/ˈɑː·tɪ·fækt/", translation: "n. 人工制品，手工艺品(常指文物)", mnemonic: "art(技巧) + fact(制造) = 靠手艺做出来的物件 = 手工艺品/文物", example: "The museum displays ancient Egyptian <span class='highlight-word'>artifacts</span>. (博物馆展出古埃及文物。)" },
                    { word: "artisan", display: "<span class='r'>art</span><span class='s'>isan</span>", pronunciation: "/ˌɑː·tɪˈzæn/", translation: "n. 工匠，手艺人", mnemonic: "art(技巧) + isan(人) = 靠手艺吃饭的人 = 工匠", example: "The furniture was made by local <span class='highlight-word'>artisans</span>. (这些家具是由当地工匠制作的。)" }
                ]
            },
            {
                root: "-bas-",
                meaning: "低，底部 (low, bottom)",
                words: [
                    { word: "base", display: "<span class='r'>bas</span><span class='s'>e</span>", pronunciation: "/beɪs/", translation: "n. 基础，底部，基地", mnemonic: "bas(底) + e = 建筑物或事物最底下的部分 = 基础", example: "The company has a large customer <span class='highlight-word'>base</span>. (公司拥有庞大的客户基础。)" },
                    { word: "basic", display: "<span class='r'>bas</span><span class='s'>ic</span>", pronunciation: "/ˈbeɪ·sɪk/", translation: "adj. 基础的，基本的", mnemonic: "bas(底) + ic(形容词) = 属于最底层的 = 基础的", example: "Water is a <span class='highlight-word'>basic</span> human need. (水是人类的基本需求。)" },
                    { word: "basement", display: "<span class='r'>bas</span><span class='s'>ement</span>", pronunciation: "/ˈbeɪs·mənt/", translation: "n. 地下室", mnemonic: "bas(底) + ement(场所) = 房子最底下的空间 = 地下室", example: "We store old boxes in the <span class='highlight-word'>basement</span>. (我们把旧箱子存放在地下室。)" },
                    { word: "debase", display: "<span class='p'>de</span><span class='r'>bas</span><span class='s'>e</span>", pronunciation: "/dɪˈbeɪs/", translation: "v. 贬低，降低价值", mnemonic: "de(向下) + base(低) = 使其地位或价值往下走 = 贬低", example: "Inflation will <span class='highlight-word'>debase</span> the value of the currency. (通货膨胀会降低货币的价值。)" }
                ]
            },
            {
                root: "-bat-",
                meaning: "打，击 (beat)",
                words: [
                    { word: "battle", display: "<span class='r'>bat</span><span class='s'>tle</span>", pronunciation: "/ˈbæt·l/", translation: "n. 战斗，战役", mnemonic: "bat(打) + tle = 打击互殴的状态 = 战斗", example: "He was killed in <span class='highlight-word'>battle</span>. (他在战斗中阵亡了。)" },
                    { word: "combat", display: "<span class='p'>com</span><span class='r'>bat</span>", pronunciation: "/ˈkɒm·bæt/", translation: "n./v. 战斗，对抗", mnemonic: "com(共同) + bat(打) = 双方打在一起 = 搏斗/对抗", example: "The government is trying to <span class='highlight-word'>combat</span> inflation. (政府正试图对抗通货膨胀。)" },
                    { word: "debate", display: "<span class='p'>de</span><span class='r'>bat</span><span class='s'>e</span>", pronunciation: "/dɪˈbeɪt/", translation: "n./v. 辩论，讨论", mnemonic: "de(向下/彻底) + bate(打) = 用言语互相打击 = 辩论", example: "There is a heated <span class='highlight-word'>debate</span> about the new policy. (关于这项新政策有一场激烈的辩论。)" },
                    { word: "battery", display: "<span class='r'>bat</span><span class='s'>tery</span>", pronunciation: "/ˈbæt·ə·ri/", translation: "n. 电池，炮兵连；殴打", mnemonic: "bat(打) + tery = 一排大炮齐射(原义) -> 提供能量的组合体 = 电池", example: "My phone <span class='highlight-word'>battery</span> is dead. (我手机电池没电了。)" }
                ]
            },
            {
                root: "-brev-",
                meaning: "短 (short)",
                words: [
                    { word: "brief", display: "<span class='r'>brief</span>", pronunciation: "/briːf/", translation: "adj. 简短的 n. 概要", mnemonic: "brief (=brev) = 本身就是“短”的意思", example: "Let's keep this meeting <span class='highlight-word'>brief</span>. (咱们把这个会开得简短点。)" },
                    { word: "abbreviate", display: "<span class='p'>ab</span><span class='r'>brev</span><span class='s'>iate</span>", pronunciation: "/əˈbriː·vi·eɪt/", translation: "v. 缩写，使简短", mnemonic: "ab(加强) + brev(短) + iate(动词) = 强行弄短 = 缩写", example: "USA is <span class='highlight-word'>abbreviated</span> from United States of America. (USA是美利坚合众国的缩写。)" },
                    { word: "brevity", display: "<span class='r'>brev</span><span class='s'>ity</span>", pronunciation: "/ˈbrev·ə·ti/", translation: "n. 简洁，简短", mnemonic: "brev(短) + ity(名词性质) = 简短的状态 = 简洁", example: "<span class='highlight-word'>Brevity</span> is the soul of wit. (言贵简洁/言简意赅是智慧的灵魂。)" },
                    { word: "briefcase", display: "<span class='r'>brief</span><span class='s'>case</span>", pronunciation: "/ˈbriːf·keɪs/", translation: "n. 公文包", mnemonic: "brief(简短的文件/案卷) + case(箱子) = 装文件的包 = 公文包", example: "He forgot his <span class='highlight-word'>briefcase</span> in the taxi. (他把公文包落在出租车里了。)" }
                ]
            },
            {
                root: "-cad- / -cas- / -cid-",
                meaning: "落下，降临 (fall)",
                words: [
                    { word: "accident", display: "<span class='p'>ac</span><span class='r'>cid</span><span class='s'>ent</span>", pronunciation: "/ˈæk·sɪ·dənt/", translation: "n. 事故，意外", mnemonic: "ac(朝向) + cid(落下) + ent = 突然砸/降临到你头上的事 = 意外", example: "He was seriously injured in a car <span class='highlight-word'>accident</span>. (他在车祸中受了重伤。)" },
                    { word: "incident", display: "<span class='p'>in</span><span class='r'>cid</span><span class='s'>ent</span>", pronunciation: "/ˈɪn·sɪ·dənt/", translation: "n. 事件，事变(常指小摩擦或冲突)", mnemonic: "in(进入) + cid(落下) + ent = 掉进生活里的小插曲 = 事件", example: "The border <span class='highlight-word'>incident</span> caused diplomatic tension. (边境冲突引发了外交紧张。)" },
                    { word: "casual", display: "<span class='r'>cas</span><span class='s'>ual</span>", pronunciation: "/ˈkæʒ·u·əl/", translation: "adj. 随便的，偶然的，休闲的", mnemonic: "cas(落下/碰巧) + ual = 凭空掉下来的/不经意的 = 偶然的/休闲的", example: "You can wear <span class='highlight-word'>casual</span> clothes to the party. (你可以穿休闲装来参加派对。)" },
                    { word: "coincide", display: "<span class='p'>co</span><span class='p'>in</span><span class='r'>cid</span><span class='s'>e</span>", pronunciation: "/ˌkəʊ·ɪnˈsaɪd/", translation: "v. 一致，巧合，同时发生", mnemonic: "co(共同) + in(进入) + cid(落下) + e = 几件事同时落到一起 = 巧合", example: "My trip to New York <span class='highlight-word'>coincides</span> with yours. (我去纽约的旅行碰巧和你的行程撞期了。)" }
                ]
            },
            {
                root: "-camp-",
                meaning: "田野，场地 (field)",
                words: [
                    { word: "camp", display: "<span class='r'>camp</span>", pronunciation: "/kæmp/", translation: "n. 营地 v. 露营", mnemonic: "camp(田野) = 在野外搭起的住处 = 营地", example: "We set up <span class='highlight-word'>camp</span> near the river. (我们在河边安营扎寨。)" },
                    { word: "campus", display: "<span class='r'>camp</span><span class='s'>us</span>", pronunciation: "/ˈkæm·pəs/", translation: "n. 校园，校区", mnemonic: "camp(场地) + us = 供学生生活学习的大片场地 = 校园", example: "Freshmen are required to live on <span class='highlight-word'>campus</span>. (大一新生被要求必须住在校园里。)" },
                    { word: "campaign", display: "<span class='r'>camp</span><span class='s'>aign</span>", pronunciation: "/kæmˈpeɪn/", translation: "n. 战役，(政治或商业)活动", mnemonic: "camp(旷野) + aign = 在旷野上列阵打仗 -> 引申为大规模社会活动", example: "The presidential <span class='highlight-word'>campaign</span> is heating up. (总统竞选活动正在白热化。)" },
                    { word: "champion", display: "<span class='r'>champ</span><span class='s'>ion</span>", pronunciation: "/ˈtʃæm·pi·ən/", translation: "n. 冠军，拥护者", mnemonic: "champ(=camp 竞技场) + ion(人) = 在竞技场上最终胜出的人 = 冠军", example: "They are the defending world <span class='highlight-word'>champions</span>. (他们是卫冕世界冠军。)" }
                ]
            }
        ];

        const app = document.getElementById('app');

        database.forEach((group, index) => {
            let wordsHTML = '';
            
            group.words.forEach(item => {
                wordsHTML += `
                    <tr class="word-row">
                        <td class="col-word">
                            <div class="word-display">${item.display}</div>
                            <div class="pronunciation">${item.pronunciation}</div>
                        </td>
                        <td class="col-details">
                            <div class="detail-item">
                                <div class="badge b-trans">译</div>
                                <div class="detail-content">${item.translation}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-mnem">记</div>
                                <div class="detail-content">${item.mnemonic}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-exam">例</div>
                                <div class="detail-content">${item.example}</div>
                            </div>
                        </td>
                    </tr>
                `;
            });

            app.innerHTML += `
                <div class="root-section">
