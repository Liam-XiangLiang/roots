<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Word Families: Top 181-190</title>
    <style>
        :root {
            /* Notion 暗黑模式核心色彩 */
            --bg-color: #191919;
            --table-border: #373737;
            --text-main: #D4D4D4;
            --text-sub: #9B9B9B;
            
            /* 词根词缀高亮色 */
            --c-prefix: #FF7B72; /* 粉红 - 前缀 */
            --c-root: #E5C07B;   /* 明黄 - 词根 */
            --c-suffix: #79C0FF; /* 天蓝 - 后缀 */
            
            /* 标签颜色 */
            --badge-trans: #316DCA;
            --badge-mnem: #347D39;
            --badge-exam: #B05C11;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 40px;
        }

        .root-section {
            margin-bottom: 60px;
        }

        .header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--c-root);
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .root-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            color: var(--c-root);
        }

        .root-meaning {
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: bold;
        }

        /* 列表表格容器 */
        .word-table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
        }

        .word-row {
            border-bottom: 1px dashed var(--table-border);
        }
        
        .word-row:last-child {
            border-bottom: none;
        }

        .col-word {
            width: 30%;
            padding: 25px 25px;
            vertical-align: top;
            border-right: 1px dashed var(--table-border);
        }

        .col-details {
            width: 70%;
            padding: 25px;
            vertical-align: top;
        }

        /* 左侧单词区样式 */
        .word-display {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }
        
        /* 词根词缀颜色类 */
        .p { color: var(--c-prefix); }
        .r { color: var(--c-root); }
        .s { color: var(--c-suffix); }

        .pronunciation {
            font-family: "Consolas", monospace;
            color: var(--text-sub);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* 右侧详情区样式 */
        .detail-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .detail-item:last-child {
            margin-bottom: 0;
        }

        .badge {
            flex-shrink: 0;
            color: #fff;
            font-size: 0.8rem;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            margin-top: 2px;
            font-weight: bold;
        }
        
        .b-trans { background-color: var(--badge-trans); }
        .b-mnem { background-color: var(--badge-mnem); }
        .b-exam { background-color: var(--badge-exam); }

        .detail-content {
            flex-grow: 1;
            font-size: 1.05rem;
        }
        
        .highlight-word {
            color: var(--c-root);
            font-weight: bold;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
    </style>
</head>
<body>

    <div id="app">
    </div>

    <script>
        const database = [
            {
                root: "-norm-",
                meaning: "规范，标准 (rule, pattern)",
                words: [
                    { word: "normal", display: "<span class='r'>norm</span><span class='s'>al</span>", pronunciation: "/ˈnɔː·ml/", translation: "adj. 正常的，正规的，标准的", mnemonic: "norm(规范) + al(形容词) = 符合通用规范的 = 正常的", example: "It is perfectly <span class='highlight-word'>normal</span> to feel nervous before an interview. (面试前感到紧张是极其正常的。)" },
                    { word: "enormous", display: "<span class='p'>e</span><span class='r'>norm</span><span class='s'>ous</span>", pronunciation: "/ɪˈnɔː·məs/", translation: "adj. 巨大的，庞大的", mnemonic: "e(出/超出) + norm(正常标准) + ous(充满) = 超出正常标准尺寸极多的 = 巨大的", example: "The project requires an <span class='highlight-word'>enormous</span> amount of money. (这个项目需要极其庞大的资金。)" },
                    { word: "abnormal", display: "<span class='p'>ab</span><span class='r'>norm</span><span class='s'>al</span>", pronunciation: "/æbˈnɔː·ml/", translation: "adj. 异常的，反常的", mnemonic: "ab(偏离/离开) + norm(正常) + al = 偏离了正常规范的 = 异常的", example: "The blood test results showed some <span class='highlight-word'>abnormal</span> cells. (验血结果显示了一些异常细胞。)" }
                ]
            },
            {
                root: "-nov-",
                meaning: "新 (new)",
                words: [
                    { word: "novel", display: "<span class='r'>nov</span><span class='s'>el</span>", pronunciation: "/ˈnɒv·l/", translation: "n. 小说 adj. 新奇的", mnemonic: "nov(新) + el(事物) = 新奇的故事/事物 = 小说/新颖的", example: "He came up with a <span class='highlight-word'>novel</span> approach to solve the problem. (他想出了一个极其新奇的解决问题的方法。)" },
                    { word: "renovate", display: "<span class='p'>re</span><span class='r'>nov</span><span class='s'>ate</span>", pronunciation: "/ˈren·ə·veɪt/", translation: "v. 翻新，装修，修复", mnemonic: "re(再次/重新) + nov(新) + ate = 重新把它弄得像新的一样 = 翻新", example: "They bought an old house and plan to <span class='highlight-word'>renovate</span> it. (他们买了一栋老房子并打算翻新它。)" },
                    { word: "novice", display: "<span class='r'>nov</span><span class='s'>ice</span>", pronunciation: "/ˈnɒv·ɪs/", translation: "n. 新手，初学者", mnemonic: "nov(新) + ice(人) = 刚接触某个领域的新人 = 新手", example: "I am a complete <span class='highlight-word'>novice</span> at programming. (我在编程方面是个彻头彻尾的新手。)" }
                ]
            },
            {
                root: "-nounc- / -nunc-",
                meaning: "宣布 (declare)",
                words: [
                    { word: "announce", display: "<span class='p'>an</span><span class='r'>nounc</span><span class='s'>e</span>", pronunciation: "/əˈnaʊns/", translation: "v. 宣布，宣告", mnemonic: "an(朝向/加强) + nounc(宣布) + e = 朝着大众大声说出来 = 宣布", example: "The company will <span class='highlight-word'>announce</span> its new product tomorrow. (公司明天将宣布其新产品。)" },
                    { word: "pronounce", display: "<span class='p'>pro</span><span class='r'>nounc</span><span class='s'>e</span>", pronunciation: "/prəˈnaʊns/", translation: "v. 发音，宣判", mnemonic: "pro(向前) + nounc(发声/宣布) + e = 在人前发出声音 = 发音", example: "How do you <span class='highlight-word'>pronounce</span> your last name? (你的姓氏怎么发音？)" },
                    { word: "denounce", display: "<span class='p'>de</span><span class='r'>nounc</span><span class='s'>e</span>", pronunciation: "/dɪˈnaʊns/", translation: "v. 谴责，公开指责", mnemonic: "de(向下/坏) + nounc(宣布) + e = 公开宣布某人做了坏事 = 谴责", example: "The president <span class='highlight-word'>denounced</span> the terrorist attack. (总统强烈谴责了那次恐怖袭击。)" }
                ]
            },
            {
                root: "-numer-",
                meaning: "数字 (number)",
                words: [
                    { word: "numeral", display: "<span class='r'>numer</span><span class='s'>al</span>", pronunciation: "/ˈnjuː·mə·rəl/", translation: "n. 数字，数词 adj. 数字的", mnemonic: "numer(数字) + al(名词/形容词) = 用来表示数的东西 = 数字", example: "The clock face has Roman <span class='highlight-word'>numerals</span>. (钟面上有罗马数字。)" },
                    { word: "numerous", display: "<span class='r'>numer</span><span class='s'>ous</span>", pronunciation: "/ˈnjuː·mə·rəs/", translation: "adj. 许多的，很多的", mnemonic: "numer(数字) + ous(充满...的) = 充满数字的/数不清的 = 许多的", example: "There are <span class='highlight-word'>numerous</span> reasons why this plan won't work. (有无数个理由能说明这个计划行不通。)" },
                    { word: "enumerate", display: "<span class='p'>e</span><span class='r'>numer</span><span class='s'>ate</span>", pronunciation: "/ɪˈnjuː·mə·reɪt/", translation: "v. 列举，枚举", mnemonic: "e(出) + numer(数) + ate(动词) = 一个个全数出来 = 列举", example: "She can <span class='highlight-word'>enumerate</span> all the capital cities in Europe. (她能一口气列举出欧洲所有的首都。)" }
                ]
            },
            {
                root: "-omni-",
                meaning: "全，总 (all)",
                words: [
                    { word: "omnipresent", display: "<span class='r'>omni</span><span class='s'>present</span>", pronunciation: "/ˌɒm·nɪˈprez·nt/", translation: "adj. 无处不在的", mnemonic: "omni(全/所有) + present(存在的) = 在所有地方都存在的 = 无处不在的", example: "Smartphones have become <span class='highlight-word'>omnipresent</span> in modern society. (智能手机在现代社会已经变得无处不在了。)" },
                    { word: "omnivore", display: "<span class='r'>omni</span><span class='s'>vore</span>", pronunciation: "/ˈɒm·nɪ·vɔːr/", translation: "n. 杂食动物", mnemonic: "omni(全) + vore(吃) = 什么都吃的生物 = 杂食动物", example: "Humans and pigs are examples of <span class='highlight-word'>omnivores</span>. (人类和猪都是杂食动物的例子。)" },
                    { word: "omnipotent", display: "<span class='r'>omni</span><span class='s'>potent</span>", pronunciation: "/ɒmˈnɪp·ə·tənt/", translation: "adj. 全能的，无所不能的", mnemonic: "omni(全) + potent(有力量的) = 拥有全部力量的 = 全能的", example: "In ancient myths, gods were often considered <span class='highlight-word'>omnipotent</span>. (在古代神话中，神通常被认为是无所不能的。)" }
                ]
            },
            {
                root: "-pac- / -peas-",
                meaning: "和平 (peace)",
                words: [
                    { word: "pacify", display: "<span class='r'>pac</span><span class='s'>ify</span>", pronunciation: "/ˈpæs·ɪ·faɪ/", translation: "v. 平息，安抚", mnemonic: "pac(和平) + ify(使动) = 使其恢复和平状态 = 安抚", example: "The mother tried to <span class='highlight-word'>pacify</span> the crying baby. (母亲试图安抚那个啼哭的婴儿。)" },
                    { word: "appease", display: "<span class='p'>ap</span><span class='r'>peas</span><span class='s'>e</span>", pronunciation: "/əˈpiːz/", translation: "v. 姑息，平息，安抚(通常指做出让步)", mnemonic: "ap(朝向) + peas(和平) + e = 引导对方走向和平 = 姑息/平息", example: "They offered him a bonus to <span class='highlight-word'>appease</span> his anger. (他们给了他一笔奖金来平息他的怒火。)" },
                    { word: "pacific", display: "<span class='r'>pac</span><span class='s'>ific</span>", pronunciation: "/pəˈsɪf·ɪk/", translation: "adj. 和平的，温和的 n. (首字母大写) 太平洋", mnemonic: "pac(和平) + ific(制造/充满) = 充满和平的 (麦哲伦航海时觉得这片海域很平静，故命名为太平洋)", example: "We flew over the <span class='highlight-word'>Pacific</span> Ocean. (我们飞越了太平洋。)" }
                ]
            },
            {
                root: "-pel- / -puls-",
                meaning: "推，驱使 (drive, push)",
                words: [
                    { word: "compel", display: "<span class='p'>com</span><span class='r'>pel</span>", pronunciation: "/kəmˈpel/", translation: "v. 强迫，迫使", mnemonic: "com(共同/极其) + pel(推) = 极其用力地推着你往前 = 强迫", example: "The law will <span class='highlight-word'>compel</span> employers to provide health insurance. (该法律将强迫雇主提供医疗保险。)" },
                    { word: "propel", display: "<span class='p'>pro</span><span class='r'>pel</span>", pronunciation: "/prəˈpel/", translation: "v. 推进，驱使", mnemonic: "pro(向前) + pel(推) = 在后面把人或物向前推 = 推进", example: "The wind <span class='highlight-word'>propelled</span> the boat forward. (风推动着小船向前航行。)" },
                    { word: "pulse", display: "<span class='r'>puls</span><span class='s'>e</span>", pronunciation: "/pʌls/", translation: "n. 脉搏，脉冲", mnemonic: "puls(推) + e = 心脏推动血液产生的跳动 = 脉搏", example: "The doctor checked the patient's <span class='highlight-word'>pulse</span>. (医生检查了病人的脉搏。)" }
                ]
            },
            {
                root: "-pend- / -pens-",
                meaning: "悬挂，衡量，花费 (hang, weigh)",
                words: [
                    { word: "depend", display: "<span class='p'>de</span><span class='r'>pend</span>", pronunciation: "/dɪˈpend/", translation: "v. 依赖，依靠", mnemonic: "de(向下) + pend(悬挂) = 挂在别人下面/指望别人托着 = 依赖", example: "You can always <span class='highlight-word'>depend</span> on me. (你永远可以信赖/依靠我。)" },
                    { word: "suspend", display: "<span class='p'>sus</span><span class='r'>pend</span>", pronunciation: "/səˈspend/", translation: "v. 悬挂，暂停，勒令停职", mnemonic: "sus(在下面) + pend(悬挂) = 吊在半空中(不上不下) = 暂停", example: "The flights were <span class='highlight-word'>suspended</span> due to the bad weather. (由于恶劣天气，航班被暂停了。)" },
                    { word: "expense", display: "<span class='p'>ex</span><span class='r'>pens</span><span class='s'>e</span>", pronunciation: "/ɪkˈspens/", translation: "n. 花费，开支", mnemonic: "ex(出) + pens(衡量/钱) + e = 把称量好的钱拿出去 = 花费", example: "The company covers all travel <span class='highlight-word'>expenses</span>. (公司报销所有的差旅开支。)" },
                    { word: "pension", display: "<span class='r'>pens</span><span class='s'>ion</span>", pronunciation: "/ˈpen·ʃn/", translation: "n. 养老金，退休金", mnemonic: "pens(衡量/支付) + ion = 到了年纪按照标准定期支付的钱 = 养老金", example: "He receives a monthly <span class='highlight-word'>pension</span> from the government. (他每月领取政府发放的养老金。)" }
                ]
            },
            {
                root: "-plac-",
                meaning: "使平静，取悦 (please)",
                words: [
                    { word: "placate", display: "<span class='r'>plac</span><span class='s'>ate</span>", pronunciation: "/pləˈkeɪt/", translation: "v. 安抚，平息", mnemonic: "plac(使平静) + ate(动词) = 让激动的人平静下来 = 安抚", example: "They offered a free gift to <span class='highlight-word'>placate</span> the angry customer. (他们提供了一份免费礼物来安抚那位愤怒的顾客。)" },
                    { word: "placebo", display: "<span class='r'>plac</span><span class='s'>ebo</span>", pronunciation: "/pləˈsiː·bəʊ/", translation: "n. 安慰剂", mnemonic: "plac(取悦) + ebo(我将) = 医生给病人开的“我将取悦你”的假药(糖丸) = 安慰剂", example: "Half of the patients were given a <span class='highlight-word'>placebo</span>. (一半的病人服用了安慰剂。)" },
                    { word: "placid", display: "<span class='r'>plac</span><span class='s'>id</span>", pronunciation: "/ˈplæs·ɪd/", translation: "adj. 平静的，温和的", mnemonic: "plac(平静) + id(形容词) = 充满平静属性的", example: "The lake was calm and <span class='highlight-word'>placid</span> in the morning. (清晨的湖面极其宁静平和。)" }
                ]
            },
            {
                root: "-plen- / -plet-",
                meaning: "满，填 (fill)",
                words: [
                    { word: "plenty", display: "<span class='r'>plen</span><span class='s'>ty</span>", pronunciation: "/ˈplen·ti/", translation: "n./pron. 充足，大量", mnemonic: "plen(满) + ty(名词) = 满出来的状态 = 大量", example: "We have <span class='highlight-word'>plenty</span> of time before the train leaves. (火车开之前我们有极其充足的时间。)" },
                    { word: "complete", display: "<span class='p'>com</span><span class='r'>plet</span><span class='s'>e</span>", pronunciation: "/kəmˈpliːt/", translation: "v. 完成 adj. 完整的", mnemonic: "com(全部) + plet(填满) + e = 全部填满了 = 完成的", example: "You have two hours to <span class='highlight-word'>complete</span> the exam. (你有两小时来完成这场考试。)" },
                    { word: "deplete", display: "<span class='p'>de</span><span class='r'>plet</span><span class='s'>e</span>", pronunciation: "/dɪˈpliːt/", translation: "v. 耗尽，使枯竭", mnemonic: "de(去除/向下) + plet(填满) + e = 把填满的东西抽走 = 耗尽", example: "The country's natural resources have been <span class='highlight-word'>depleted</span>. (该国的自然资源已经被消耗殆尽了。)" }
                ]
            }
        ];

        const app = document.getElementById('app');

        database.forEach((group, index) => {
            let wordsHTML = '';
            
            group.words.forEach(item => {
                wordsHTML += `
                    <tr class="word-row">
                        <td class="col-word">
                            <div class="word-display">${item.display}</div>
                            <div class="pronunciation">${item.pronunciation}</div>
                        </td>
                        <td class="col-details">
                            <div class="detail-item">
                                <div class="badge b-trans">译</div>
                                <div class="detail-content">${item.translation}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-mnem">记</div>
                                <div class="detail-content">${item.mnemonic}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-exam">例</div>
                                <div class="detail-content">${item.example}</div>
                            </div>
                        </td>
                    </tr>
                `;
            });

            app.innerHTML += `
                <div class="root-section">
                    <div class="header">
                        <h1 class="root-title">${index + 181}. ${group.root}</h1>
                        <div class="root-meaning">【 核心含义：${group.meaning} 】</div>
                    </div>
                    <table class="word-table">
                        ${wordsHTML}
                    </table>
                </div>
            `;
        });
    </script>
</body>
</html>
