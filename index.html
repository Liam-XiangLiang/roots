沉迷于<br><span style=\"font-size:0.8em;color:gray\">(被死死钩住)</span>","scenario":"<span class=\"context-tag tag-work\">产品与成瘾</span> \"The app is designed to get users <b>hooked into</b> its daily reward system.\"<br>(这款App的机制就是为了让用户死死沉迷于/黏在它的日常奖励系统中。)","tags":["产品与成瘾"]},{"id":994,"verb":"Itch for","meaning":"极度渴望(某事发生或做某事)<br><span style=\"font-size:0.8em;color:gray\">(心里痒痒得受不了)</span>","scenario":"<span class=\"context-tag tag-drama\">迫不及待</span> \"The opposing team is just <b>itching for</b> a fight.\"<br>(对方球队现在简直是心痒难耐/急不可耐地想跟我们干一仗。)","tags":["迫不及待"]},{"id":995,"verb":"Jack up","meaning":"用千斤顶顶起 / 大幅且恶意地提高(价格)<br><span style=\"font-size:0.8em;color:gray\">(极其口语化的抱怨，同 hike up)</span>","scenario":"<span class=\"context-tag tag-life\">吐槽奸商</span> \"The gas stations completely <b>jacked up</b> their prices before the hurricane.\"<br>(飓风来临前，加油站极其恶意地/疯狂地把油价给抬上去了。)","tags":["吐槽奸商"]},{"id":996,"verb":"Key into","meaning":"输入数据 / 深入了解并精准契合(需求)<br><span style=\"font-size:0.8em;color:gray\">(像钥匙插对锁眼一样精准)</span>","scenario":"<span class=\"context-tag tag-work\">洞悉市场</span> \"A successful startup must <b>key into</b> what consumers actually want.\"<br>(一家成功的初创公司必须极其精准地洞悉/契合消费者真正想要的东西。)","tags":["洞悉市场"]},{"id":997,"verb":"Knock together","meaning":"匆匆拼凑做成 / 临时极其敷衍地搭起<br><span style=\"font-size:0.8em;color:gray\">(敲敲打打弄出来，同 cobble together)</span>","scenario":"<span class=\"context-tag tag-work\">吐槽烂活</span> \"We didn't have much time, so we just <b>knocked together</b> a quick prototype.\"<br>(我们没多少时间，所以就极其敷衍地/随便敲敲打打拼凑了一个原型出来。)","tags":["吐槽烂活"]},{"id":998,"verb":"Lash down","meaning":"死死绑紧 / 猛烈抨击<br><span style=\"font-size:0.8em;color:gray\">(用绳子抽打固定)</span>","scenario":"<span class=\"context-tag tag-life\">抗灾准备</span> \"Make sure you <b>lash down</b> everything on the deck before the storm hits.\"<br>(务必在风暴来临前，把甲板上的所有东西都死死绑紧/固定住。)","tags":["抗灾准备"]},{"id":999,"verb":"Leap at","meaning":"欣然接受 / 极其迫不及待地抓住(机会)<br><span style=\"font-size:0.8em;color:gray\">(同 jump at，像猛兽一样扑过去)</span>","scenario":"<span class=\"context-tag tag-work\">绝佳良机</span> \"When they offered him the job in Silicon Valley, he <b>leapt at</b> the chance.\"<br>(当他们给他提供硅谷的工作时，他毫不犹豫地/犹如饿虎扑食般抓住了这个机会。)","tags":["绝佳良机"]},{"id":1000,"verb":"Fall into place","meaning":"(千丝万缕的线索或计划) 完美契合 / 水到渠成<br><span style=\"font-size:0.8em;color:gray\">(像拼图的最后一块完美嵌入。努力的最终回报)</span>","scenario":"<span class=\"context-tag tag-life\">终极圆满/史诗结语</span> \"After months of hard work and endless studying, everything is finally starting to <b>fall into place</b>.\"<br>(经过数月的艰苦努力和无尽的学习，所有的心血终于开始开花结果/一切都水到渠成了。)","tags":["终极圆满/史诗结语"]}];

        let currentIndex = 0; let activeViewMode = 'card'; let currentStatusFilter = 'all'; let currentTagFilter = 'all'; let currentSearchQuery = ''; let isRandomMode = false;
        let masteredList = []; let starredList = []; let displayQueue = [];

        function loadProgress() {
            try {
                const m = localStorage.getItem('pv_mastered_v2'); const s = localStorage.getItem('pv_starred_v2'); const idx = localStorage.getItem('pv_current_index_v2'); const r = localStorage.getItem('pv_random_mode_v2');
                if (m) masteredList = JSON.parse(m); if (s) starredList = JSON.parse(s); if (idx) currentIndex = parseInt(idx, 10) || 0; if (r) isRandomMode = (r === 'true');
            } catch (e) { console.error(e); }
        }
        function saveProgress() { localStorage.setItem('pv_mastered_v2', JSON.stringify(masteredList)); localStorage.setItem('pv_starred_v2', JSON.stringify(starredList)); localStorage.setItem('pv_current_index_v2', currentIndex.toString()); localStorage.setItem('pv_random_mode_v2', isRandomMode.toString()); updateDashboardCounters(); }
        function initTagsDropdown() { const tagSelect = document.getElementById('tagSelect'); const allTags = new Set(); DATASET.forEach(item => { if (item.tags) item.tags.forEach(t => allTags.add(t)); }); allTags.forEach(tag => { const opt = document.createElement('option'); opt.value = tag; opt.textContent = tag; tagSelect.appendChild(opt); }); }
        function shuffleArray(array) { let currentIndex = array.length, randomIndex; while (currentIndex != 0) { randomIndex = Math.floor(Math.random() * currentIndex); currentIndex--; [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]]; } return array; }
        function rebuildDisplayQueue() {
            let result = [...DATASET];
            if (currentSearchQuery) { const query = currentSearchQuery.toLowerCase(); result = result.filter(item => item.verb.toLowerCase().includes(query) || item.meaning.toLowerCase().includes(query) || item.scenario.toLowerCase().includes(query)); }
            if (currentStatusFilter === 'unlearned') { result = result.filter(item => !masteredList.includes(item.id)); } else if (currentStatusFilter === 'mastered') { result = result.filter(item => masteredList.includes(item.id)); } else if (currentStatusFilter === 'starred') { result = result.filter(item => starredList.includes(item.id)); }
            if (currentTagFilter !== 'all') { result = result.filter(item => item.tags && item.tags.includes(currentTagFilter)); }
            if (isRandomMode) { shuffleArray(result); } else { result.sort((a, b) => a.id - b.id); }
            displayQueue = result; if (currentIndex >= displayQueue.length) { currentIndex = Math.max(0, displayQueue.length - 1); }
            document.getElementById('totalCountDisplay').textContent = displayQueue.length;
            document.getElementById('countAll').textContent = DATASET.length;
            document.getElementById('countMastered').textContent = masteredList.length;
            document.getElementById('countStarred').textContent = starredList.length;
            document.getElementById('countUnlearned').textContent = DATASET.length - masteredList.length;
            renderCurrentView();
        }
        function updateDashboardCounters() { const masteredCount = masteredList.length; const starredCount = starredList.length; document.getElementById('masteredCountDisplay').textContent = masteredCount + ' / ' + DATASET.length; document.getElementById('starredCountDisplay').textContent = starredCount; const percent = DATASET.length ? (masteredCount / DATASET.length) * 100 : 0; document.getElementById('progressBarFill').style.width = percent + '%'; }
        function renderCurrentView() { if (activeViewMode === 'card') { renderFlashcard(); } else { renderDenseList(); } }
        function renderFlashcard() {
            const wrapper = document.getElementById('flashcardWrapper'); wrapper.classList.remove('flipped');
            if (displayQueue.length === 0) { document.getElementById('cardVerb').textContent = "Empty Queue"; document.getElementById('cardMeaning').innerHTML = "无匹配短语。"; document.getElementById('cardScenario').innerHTML = "-"; document.getElementById('cardId').textContent = "-"; document.getElementById('cardProgressIndex').textContent = "0 / 0"; document.getElementById('cardTags').innerHTML = ""; return; }
            const item = displayQueue[currentIndex]; document.getElementById('cardId').textContent = item.id; document.getElementById('cardProgressIndex').textContent = (currentIndex + 1) + ' / ' + displayQueue.length; document.getElementById('cardVerb').textContent = item.verb; document.getElementById('backVerb').textContent = item.verb; document.getElementById('cardMeaning').innerHTML = item.meaning; document.getElementById('cardScenario').innerHTML = item.scenario;
            const encodedPhrase = encodeURIComponent(item.verb); const ygUrl = 'https://youglish.com/pronounce/' + encodedPhrase + '/english'; document.getElementById('frontYouGlishBtn').href = ygUrl; document.getElementById('backYouGlishBtn').href = ygUrl;
            const tagsArea = document.getElementById('cardTags'); tagsArea.innerHTML = ''; if (item.tags) { item.tags.forEach(t => { const el = document.createElement('span'); el.className = 'tag-pill'; el.textContent = t; tagsArea.appendChild(el); }); }
            const starBtn = document.getElementById('starCardBtn'); starBtn.className = 'btn-status-toggle btn-star ' + (starredList.includes(item.id) ? 'active' : ''); starBtn.textContent = starredList.includes(item.id) ? '★ 已标星 (S)' : '☆ 标星难点 (S)';
            const masterBtn = document.getElementById('masterCardBtn'); masterBtn.className = 'btn-status-toggle btn-mastered ' + (masteredList.includes(item.id) ? 'active' : ''); masterBtn.textContent = masteredList.includes(item.id) ? '✔ 已学会 (Enter)' : '检测：未学会 (Enter)';
        }
        function renderDenseList() {
            const tbody = document.getElementById('denseTableBody'); tbody.innerHTML = ''; if (displayQueue.length === 0) return;
            displayQueue.forEach(item => {
                const tr = document.createElement('tr'); if (masteredList.includes(item.id)) tr.classList.add('mastered'); const encodedPhrase = encodeURIComponent(item.verb); const ygUrl = 'https://youglish.com/pronounce/' + encodedPhrase + '/english';
                tr.innerHTML = '<td class="td-id">' + item.id + '</td>' +
                               '<td class="td-verb">' + item.verb + ' <a class="youglish-btn" href="' + ygUrl + '" target="_blank" style="font-size:0.65rem; padding:1px 5px;" onclick="event.stopPropagation();">🔊</a></td>' +
                               '<td class="td-meaning">' + item.meaning + '</td>' +
                               '<td class="td-example">' + item.scenario + '</td>' +
                               '<td><button class="star-icon-btn ' + (starredList.includes(item.id) ? 'active' : '') + '">★</button></td>';
                tr.addEventListener('click', (e) => { if (e.target.classList.contains('star-icon-btn')) { e.stopPropagation(); toggleStarStatus(item.id); e.target.classList.toggle('active'); return; } if (e.target.classList.contains('youglish-btn')) return; const idx = displayQueue.findIndex(d => d.id === item.id); if (idx !== -1) { currentIndex = idx; activeViewMode = 'card'; document.querySelectorAll('.mode-btn')[0].click(); } });
                tbody.appendChild(tr);
            });
        }
        function toggleStarStatus(id) { const idx = starredList.indexOf(id); if (idx > -1) { starredList.splice(idx, 1); } else { starredList.push(id); } saveProgress(); if (currentStatusFilter === 'starred') rebuildDisplayQueue(); }
        function toggleMasteredStatus(id) { const idx = masteredList.indexOf(id); if (idx > -1) { masteredList.splice(idx, 1); } else { masteredList.push(id); } saveProgress(); rebuildDisplayQueue(); }
        function nextCard() { if (!displayQueue.length) return; currentIndex = (currentIndex + 1) % displayQueue.length; renderFlashcard(); }
        function prevCard() { if (!displayQueue.length) return; currentIndex = (currentIndex - 1 + displayQueue.length) % displayQueue.length; renderFlashcard(); }
        function setupEventListeners() {
            document.getElementById('flashcardWrapper').addEventListener('click', (e) => { if (e.target.classList.contains('youglish-btn')) return; document.getElementById('flashcardWrapper').classList.toggle('flipped'); });
            document.getElementById('nextCardBtn').addEventListener('click', (e) => { e.stopPropagation(); nextCard(); }); document.getElementById('prevCardBtn').addEventListener('click', (e) => { e.stopPropagation(); prevCard(); });
            document.getElementById('starCardBtn').addEventListener('click', (e) => { e.stopPropagation(); if (displayQueue[currentIndex]) toggleStarStatus(displayQueue[currentIndex].id); renderFlashcard(); });
            document.getElementById('masterCardBtn').addEventListener('click', (e) => { e.stopPropagation(); if (displayQueue[currentIndex]) toggleMasteredStatus(displayQueue[currentIndex].id); });
            document.querySelectorAll('.mode-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); activeViewMode = btn.getAttribute('data-mode'); document.getElementById('cardStage').style.display = activeViewMode === 'card' ? 'flex' : 'none'; document.getElementById('listStage').style.display = activeViewMode === 'list' ? 'block' : 'none'; renderCurrentView(); }); });
            document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentStatusFilter = btn.getAttribute('data-status'); currentIndex = 0; rebuildDisplayQueue(); }); });
            document.getElementById('tagSelect').addEventListener('change', (e) => { currentTagFilter = e.target.value; currentIndex = 0; rebuildDisplayQueue(); });
            document.getElementById('searchInput').addEventListener('input', (e) => { currentSearchQuery = e.target.value; currentIndex = 0; rebuildDisplayQueue(); });
            const randomBtn = document.getElementById('randomToggleBtn'); randomBtn.addEventListener('click', () => { isRandomMode = !isRandomMode; currentIndex = 0; saveProgress(); randomBtn.textContent = isRandomMode ? '🎲 随机乱序模式' : '🔁 顺序播放模式'; rebuildDisplayQueue(); });
            document.getElementById('resetProgressBtn').addEventListener('click', () => { if (confirm('确定要清空背词进度吗？')) { localStorage.clear(); masteredList = []; starredList = []; currentIndex = 0; saveProgress(); rebuildDisplayQueue(); } });
            window.addEventListener('keydown', (e) => { if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return; if (e.code === 'Space') { e.preventDefault(); document.getElementById('flashcardWrapper').classList.toggle('flipped'); } if (e.code === 'ArrowRight' || e.code === 'KeyD') nextCard(); if (e.code === 'ArrowLeft' || e.code === 'KeyA') prevCard(); if (e.code === 'Enter' || e.code === 'KeyW') { e.preventDefault(); if (displayQueue[currentIndex]) toggleMasteredStatus(displayQueue[currentIndex].id); } if (e.code === 'KeyS') { if (displayQueue[currentIndex]) toggleStarStatus(displayQueue[currentIndex].id); renderFlashcard(); } });
        }
        window.addEventListener('DOMContentLoaded', () => { loadProgress(); initTagsDropdown(); setupEventListeners(); rebuildDisplayQueue(); updateDashboardCounters(); });
    </script>
</body>
</html>
