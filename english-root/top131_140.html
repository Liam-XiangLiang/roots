<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Word Families: Top 131-140</title>
    <style>
        :root {
            /* Notion 暗黑模式核心色彩 */
            --bg-color: #191919;
            --table-border: #373737;
            --text-main: #D4D4D4;
            --text-sub: #9B9B9B;
            
            /* 词根词缀高亮色 */
            --c-prefix: #FF7B72; /* 粉红 - 前缀 */
            --c-root: #E5C07B;   /* 明黄 - 词根 */
            --c-suffix: #79C0FF; /* 天蓝 - 后缀 */
            
            /* 标签颜色 */
            --badge-trans: #316DCA;
            --badge-mnem: #347D39;
            --badge-exam: #B05C11;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 40px;
        }

        .root-section {
            margin-bottom: 60px;
        }

        .header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--c-root);
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .root-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            color: var(--c-root);
        }

        .root-meaning {
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: bold;
        }

        .word-table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
        }

        .word-row {
            border-bottom: 1px dashed var(--table-border);
        }
        
        .word-row:last-child {
            border-bottom: none;
        }

        .col-word {
            width: 30%;
            padding: 25px 25px;
            vertical-align: top;
            border-right: 1px dashed var(--table-border);
        }

        .col-details {
            width: 70%;
            padding: 25px;
            vertical-align: top;
        }

        .word-display {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }
        
        .p { color: var(--c-prefix); }
        .r { color: var(--c-root); }
        .s { color: var(--c-suffix); }

        .pronunciation {
            font-family: "Consolas", monospace;
            color: var(--text-sub);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .detail-item:last-child {
            margin-bottom: 0;
        }

        .badge {
            flex-shrink: 0;
            color: #fff;
            font-size: 0.8rem;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            margin-top: 2px;
            font-weight: bold;
        }
        
        .b-trans { background-color: var(--badge-trans); }
        .b-mnem { background-color: var(--badge-mnem); }
        .b-exam { background-color: var(--badge-exam); }

        .detail-content {
            flex-grow: 1;
            font-size: 1.05rem;
        }
        
        .highlight-word {
            color: var(--c-root);
            font-weight: bold;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
    </style>
</head>
<body>

    <div id="app">
    </div>

    <script>
        const database = [
            {
                root: "-cant- / -cent-",
                meaning: "唱 (sing)",
                words: [
                    { word: "chant", display: "<span class='r'>chant</span>", pronunciation: "/tʃɑːnt/", translation: "v./n. 吟唱，咏唱，反复呼喊", mnemonic: "chant(唱) = 反复有节奏地大声唱出", example: "The crowd started to <span class='highlight-word'>chant</span> his name. (人群开始有节奏地反复高呼他的名字。)" },
                    { word: "accent", display: "<span class='p'>ac</span><span class='r'>cent</span>", pronunciation: "/ˈæk·sent/", translation: "n. 口音，重音", mnemonic: "ac(加强) + cent(唱/发声) = 说话时加强的声调 = 口音/重音", example: "He speaks English with a strong French <span class='highlight-word'>accent</span>. (他带着浓重的法国口音说英语。)" },
                    { word: "incentive", display: "<span class='p'>in</span><span class='r'>cent</span><span class='s'>ive</span>", pronunciation: "/ɪnˈsen·tɪv/", translation: "n. 刺激，动机，激励", mnemonic: "in(进入) + cent(唱) + ive = 在人心里唱响战歌 = 激发行动的动机", example: "Bonus payments provide an <span class='highlight-word'>incentive</span> to work harder. (奖金能成为员工更加努力工作的激励/动机。)" },
                    { word: "enchant", display: "<span class='p'>en</span><span class='r'>chant</span>", pronunciation: "/ɪnˈtʃɑːnt/", translation: "v. 使着迷，施魔法", mnemonic: "en(使) + chant(唱) = 对某人唱起迷魂咒语 = 使着迷", example: "The audience was completely <span class='highlight-word'>enchanted</span> by her performance. (观众被她的表演彻底迷住了。)" }
                ]
            },
            {
                root: "-cav-",
                meaning: "洞，空 (hollow)",
                words: [
                    { word: "cave", display: "<span class='r'>cav</span><span class='s'>e</span>", pronunciation: "/keɪv/", translation: "n. 洞穴 v. 塌陷，屈服", mnemonic: "cav(洞) + e = 中空的地方 = 洞穴", example: "The bears hibernate in the <span class='highlight-word'>cave</span> during winter. (熊在冬天躲在洞穴里冬眠。)" },
                    { word: "cavity", display: "<span class='r'>cav</span><span class='s'>ity</span>", pronunciation: "/ˈkæv·ə·ti/", translation: "n. 空腔，蛀牙(牙洞)", mnemonic: "cav(洞) + ity(名词) = 身体或牙齿上的空洞", example: "The dentist found a small <span class='highlight-word'>cavity</span> in my tooth. (牙医在我的牙齿上发现了一个小蛀牙。)" },
                    { word: "excavate", display: "<span class='p'>ex</span><span class='r'>cav</span><span class='s'>ate</span>", pronunciation: "/ˈeks·kə·veɪt/", translation: "v. 挖掘，发掘", mnemonic: "ex(出) + cav(洞) + ate(动词) = 往外挖出洞来 = 挖掘/考古发掘", example: "Archaeologists are <span class='highlight-word'>excavating</span> the ancient ruins. (考古学家们正在发掘古代遗迹。)" }
                ]
            },
            {
                root: "-cern- / -cert-",
                meaning: "搞清，确信 (separate, sure)",
                words: [
                    { word: "certain", display: "<span class='r'>cert</span><span class='s'>ain</span>", pronunciation: "/ˈsɜː·tn/", translation: "adj. 确定的，某(个)", mnemonic: "cert(搞清/确信) + ain = 搞得清清楚楚的 = 确信无疑的", example: "Are you absolutely <span class='highlight-word'>certain</span> about this? (你对这件事绝对确定吗？)" },
                    { word: "concern", display: "<span class='p'>con</span><span class='r'>cern</span>", pronunciation: "/kənˈsɜːn/", translation: "v./n. 关心，涉及，担忧", mnemonic: "con(共同) + cern(搞清) = 大家都想搞清楚并关注的事 = 关心/担忧", example: "Climate change is a major <span class='highlight-word'>concern</span> for scientists. (气候变化是科学家们极其关注/担忧的重大问题。)" },
                    { word: "discern", display: "<span class='p'>dis</span><span class='r'>cern</span>", pronunciation: "/dɪˈsɜːn/", translation: "v. 辨别，看出", mnemonic: "dis(分开) + cern(搞清) = 把事物分开并搞清楚 = 辨别", example: "It is difficult to <span class='highlight-word'>discern</span> the truth from lies. (要在谎言中辨别出真相是很困难的。)" },
                    { word: "certificate", display: "<span class='r'>cert</span><span class='s'>ific</span><span class='s'>ate</span>", pronunciation: "/səˈtɪf·ɪ·kət/", translation: "n. 证书，证明", mnemonic: "cert(确信) + ific(做) + ate = 做出来让人确信的东西 = 证书", example: "You will receive a <span class='highlight-word'>certificate</span> after completing the course. (完成课程后你将获得一份证书。)" }
                ]
            },
            {
                root: "-civ-",
                meaning: "公民 (citizen)",
                words: [
                    { word: "civil", display: "<span class='r'>civ</span><span class='s'>il</span>", pronunciation: "/ˈsɪv·l/", translation: "adj. 公民的，国内的，文明的", mnemonic: "civ(公民) + il = 属于公民的/公民应具备的素质 = 国内的/文明礼貌的", example: "The country has been in a <span class='highlight-word'>civil</span> war for 5 years. (这个国家已经打了5年的内战/公民战争。)" },
                    { word: "civic", display: "<span class='r'>civ</span><span class='s'>ic</span>", pronunciation: "/ˈsɪv·ɪk/", translation: "adj. 城市的，公民的", mnemonic: "civ(公民) + ic(形容词) = 关于城市和市民责任的", example: "Voting is your <span class='highlight-word'>civic</span> duty. (投票是你的公民义务。)" },
                    { word: "civilian", display: "<span class='r'>civil</span><span class='s'>ian</span>", pronunciation: "/səˈvɪl·i·ən/", translation: "n. 平民，百姓", mnemonic: "civil(平民的) + ian(人) = 非军人的老百姓", example: "Many innocent <span class='highlight-word'>civilians</span> were killed in the bombing. (许多无辜的平民在轰炸中丧生。)" },
                    { word: "civilization", display: "<span class='r'>civil</span><span class='s'>ization</span>", pronunciation: "/ˌsɪv·ə·laɪˈzeɪ·ʃn/", translation: "n. 文明", mnemonic: "civil(文明) + ization(化) = 人类社会高度进化的状态", example: "Ancient Egyptian <span class='highlight-word'>civilization</span> was highly advanced. (古埃及文明高度发达。)" }
                ]
            },
            {
                root: "-clud- / -clus-",
                meaning: "关闭 (close)",
                words: [
                    { word: "include", display: "<span class='p'>in</span><span class='r'>clude</span>", pronunciation: "/ɪnˈkluːd/", translation: "v. 包含，包括", mnemonic: "in(向内) + clude(关闭) = 关在里面算作一份子 = 包含", example: "Does the price <span class='highlight-word'>include</span> tax? (这个价格包含税吗？)" },
                    { word: "exclude", display: "<span class='p'>ex</span><span class='r'>clude</span>", pronunciation: "/ɪkˈskluːd/", translation: "v. 排除，不包括", mnemonic: "ex(向外) + clude(关闭) = 关在外面 = 排除在外", example: "Women were historically <span class='highlight-word'>excluded</span> from voting. (在历史上，女性曾被剥夺/排除在投票权之外。)" },
                    { word: "conclude", display: "<span class='p'>con</span><span class='r'>clude</span>", pronunciation: "/kənˈkluːd/", translation: "v. 得出结论，结束", mnemonic: "con(全部) + clude(关闭) = 把事情全部打包并关上门 = 总结/结束", example: "What did you <span class='highlight-word'>conclude</span> from this report? (你从这份报告中得出了什么结论？)" },
                    { word: "exclusive", display: "<span class='p'>ex</span><span class='r'>clus</span><span class='s'>ive</span>", pronunciation: "/ɪkˈskluː·sɪv/", translation: "adj. 独家的，排外的，高端的", mnemonic: "ex(外) + clus(关闭) + ive = 把其他人都关在门外只服务少数人 = 独家的/高端的", example: "This club is very <span class='highlight-word'>exclusive</span>. (这家俱乐部极其高端/排外。)" }
                ]
            },
            {
                root: "-cresc- / -cret-",
                meaning: "增长，产生 (grow)",
                words: [
                    { word: "increase", display: "<span class='p'>in</span><span class='r'>crease</span>", pronunciation: "/ɪnˈkriːs/", translation: "v./n. 增加", mnemonic: "in(加强) + crease(=cresc 增长) = 不断往上涨 = 增加", example: "The company aims to <span class='highlight-word'>increase</span> its sales by 20%. (公司目标是将销售额增加20%。)" },
                    { word: "decrease", display: "<span class='p'>de</span><span class='r'>crease</span>", pronunciation: "/dɪˈkriːs/", translation: "v./n. 减少", mnemonic: "de(向下) + crease(增长) = 往下长 = 减少", example: "The population has <span class='highlight-word'>decreased</span> in recent years. (近年来人口在减少。)" },
                    { word: "create", display: "<span class='r'>cre</span><span class='s'>ate</span>", pronunciation: "/kriˈeɪt/", translation: "v. 创造，创建", mnemonic: "cre(=cret 产生) + ate(使动) = 使新事物从无到有地产生 = 创造", example: "We need to <span class='highlight-word'>create</span> a new marketing strategy. (我们需要创建一个新的营销策略。)" },
                    { word: "concrete", display: "<span class='p'>con</span><span class='r'>crete</span>", pronunciation: "/ˈkɒn·kriːt/", translation: "adj. 具体的 n. 混凝土", mnemonic: "con(共同) + crete(生长/凝结) = 长在一起变成坚硬的实体 = 具体的/混凝土", example: "Do you have any <span class='highlight-word'>concrete</span> evidence? (你有任何确凿/具体的证据吗？)" }
                ]
            },
            {
                root: "-cru- / -crit-",
                meaning: "判断，分开 (judge)",
                words: [
                    { word: "critical", display: "<span class='r'>crit</span><span class='s'>ical</span>", pronunciation: "/ˈkrɪt·ɪ·kl/", translation: "adj. 批判性的，极其关键的", mnemonic: "crit(判断) + ical = 在分岔路口需要做出重大判断的 = 关键的", example: "This is a <span class='highlight-word'>critical</span> moment for the project. (这是该项目极其关键的时刻。)" },
                    { word: "criticize", display: "<span class='r'>crit</span><span class='s'>icize</span>", pronunciation: "/ˈkrɪt·ɪ·saɪz/", translation: "v. 批评，挑剔", mnemonic: "crit(判断) + icize(动词) = 做出负面判断并说出来 = 批评", example: "He is always trying to <span class='highlight-word'>criticize</span> my work. (他总是试图批评/挑剔我的工作。)" },
                    { word: "hypocrite", display: "<span class='p'>hypo</span><span class='r'>crite</span>", pronunciation: "/ˈhɪp·ə·krɪt/", translation: "n. 伪君子", mnemonic: "hypo(在下面/掩饰) + crite(判断) = 表面一套背后一套做判断的人 = 伪君子", example: "He complains about pollution, but drives a huge SUV. What a <span class='highlight-word'>hypocrite</span>! (他抱怨污染，自己却开油老虎SUV。真是个伪君子！)" },
                    { word: "criteria", display: "<span class='r'>crit</span><span class='s'>eria</span>", pronunciation: "/kraɪˈtɪə·ri·ə/", translation: "n. 标准，准则(复数)", mnemonic: "crit(判断) + eria = 用来作为判断依据的东西 = 标准", example: "What are the <span class='highlight-word'>criteria</span> for getting this job? (获得这份工作的标准是什么？)" }
                ]
            },
            {
                root: "-cult-",
                meaning: "耕作，培养 (till, care)",
                words: [
                    { word: "culture", display: "<span class='r'>cult</span><span class='s'>ure</span>", pronunciation: "/ˈkʌl·tʃər/", translation: "n. 文化，培养", mnemonic: "cult(培养) + ure(名词) = 经过人类社会长期培育沉淀下来的东西 = 文化", example: "It takes time to adapt to a new corporate <span class='highlight-word'>culture</span>. (适应新的企业文化需要时间。)" },
                    { word: "cultivate", display: "<span class='r'>cult</span><span class='s'>ivate</span>", pronunciation: "/ˈkʌl·tɪ·veɪt/", translation: "v. 培养，耕作，结交", mnemonic: "cult(培养) + ivate(动词) = 用心去浇灌和种植", example: "He tried to <span class='highlight-word'>cultivate</span> a good relationship with the boss. (他试图与老板培养/建立良好的关系。)" },
                    { word: "agriculture", display: "<span class='p'>agri</span><span class='r'>cult</span><span class='s'>ure</span>", pronunciation: "/ˈæɡ·rɪ·kʌl·tʃər/", translation: "n. 农业", mnemonic: "agri(田地) + culture(耕作) = 在田地里的耕作 = 农业", example: "The country's economy relies heavily on <span class='highlight-word'>agriculture</span>. (该国经济严重依赖农业。)" }
                ]
            },
            {
                root: "-celer-",
                meaning: "快 (swift)",
                words: [
                    { word: "accelerate", display: "<span class='p'>ac</span><span class='r'>celer</span><span class='s'>ate</span>", pronunciation: "/əkˈsel·ə·reɪt/", translation: "v. 加速，促进", mnemonic: "ac(加强/朝向) + celer(快) + ate = 踩下油门变得更快 = 加速", example: "The car can <span class='highlight-word'>accelerate</span> from 0 to 60 mph in 3 seconds. (这辆车能在3秒内从0加速到60英里/小时。)" },
                    { word: "decelerate", display: "<span class='p'>de</span><span class='r'>celer</span><span class='s'>ate</span>", pronunciation: "/diːˈsel·ə·reɪt/", translation: "v. 减速", mnemonic: "de(向下) + celer(快) + ate = 速度往下降 = 减速", example: "You should <span class='highlight-word'>decelerate</span> when approaching a red light. (接近红灯时你应该减速。)" },
                    { word: "celerity", display: "<span class='r'>celer</span><span class='s'>ity</span>", pronunciation: "/səˈler·ə·ti/", translation: "n. 敏捷，快速", mnemonic: "celer(快) + ity(名词) = 速度很快的状态", example: "The police responded to the emergency with great <span class='highlight-word'>celerity</span>. (警方以极快的速度对紧急情况做出了响应。)" }
                ]
            },
            {
                root: "-dent- / -dont-",
                meaning: "牙齿 (tooth)",
                words: [
                    { word: "dentist", display: "<span class='r'>dent</span><span class='s'>ist</span>", pronunciation: "/ˈden·tɪst/", translation: "n. 牙医", mnemonic: "dent(牙齿) + ist(人) = 专门修理牙齿的专业人员 = 牙医", example: "I have an appointment with the <span class='highlight-word'>dentist</span> tomorrow. (我明天预约了看牙医。)" },
                    { word: "dental", display: "<span class='r'>dent</span><span class='s'>al</span>", pronunciation: "/ˈden·tl/", translation: "adj. 牙齿的，牙科的", mnemonic: "dent(牙齿) + al(形容词) = 属于牙齿的", example: "Good <span class='highlight-word'>dental</span> hygiene is important for overall health. (良好的牙齿卫生对整体健康极其重要。)" },
                    { word: "orthodontist", display: "<span class='p'>ortho</span><span class='r'>dont</span><span class='s'>ist</span>", pronunciation: "/ˌɔː·θəˈdɒn·tɪst/", translation: "n. 正畸医生(牙齿矫正)", mnemonic: "ortho(正/直) + dont(牙齿) + ist = 把长歪的牙齿矫正变直的医生", example: "My <span class='highlight-word'>orthodontist</span> said I need to wear braces for two years. (我的正畸医生说我得戴两年牙套。)" },
                    { word: "indent", display: "<span class='p'>in</span><span class='r'>dent</span>", pronunciation: "/ɪnˈdent/", translation: "v. 缩进，使成犬牙交错状", mnemonic: "in(进入) + dent(牙齿) = 像被狗咬了一个缺口一样 = (排版时的) 首行缩进", example: "Don't forget to <span class='highlight-word'>indent</span> the first line of each paragraph. (别忘了每个段落的第一行要缩进。)" }
                ]
            }
        ];

        const app = document.getElementById('app');

        database.forEach((group, index) => {
            let wordsHTML = '';
            
            group.words.forEach(item => {
                wordsHTML += `
                    <tr class="word-row">
                        <td class="col-word">
                            <div class="word-display">${item.display}</div>
                            <div class="pronunciation">${item.pronunciation}</div>
                        </td>
                        <td class="col-details">
                            <div class="detail-item">
                                <div class="badge b-trans">译</div>
                                <div class="detail-content">${item.translation}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-mnem">记</div>
                                <div class="detail-content">${item.mnemonic}</div>
                            </div>
                            <div class="detail-item">
                                <div class="badge b-exam">例</div>
                                <div class="detail-content">${item.example}</div>
                            </div>
                        </td>
                    </tr>
                `;
            });

            app.innerHTML += `
                <div class="root-section">
                    <div class="header">
                        <h1 class="root-title">${index + 131}. ${group.root}</h1>
                        <div class="root-meaning">【 核心含义：${group.meaning} 】</div>
                    </div>
                    <table class="word-table">
                        ${wordsHTML}
                    </table>
                </div>
            `;
        });
    </script>
</body>
</html>
